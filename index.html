// ─── TIME HELPERS ─────────────────────────────────────────────────────────────
function addMin(t, m) {
  const [h,mn] = t.split(':').map(Number);
  const tot = h*60+mn+m;
  return `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;
}
function durLabel(m) {
  const h=Math.floor(m/60), mn=m%60;
  return h&&mn?`${h} jam ${mn} menit`:h?`${h} jam`:`${mn} menit`;
}
function pickRand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function parseDurasi(v) {
  return {'1D':[1,0],'2D1N':[2,1],'3D2N':[3,2],'4D3N':[4,3],'5D4N':[5,4]}[v]||[2,1];
}
function timeToMin(t) {
  if (!t || typeof t !== 'string') return 9999;
  const [h,m] = t.split(':').map(Number);
  return (h||0)*60+(m||0);
}
function sortActivities(acts) {
  return [...acts].sort((a,b) => timeToMin(a.time)-timeToMin(b.time));
}

// ─── TRANSPORT HELPERS ────────────────────────────────────────────────────────
function hasMotor()  { return S.transport==='pribadi_motor' || S.sewaLokal.has('motor'); }
function hasMobil()  { return S.transport==='pribadi_mobil' || S.sewaLokal.has('mobil_driver'); }
function hasOjek()   { return S.sewaLokal.has('ojek'); }
function getTransportLabel() {
  if (hasMotor()) return 'motor';
  if (hasMobil()) return 'mobil';
  if (hasOjek())  return 'ojek online';
  return 'kendaraan';
}
function tipsKembaliDaratan() {
  if (hasMotor() || hasMobil()) return 'Kendaraanmu sudah standby di parkiran GWD. Perjalanan balik ke penginapan ±45 menit.';
  if (hasOjek())  return 'Grab/Gojek terbatas di area GWD — sebaiknya pesan ojek pangkalan atau arrange jemputan H-1.';
  return 'Transportasi umum tidak tersedia di area GWD. Pastikan sudah arrange kendaraan pulang dari H-1.';
}
function travelMinutes(coord1, coord2) {
  if (!coord1 || !coord2) return 20;
  const dist = haversineKm(coord1.lat, coord1.lng, coord2.lat, coord2.lng);
  const speed = hasMotor() ? 35 : hasMobil() ? 40 : 35;
  return Math.round((dist/speed)*60)+10;
}

<script>
// ─── KULINER HELPERS ──────────────────────────────────────────────────────────
function getKulinerNear(lat, lng, radiusKm=1, maxResult=5) {
  if (!lat || !lng) return [];
  const cache = window._placesCache || [];
  return cache
    .filter(d => {
      const t = ((d.type||'')+(d.kategori||'')).toLowerCase();
      return t.includes('kuliner')||t.includes('cafe')||t.includes('kafe')||
             t.includes('restoran')||t.includes('warung')||t.includes('rumah makan')||
             t.includes('seafood')||t.includes('makan')||t.includes('kedai')||
             t.includes('depot')||t.includes('lesehan')||t.includes('kopi');
    })
    .filter(d => d.lat && d.lng && d.nama)
    .map(d => ({...d, dist: haversineKm(lat, lng, d.lat, d.lng)}))
    .filter(d => d.dist <= radiusKm)
    .sort((a,b)=>a.dist-b.dist)
    .slice(0, maxResult);
}

function kulinerActivity(k, waktu, labelWaktu, fallbackZone) {
  const timeMap = { pagi:'07:00', siang:'12:30', malam:'19:00' };
  const distTxt = k.dist<1 ? `${Math.round(k.dist*1000)}m dari lokasi` : `${k.dist.toFixed(1)}km dari lokasi`;
  return {
    time: timeMap[waktu]||timeMap.siang,
    name: `${labelWaktu} — ${k.nama}`,
    location: k.nama+(k.kawasan?`, ${k.kawasan}`:''),
    duration: '1 jam',
    description: `${labelWaktu} di ${k.nama}. ${k.catatan||k.menu_andalan||k.kategori||''}`.trim(),
    tips: `~${distTxt}${k.harga?' · Rp'+k.harga:''}`,
    estimatedCost: k.harga ? parseInt(String(k.harga).replace(/\D/g,''))||25000 : 25000,
    type: 'makan',
  };
}

function getDestCoords(destOrId) {
  const id = typeof destOrId==='string' ? destOrId : destOrId?.id;
  const d  = typeof destOrId==='object' ? destOrId : DESTINATIONS.find(x=>x.id===id);
  if (d?.lat && d?.lng) return {lat:d.lat, lng:d.lng};
  const ext = DEST_EXT[id];
  if (ext?.lat && ext?.lng) return {lat:ext.lat, lng:ext.lng};
  return null;
}
function midpoint(c1, c2) {
  if (!c1||!c2) return c1||c2||null;
  return {lat:(c1.lat+c2.lat)/2, lng:(c1.lng+c2.lng)/2};
}

function buildMakan(waktu, zone, overrideTime, refLat, refLng) {
  const timeMap  = { pagi:'07:00', siang:'12:30', malam:'19:00' };
  const labelMap = { pagi:'Sarapan', siang:'Makan Siang', malam:'Makan Malam' };
  const finalTime = overrideTime || timeMap[waktu];
  const label = labelMap[waktu];

  if (S.kulinerCustom && S.kulinerCustom.trim()) {
    return { time:finalTime, name:`${label} — ${S.kulinerCustom.trim()}`,
      location:S.kulinerCustom.trim(), duration:'1 jam',
      description:`${label} di ${S.kulinerCustom.trim()} — pilihan kuliner incaran kamu.`,
      tips:'Sesuaikan dengan jam operasional.', estimatedCost:30000, type:'makan' };
  }

  const hotelC = getHotelCoords();
  const coords = (refLat && refLng) ? {lat:refLat, lng:refLng} : hotelC;
  if (!window._usedKuliner) window._usedKuliner = new Set();

  const nearby = getKulinerNear(coords.lat, coords.lng, 1, 5);
  if (nearby.length > 0) {
    const fresh = nearby.filter(k => !window._usedKuliner.has(k.id||k.nama));
    const k = fresh.length > 0 ? fresh[0] : nearby[0];
    window._usedKuliner.add(k.id||k.nama);
    return kulinerActivity(k, waktu, label, zone);
  }
  const nearby3 = getKulinerNear(coords.lat, coords.lng, 3, 5);
  if (nearby3.length > 0) {
    const fresh = nearby3.filter(k => !window._usedKuliner.has(k.id||k.nama));
    const k = fresh.length > 0 ? fresh[0] : nearby3[0];
    window._usedKuliner.add(k.id||k.nama);
    return kulinerActivity(k, waktu, label, zone);
  }

  const genDesc = {
    pagi:  'Cari warung sarapan lokal — Sego Tempong, nasi pecel, atau lontong sayur khas Banyuwangi.',
    siang: 'Cari warung makan terdekat. Menu andalan: Rujak Soto, Rawon, atau Pecel Pitik.',
    malam: 'Cari warung makan malam di sekitar penginapan. Banyak pilihan seafood dan warung kaki lima.',
  };
  return {
    time:finalTime, name:`${label} — Warung Lokal Sekitar Lokasi`,
    location:'Warung terdekat dari lokasi', duration:'1 jam',
    description:genDesc[waktu],
    tips:'Tanya rekomendasi ke warga lokal atau penginapan.',
    estimatedCost: waktu==='pagi'?20000:waktu==='siang'?25000:30000,
    type:'makan',
  };
}

function getHotelCoords() {
  const h = (S.penginapanDataList||[]).find(p=>p.lat&&p.lng);
  if (h) return {lat:h.lat, lng:h.lng};
  return BWI_COORDS.pusat;
}

// ─── ARRIVAL DAY ─────────────────────────────────────────────────────────────
function buildArrivalDay(kota, transport, penginapan) {
  const isUmum  = transport === 'umum';
  const jamTiba = parseInt((S.waktuTiba||'10:00').split(':')[0]);
  const finalHotel = getFinalHotelName();
  const hotelC  = getHotelCoords();
  const selectedDests  = DESTINATIONS.filter(d => S.destinations.has(d.id));
  const firstDestCoord = selectedDests.length>0 ? getDestCoords(selectedDests[0]) : null;
  const sarapanCoord   = midpoint(BWI_COORDS.stasiun, firstDestCoord) || BWI_COORDS.stasiun;
  const acts = [];

  acts.push({ _order:0, time:S.waktuTiba, name:'Tiba di Banyuwangi',
    location: isUmum ? 'Stasiun/Bandara Banyuwangi' : 'Banyuwangi',
    duration:'30 menit', description:'Selamat datang di Banyuwangi! 🎉',
    tips: hasMotor() ? 'Kendaraan sewa bisa diambil di area stasiun — konfirmasi H-1.'
      : hasMobil() ? 'Mobil + driver sudah bisa standby di stasiun — konfirmasi jadwal jemput H-1.'
      : hasOjek()  ? 'Grab/Gojek tersedia di area stasiun untuk perjalanan pertama.'
      : 'Grab/Gojek tersedia di area stasiun.',
    estimatedCost:0, type:'transport' });

  if (jamTiba < 11) {
    acts.push({ _order:1, time:addMin(S.waktuTiba,20), name:'Titip Tas (Opsional)',
      location:'Locker Wangi / Area Stasiun', duration:'20 menit',
      description:'Jika membawa koper besar, bisa dititipkan di Locker Wangi sebelum jalan-jalan.',
      tips:'Locker Wangi: lockerwangi.com | Tarif ~25K/tas. Buka 24 jam.',
      estimatedCost:25000, type:'aktivitas' });
    const sarapan = buildMakan('pagi','kota', addMin(S.waktuTiba,45), sarapanCoord.lat, sarapanCoord.lng);
    sarapan.name = 'Sarapan Khas Banyuwangi';
    acts.push({ _order:2, ...sarapan, time:addMin(S.waktuTiba,45) });
    acts.push({ _order:3, time:'13:00', name:'Check-in Penginapan',
      location:finalHotel, duration:'1 jam',
      description:`Check-in ${finalHotel}. Check-in standar jam 14:00.`,
      tips:'Hubungi penginapan H-1 untuk konfirmasi early check-in.',
      estimatedCost:0, type:'penginapan' });
    const malamAct = buildMakan('malam','kota','19:00',hotelC?.lat,hotelC?.lng);
    malamAct.time = '19:00';
    acts.push({ _order:10, ...malamAct });
  } else if (jamTiba >= 11 && jamTiba < 18) {
    const checkInTime = jamTiba>=14 ? S.waktuTiba : '14:00';
    if (jamTiba < 14) {
      const siangAct = buildMakan('siang','kota',addMin(S.waktuTiba,30),BWI_COORDS.stasiun.lat,BWI_COORDS.stasiun.lng);
      siangAct.name  = 'Makan Siang Sambil Menunggu Check-in';
      acts.push({ _order:1, ...siangAct });
    }
    acts.push({ _order:2, time:checkInTime, name:'Check-in Penginapan',
      location:finalHotel, duration:'1 jam',
      description:`Check-in ${finalHotel}. Istirahat dan bersih-bersih setelah perjalanan.`,
      tips:'', estimatedCost:0, type:'penginapan' });
    const malamAct = buildMakan('malam','kota','19:00',hotelC?.lat,hotelC?.lng);
    malamAct.time = '19:00';
    acts.push({ _order:10, ...malamAct });
  } else {
    acts.push({ _order:1, time:addMin(S.waktuTiba,20), name:'Check-in & Istirahat',
      location:finalHotel, duration:'Malam',
      description:`Check-in ${finalHotel}. Istirahat yang cukup.`,
      tips:'', estimatedCost:0, type:'penginapan' });
    const malamAct = buildMakan('malam','kota',addMin(S.waktuTiba,60),BWI_COORDS.stasiun.lat,BWI_COORDS.stasiun.lng);
    acts.push({ _order:2, ...malamAct });
  }

  const ordered = acts.sort((a,b)=>(a._order||0)-(b._order||0)).map(({_order,...r})=>r);
  return { day:1, date_label:'Hari 1', title:'Kedatangan di Banyuwangi', activities:ordered };
}

function injectArrivalExtras(arrivalDay) {
  const extras = (S.planArrivalExtras||[]).map(id=>DESTINATIONS.find(d=>d.id===id)).filter(Boolean);
  if (extras.length===0) return arrivalDay;
  const pagiSpots = extras.filter(d => { const bt=(DEST_EXT[d.id]?.bestTime||'').toLowerCase(); return bt.includes('pagi')||bt===''; });
  const soreSpots = extras.filter(d => { const bt=(DEST_EXT[d.id]?.bestTime||'').toLowerCase(); return bt.includes('sore')||bt.includes('sunset')||bt.includes('siang'); });
  let curPagi = addMin(S.waktuTiba, 80);
  let prevCoord = BWI_COORDS.stasiun;
  const pagiActs = pagiSpots.map(d => {
    const ext=DEST_EXT[d.id]||{}, dur=ext.dur||90;
    const dCoord=getDestCoords(d)||prevCoord;
    const travelMin=travelMinutes(prevCoord,dCoord);
    curPagi=addMin(curPagi,travelMin);
    const act={time:curPagi,name:d.name,location:d.name+', Banyuwangi',duration:durLabel(dur),description:ext.desc||d.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'};
    curPagi=addMin(curPagi,dur); prevCoord=dCoord;
    return act;
  });
  const checkInTime=timeToMin(curPagi)>timeToMin('13:00')?curPagi:'13:00';
  let curSore=addMin(checkInTime,90);
  const soreActs=soreSpots.map(d=>{
    const ext=DEST_EXT[d.id]||{},dur=ext.dur||120;
    const act={time:curSore,name:d.name,location:d.name+', Banyuwangi',duration:durLabel(dur),description:ext.desc||d.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'};
    curSore=addMin(curSore,dur+30); return act;
  });
  const base=arrivalDay.activities;
  const idxSarapan=base.findIndex(a=>a.type==='makan');
  const idxCheckin=base.findIndex(a=>a.type==='penginapan');
  const result=[];
  base.forEach((a,i)=>{
    result.push(a);
    if(i===idxSarapan&&pagiActs.length>0){result.push(...pagiActs);if(idxCheckin>=0)base[idxCheckin].time=checkInTime;}
    if(i===idxCheckin&&soreActs.length>0){result.push(...soreActs);}
  });
  arrivalDay.activities=result;
  return arrivalDay;
}

function buildDepartureDay(dayNum, kota, transport) {
  const isUmum   = transport==='umum';
  const subTrans = S.subTransport;
  const jamPulang= S.waktuPulang||'13:00';
  const depPoint = subTrans==='pesawat'?BWI_COORDS.bandara:subTrans==='kereta'?BWI_COORDS.stasiun:isUmum?BWI_COORDS.pelabuhan:BWI_COORDS.pusat;
  const hotelC   = getHotelCoords();
  const checkoutTime=addMin(jamPulang,-90);
  const olehTime=addMin(jamPulang,-210);
  const sarapanRaw=addMin(jamPulang,-300);
  const sarapanTime=timeToMin(sarapanRaw)<timeToMin('06:30')?'06:30':sarapanRaw;
  const sarapan=buildMakan('pagi','kota',sarapanTime,hotelC?.lat,hotelC?.lng);
  sarapan.name='Sarapan & Persiapan Check-out';
  const makanAkhir=buildMakan('siang','kota',addMin(jamPulang,-60),depPoint.lat,depPoint.lng);
  makanAkhir.name='Makan Terakhir di Banyuwangi';
  const olehOleh=getKulinerNear(depPoint.lat,depPoint.lng,5,3).filter(k=>{const t=(k.type||k.kategori||k.nama||'').toLowerCase();return t.includes('oleh')||t.includes('toko')||t.includes('kopi')||t.includes('souvenir')||t.includes('batik');});
  const olehDesc=olehOleh.length>0?`Belanja oleh-oleh di sekitar ${depPoint.label}: ${olehOleh.map(k=>k.nama).join(', ')}.`:'Kopi Osing, Batik Gajah Oling, Dodol Banyuwangi.';
  const activities=[
    {...sarapan, time:sarapanTime},
    {time:olehTime,name:'Belanja Oleh-oleh Khas Banyuwangi',location:olehOleh.length>0?olehOleh[0].nama:'Toko Oleh-oleh Banyuwangi',duration:'1.5 jam',description:olehDesc,tips:'Toko Oleh-oleh Barokah di Jl. A. Yani.',estimatedCost:150000,type:'aktivitas'},
    {...makanAkhir,time:addMin(jamPulang,-60)},
    {time:jamPulang,name:`Perjalanan Pulang ke ${kota}`,location:depPoint.label,duration:isUmum?'±6–8 jam':'±4–5 jam',description:`Bertolak dari ${depPoint.label} kembali ke ${kota}. Bawa kenangan indah dari Banyuwangi!`,tips:'Sampai jumpa lagi di Banyuwangi! 🌋',estimatedCost:isUmum?150000:60000,type:'transport'},
  ];
  return {day:dayNum,date_label:`Hari ${dayNum}`,title:'Oleh-oleh & Perjalanan Pulang',activities};
}

function buildActivityDay(dayNum, spots, zone, form, opts={}) {
  const hasIjen      = spots.some(s=>s.id==='ijen');
  const hasSukamade  = spots.some(s=>s.id==='sukamade');
  const hasMenjangan = spots.some(s=>s.id==='menjangan'||(s.name||'').toLowerCase().includes('menjangan'));
  const hasTabuhan   = spots.some(s=>s.id==='tabuhan'  ||(s.name||'').toLowerCase().includes('tabuhan'));

  if (hasMenjangan || hasTabuhan) {
    const title = (hasMenjangan&&hasTabuhan)?'Snorkeling Menjangan & Tabuhan':hasMenjangan?'Snorkeling Pulau Menjangan':'Pulau Tabuhan';
    const biaya = (hasMenjangan&&hasTabuhan)?275000:hasMenjangan?250000:100000;
    const sisaSpots=spots.filter(s=>s.id!=='menjangan'&&s.id!=='tabuhan');
    const malamAct=buildMakan('malam','utara',null,getHotelCoords()?.lat,getHotelCoords()?.lng); malamAct.time='19:00';
    const acts=[
      {time:'06:30',name:'Berangkat Menuju Grand Watu Dodol',location:`${getFinalHotelName()} → Pantai Grand Watu Dodol`,duration:'±45 menit',description:'Perjalanan menuju meeting point open trip di Pantai Grand Watu Dodol.',tips:'Tiket masuk Grand Watu Dodol 8K/orang + parkir 10K.',estimatedCost:18000,type:'transport'},
      {time:'07:30',name:`Meeting Point & Briefing — ${title}`,location:'Pantai Grand Watu Dodol (Sunrise Boat)',duration:'30 menit',description:'Registrasi, fitting alat snorkeling, dan briefing singkat dari guide.',tips:`Open trip via Yukbanyuwangi. Booking H-1. Biaya ~${biaya.toLocaleString('id-ID')}/orang all-in termasuk makan siang.`,estimatedCost:biaya,type:'aktivitas'},
    ];
    if (hasMenjangan) acts.push({time:'08:15',name:'Menyeberang & Snorkeling Pulau Menjangan',location:'Pulau Menjangan, TN Bali Barat',duration:'±4 jam',description:'Snorkeling di Sandy Slope dan Coral Garden — visibilitas hingga 30m.',tips:'Fins boleh bawa sendiri.',estimatedCost:0,type:'aktivitas'});
    acts.push({time:'12:30',name:'Berlabuh di Pulau Tabuhan — Makan Siang',location:'Pulau Tabuhan',duration:'2.5 jam',description:'Makan siang (sudah termasuk paket). Explore pasir putih dan gradasi air biru.',tips:'Ada surau dan toilet di pulau.',estimatedCost:50000,type:'aktivitas'});
    acts.push({time:'15:00',name:'Kembali ke Daratan & Bilas',location:'Pantai Grand Watu Dodol',duration:'1 jam',description:'Perjalanan balik. Fasilitas kamar bilas tersedia.',tips:tipsKembaliDaratan(),estimatedCost:0,type:'transport'});
    acts.push(malamAct);
    // sisaSpots hanya ditambah kalau waktunya cukup (sebelum jamPulang - 2 jam)
    const jamPulangH = parseInt((S.waktuPulang||'13:00').split(':')[0]);
    if (sisaSpots.length>0 && jamPulangH >= 18) {
      sisaSpots.forEach((spot,i)=>{const ext=DEST_EXT[spot.id]||{};acts.push({time:addMin('16:30',i*90),name:spot.name,location:spot.name+', Banyuwangi',duration:durLabel(ext.dur||90),description:ext.desc||spot.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'});});
    }
    return {day:dayNum,date_label:`Hari ${dayNum}`,title,activities:sortActivities(acts)};
  }

  if (hasSukamade) {
    const hotelC=getHotelCoords();
    const acts=[
      buildMakan('pagi',zone,null,DEST_EXT.sukamade?.lat,DEST_EXT.sukamade?.lng),
      {time:'08:00',name:'Perjalanan Menuju Sukamade',location:'Pesanggaran → Sarongan → Sukamade',duration:'2–3 jam',description:'Perjalanan menuju Pantai Sukamade via Pesanggaran. Jalan terakhir offroad, disarankan pakai jeep.',tips:`Sewa jeep lokal ~300–500K. Briefing konservasi wajib diikuti sebelum malam.`,estimatedCost:400000,type:'transport'},
      {time:'11:00',name:'Wisata Konservasi & Pantai Sukamade',location:'Pantai Sukamade, TN Meru Betiri',duration:'3 jam',description:'Explore pantai, spot snorkeling, dan kunjungi pusat konservasi penyu.',tips:'Bawa baju ganti dan camilan.',estimatedCost:10000,type:'aktivitas'},
      buildMakan('siang','selatan',null,DEST_EXT.sukamade?.lat,DEST_EXT.sukamade?.lng),
      {time:'15:00',name:'Istirahat Siang Menjelang Malam',location:'Penginapan/Losmen Sukamade',duration:'3 jam',description:'Istirahat dan persiapan untuk misi malam — menyaksikan penyu bertelur.',tips:'Gunakan pakaian berwarna gelap.',estimatedCost:0,type:'istirahat'},
      {time:'20:00',name:'Misi Penyu Sukamade 🐢',location:'Pantai Sukamade, Meru Betiri',duration:'2–3 jam',description:'Dipandu ranger ke pantai peneluran. Saksikan penyu hijau bertelur — pengalaman yang tidak terlupakan.',tips:'Dilarang bawa senter, suara keras, dan rokok. HP dalam mode senyap.',estimatedCost:0,type:'aktivitas'},
    ];
    return {day:dayNum,date_label:`Hari ${dayNum}`,title:'Misi Penyu Sukamade',activities:sortActivities(acts)};
  }

  if (hasIjen) {
    const ijenExt=DEST_EXT['ijen']||{};
    const hotelC=getHotelCoords();
    const extraSpots=spots.filter(s=>s.id!=='ijen');
    const acts=[
      {time:'01:00',name:'Bangun & Persiapan Ijen',location:getFinalHotelName(),duration:'30 menit',description:'Bangun dini hari. Pakai jaket paling tebal, masker N95, dan headlamp. Sarapan ringan atau skip.',tips:'Atur alarm 00:45. Simpan barang berharga di hotel.',estimatedCost:0,type:'istirahat'},
      {time:'01:30',name:'Perjalanan ke Paltuding (Basecamp Ijen)',location:`${getFinalHotelName()} → Paltuding`,duration:'1.5 jam',description:`Perjalanan dari ${getFinalHotelName()} ke Paltuding (basecamp Kawah Ijen). Jalannya berliku dan gelap.`,tips:`Pakai ${getTransportLabel()}. Perjalanan ±1.5 jam dari kota, pastikan kendaraan prima. Parkir di Paltuding.`,estimatedCost:0,type:'transport'},
      {time:'03:00',name:'Trekking Kawah Ijen — Blue Fire',location:'Paltuding → Puncak Kawah Ijen',duration:'2.5 jam',description:'Trek 3km dengan elevasi 900m dari Paltuding ke puncak. Di kawah, saksikan blue fire misterius dari jarak dekat.',tips:'Beli tiket di gerbang (Rp5.000 WNI, Rp150.000 WNA). Masker gas WAJIB. Porter tersedia ~150K.',estimatedCost:5000,type:'aktivitas'},
      {time:'05:30',name:'Sunrise di Puncak Ijen',location:'Puncak Kawah Ijen (2.386m)',duration:'1 jam',description:'Matahari terbit di puncak dengan pemandangan kawah biru di bawah. Momen paling dramatis di Banyuwangi.',tips:'Suhu di puncak <10°C saat subuh. Jangan buang sampah, jaga kebersihan kawasan.',estimatedCost:0,type:'aktivitas'},
      {time:'07:00',name:'Turun dari Ijen',location:'Puncak → Paltuding',duration:'1.5 jam',description:'Turun dengan santai, nikmati pemandangan hutan hujan tropis.',tips:'Turunan lebih licin dari pada naik. Hati-hati.',estimatedCost:0,type:'transport'},
    ];
    const ijenEnd='09:30';
    if (extraSpots.length>0 && S.gayaPerjalanan==='eksplorasi') {
      let curTime=addMin(ijenEnd,60);
      acts.push(buildMakan('siang',zone,curTime,getHotelCoords()?.lat,getHotelCoords()?.lng));
      curTime=addMin(curTime,60+45);
      extraSpots.forEach(spot=>{
        const ext=DEST_EXT[spot.id]||{};
        const dur=ext.dur||120;
        acts.push({time:curTime,name:spot.name,location:spot.name+', Banyuwangi',duration:durLabel(dur),description:ext.desc||spot.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'});
        curTime=addMin(curTime,dur+30);
      });
    } else {
      acts.push({time:'10:00',name:'Kembali ke Penginapan & Istirahat',location:getFinalHotelName(),duration:'Sisa hari',description:'Tidur siang total — ini yang paling dibutuhkan setelah trekking semalam suntuk.',tips:'Selamat, kamu baru menyelesaikan petualangan terberat di Banyuwangi! 🌋',estimatedCost:0,type:'istirahat'});
    }
    return {day:dayNum,date_label:`Hari ${dayNum}`,title:'Petualangan Kawah Ijen',activities:sortActivities(acts)};
  }

  // ── Normal activity day ──────────────────────────────────────────────────────
  const acts = [];
  const hotelC=getHotelCoords();
  const distKm=ZONE_DIST[zone]||30;
  const travelMins=(hasMotor()||hasMobil())?Math.round(distKm/40*60):Math.round(distKm/35*60)+15;
  const travelLabel=hasMotor()||hasMobil()?`~${Math.round(distKm/40*60)}–${Math.round(distKm/40*60)+15} menit`:`~${Math.round(distKm/30*60)} menit dengan ${getTransportLabel()}`;

  acts.push(buildMakan('pagi',zone,null,hotelC?.lat,hotelC?.lng));
  acts.push({time:addMin('07:00',60+15),name:`Perjalanan ke Area ${ZONE_LABEL_SHORT[zone]||zone}`,
    location:`${getFinalHotelName()} → ${ZONE_LABEL_SHORT[zone]||zone}`,
    duration:travelLabel,
    description:`Perjalanan menuju destinasi hari ini. Siapkan diri untuk pengalaman luar biasa!`,
    tips:hasMotor()?'Isi bensin penuh — SPBU terbatas di area wisata.':hasMobil()?'Gunakan Google Maps — signal melemah di beberapa titik.':'Pesan ojek/grab dari H-1.',
    estimatedCost:hasMotor()?15000:hasMobil()?50000:40000,type:'transport'});

  const sorted = opts.honorOrder ? spots : [...spots].sort((a,b)=>{
    const sa=DEST_EXT[a.id]?.isSunset?10:DEST_EXT[a.id]?.isNight?20:0;
    const sb=DEST_EXT[b.id]?.isSunset?10:DEST_EXT[b.id]?.isNight?20:0;
    return sa-sb;
  });
  const mainSpots  =sorted.filter(s=>!DEST_EXT[s.id]?.isSunset&&!DEST_EXT[s.id]?.isNight);
  const sunsetSpots=sorted.filter(s=>DEST_EXT[s.id]?.isSunset);
  const nightSpots =sorted.filter(s=>DEST_EXT[s.id]?.isNight&&!DEST_EXT[s.id]?.isSunset);

  let curTime=addMin('07:00',60+15+travelMins);
  mainSpots.forEach((spot,i)=>{
    const ext=DEST_EXT[spot.id]||{};
    const dur=ext.dur||180;
    acts.push({time:curTime,name:spot.name,location:spot.name+', Banyuwangi',duration:durLabel(dur),description:ext.desc||spot.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'});
    curTime=addMin(curTime,dur);
    if(i<mainSpots.length-1) {
      acts.push(buildMakan('siang',zone,curTime,getDestCoords(spot)?.lat,getDestCoords(spot)?.lng));
      curTime=addMin(curTime,60);
    }
  });

  const hasMidMakan=acts.some(a=>a.type==='makan'&&a.name.toLowerCase().includes('siang'));
  if (!hasMidMakan) {
    const siangTime=acts.filter(a=>a.type==='aktivitas').length>0?addMin(curTime,-30):'12:30';
    acts.push(buildMakan('siang',zone,siangTime,null,null));
    if (timeToMin(siangTime)<timeToMin(curTime)) curTime=addMin(siangTime,60);
  }

  sunsetSpots.forEach(spot=>{
    const ext=DEST_EXT[spot.id]||{};
    const dur=ext.dur||180;
    const sunsetStart='16:00';
    acts.push({time:sunsetStart,name:spot.name,location:spot.name+', Banyuwangi',duration:durLabel(dur),description:ext.desc||spot.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'});
    curTime=addMin(sunsetStart,dur);
  });

  const malamAct=buildMakan('malam',zone,'19:00',hotelC?.lat,hotelC?.lng);
  acts.push(malamAct);
  nightSpots.forEach(spot=>{
    const ext=DEST_EXT[spot.id]||{};
    acts.push({time:'20:00',name:spot.name,location:spot.name,duration:durLabel(ext.dur||180),description:ext.desc||spot.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'});
  });

  const baseTitle=spots.length===1?spots[0].name:`Jelajah ${ZONE_LABEL_SHORT[zone]||'Banyuwangi'}`;
  return {day:dayNum,date_label:`Hari ${dayNum}`,title:baseTitle,activities:sortActivities(acts)};
}

// ─── BUDGET & SUMMARY ─────────────────────────────────────────────────────────
function calculateBudget(spots, form, totalDays) {
  const tiket  = spots.reduce((s,d)=>s+(DEST_EXT[d.id]?.tiket||0),0);
  const makan  = totalDays*3*27000;
  const nights = Math.max(0,totalDays-1);
  const hotelEst={hotel45:700000,hotel3:300000,hotel12:150000,homestay:80000,none:0,firebase:150000,custom:150000};
  const hotel  = (hotelEst[form.penginapan]||100000)*nights;
  const sewaEst=[...(form.sewaLokal||[])].reduce((s,v)=>s+({motor:120000,mobil_driver:500000,ojek:30000}[v]||0)*totalDays,0);
  const transPP={kereta:250000,pesawat:1500000,bus:150000}[form.subTransport]||(form.transport==='pribadi_mobil'?400000:form.transport==='pribadi_motor'?150000:200000);
  const totalTransport=transPP+sewaEst;
  const min=tiket+makan+hotel+totalTransport;
  return {
    min:Math.round(min/1000)*1000, max:Math.round(min*1.35/1000)*1000,
    details:{transportasi:totalTransport,akomodasi:hotel,kuliner:makan,wisata:tiket},
    note:`Per orang · ${totalDays} hari · Belum termasuk oleh-oleh`,
  };
}
function buildPackingTips(spots) {
  const base=new Set(['Sunscreen SPF50+','Uang tunai (ATM terbatas)','Powerbank','Kartu identitas','Obat-obatan pribadi']);
  spots.forEach(s=>(PACKING_DB[s.id]||[]).forEach(t=>base.add(t)));
  return [...base].slice(0,8);
}
function buildSummary(spots, totalDays, gaya, kota) {
  return `Itinerary ${totalDays} hari dari ${kota} ke ${spots.length} destinasi terbaik Banyuwangi, disusun dengan gaya ${gaya==='santai'?'santai — menikmati setiap momen tanpa terburu-buru':'eksplorasi — efisien namun tetap berkesan'}.`;
}
function buildNotes(spots) {
  const n=[];
  if(spots.some(s=>s.id==='ijen')) n.push('Kawah Ijen ditutup saat cuaca ekstrem — selalu cek update terbaru sebelum berangkat.');
  if(spots.some(s=>s.id==='sukamade')) n.push('Akses Sukamade bisa terputus di musim hujan.');
  if(spots.some(s=>['menjangan','tabuhan'].includes(s.id))) n.push('Perjalanan ke pulau tergantung kondisi laut.');
  return n.join(' ')||'Selalu cek kondisi cuaca dan jalan sebelum berangkat. Jaga kebersihan dan hormati alam Banyuwangi.';
}
</script>
<script>
// ─── PLANNING BOARD ──────────────────────────────────────────────────────────
function initPlanDays() {
  const [totalDays]=parseDurasi(S.durasi);
  const selected=DESTINATIONS.filter(d=>S.destinations.has(d.id));
  const spotsPerDay=S.gayaPerjalanan==='santai'?2:3;
  const naturalAct=Math.max(1,totalDays-(totalDays>1?2:0));
  const actDays=Math.min(Math.max(naturalAct,Math.ceil(selected.length/spotsPerDay)),Math.max(1,totalDays-1));
  S.planDays=Array.from({length:actDays},()=>[]);
  S.planBacklog=[];
  S.planArrivalExtras=[];
  const byZone={};
  selected.forEach(d=>{const z=DEST_EXT[d.id]?.zone||d.zone||'kota';if(!byZone[z])byZone[z]=[];byZone[z].push(d.id);});
  if(byZone.barat){const ord=['ijen','kawah_wurung','jagir'];byZone.barat.sort((a,b)=>ord.indexOf(a)-ord.indexOf(b));}
  if(byZone.selatan){byZone.selatan.sort((a,b)=>(a==='sukamade'?1:0)-(b==='sukamade'?1:0));}
  let di=0;
  ['barat','utara','selatan','kota'].forEach(zone=>{
    if(!byZone[zone]||di>=actDays) return;
    const spots=byZone[zone];
    if(zone==='barat'&&spots.includes('ijen')){
      const ig=S.gayaPerjalanan==='eksplorasi'?['ijen',...spots.filter(s=>s!=='ijen').slice(0,1)]:['ijen'];
      if(di<actDays) S.planDays[di++]=ig;
      const rem=spots.filter(s=>!ig.includes(s));
      if(rem.length>0&&di<actDays) S.planDays[di++]=rem;
      return;
    }
    if(spots.includes('sukamade')){
      const others=spots.filter(s=>s!=='sukamade');
      for(let i=0;i<others.length;i+=spotsPerDay) if(di<actDays) S.planDays[di++]=others.slice(i,i+spotsPerDay);
      if(di<actDays) S.planDays[di++]=['sukamade'];
      return;
    }
    for(let i=0;i<spots.length;i+=spotsPerDay) if(di<actDays) S.planDays[di++]=spots.slice(i,i+spotsPerDay);
  });
  S.planBacklog=selected.map(d=>d.id).filter(id=>!S.planDays.flat().includes(id));
}

function readPlanFromDOM() {
  S.planDays=S.planDays.map((_,i)=>{
    const el=document.getElementById(`bucket-day${i}`);
    return el?[...el.querySelectorAll('.drag-item')].map(c=>c.dataset.id):[];
  });
  const arrEl=document.getElementById('bucket-day-arrival');
  S.planArrivalExtras=arrEl?[...arrEl.querySelectorAll('.drag-item')].map(c=>c.dataset.id).filter(id=>!id.startsWith('hotel_checkin_')):[];
  const bEl=document.getElementById('bucket-unassigned');
  S.planBacklog=bEl?[...bEl.querySelectorAll('.drag-item')].map(c=>c.dataset.id).filter(id=>!id.startsWith('hotel_checkin_')):[];
}

function renderPlanningBoard() {
  const [totalDays]=parseDurasi(S.durasi);
  if(!S.planDays||S.planDays.length===0) initPlanDays();

  function destCard(id) {
    const d=DESTINATIONS.find(x=>x.id===id);
    if(!d) return '';
    const ext=DEST_EXT[id]||{};
    const zone=ext.zone||d.zone||'';
    return `<div class="drag-item" data-id="${id}">
      <span class="drag-handle">≡</span>
      <span class="drag-emoji">${d.emoji||'🗺️'}</span>
      <div class="drag-info">
        <div class="drag-title">${esc(d.name)}</div>
        <div class="drag-zone">⏰ ${d.bestTime||'pagi'} · ${zone}</div>
      </div>
      ${id==='ijen'?'<span style="font-size:11px;color:#c0392b" title="Perlu persiapan khusus">⚠️</span>':''}
    </div>`;
  }

  function hotelCard(idx, name) {
    return `<div class="drag-item" data-id="hotel_checkin_${idx}_${Date.now()}_${Math.random().toString(36).slice(2,6)}" style="touch-action:none"
      style="border-color:rgba(196,123,212,.3);background:rgba(196,123,212,.06)">
      <span class="drag-handle" style="color:#7a4a8a">≡</span>
      <span class="drag-emoji">🏨</span>
      <div class="drag-info">
        <div class="drag-title" style="color:#c47bd4">Check-in: ${esc(name)}</div>
        <div class="drag-zone" style="color:#8a5a9a">📍 Akomodasi · seret ke hari menginap</div>
      </div>
      <button class="btn-clone-hotel" data-hotel-name="${esc(name)}" data-hotel-idx="${idx}"
        title="Duplikat kartu"
        style="background:rgba(196,123,212,.15);border:1px solid rgba(196,123,212,.3);color:#c47bd4;border-radius:0;padding:3px 7px;font-size:11px;cursor:pointer;font-family:inherit;flex-shrink:0;white-space:nowrap">+</button>
    </div>`;
  }

  const hotelNames=getHotelNames();
  const hotelCards=hotelNames.map((name,idx)=>hotelCard(idx,name)).join('');
  const backlogHTML=S.planBacklog.length>0||hotelCards?`
    <div class="plan-col" style="border-color:rgba(255,200,50,.25)">
      <div class="plan-col-header" style="color:#444444">📌 Belum Dijadwalkan
        ${S.planBacklog.length>0?`<span style="font-size:10px;background:rgba(255,200,50,.15);padding:2px 7px;border-radius:0;margin-left:6px">${S.planBacklog.length}</span>`:''}
      </div>
      <div class="plan-col-body" id="bucket-unassigned">${S.planBacklog.map(destCard).join('')}${hotelCards}</div>
    </div>`:'';

  const arrivalHTML=`
    <div class="plan-col">
      <div class="plan-col-header">
        <span class="plan-day-badge">1</span> Hari 1 — Kedatangan
        <span style="font-size:10px;color:#888888;margin-left:auto">Check-in otomatis</span>
      </div>
      <div class="plan-col-body arrival-bucket" id="bucket-day-arrival">
        ${S.planArrivalExtras&&S.planArrivalExtras.length>0
          ?S.planArrivalExtras.map(destCard).join('')
          :'<div class="plan-empty" style="font-size:11px">Opsional: seret destinasi kota ke sini untuk sore kedatangan</div>'}
      </div>
    </div>`;

  const actDayHTML=S.planDays.map((ids,i)=>{
    const dayNum=i+2;
    const destIds=ids.filter(id=>!id.startsWith('hotel_checkin_'));
    const ijenWarn=destIds.includes('ijen')&&destIds.length>1;
    const countWarn=S.gayaPerjalanan==='santai'&&destIds.length>2&&!destIds.includes('ijen');
    const warnHTML=ijenWarn?`<div class="plan-warn">⚠️ Ijen sebaiknya hari tersendiri</div>`:countWarn?`<div class="plan-warn">⚠️ Gaya santai: disarankan maks 2 destinasi/hari</div>`:'';
    return `
      <div class="plan-col">
        <div class="plan-col-header">
          <span class="plan-day-badge">${dayNum}</span> Hari ${dayNum}
          <span style="font-size:10px;color:#888888;margin-left:auto">${destIds.length} destinasi</span>
        </div>
        ${warnHTML}
        <div class="plan-col-body" id="bucket-day${i}">
          ${ids.map(id=>id.startsWith('hotel_checkin_')?hotelCard(parseInt(id.split('_')[2]),hotelNames[parseInt(id.split('_')[2])]||'Penginapan'):destCard(id)).join('')}
          ${ids.length===0?`<div class="plan-empty" style="padding:14px;text-align:center">
            <div style="font-size:20px;margin-bottom:6px">✈️</div>
            <div style="font-size:12px;font-weight:700;color:#444;margin-bottom:3px">Hari Kosong</div>
            <div style="font-size:11px;color:#888;line-height:1.5">Hari ini akan otomatis jadi<br>hari kepulangan saat generate</div>
          </div>`:''}
        </div>
      </div>`;
  }).join('');

  const depHTML=totalDays>1?`
    <div class="plan-col locked">
      <div class="plan-col-header">
        <span class="plan-day-badge" style="background:#4a7a4a">${totalDays}</span>
        Hari ${totalDays} — Kepulangan 🔒
        <span style="font-size:10px;color:#888888;margin-left:auto">Otomatis</span>
      </div>
    </div>`:'';

  return `
    <h2 class="step-title">Susun Perjalananmu</h2>
    <p class="step-sub">Tahan lalu seret destinasi ke hari yang diinginkan</p>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:11px;color:#888888">
        ${S.destinations.size} destinasi · ${totalDays} hari
        ${S.planBacklog.length>0?`<span style="color:#c0392b"> · ${S.planBacklog.length} belum dijadwalkan</span>`:''}
      </div>
      <button id="btn-reset-plan" style="font-size:11px;color:#3d4461;background:#ffffff;border:1.5px solid #e4e8f0;border-radius:20px;padding:5px 12px;cursor:pointer;font-family:inherit;box-shadow:0 1px 4px rgba(15,52,96,.08)">
        ↺ Saran Otomatis
      </button>
    </div>
    ${hotelNames.length>1?`<div style="font-size:12px;color:#7b4da4;background:rgba(196,123,212,.08);padding:10px 14px;border-radius:8px;margin-bottom:14px;border:1.5px solid rgba(196,123,212,.25)">
      💡 <b>Multi-penginapan terdeteksi</b> — kartu check-in ungu bisa kamu seret ke hari pindah penginapan
    </div>`:''}
    <div class="planning-board">${backlogHTML}${arrivalHTML}${actDayHTML}${depHTML}</div>`;
}

// ─── SORTABLEJS ───────────────────────────────────────────────────────────────
let _sortableInstances=[];
function initSortableBoard() {
  _sortableInstances.forEach(s=>s.destroy()); _sortableInstances=[];
  document.querySelectorAll('.plan-col-body').forEach(col=>{
    if(col.closest('.plan-col.locked')) return;
    const isArrival=col.id==='bucket-day-arrival';
    const isBacklog=col.id==='bucket-unassigned';
    const inst=new Sortable(col,{
      group:isArrival?{name:'wandr-arrival',pull:'wandr-board',put:['wandr-board','wandr-arrival']}:isBacklog?{name:'wandr-board',pull:true,put:['wandr-board','wandr-arrival']}:{name:'wandr-board',pull:true,put:['wandr-board']},
      animation:280,easing:'cubic-bezier(0.25,1,0.5,1)',delay:150,delayOnTouchOnly:true,
      fallbackTolerance:5,scroll:true,scrollSensitivity:80,scrollSpeed:20,bubbleScroll:true,
      forceFallback:true,fallbackOnBody:true,
      ghostClass:'sortable-ghost',chosenClass:'sortable-chosen',dragClass:'sortable-drag',
      onEnd:()=>readPlanFromDOM(),
    });
    _sortableInstances.push(inst);
  });
  document.querySelectorAll('.btn-clone-hotel').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();duplicateHotelCard(btn);});
  });
}

function duplicateHotelCard(btn) {
  const name=btn.dataset.hotelName, idx=parseInt(btn.dataset.hotelIdx);
  const uid=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  const clone=document.createElement('div');
  clone.className='drag-item'; clone.dataset.id=`hotel_checkin_${idx}_${uid}`;
  clone.style.cssText='border-color:rgba(196,123,212,.3);background:rgba(196,123,212,.06);touch-action:none;';
  clone.innerHTML=`<span class="drag-handle" style="color:#7a4a8a">≡</span>
    <span class="drag-emoji">🏨</span>
    <div class="drag-info">
      <div class="drag-title" style="color:#c47bd4">Check-in: ${name}</div>
      <div class="drag-zone" style="color:#8a5a9a">📍 Akomodasi · seret ke hari menginap</div>
    </div>
    <button class="btn-clone-hotel" data-hotel-name="${name}" data-hotel-idx="${idx}"
      style="background:rgba(196,123,212,.15);border:1px solid rgba(196,123,212,.3);color:#c47bd4;border-radius:0;padding:3px 7px;font-size:11px;cursor:pointer;font-family:inherit;flex-shrink:0">+</button>`;
  btn.closest('.drag-item').insertAdjacentElement('afterend',clone);
  clone.querySelector('.btn-clone-hotel').addEventListener('click',e=>{e.stopPropagation();duplicateHotelCard(clone.querySelector('.btn-clone-hotel'));});
  readPlanFromDOM();
}

// ─── GENERATE ENGINE ──────────────────────────────────────────────────────────
function generate() {
  S.loading=true; S.itinerary=null; S.error=null;
  render();
  setTimeout(()=>{
    try {
      if(S.planDays&&S.planDays.some(d=>d.length>0)){generateFromPlan();return;}
      const days=[];
      const selected=DESTINATIONS.filter(d=>S.destinations.has(d.id)).map(d=>({...d,...(DEST_EXT[d.id]||{})}));
      const [totalDays]=parseDurasi(S.durasi);
      const spotsPerDay=S.gayaPerjalanan==='santai'?2:3;
      const kota=S.kotaAsal==='Lainnya'?S.kotaAsalCustom:S.kotaAsal;
      window._usedKuliner=new Set();
      days.push(injectArrivalExtras(buildArrivalDay(kota,S.transport,S.penginapan)));
      const byZone={};
      selected.forEach(d=>{const z=d.zone||'kota';if(!byZone[z])byZone[z]=[];byZone[z].push(d);});
      if(byZone.barat){const ord=['ijen','kawah_wurung','jagir'];byZone.barat.sort((a,b)=>ord.indexOf(a.id)-ord.indexOf(b.id));}
      if(byZone.selatan){byZone.selatan.sort((a,b)=>(a.id==='sukamade'?1:0)-(b.id==='sukamade'?1:0));}
      let dayNum=2;
      const actDayLimit=totalDays>1?totalDays-1:totalDays;
      ['barat','utara','selatan','kota'].forEach(zone=>{
        if(!byZone[zone]||dayNum>actDayLimit) return;
        const spots=byZone[zone];
        if(zone==='barat'&&spots.some(s=>s.id==='ijen')){
          const ijenSpot=spots.find(s=>s.id==='ijen'),others=spots.filter(s=>s.id!=='ijen');
          const ijenGroup=S.gayaPerjalanan==='eksplorasi'&&others.length?[ijenSpot,others[0]]:[ijenSpot];
          if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,ijenGroup,zone,S));
          const remaining=S.gayaPerjalanan==='eksplorasi'?others.slice(1):others;
          for(let i=0;i<remaining.length;i+=spotsPerDay) if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,remaining.slice(i,i+spotsPerDay),zone,S));
          return;
        }
        if(spots.some(s=>s.id==='sukamade')){
          const sukamade=spots.find(s=>s.id==='sukamade'),others=spots.filter(s=>s.id!=='sukamade');
          for(let i=0;i<others.length;i+=spotsPerDay) if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,others.slice(i,i+spotsPerDay),zone,S));
          if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,[sukamade],zone,S));
          return;
        }
        for(let i=0;i<spots.length;i+=spotsPerDay) if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,spots.slice(i,i+spotsPerDay),zone,S));
      });
      if(totalDays>1) days.push(buildDepartureDay(totalDays,kota,S.transport));
      S.itinerary={summary:buildSummary(selected,totalDays,S.gayaPerjalanan,kota),totalDays,highlights:selected.slice(0,3).map(d=>d.name),estimatedBudget:calculateBudget(selected,S,totalDays),days:days.slice(0,totalDays),packingTips:buildPackingTips(selected),importantNotes:buildNotes(selected)};
    } catch(e) {
      S.error='Terjadi kesalahan: '+e.message; console.error(e);
    } finally { S.loading=false; render(); }
  }, 800);
}

function generateFromPlan() {
  try {
    const kota=S.kotaAsal==='Lainnya'?S.kotaAsalCustom:S.kotaAsal;
    const [totalDays]=parseDurasi(S.durasi);
    const allSelected=DESTINATIONS.filter(d=>S.destinations.has(d.id));
    const hotelNames=getHotelNames();
    const days=[];
    days.push(injectArrivalExtras(buildArrivalDay(kota,S.transport,S.penginapan)));
    S.planDays.forEach((allIds,i)=>{
      const dayNum=i+2;
      if(dayNum>=totalDays||allIds.length===0) return;
      const hotelCheckIns=allIds.filter(id=>id.startsWith('hotel_checkin_')).map(id=>{const idx=parseInt(id.split('_')[2]);return{id,name:`Check-in: ${hotelNames[idx]||'Penginapan'}`,hotelName:hotelNames[idx]||'Penginapan',type:'penginapan'};});
      const spots=allIds.filter(id=>!id.startsWith('hotel_checkin_')).map(id=>DESTINATIONS.find(d=>d.id===id)).filter(Boolean).map(d=>({...d,...(DEST_EXT[d.id]||{})}));
      if(spots.length===0&&hotelCheckIns.length>0){const act=hotelCheckIns.map(h=>({time:'14:00',name:h.name,location:h.hotelName,duration:'1 jam',description:`Check-in ${h.hotelName}.`,tips:'Siapkan dokumen booking.',estimatedCost:0,type:'penginapan'}));days.push({day:dayNum,date_label:`Hari ${dayNum}`,title:'Check-in Penginapan',activities:sortActivities(act)});return;}
      if(spots.length===0) return;
      const zone=spots[0]?.zone||'kota';
      const builtDay=buildActivityDay(dayNum,spots,zone,S,{honorOrder:true});
      if(hotelCheckIns.length>0){
        const isMenjanganTabuhanDay=spots.some(s=>s.id==='menjangan'||s.id==='tabuhan'||(s.name||'').toLowerCase().includes('menjangan')||(s.name||'').toLowerCase().includes('tabuhan'));
        const lastAct=builtDay.activities.filter(a=>a.type==='aktivitas'||a.type==='transport').slice(-1)[0];
        let checkInHour='14:00';
        if(isMenjanganTabuhanDay){checkInHour='16:00';}
        else if(lastAct?.time){const afterLast=addMin(lastAct.time,(lastAct.duration?.includes('jam')?parseInt(lastAct.duration)*60:60)+30);checkInHour=timeToMin(afterLast)>timeToMin('14:00')?afterLast:'14:00';}
        const checkinActs=hotelCheckIns.map(h=>({time:checkInHour,name:h.name,location:h.hotelName,duration:'1 jam',description:`Check-in ${h.hotelName}.`,tips:'Siapkan dokumen booking.',estimatedCost:0,type:'penginapan'}));
        builtDay.activities=sortActivities([...builtDay.activities,...checkinActs]);
      }
      days.push(builtDay);
    });
    if(totalDays>1) days.push(buildDepartureDay(totalDays,kota,S.transport));
    S.itinerary={summary:buildSummary(allSelected,totalDays,S.gayaPerjalanan,kota),totalDays,highlights:allSelected.slice(0,3).map(d=>d.name),estimatedBudget:calculateBudget(allSelected,S,totalDays),days:days.slice(0,totalDays),packingTips:buildPackingTips(allSelected),importantNotes:buildNotes(allSelected)};
  } catch(e) {
    S.error='Terjadi kesalahan: '+e.message; console.error(e);
  } finally { S.loading=false; render(); }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async()=>{
  await loadDestinations();
  document.getElementById('progress-area').style.display='';
  render();
})();
</script>
