// ─── GENERATE ENGINE ──────────────────────────────────────────────────────────
function generate() {
  S.loading=true; S.itinerary=null; S.error=null;
  render();
  setTimeout(()=>{
    try {
      if(S.planDays&&S.planDays.some(d=>d.length>0)){generateFromPlan();return;}
      const days=[];
      const selected=DESTINATIONS.filter(d=>S.destinations.has(d.id)).map(d=>({...d,...(DEST_EXT[d.id]||{})}));
      const [totalDays]=parseDurasi(S.durasi);
      const spotsPerDay=S.gayaPerjalanan==='santai'?2:3;
      const kota=S.kotaAsal==='Lainnya'?S.kotaAsalCustom:S.kotaAsal;
      window._usedKuliner=new Set();
      days.push(injectArrivalExtras(buildArrivalDay(kota,S.transport,S.penginapan)));
      const byZone={};
      selected.forEach(d=>{const z=d.zone||'kota';if(!byZone[z])byZone[z]=[];byZone[z].push(d);});
      if(byZone.barat){const ord=['ijen','kawah_wurung','jagir'];byZone.barat.sort((a,b)=>ord.indexOf(a.id)-ord.indexOf(b.id));}
      if(byZone.selatan){byZone.selatan.sort((a,b)=>(a.id==='sukamade'?1:0)-(b.id==='sukamade'?1:0));}
      let dayNum=2;
      const actDayLimit=totalDays>1?totalDays-1:totalDays;
      ['barat','utara','selatan','kota'].forEach(zone=>{
        if(!byZone[zone]||dayNum>actDayLimit) return;
        const spots=byZone[zone];
        if(zone==='barat'&&spots.some(s=>s.id==='ijen'||s.isIjen===true)){
          const ijenSpot=spots.find(s=>s.id==='ijen'||s.isIjen===true),others=spots.filter(s=>s.id!=='ijen'&&!s.isIjen);
          // Ijen SELALU hari tersendiri — trekking dini hari, tidak bisa digabung destinasi lain
          if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,[ijenSpot],zone,S));
          // Motor/mobil: Kawah Wurung sudah dijadwalkan di dalam hari Ijen
          // Umum: Kawah Wurung tetap jadi hari tersendiri (tidak ada kendaraan setelah DAMRI)
          const isPribadiGen = S.transport==='pribadi_motor'||S.transport==='pribadi_mobil'||
            S.sewaLokal.has('motor')||S.sewaLokal.has('mobil')||
            (S.transport==='sewa'&&(S.sewaLokal.has('motor')||S.sewaLokal.has('mobil')));
          const wurungAlreadyScheduled = isPribadiGen &&
            others.some(s=>(s.id||'').includes('wurung')||(s.name||'').toLowerCase().includes('wurung'));
          const remaining = wurungAlreadyScheduled
            ? others.filter(s=>!(s.id||'').includes('wurung')&&!(s.name||'').toLowerCase().includes('wurung'))
            : others;
          for(let i=0;i<remaining.length;i+=spotsPerDay) if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,remaining.slice(i,i+spotsPerDay),zone,S));
          return;
        }
        if(spots.some(s=>s.id==='sukamade')){
          const sukamade=spots.find(s=>s.id==='sukamade'),others=spots.filter(s=>s.id!=='sukamade');
          for(let i=0;i<others.length;i+=spotsPerDay) if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,others.slice(i,i+spotsPerDay),zone,S));
          if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,[sukamade],zone,S));
          return;
        }
        for(let i=0;i<spots.length;i+=spotsPerDay) if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,spots.slice(i,i+spotsPerDay),zone,S));
      });
      if(totalDays>1) days.push(buildDepartureDay(totalDays,kota,S.transport));
      S.itinerary={summary:buildSummary(selected,totalDays,S.gayaPerjalanan,kota),totalDays,highlights:selected.slice(0,3).map(d=>d.name),estimatedBudget:calculateBudget(selected,S,totalDays),days:days.slice(0,totalDays),packingTips:buildPackingTips(selected),importantNotes:buildNotes(selected)};
    } catch(e) {
      S.error='Terjadi kesalahan: '+e.message; console.error(e);
    } finally { S.loading=false; render(); }
  }, 800);
}

function generateFromPlan() {
  try {
    const kota=S.kotaAsal==='Lainnya'?S.kotaAsalCustom:S.kotaAsal;
    const [totalDays]=parseDurasi(S.durasi);
    const allSelected=DESTINATIONS.filter(d=>S.destinations.has(d.id));
    const hotelNames=getHotelNames();
    const days=[];
    days.push(injectArrivalExtras(buildArrivalDay(kota,S.transport,S.penginapan)));

    // Defensive: pastikan Ijen hanya muncul SEKALI di seluruh planDays.
    // Kalau user (sengaja/tidak sengaja) menaruh Ijen di >1 hari, hanya hari pertama yang dipertahankan.
    const ijenRealId2 = (DESTINATIONS.find(d=>d.isIjen)||{}).id;
    if (ijenRealId2) {
      let ijenSeen = false;
      S.planDays = S.planDays.map(dayIds => {
        if (!dayIds.includes(ijenRealId2)) return dayIds;
        if (ijenSeen) return dayIds.filter(id => id !== ijenRealId2); // buang duplikat
        ijenSeen = true;
        return dayIds;
      });
    }

    let currentHotelName = getFinalHotelName(); // hotel awal (hari kedatangan)
    S.planDays.forEach((allIds,i)=>{
      const dayNum=i+2;
      if(dayNum>=totalDays||allIds.length===0) return;
      const hotelCheckIns=allIds.filter(id=>id.startsWith('hotel_checkin_')).map(id=>{
        const idx=parseInt(id.split('_')[2]);
        const hotelObj=(S.penginapanDataList||[])[idx];
        return {id,name:`Check-in: ${hotelNames[idx]||'Penginapan'}`,hotelName:hotelNames[idx]||'Penginapan',lat:hotelObj?.lat,lng:hotelObj?.lng,type:'penginapan'};
      }).filter(h=>h.hotelName!==currentHotelName);
      const spots=allIds.filter(id=>!id.startsWith('hotel_checkin_')).map(id=>DESTINATIONS.find(d=>d.id===id)).filter(Boolean).map(d=>({...d,...(DEST_EXT[d.id]||{})}));
      if(spots.length===0&&hotelCheckIns.length>0){const act=hotelCheckIns.map(h=>({time:'14:00',name:h.name,location:h.hotelName,duration:'1 jam',description:`Check-in ${h.hotelName}.`,tips:'Siapkan dokumen booking.',estimatedCost:0,type:'penginapan'}));days.push({day:dayNum,date_label:`Hari ${dayNum}`,title:'Check-in Penginapan',activities:sortActivities(act)});return;}
      if(spots.length===0) return;
      const zone=spots[0]?.zone||'kota';
      const builtDay=buildActivityDay(dayNum,spots,zone,S,{honorOrder:true,hotelNameOverride:currentHotelName});
      if(hotelCheckIns.length>0){
        const paltudingHotelName=hotelCheckIns[0].hotelName;
        const oldHotelName=currentHotelName;
        const istirahatAwalAct=builtDay.activities.find(a=>a.name==='Istirahat Awal di Penginapan Paltuding');
        const kembaliSoreAct=builtDay.activities.find(a=>a.name==='Kembali ke Penginapan — Istirahat Sore');
        const sarapanBilasAct=builtDay.activities.find(a=>a.name==='Sarapan & Bilas di Penginapan');

        if(istirahatAwalAct && kembaliSoreAct){
          // Skenario ganti penginapan di hari yang sama (mis. hari Ijen → Kawah Wurung):
          // - Checkout dari hotel LAMA SEBELUM berangkat ke Kawah Wurung, karena tidak akan
          //   kembali lagi ke penginapan itu hari ini.
          // - Setelah Kawah Wurung, LANGSUNG check-in ke hotel BARU (bukan balik ke hotel lama).
          // Kartu "Istirahat Awal di Penginapan Paltuding" (jam 20:00) jadi redundan —
          // isinya soal persiapan trek Ijen tengah malam, padahal trek Ijen di hari ini
          // sudah selesai pagi tadi. Hapus supaya tidak ada kartu "Paltuding" nyasar lagi
          // di malam hari.
          builtDay.activities = builtDay.activities.filter(a => a !== istirahatAwalAct);

          const checkoutTime = sarapanBilasAct?.time ? addMin(sarapanBilasAct.time, 90) : '10:00';
          const checkoutAct = {
            time: checkoutTime,
            name: `Checkout: ${oldHotelName}`,
            location: oldHotelName,
            duration: '15 menit',
            description: `Checkout dari ${oldHotelName} sebelum berangkat ke Kawah Wurung — tidak kembali lagi ke penginapan ini hari ini.`,
            tips: 'Bawa turun semua barang sekarang, karena setelah Kawah Wurung langsung menuju penginapan berikutnya.',
            estimatedCost: 0, type: 'penginapan'
          };

          // Waktu check-in ke hotel BARU menyesuaikan jarak & estimasi waktu tempuh
          // dari Kawah Wurung — bukan dipatok ke jam 14:00 bawaan — karena kalau
          // penginapan barunya jauh dari Ijen/Kawah Wurung, wajar tiba lebih malam.
          const kawahWurungAct = builtDay.activities.find(a=>a.name==='Kawah Wurung');
          const newHotel = hotelCheckIns[0];
          let newCheckInTime = kembaliSoreAct.time; // fallback: waktu bawaan (14:00)
          if (kawahWurungAct?.time && newHotel?.lat && newHotel?.lng) {
            const kwCoord = getDestCoords('kawah_wurung');
            const kwDurMin = kawahWurungAct.duration?.includes('jam') ? parseInt(kawahWurungAct.duration)*60 : 120;
            const travelToHotelMin = kwCoord ? travelMinutes(kwCoord, {lat:newHotel.lat, lng:newHotel.lng}) : 45;
            newCheckInTime = addMin(kawahWurungAct.time, kwDurMin + travelToHotelMin);
          }

          // Ganti "Kembali ke Penginapan — Istirahat Sore" jadi check-in ke hotel BARU
          kembaliSoreAct.time = newCheckInTime;
          kembaliSoreAct.name = hotelCheckIns[0].name;
          kembaliSoreAct.location = paltudingHotelName;
          kembaliSoreAct.duration = '1 jam';
          kembaliSoreAct.description = `Check-in ${paltudingHotelName}. Istirahat sore setelah dua aktivitas berat hari ini.`;
          kembaliSoreAct.tips = 'Siapkan dokumen booking. 🌋 Ijen + Kawah Wurung dalam satu hari — pencapaian luar biasa!';
          kembaliSoreAct.type = 'penginapan';

          currentHotelName = hotelCheckIns[hotelCheckIns.length-1].hotelName || currentHotelName;
          builtDay.activities.push(checkoutAct);

          // Sebelumnya hari ini berakhir begitu saja setelah check-in (tanpa makan
          // malam sama sekali). Tambahkan Makan Malam di sekitar penginapan BARU,
          // asal check-in-nya tidak kemalaman.
          if (timeToMin(newCheckInTime) < timeToMin('21:00')) {
            const malamTime = addMin(newCheckInTime, 90);
            builtDay.activities.push(buildMakan('malam', zone, malamTime, newHotel?.lat, newHotel?.lng));
          }

          builtDay.activities = sortActivities(builtDay.activities);
        } else {
          // Skenario umum: pindah ke penginapan baru di hari ini.
          currentHotelName = hotelCheckIns[hotelCheckIns.length-1].hotelName || currentHotelName;
          const isMenjanganTabuhanDay=spots.some(s=>s.id==='menjangan'||s.id==='tabuhan'||(s.name||'').toLowerCase().includes('menjangan')||(s.name||'').toLowerCase().includes('tabuhan'));
          const lastAct=builtDay.activities.filter(a=>a.type==='aktivitas'||a.type==='transport').slice(-1)[0];
          const lastSpot=spots[spots.length-1];
          const newHotel=hotelCheckIns[hotelCheckIns.length-1];

          // Jam check-in TIDAK dipatok ke jam standar hotel (14:00), tapi
          // menyesuaikan jarak & estimasi waktu tempuh dari destinasi terakhir
          // hari ini ke penginapan baru — kalau jaraknya jauh, check-in wajar
          // lebih malam; kalau dekat, bisa lebih cepat dari 14:00.
          let checkInHour='14:00';
          if(isMenjanganTabuhanDay){
            checkInHour='16:00';
          } else if(lastAct?.time){
            const lastDurMin = lastAct.duration?.includes('jam') ? parseInt(lastAct.duration)*60 : 60;
            const lastCoord  = lastSpot ? getDestCoords(lastSpot) : null;
            const travelToHotelMin = (lastCoord && newHotel?.lat && newHotel?.lng)
              ? travelMinutes(lastCoord, {lat:newHotel.lat, lng:newHotel.lng})
              : 45; // buffer default kalau koordinat penginapan baru belum ada
            checkInHour = addMin(lastAct.time, lastDurMin + travelToHotelMin);
          }

          // Checkout dari penginapan lama dilakukan PAGI HARI, sebelum berangkat
          // menuju destinasi pertama — bukan menjelang check-in baru — karena
          // user tidak akan kembali lagi ke penginapan lama hari ini.
          const firstTravelAct = builtDay.activities.find(a=>a.type==='transport');
          const checkoutTime = firstTravelAct?.time ? addMin(firstTravelAct.time,-10) : '08:00';
          const checkoutAct={time:checkoutTime,name:`Checkout: ${oldHotelName}`,location:oldHotelName,duration:'15 menit',description:`Checkout dari ${oldHotelName} pagi ini sebelum berangkat — tidak kembali lagi ke penginapan ini hari ini.`,tips:'Bawa turun semua barang sekarang dan selesaikan pembayaran/deposit sebelum berangkat.',estimatedCost:0,type:'penginapan'};

          // Kalau check-in di penginapan baru sudah terjadi sebelum jam makan
          // malam, ganti pencarian kuliner "malam" supaya dicari di sekitar
          // penginapan BARU (bukan penginapan lama yang sudah ditinggalkan).
          if (newHotel?.lat && newHotel?.lng && timeToMin(checkInHour) <= timeToMin('19:00')) {
            const malamIdx = builtDay.activities.findIndex(a=>a.type==='makan'&&a.name.toLowerCase().includes('malam'));
            if (malamIdx>=0) {
              builtDay.activities[malamIdx] = buildMakan('malam', zone, '19:00', newHotel.lat, newHotel.lng);
            }
          }

          const checkinActs=[checkoutAct,...hotelCheckIns.map(h=>({time:checkInHour,name:h.name,location:h.hotelName,duration:'1 jam',description:`Check-in ${h.hotelName}. Waktu menyesuaikan estimasi perjalanan dari ${lastAct?.name||'destinasi terakhir'} hari ini.`,tips:'Siapkan dokumen booking.',estimatedCost:0,type:'penginapan'}))];
          builtDay.activities=sortActivities([...builtDay.activities,...checkinActs]);
        }
      }
      days.push(builtDay);
    });
    if(totalDays>1) days.push(buildDepartureDay(totalDays,kota,S.transport));
    S.itinerary={summary:buildSummary(allSelected,totalDays,S.gayaPerjalanan,kota),totalDays,highlights:allSelected.slice(0,3).map(d=>d.name),estimatedBudget:calculateBudget(allSelected,S,totalDays),days:days.slice(0,totalDays),packingTips:buildPackingTips(allSelected),importantNotes:buildNotes(allSelected)};
  } catch(e) {
    S.error='Terjadi kesalahan: '+e.message; console.error(e);
  } finally { S.loading=false; render(); }
}

(async()=>{
  await loadDestinations();
  document.getElementById('progress-area').style.display='';
  render();

function togglePackItem(el) {
  el.classList.toggle('done');
  const cb = el.querySelector('.cb');
  const done = el.classList.contains('done');
  if (cb) cb.classList.toggle('checked', done);
  el.style.opacity = done ? '0.45' : '1';
}

function autoFillJam(tiba) {
  S.waktuTiba = tiba;
  // Update input field langsung
  const el = document.getElementById('input-waktu-tiba');
  if (el) el.value = tiba;
  // Re-render section jadwal agar checkmark muncul
  partialUpdateTransportSchedule();
}

function partialUpdateTransportSchedule() {
  // Re-render hanya bagian JAM PERJALANAN tanpa full render
  // Cukup trigger render step1 partial
  const step1content = document.getElementById('content-wrap');
  if (step1content && S.step === 3) {
    render();
    // Scroll ke posisi jadwal
    setTimeout(() => {
      const jamEl = document.querySelector('[data-section="jam"]');
      if (jamEl) jamEl.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 100);
  }
}
