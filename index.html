<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Banyuwangi Cloud DB</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f172a;--surface:#1e293b;--border:#334155;
      --text:#f1f5f9;--muted:#64748b;
      --w:#34d399;--p:#a78bfa;--k:#fb923c;--hi:#f59e0b;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:72px}
    header{background:var(--surface);border-bottom:1px solid var(--border);
      padding:14px 16px 0;position:sticky;top:0;z-index:100}
    .hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .hdr-top h1{font-size:17px;font-weight:700;letter-spacing:.04em;flex:1}
    .hdr-top h1 span{color:var(--hi)}
    .badge{font-size:9px;font-family:monospace;background:#14532d;color:#86efac;
      padding:5px 8px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase;
      font-weight:700;flex-shrink:0;cursor:pointer;border:none}
    
    .btn-export {background:#1e3a8a; color:#93c5fd; border:1px solid #3b82f6; display:none;}
    .btn-login {background:#334155; color:#cbd5e1; border:1px solid #475569;}

    .sw{position:relative;margin-bottom:12px}
    .sw input{width:100%;padding:10px 36px;background:var(--bg);
      border:1px solid var(--border);border-radius:8px;color:var(--text);
      font-size:14px;outline:none;transition:border-color .2s}
    .sw input::placeholder{color:var(--muted)}
    .sw input:focus{border-color:var(--hi)}
    .sw .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);
      font-size:14px;pointer-events:none}
    .sw .sc{position:absolute;right:10px;top:50%;transform:translateY(-50%);
      background:var(--border);border:none;color:var(--muted);font-size:11px;
      width:20px;height:20px;border-radius:50%;cursor:pointer;
      display:none;align-items:center;justify-content:center}
    .filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .filter-btn{flex-shrink:0;padding:6px 13px;border-radius:20px;
      border:1px solid var(--border);background:transparent;color:var(--muted);
      font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
    .filter-btn.active{font-weight:700}
    [data-filter="all"].active     {background:var(--hi);color:#0f172a;border-color:var(--hi)}
    [data-filter="wisata"].active  {background:var(--w);color:#0f172a;border-color:var(--w)}
    [data-filter="penginapan"].active{background:var(--p);color:#0f172a;border-color:var(--p)}
    [data-filter="kuliner"].active {background:var(--k);color:#0f172a;border-color:var(--k)}
    .stats{display:flex;justify-content:space-between;padding:8px 16px;
      font-size:11px;color:var(--muted);font-family:monospace}
    .list{padding:0 12px}
    .card{background:var(--surface);border-radius:10px;
      border:1px solid var(--border);border-left:3px solid var(--border);
      margin-bottom:10px;overflow:hidden;cursor:pointer}
    .card.wisata    {border-left-color:var(--w)}
    .card.penginapan{border-left-color:var(--p)}
    .card.kuliner   {border-left-color:var(--k)}
    .card-main{padding:12px 14px 8px}
    .card-type{font-size:9px;font-weight:700;letter-spacing:.12em;
      text-transform:uppercase;font-family:monospace;margin-bottom:3px}
    .wisata .card-type    {color:var(--w)}
    .penginapan .card-type{color:var(--p)}
    .kuliner .card-type   {color:var(--k)}
    .card-user{display:inline-block;font-size:8px;background:#1e3a5f;color:#93c5fd;
      padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle;font-family:monospace}
    .card-edited{display:inline-block;font-size:8px;background:#1c2a1e;color:#86efac;
      padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle;font-family:monospace}
    .card-name{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:2px}
    .card-sub{font-size:11px;color:var(--muted);margin-bottom:8px}
    .card-row{display:flex;justify-content:space-between;align-items:flex-end}
    .card-tags{display:flex;flex-wrap:wrap;gap:5px}
    .tag{font-size:10px;padding:2px 7px;border-radius:4px;
      background:var(--bg);border:1px solid var(--border);color:var(--muted);white-space:nowrap}
    .tag.mulus   {background:#052e16;color:#86efac;border-color:#14532d}
    .tag.menengah{background:#451a03;color:#fcd34d;border-color:#78350f}
    .tag.ekstrem {background:#450a0a;color:#fca5a5;border-color:#7f1d1d}
    .tag.perahu  {background:#0c1a4a;color:#93c5fd;border-color:#1e3a8a}
    .card-price{font-size:13px;font-weight:700;white-space:nowrap;margin-left:8px}
    .gratis{color:var(--w)}
    .card-hint{font-size:10px;color:var(--border);text-align:right;padding:2px 14px 6px}
    .card-hint::after{content:"▼ klik untuk detail & opsi"}
    .card.open .card-hint::after{content:"▲ tutup"}
    .card-detail{display:none;border-top:1px solid var(--border);
      background:var(--bg);padding:12px 14px}
    .card.open .card-detail{display:block}
    .card-notes{font-size:13px;color:#94a3b8;line-height:1.6;margin-bottom:12px}
    .card-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .maps-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
      background:#1d4ed8;color:#eff6ff;text-decoration:none;border-radius:6px;
      font-size:12px;font-weight:600;border:none;cursor:pointer}
    .edit-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;
      background:transparent;color:var(--hi);border:1px solid var(--hi);
      border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;
      transition:all .15s}
    .edit-btn:active{background:var(--hi);color:#0f172a}
    .delete-btn{display:inline-flex;align-items:center;gap:4px;padding:8px 12px;
      background:transparent;color:#f87171;border:1px solid #f87171;
      border-radius:6px;font-size:12px;cursor:pointer;margin-left:auto;
      transition:all .15s}
    .delete-btn:active{background:#f87171;color:#fff}
    .fab{position:fixed;bottom:80px;right:16px;z-index:200;
      width:52px;height:52px;border-radius:50%;border:none;
      background:var(--hi);color:#0f172a;font-size:24px;font-weight:700;
      cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.4);
      display:none;align-items:center;justify-content:center;transition:transform .15s}
    .fab:active{transform:scale(0.9)}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);
      z-index:999;padding:16px;align-items:flex-end;justify-content:center}
    .modal.open{display:flex}
    .modal-box{background:var(--surface);border:1px solid var(--border);
      border-radius:16px 16px 0 0;width:100%;max-width:480px;
      max-height:88vh;overflow-y:auto;padding:20px}
    .modal-box.center{border-radius:16px; align-self:center;}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;
      padding-bottom:12px;border-bottom:1px solid var(--border);
      display:flex;justify-content:space-between;align-items:center}
    .modal-close{background:none;border:none;color:var(--muted);
      font-size:20px;cursor:pointer;padding:0 4px}
    .form-group{margin-bottom:14px}
    .form-label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
    .form-input{width:100%;padding:10px;background:var(--bg);
      color:var(--text);border:1px solid var(--border);border-radius:6px;
      font-size:14px;outline:none;font-family:inherit}
    .form-input:focus{border-color:var(--hi)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
    .btn-batal{padding:10px 16px;background:transparent;color:var(--text);
      border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px}
    .btn-simpan{padding:10px 20px;background:var(--hi);color:#0f172a;
      border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px}
    .btn-simpan:disabled{opacity:.5;cursor:not-allowed}
    .confirm{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);
      z-index:1100;align-items:center;justify-content:center;padding:20px}
    .confirm.open{display:flex}
    .confirm-box{background:var(--surface);border:1px solid var(--border);
      border-radius:12px;padding:24px;max-width:320px;width:100%;text-align:center}
    .confirm-box h3{margin-bottom:8px;font-size:16px}
    .confirm-box p{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
    .confirm-actions{display:flex;gap:10px;justify-content:center}
    .btn-konfirmasi{padding:10px 20px;background:#ef4444;color:#fff;
      border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px}
    .btn-konfirmasi-batal{padding:10px 16px;background:transparent;color:var(--text);
      border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px}
    .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);
      background:#1e293b;border:1px solid var(--border);color:var(--text);
      padding:10px 18px;border-radius:8px;font-size:13px;
      opacity:0;transition:all .3s;z-index:1000;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .toast.success{border-color:var(--w);color:var(--w)}
    .toast.error{border-color:#f87171;color:#f87171}
    nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);
      border-top:1px solid var(--border);display:flex;padding:8px 0 14px;z-index:100}
    .nav-item{text-align:center;flex:1;opacity:.3;cursor:pointer}
    .nav-item.active{opacity:1}
    .nav-icon{font-size:18px}
    .nav-label{font-size:9px;font-family:monospace;text-transform:uppercase;
      letter-spacing:.06em;color:var(--muted);margin-top:2px}
    .nav-item.active .nav-label{color:var(--hi)}
    .empty{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-icon{font-size:40px;margin-bottom:12px}
  </style>
</head>
<body>

<header>
  <div class="hdr-top">
    <span>🗺️</span>
    <h1>BWI-App <span>by DitoLabs</span></span></h1>
    <button id="btnExport" class="badge btn-export" title="Download data">💾 EXPORT</button>
    <button id="btnLogin" class="badge btn-login">🔐 LOGIN</button>
  </div>
  <div class="sw">
    <span class="si">🔍</span>
    <input type="text" id="searchInput" placeholder="Cari nama, kawasan, kategori...">
    <button class="sc" id="clearBtn">✕</button>
  </div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">🧭 Semua</button>
    <button class="filter-btn" data-filter="wisata">⛺ Wisata</button>
    <button class="filter-btn" data-filter="penginapan">🏨 Penginapan</button>
    <button class="filter-btn" data-filter="kuliner">🍜 Kuliner</button>
  </div>
</header>

<div class="stats">
  <span id="countLabel">Mengakses Cloud...</span>
  <span id="totalLabel"></span>
</div>

<div class="list" id="list"></div>

<button class="fab" id="fabBtn" title="Tambah data baru">+</button>

<div class="modal" id="modalLogin">
  <div class="modal-box center" style="max-width:320px;">
    <div class="modal-title">
      <span>Masuk sebagai Admin</span>
      <button class="modal-close" id="closeLogin">✕</button>
    </div>
    <div class="form-group">
      <input type="email" id="loginEmail" class="form-input" placeholder="Email Admin">
    </div>
    <div class="form-group">
      <input type="password" id="loginPass" class="form-input" placeholder="Password">
    </div>
    <button id="btnDoLogin" class="btn-simpan" style="width:100%; margin-top:10px;">Login</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title">
      <span id="modalTitle">Tambah Data Baru</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Tipe Data</label>
      <select class="form-input" id="inputTipe">
        <option value="wisata">⛺ Wisata</option>
        <option value="penginapan">🏨 Penginapan</option>
        <option value="kuliner">🍜 Kuliner & Café</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Nama Tempat *</label>
      <input class="form-input" type="text" id="inputNama" placeholder="Contoh: Warung Mak Jum">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Kategori</label>
        <input class="form-input" type="text" id="inputKategori" placeholder="Pantai / Hotel / ...">
      </div>
      <div class="form-group">
        <label class="form-label">Kawasan / Kecamatan</label>
        <input class="form-input" type="text" id="inputKawasan" placeholder="Glagah / Licin / ...">
      </div>
    </div>
    <div id="fieldWisata" class="form-group">
      <label class="form-label">Kondisi Akses</label>
      <select class="form-input" id="inputAkses">
        <option>Mulus</option><option>Menengah</option>
        <option>Ekstrem</option><option>Perahu</option>
      </select>
    </div>
    <div id="fieldKuliner" class="form-group" style="display:none">
      <label class="form-label">Menu Andalan</label>
      <input class="form-input" type="text" id="inputMenu" placeholder="Sego Tempong / ...">
    </div>
    <div class="form-group">
      <label class="form-label" id="labelHarga">Estimasi HTM (Rp)</label>
      <input class="form-input" type="number" id="inputHarga" value="0" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">Link Google Maps</label>
      <input class="form-input" type="url" id="inputMaps" placeholder="https://maps.google.com/...">
    </div>
    <div class="form-group">
      <label class="form-label">Catatan / Review</label>
      <textarea class="form-input" id="inputCatatan" rows="3"
        placeholder="Deskripsi singkat, keunikan, tips..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-batal" id="btnBatal">Batal</button>
      <button class="btn-simpan" id="btnSimpan">Simpan</button>
    </div>
  </div>
</div>

<div class="confirm" id="confirmDelete">
  <div class="confirm-box">
    <h3>Hapus Entri?</h3>
    <p id="confirmMsg">Data ini akan dihapus permanen dari Cloud Database.</p>
    <div class="confirm-actions">
      <button class="btn-konfirmasi-batal" id="btnConfirmBatal">Batal</button>
      <button class="btn-konfirmasi" id="btnConfirmHapus">Hapus</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav>
  <div class="nav-item active" data-filter="all">
    <div class="nav-icon">🧭</div><div class="nav-label">Explore</div>
  </div>
  <div class="nav-item" data-filter="penginapan">
    <div class="nav-icon">🏨</div><div class="nav-label">Inap</div>
  </div>
  <div class="nav-item" data-filter="kuliner">
    <div class="nav-icon">🍜</div><div class="nav-label">Kuliner</div>
  </div>
</nav>

<script type="module">
  // 1. Import Firebase SDK lengkap dengan fitur Authentication
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCHWWjnxX5-Fk9-gRTZVwyC3WDDfnLPh_s",
    authDomain: "banyuwangi-db.firebaseapp.com",
    projectId: "banyuwangi-db",
    storageBucket: "banyuwangi-db.firebasestorage.app",
    messagingSenderId: "973498690850",
    appId: "1:973498690850:web:b2d67373174542167a497b"
  };

  const app = initializeApp(firebaseConfig);
  const dbFirestore = getFirestore(app);
  const colRef = collection(dbFirestore, "places");
  const auth = getAuth(app);

  let DB = [];
  let isAdmin = false; // Status hak akses pengguna
  let currentFilter = 'all';
  let currentQuery  = '';
  let formMode      = 'add';
  let editTargetId  = null;
  let deleteTargetId = null;

  const ACCESS_CLS = {Mulus:'mulus',Menengah:'menengah',Ekstrem:'ekstrem',Perahu:'perahu'};
  const TYPE_META  = {
    wisata:    {label:'⛺ Wisata',    cls:'wisata'},
    penginapan:{label:'🏨 Penginapan',cls:'penginapan'},
    kuliner:   {label:'🍜 Kuliner',  cls:'kuliner'},
  };

  function toast(msg,type='success'){
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast '+type+' show';
    clearTimeout(t._t); t._t = setTimeout(()=>{t.className='toast '+type;}, 3000);
  }

  /* ── 🔐 SISTEM AUTENTIKASI ADMIN ── */
  const modalLogin = document.getElementById('modalLogin');
  
  // Memantau status login
  onAuthStateChanged(auth, (user) => {
    if (user) {
      isAdmin = true;
      document.getElementById('btnLogin').textContent = '🔓 LOGOUT';
      document.getElementById('btnLogin').style.background = '#0f172a';
      document.getElementById('btnExport').style.display = 'block'; // Tampilkan tombol export
      document.getElementById('fabBtn').style.display = 'flex'; // Tampilkan tombol tambah (+)
      toast('Berhasil masuk sebagai Admin');
    } else {
      isAdmin = false;
      document.getElementById('btnLogin').textContent = '🔐 LOGIN';
      document.getElementById('btnLogin').style.background = '#334155';
      document.getElementById('btnExport').style.display = 'none'; // Sembunyikan export
      document.getElementById('fabBtn').style.display = 'none'; // Sembunyikan tambah (+)
    }
    render(); // Muat ulang layar untuk memunculkan/menyembunyikan tombol edit/hapus di kartu
  });

  document.getElementById('btnLogin').addEventListener('click', () => {
    if (isAdmin) {
      if(confirm('Yakin ingin keluar dari mode Admin?')) signOut(auth);
    } else {
      modalLogin.classList.add('open');
      document.getElementById('loginEmail').focus();
    }
  });

  document.getElementById('closeLogin').addEventListener('click', () => modalLogin.classList.remove('open'));

  document.getElementById('btnDoLogin').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    const btn = document.getElementById('btnDoLogin');
    
    if(!email || !pass) return toast('Email & Password wajib diisi','error');
    
    btn.textContent = 'Memeriksa...';
    btn.disabled = true;

    try {
      await signInWithEmailAndPassword(auth, email, pass);
      modalLogin.classList.remove('open');
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPass').value = '';
    } catch (error) {
      toast('Login gagal. Periksa kembali akses Anda.', 'error');
    } finally {
      btn.textContent = 'Login';
      btn.disabled = false;
    }
  });


  /* ── RENDER DATA ── */
  function updateStats() {
    const w = DB.filter(d => d.type === 'wisata').length;
    const p = DB.filter(d => d.type === 'penginapan').length;
    const k = DB.filter(d => d.type === 'kuliner').length;
    document.getElementById('totalLabel').textContent = `${DB.length} total · ${w}W ${p}I ${k}K`;
  }

  function rupiah(n){
    if(!n || n===0) return '<span class="gratis">GRATIS</span>';
    return 'Rp '+Number(n).toLocaleString('id-ID');
  }
  function matches(d,q){
    if(!q) return true;
    return [d.nama,d.kategori,d.kawasan,d.catatan,d.menu_andalan].some(s=>s&&s.toLowerCase().includes(q));
  }
  function cardHTML(d){
    const m = TYPE_META[d.type];
    const price = rupiah(d.type==='wisata'?d.htm:d.harga);
    const aks = d.type==='wisata'&&d.akses?`<span class="tag ${ACCESS_CLS[d.akses]||''}">🛵 ${d.akses}</span>`:'';
    const menu = d.type==='kuliner'&&d.menu_andalan?`<span class="tag">🍽️ ${d.menu_andalan}</span>`:'';
    const mapsBtn = d.maps&&d.maps!=='#'?`<a class="maps-btn" href="${d.maps}" target="_blank" rel="noopener">🗺️ Maps</a>`:'';
    
    // Tombol Edit & Hapus HANYA dirender jika pengguna adalah Admin
    const adminControls = isAdmin ? `
      <button class="edit-btn" data-edit="${d.id}">✏️ Edit</button>
      <button class="delete-btn" data-delete="${d.id}">🗑️</button>
    ` : '';

    return `<div class="card ${m.cls}" data-id="${d.id}" data-type="${d.type}">
      <div class="card-main">
        <div class="card-type">${m.label}</div>
        <div class="card-name">${d.nama}</div>
        <div class="card-sub">${d.kategori||'—'}</div>
        <div class="card-row">
          <div class="card-tags"><span class="tag">📍 ${d.kawasan||'—'}</span>${aks}${menu}</div>
          <div class="card-price">${price}</div>
        </div>
      </div>
      <div class="card-hint"></div>
      <div class="card-detail">
        <p class="card-notes">${d.catatan||'—'}</p>
        <div class="card-actions">
          ${mapsBtn}
          ${adminControls}
        </div>
      </div>
    </div>`;
  }

  function render(){
    const q = currentQuery.toLowerCase();
    const filtered = DB.filter(d=>(currentFilter==='all'||d.type===currentFilter)&&matches(d,q));
    document.getElementById('countLabel').textContent = filtered.length + ' entri ditemukan';
    const list = document.getElementById('list');
    if(!filtered.length){
      list.innerHTML = `<div class="empty"><div class="empty-icon">🌾</div>Tidak ada hasil untuk "<strong>${currentQuery}</strong>"</div>`;
      return;
    }
    list.innerHTML = filtered.map(cardHTML).join('');
    list.onclick = e => {
      // Pastikan aksi edit/hapus tidak berjalan jika tombolnya tidak ada
      const editBtn = e.target.closest('[data-edit]');
      if(editBtn && isAdmin){ e.stopPropagation(); openEdit(editBtn.dataset.edit); return; }
      
      const delBtn = e.target.closest('[data-delete]');
      if(delBtn && isAdmin){ e.stopPropagation(); openConfirmDelete(delBtn.dataset.delete); return; }
      
      if(e.target.closest('a') || e.target.closest('button')) return;
      const card = e.target.closest('.card');
      if(card) card.classList.toggle('open');
    };
  }

  /* ── 📡 PULL DATA DARI CLOUD ── */
  onSnapshot(colRef, (snapshot) => {
    DB = [];
    snapshot.forEach((docSnap) => {
      DB.push(docSnap.data());
    });
    updateStats();
    render();
  }, (error) => {
    console.error(error);
    document.getElementById('countLabel').textContent = "Offline / Gagal konek";
  });


  /* ── SEARCH, FILTER & EXPORT ── */
  const si = document.getElementById('searchInput');
  const sc = document.getElementById('clearBtn');
  si.addEventListener('input',()=>{
    currentQuery = si.value; sc.style.display = currentQuery?'flex':'none'; render();
  });
  sc.addEventListener('click',()=>{si.value=''; currentQuery=''; sc.style.display='none'; si.focus(); render();});
  
  document.getElementById('filters').addEventListener('click',e=>{
    const btn=e.target.closest('.filter-btn'); if(!btn)return;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); currentFilter=btn.dataset.filter; render();
  });
  document.querySelector('nav').addEventListener('click',e=>{
    const ni=e.target.closest('.nav-item'); if(!ni)return;
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
    ni.classList.add('active'); currentFilter=ni.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b=>{
      b.classList.remove('active');
      if(b.dataset.filter===currentFilter)b.classList.add('active');
    });
    render();
  });

  document.getElementById('btnExport').addEventListener('click', () => {
    if(!isAdmin) return; // Pengaman ganda
    const out = { wisata_banyuwangi: [], penginapan: [], kuliner_cafe: [] };
    DB.forEach(d => {
      const copy = { ...d };
      const originType = copy.type;
      delete copy.type; 
      if (originType === 'wisata') out.wisata_banyuwangi.push(copy);
      else if (originType === 'penginapan') out.penginapan.push(copy);
      else if (originType === 'kuliner') out.kuliner_cafe.push(copy);
    });
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(out, null, 2));
    const dl = document.createElement('a');
    dl.setAttribute("href", dataStr);
    dl.setAttribute("download", "banyuwangi_cloud_backup.json");
    document.body.appendChild(dl); dl.click(); dl.remove();
    toast('💾 Backup Cloud berhasil didownload!');
  });


  /* ── MODAL ADD / EDIT ── */
  const modal = document.getElementById('modal');
  const inputTipe = document.getElementById('inputTipe');

  function openModal(){ modal.classList.add('open'); }
  function closeModal(){ modal.classList.remove('open'); resetForm(); }

  document.getElementById('fabBtn').addEventListener('click', () => {
    if(!isAdmin) return;
    formMode = 'add'; editTargetId = null;
    document.getElementById('modalTitle').textContent = 'Tambah Data Baru';
    document.getElementById('btnSimpan').textContent = 'Simpan ke Cloud';
    inputTipe.disabled = false; resetForm(); openModal();
    document.getElementById('inputNama').focus();
  });
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('btnBatal').addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if(e.target===modal) closeModal(); });
  inputTipe.addEventListener('change', () => updateFormFields(inputTipe.value));

  function updateFormFields(tipe){
    document.getElementById('fieldWisata').style.display = tipe==='wisata'?'':'none';
    document.getElementById('fieldKuliner').style.display = tipe==='kuliner'?'':'none';
    document.getElementById('labelHarga').textContent = tipe==='wisata'?'Estimasi HTM (Rp)':'Estimasi Harga / malam (Rp)';
  }

  function resetForm(){
    ['inputNama','inputKategori','inputKawasan','inputMaps','inputCatatan','inputMenu']
      .forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    document.getElementById('inputHarga').value='0';
    document.getElementById('inputTipe').value='wisata';
    updateFormFields('wisata');
  }

  function openEdit(id){
    if(!isAdmin) return;
    const d = DB.find(x => x.id === id); if(!d) return;
    formMode = 'edit'; editTargetId = id;
    document.getElementById('modalTitle').textContent = '✏️ Edit Data Cloud';
    document.getElementById('btnSimpan').textContent = 'Update Cloud';
    const tipeVal = d.type;
    inputTipe.value = tipeVal; inputTipe.disabled = true;
    updateFormFields(tipeVal);
    document.getElementById('inputNama').value = d.nama||'';
    document.getElementById('inputKategori').value = d.kategori||'';
    document.getElementById('inputKawasan').value = d.kawasan||'';
    document.getElementById('inputMaps').value = d.maps||'';
    document.getElementById('inputCatatan').value = d.catatan||'';
    if(tipeVal==='wisata'){
      document.getElementById('inputAkses').value = d.akses||'Menengah';
      document.getElementById('inputHarga').value = d.htm||0;
    } else {
      document.getElementById('inputHarga').value = d.harga||0;
      if(tipeVal==='kuliner') document.getElementById('inputMenu').value = d.menu_andalan||'';
    }
    openModal();
  }

  document.getElementById('btnSimpan').addEventListener('click', async () => {
    if(!isAdmin) return toast('Akses ditolak','error');
    const nama = document.getElementById('inputNama').value.trim();
    if(!nama){ toast('Nama tempat wajib diisi', 'error'); return; }
    
    const btn = document.getElementById('btnSimpan');
    const tipe = inputTipe.value;

    const payload = {
      nama,
      type: tipe,
      kategori: document.getElementById('inputKategori').value.trim() || '—',
      kawasan:  document.getElementById('inputKawasan').value.trim()  || '—',
      maps:     document.getElementById('inputMaps').value.trim()     || '#',
      catatan:  document.getElementById('inputCatatan').value.trim()  || '—',
    };
    if(tipe === 'wisata'){
      payload.akses = document.getElementById('inputAkses').value;
      payload.htm = parseInt(document.getElementById('inputHarga').value) || 0;
    } else {
      payload.harga = parseInt(document.getElementById('inputHarga').value) || 0;
      if(tipe === 'kuliner') payload.menu_andalan = document.getElementById('inputMenu').value.trim() || '—';
    }

    btn.disabled = true;
    btn.textContent = 'Menyimpan...';

    try {
      if (formMode === 'edit') {
        payload.id = editTargetId;
      } else {
        payload.id = tipe.charAt(0) + Date.now();
      }
      await setDoc(doc(dbFirestore, "places", payload.id), payload);
      toast('✓ ' + nama + ' tersimpan di Cloud');
      closeModal();
    } catch(e) {
      toast('❌ Gagal: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = formMode==='edit'?'Update Cloud':'Simpan ke Cloud';
    }
  });


  /* ── MENGHAPUS DATA ── */
  function openConfirmDelete(id){
    if(!isAdmin) return;
    const d = DB.find(x => x.id === id); deleteTargetId = id;
    document.getElementById('confirmMsg').textContent = `"${d?d.nama:id}" akan dihapus PERMANEN dari Cloud Database.`;
    document.getElementById('confirmDelete').classList.add('open');
  }
  function closeConfirmDelete(){ deleteTargetId=null; document.getElementById('confirmDelete').classList.remove('open'); }
  
  document.getElementById('btnConfirmBatal').addEventListener('click', closeConfirmDelete);
  document.getElementById('confirmDelete').addEventListener('click', e => { if(e.target===document.getElementById('confirmDelete')) closeConfirmDelete(); });

  document.getElementById('btnConfirmHapus').addEventListener('click', async () => {
    if(!isAdmin) return;
    const id = deleteTargetId; if(!id) return;
    const d = DB.find(x => x.id === id); 
    closeConfirmDelete();

    try {
      await deleteDoc(doc(dbFirestore, "places", id));
      toast('🗑️ ' + (d?d.nama:id) + ' dihapus');
    } catch (e) {
      toast('❌ Gagal menghapus: ' + e.message, 'error');
    }
  });
</script>
</body>
</html>
