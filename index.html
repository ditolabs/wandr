<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wandr — Buat Itinerary Banyuwangi</title>
  <meta name="description" content="Generate itinerary perjalanan Banyuwangi secara otomatis dengan AI. Masukkan destinasi, pilih kendaraan dan durasi, itinerary langsung jadi.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & BASE ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      background: #0c1a0c;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      color: #f0e8d8;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }

    /* ── LAYOUT ────────────────────────────────────────────────────────── */
    #app { max-width: 640px; margin: 0 auto; padding: 0 20px; }

    /* ── HEADER ────────────────────────────────────────────────────────── */
    #header {
      padding-top: 20px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: #e07b39;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .logo-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px; font-weight: 700;
      letter-spacing: -.01em;
    }
    .logo-badge {
      font-size: 10px; color: #4a6a4a;
      background: rgba(74,106,74,.18);
      padding: 2px 9px; border-radius: 20px; font-weight: 500;
    }

    /* ── PROGRESS ──────────────────────────────────────────────────────── */
    #progress-area { margin-bottom: 20px; }
    .step-labels { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .step-label { font-size: 10px; font-weight: 400; color: #2a4a2a; letter-spacing: .04em; transition: color .3s; }
    .step-label.active { font-weight: 700; color: #e07b39; }
    .step-label.done   { color: #4a7a4a; }
    .progress-bar { height: 2px; background: rgba(255,255,255,.05); border-radius: 1px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #c96a2a, #e07b39);
      border-radius: 1px;
      transition: width .5s ease;
    }

    /* ── NAV ───────────────────────────────────────────────────────────── */
    #nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0 32px;
      border-top: 1px solid rgba(255,255,255,.04);
      margin-top: 4px;
    }
    .dest-count { font-size: 11px; color: #3a5a3a; }

    /* ── BUTTONS ───────────────────────────────────────────────────────── */
    .btn-pri {
      background: #e07b39; color: #fff; border: none;
      border-radius: 10px; padding: 12px 22px;
      font-family: inherit; font-weight: 600; font-size: 15px;
      cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 8px;
      white-space: nowrap;
    }
    .btn-pri:hover:not(:disabled) { background: #c96a2a; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(224,123,57,.3); }
    .btn-pri:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
    .btn-ghost {
      background: transparent; color: #8fa08f;
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: 12px 22px;
      font-family: inherit; font-weight: 500; font-size: 15px;
      cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-ghost:hover  { border-color: rgba(255,255,255,.22); color: #c0d4c0; }
    .btn-ghost.hidden { visibility: hidden; }

    /* ── STEP TYPOGRAPHY ───────────────────────────────────────────────── */
    .step-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px; font-weight: 700;
      margin-bottom: 6px; line-height: 1.3;
    }
    .step-sub { color: #6a8a6a; font-size: 14px; margin-bottom: 20px; }
    .field-label {
      display: block; font-size: 12px; font-weight: 600;
      color: #6a8a6a; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .field-wrap { margin-bottom: 20px; }

    /* ── CATEGORY FILTER ───────────────────────────────────────────────── */
    .cat-filter { display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap; }
    .cat-btn {
      background: rgba(255,255,255,.06); color: #8fa08f;
      border: none; border-radius: 20px; padding: 5px 13px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: all .2s;
    }
    .cat-btn.active { background: #e07b39; color: #fff; }

    /* ── DESTINATION GRID ──────────────────────────────────────────────── */
    .dest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .dest-chip {
      padding: 13px; border-radius: 12px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(255,255,255,.08);
      cursor: pointer; transition: all .2s; user-select: none;
    }
    .dest-chip:hover { transform: translateY(-2px); }
    .dest-chip.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .dest-chip-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .dest-emoji { font-size: 22px; }
    .dest-check {
      width: 18px; height: 18px; border-radius: 50%;
      background: #e07b39;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: white; flex-shrink: 0;
      opacity: 0; transition: opacity .2s;
    }
    .dest-chip.selected .dest-check { opacity: 1; }
    .dest-name  { font-size: 13px; font-weight: 600; color: #f0e8d8; line-height: 1.3; margin-top: 8px; }
    .dest-desc  { font-size: 11px; color: #5a7a5a; margin-top: 3px; line-height: 1.4; }
    .dest-meta  { margin-top: 7px; display: flex; align-items: center; gap: 6px; }
    .cat-tag    { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
    .cat-tag.alam   { background: rgba(74,144,74,.15);  color: rgba(74,144,74,.95);  border: 1px solid rgba(74,144,74,.4); }
    .cat-tag.pantai { background: rgba(57,157,224,.15); color: rgba(57,157,224,.95); border: 1px solid rgba(57,157,224,.4); }
    .cat-tag.diving { background: rgba(57,224,200,.15); color: rgba(57,224,200,.95); border: 1px solid rgba(57,224,200,.4); }
    .cat-tag.budaya { background: rgba(224,178,57,.15); color: rgba(224,178,57,.95); border: 1px solid rgba(224,178,57,.4); }
    .best-time  { font-size: 10px; color: #4a6a4a; }
    .dest-notice {
      margin-top: 14px; padding: 10px 14px;
      background: rgba(224,123,57,.07);
      border: 1px solid rgba(224,123,57,.2);
      border-radius: 10px; font-size: 12px; color: #b08060;
      display: none;
    }
    .dest-notice.show { display: block; }

    /* ── SELECT & INPUT ────────────────────────────────────────────────── */
    select, input[type="text"], input[type="time"],
    input[type="email"], input[type="password"], textarea {
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.1);
      color: #f0e8d8; border-radius: 10px; padding: 11px 14px;
      font-family: inherit; font-size: 14px;
      outline: none; transition: border-color .2s;
      width: 100%; appearance: none; -webkit-appearance: none;
      /* ── Fix RTL typing bug di Android Chrome ── */
      direction: ltr !important;
      text-align: left !important;
      unicode-bidi: plaintext;
      -webkit-rtl-ordering: logical;
    }
    select:focus, input:focus { border-color: rgba(224,123,57,.7); background: rgba(255,255,255,.07); }
    select option { background: #1a2e1a; color: #f0e8d8; }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .select-wrap { position: relative; }
    .select-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #5a7a5a; font-size: 12px; }

    /* ── AUTOCOMPLETE DROPDOWN ─────────────────────────────────────────── */
    .autocomplete-wrap { position: relative; }
    .autocomplete-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 100;
      background: #1a2e1a; border: 1.5px solid rgba(224,123,57,.35);
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      max-height: 260px; overflow-y: auto;
    }
    .autocomplete-item {
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,.04);
      transition: background .15s;
      display: flex; align-items: center; gap: 10px;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover, .autocomplete-item.active { background: rgba(224,123,57,.12); }
    .autocomplete-item-name { font-size: 13px; font-weight: 600; color: #f0e8d8; }
    .autocomplete-item-sub  { font-size: 11px; color: #5a7a5a; margin-top: 1px; }
    .autocomplete-empty { padding: 14px; text-align: center; font-size: 12px; color: #3a5a3a; font-style: italic; }

    /* ── CARD OPTIONS ──────────────────────────────────────────────────── */
    .card-list { display: flex; flex-direction: column; gap: 8px; }
    .card-opt {
      padding: 13px 15px; border-radius: 12px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(255,255,255,.08);
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; gap: 13px;
    }
    .card-opt:hover { transform: translateY(-2px); }
    .card-opt.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .card-opt.sm { padding: 11px 13px; border-radius: 10px; }
    .card-opt-icon { font-size: 24px; flex-shrink: 0; }
    .card-opt.sm .card-opt-icon { font-size: 20px; }
    .card-opt-title { font-size: 14px; font-weight: 600; color: #f0e8d8; transition: color .2s; }
    .card-opt.sm .card-opt-title { font-size: 13px; font-weight: 500; }
    .card-opt.selected .card-opt-title { color: #e07b39; }
    .card-opt-sub { font-size: 12px; color: #5a7a5a; margin-top: 2px; }
    .card-opt.sm .card-opt-sub { font-size: 11px; }
    .card-opt-check { color: #e07b39; font-size: 14px; flex-shrink: 0; margin-left: auto; opacity: 0; transition: opacity .2s; }
    .card-opt.selected .card-opt-check { opacity: 1; }

    /* ── SEWA LOKAL ────────────────────────────────────────────────────── */
    .sewa-wrap {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height .35s ease, opacity .35s ease;
    }
    .sewa-wrap.open { max-height: 420px; opacity: 1; }
    .sewa-box {
      padding: 15px; border-radius: 12px;
      background: rgba(107,159,212,.06);
      border: 1.5px solid rgba(107,159,212,.2);
      margin-bottom: 4px;
    }
    .sewa-title { font-size: 13px; font-weight: 700; color: #6b9fd4; margin-bottom: 4px; }
    .sewa-sub   { font-size: 12px; color: #5a7a5a; margin-bottom: 12px; line-height: 1.5; }
    .card-opt.sewa-sel { background: rgba(107,159,212,.12) !important; border-color: rgba(107,159,212,.6) !important; }
    .card-opt.sewa-sel .card-opt-title { color: #6b9fd4 !important; }
    .card-opt.sewa-sel .card-opt-check { opacity: 1 !important; color: #6b9fd4 !important; }

    /* ── PILL OPTIONS ──────────────────────────────────────────────────── */
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill-opt {
      padding: 10px 15px; border-radius: 10px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(255,255,255,.08);
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .pill-opt:hover { transform: translateY(-1px); }
    .pill-opt.selected { background: rgba(224,123,57,.13); border-color: #e07b39; }
    .pill-label { font-size: 13px; font-weight: 700; color: #f0e8d8; transition: color .2s; }
    .pill-opt.selected .pill-label { color: #e07b39; }
    .pill-sub { font-size: 10px; color: #5a7a5a; margin-top: 2px; }

    /* ── GAYA CARDS ────────────────────────────────────────────────────── */
    .gaya-row { display: flex; gap: 10px; }
    .gaya-card {
      flex: 1; padding: 15px; border-radius: 12px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(255,255,255,.08);
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .gaya-card:hover { transform: translateY(-2px); }
    .gaya-card.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .gaya-emoji { font-size: 28px; margin-bottom: 8px; }
    .gaya-label { font-size: 14px; font-weight: 700; color: #f0e8d8; transition: color .2s; }
    .gaya-card.selected .gaya-label { color: #e07b39; }
    .gaya-desc  { font-size: 11px; color: #5a7a5a; margin-top: 7px; line-height: 1.6; white-space: pre-line; }

    /* ── COUNTER ───────────────────────────────────────────────────────── */
    .counter-row { display: flex; align-items: center; gap: 14px; }
    .cnt-btn {
      background: rgba(255,255,255,.07); color: #f0e8d8;
      border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 8px; width: 36px; height: 36px;
      font-size: 18px; cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit;
    }
    .cnt-btn:hover { background: rgba(255,255,255,.13); }
    .cnt-val   { font-size: 22px; font-weight: 700; min-width: 30px; text-align: center; }
    .cnt-label { font-size: 13px; color: #5a7a5a; }

    /* ── LOADING ───────────────────────────────────────────────────────── */
    .loading-screen { text-align: center; padding: 64px 0; }
    .loading-icon {
      font-size: 52px; margin-bottom: 18px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .loading-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px; margin-bottom: 10px; line-height: 1.3;
    }
    .loading-sub  { color: #5a7a5a; font-size: 13px; line-height: 1.6; }
    .loading-tags { display: flex; gap: 7px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .loading-tag  { font-size: 11px; color: #4a6a4a; background: rgba(74,106,74,.15); padding: 4px 11px; border-radius: 20px; }
    .dot { animation: bou 1.4s ease-in-out infinite; display: inline-block; }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bou { 0%,80%,100%{transform:translateY(0);opacity:.5} 40%{transform:translateY(-7px);opacity:1} }

    /* ── ERROR ─────────────────────────────────────────────────────────── */
    .error-screen { text-align: center; padding: 64px 0; }

    /* ── RESULT ────────────────────────────────────────────────────────── */
    .result-summary {
      padding: 18px;
      background: rgba(224,123,57,.07);
      border: 1.5px solid rgba(224,123,57,.2);
      border-radius: 16px; margin-bottom: 22px;
    }
    .result-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .result-title { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; font-weight: 700; flex: 1; line-height: 1.3; }
    .result-budget-label { font-size: 10px; color: #6a8a6a; text-align: right; }
    .result-budget-val   { font-size: 16px; font-weight: 700; color: #e07b39; }
    .result-desc  { font-size: 13px; color: #a0b090; line-height: 1.6; margin-bottom: 10px; }
    .highlight-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .highlight-tag  { font-size: 11px; padding: 3px 9px; background: rgba(224,123,57,.1); border: 1px solid rgba(224,123,57,.25); border-radius: 20px; color: #b08060; }
    .budget-note { font-size: 11px; color: #4a6a4a; }

    /* ── DAY SECTION ───────────────────────────────────────────────────── */
    .day-section { margin-bottom: 24px; animation: fdi .5s ease both; }
    @keyframes fdi { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .day-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .day-num {
      width: 32px; height: 32px; background: #e07b39;
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .day-label    { font-size: 10px; color: #5a7a5a; text-transform: uppercase; letter-spacing: .05em; }
    .day-title-txt { font-family: 'Playfair Display', Georgia, serif; font-size: 17px; font-weight: 600; line-height: 1.3; }

    /* ── ACTIVITY ──────────────────────────────────────────────────────── */
    .act-list { padding-left: 4px; }
    .act-item { display: flex; gap: 12px; margin-bottom: 12px; animation: sli .45s ease both; }
    @keyframes sli { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .act-timeline { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 22px; }
    .act-icon { font-size: 15px; }
    .act-line { width: 1px; flex: 1; background: rgba(255,255,255,.05); margin: 4px 0; min-height: 12px; }
    .act-body { flex: 1; padding-bottom: 4px; }
    .act-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .act-time     { font-size: 11px; color: #5a7a5a; font-weight: 500; }
    .act-duration { font-size: 11px; color: #3d5a3d; margin-left: 7px; }
    .act-cost     { font-size: 11px; color: #6a8a6a; background: rgba(255,255,255,.04); padding: 2px 7px; border-radius: 6px; flex-shrink: 0; }
    .act-name     { font-size: 14px; font-weight: 600; color: #f0e8d8; line-height: 1.3; }
    .act-location { font-size: 11px; color: #4a6a4a; margin-top: 2px; }
    .act-desc     { font-size: 12px; color: #7a9a7a; line-height: 1.55; margin-top: 4px; }
    .act-tip      { margin-top: 7px; padding: 6px 10px; border-radius: 7px; font-size: 11px; line-height: 1.5; border-left: 2px solid; }

    /* ── PACKING & NOTES ───────────────────────────────────────────────── */
    .packing-box  { padding: 15px; background: rgba(255,255,255,.03); border-radius: 12px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,.07); }
    .packing-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .packing-tags  { display: flex; gap: 6px; flex-wrap: wrap; }
    .packing-tag   { font-size: 11px; padding: 4px 10px; background: rgba(255,255,255,.05); border-radius: 20px; color: #7a9a7a; }
    .notes-box { padding: 13px; background: rgba(224,178,57,.06); border-radius: 10px; border: 1px solid rgba(224,178,57,.15); margin-bottom: 22px; font-size: 12px; color: #a09040; line-height: 1.5; }

    /* ── SCROLLBAR ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

    /* ── SORTABLEJS DRAG STATES ────────────────────────────────────────── */
    .sortable-chosen  { box-shadow: 0 8px 24px rgba(0,0,0,.5); background: #1a2e1a !important; border-color: #e07b39 !important; transform: scale(1.02); }
    .sortable-ghost   { opacity: .3; background: rgba(224,123,57,.1) !important; border: 2px dashed #e07b39 !important; }
    .sortable-drag    { cursor: grabbing !important; z-index: 9999 !important; background: #1a2e1a !important; border: 1px solid #e07b39 !important; box-shadow: 0 15px 35px rgba(0,0,0,.7) !important; opacity: 1 !important; will-change: transform, left, top !important; pointer-events: none !important; transition: none !important; }
    .drag-item        { cursor: grab; user-select: none; -webkit-user-select: none; touch-action: pan-y; }

    /* ── PLANNING BOARD ────────────────────────────────────────────────── */
    .planning-board   { display: flex; flex-direction: column; gap: 10px; }
    .plan-col         { border: 1px solid rgba(255,255,255,.08); border-radius: 14px;
                        background: rgba(255,255,255,.02); overflow: hidden; }
    .plan-col.locked  { opacity: .6; }
    .plan-col-header  { display: flex; align-items: center; gap: 8px;
                        padding: 11px 14px; font-size: 13px; font-weight: 600;
                        color: #7a9a7a; border-bottom: 1px solid rgba(255,255,255,.05);
                        background: rgba(255,255,255,.02); }
    .plan-col-body    { padding: 8px; display: flex; flex-direction: column; gap: 6px;
                        min-height: 48px; }
    .plan-day-badge   { width: 22px; height: 22px; border-radius: 50%;
                        background: #3a5a3a; color: #a0c090; font-size: 11px;
                        font-weight: 700; display: flex; align-items: center;
                        justify-content: center; flex-shrink: 0; }
    .plan-warn        { font-size: 11px; color: #a07840; background: rgba(255,180,50,.07);
                        padding: 6px 12px; border-left: 2px solid rgba(255,180,50,.3); }
    .plan-empty       { font-size: 12px; color: #3a5a3a; text-align: center;
                        padding: 14px; font-style: italic; }

    /* ── DRAG CARD ─────────────────────────────────────────────────────── */
    .drag-item        { display: flex; align-items: center; gap: 10px;
                        padding: 10px 12px; border-radius: 10px;
                        border: 1px solid rgba(255,255,255,.08);
                        background: rgba(255,255,255,.03);
                        transition: background .15s, border-color .15s; }

<script>
// ─── KAWASAN → ZONE MAPPING ───────────────────────────────────────────────────
const KAWASAN_ZONE = {
  'Licin':'barat','Licin / Paltuding':'barat','Kalibendo':'barat',
  'Kalibaru':'barat','Songgon':'barat','Kemiren':'barat','Glenmore':'barat',
  'Wongsorejo':'utara','Banyuputih':'utara','Kalipuro':'utara',
  'Pesanggaran':'selatan','Tegaldlimo':'selatan','Purwoharjo':'selatan',
  'Muncar':'selatan','Benculuk':'selatan','Grajagan':'selatan',
  'Pusat Kota':'kota','Glagah':'kota','Rogojampi':'kota','Banyuwangi':'kota',
};

// ─── FIRESTORE DOC → WANDR DESTINATION ───────────────────────────────────────
function mapToWandr(id, d) {
  if (d.type !== 'wisata' || d.status === 'pending') return null;
  const nama = (d.nama||'').toLowerCase();
  const kat  = (d.kategori||'').toLowerCase();
  let cat = 'alam';
  if (kat.includes('pantai')||kat.includes('beach')||kat.includes('teluk')) cat='pantai';
  if (kat.includes('snorkel')||kat.includes('diving')||kat.includes('pulau')) cat='diving';
  if (kat.includes('kota')||kat.includes('budaya')||kat.includes('sejarah')) cat='budaya';
  const emojiBase = {alam:'🌿',pantai:'🌊',diving:'🤿',budaya:'🏛️'};
  const emojiOvr  = {'kawah ijen':'🌋','ijen':'🌋','air terjun':'💧','baluran':'🦌',
    'sukamade':'🐢','red island':'🏄','g-land':'🏄','menjangan':'🤿',
    'tabuhan':'🏝️','kawah wurung':'🏔️','green bay':'🌊','city tour':'🏛️'};
  let emoji = emojiBase[cat]||'🗺️';
  for (const [k,v] of Object.entries(emojiOvr)) { if(nama.includes(k)){emoji=v;break;} }
  const isIjen=nama.includes('ijen'), isSunset=nama.includes('red island')||nama.includes('pulau merah');
  const isNight=nama.includes('sukamade'), isCity=nama.includes('city tour');
  let bestTime='pagi';
  if(isSunset) bestTime='sore'; if(isNight) bestTime='malam'; if(isIjen) bestTime='dini hari';
  // Zone dari kawasan mapping, dengan override berbasis nama untuk yang sering salah
  const NAMA_ZONE_OVERRIDE = {
    'kawah wurung':'barat','kawah ijen':'barat','ijen':'barat','lider':'barat',
    'telunjuk':'barat','jagir':'barat','malangsari':'barat','beji':'barat',
    'baluran':'utara','menjangan':'utara','tabuhan':'utara','wongsorejo':'utara',
    'sukamade':'selatan','alas purwo':'selatan','red island':'selatan',
    'pulau merah':'selatan','green bay':'selatan','teluk ijo':'selatan',
    'g-land':'selatan','grajagan':'selatan','wedi ireng':'selatan',
  };
  let zone = KAWASAN_ZONE[d.kawasan] || 'kota';
  // Override jika nama mengandung keyword zona
  for (const [key, z] of Object.entries(NAMA_ZONE_OVERRIDE)) {
    if (nama.includes(key)) { zone = z; break; }
  }
  const dur  = isIjen?300:cat==='diving'?360:kat.includes('terjun')?120:180;

  // Auto-generate aliases dari nama Firestore supaya matching lebih toleran
  // Contoh: "Pura Beji Antaboga" → aliases: ['pura beji antaboga','beji antaboga','beji','antaboga']
  const namaWords = nama.split(' ').filter(w => w.length > 2);
  const autoAliases = new Set([nama]);
  // Tambah sub-kombinasi kata (tanpa kata depan seperti "pura","taman","air","pantai")
  const skipWords = new Set(['pura','taman','nasional','pantai','air','gua','goa','pulau','kebun','perkebunan','padang']);
  const meaningfulWords = namaWords.filter(w => !skipWords.has(w));
  if (meaningfulWords.length > 0) {
    autoAliases.add(meaningfulWords.join(' '));
    meaningfulWords.forEach(w => autoAliases.add(w));
    // Kombinasi dua kata berurutan
    for (let i = 0; i < meaningfulWords.length - 1; i++) {
      autoAliases.add(meaningfulWords[i] + ' ' + meaningfulWords[i+1]);
    }
  }

  return { id, name:d.nama, cat, emoji, desc:d.catatan||d.kategori||'', bestTime,
    zone, tiket:d.htm||0, dur, isIjen, isSunset, isNight, isCity,
    aliases: [...autoAliases],
    tips:d.catatan?`Akses ${d.akses||''}. ${d.catatan}`.trim():'', maps:d.maps||'',
    lat:d.lat||null, lng:d.lng||null };
}

    const timeout = new Promise((_,rej) => setTimeout(()=>rej(new Error('timeout')), 10000));
    const query   = db.collection('places').get();
    const snap    = await Promise.race([query, timeout]);
    // Cache untuk dipakai loadPenginapanOptions (hindari fetch ulang)
    window._placesCache = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));

    const loaded = snap.docs
      .map(doc => mapToWandr(doc.id, doc.data()))
      .filter(Boolean);

    if (loaded.length > 0) {
      DESTINATIONS = loaded;
      console.log(`✓ Firebase: ${loaded.length} destinasi wisata dimuat dari ${snap.docs.length} total records`);
    } else {
      DESTINATIONS = DESTINATIONS_FALLBACK;
      console.warn('Firebase kosong atau semua pending, pakai fallback');
    }
  } catch(e) {
    DESTINATIONS = DESTINATIONS_FALLBACK;
    console.warn('Firebase gagal (' + e.message + '), pakai fallback');
  }
}

function haversineKm(lat1,lng1,lat2,lng2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Fuzzy match teks ke DESTINATIONS — split koma, cari tiap kata
function parseDestInput(text) {
  S.destinations.clear();
  const terms = text.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
  terms.forEach(term => {
    if (!term) return;
    let bestMatch = null, bestScore = 0;
    DESTINATIONS.forEach(d => {
      const score = matchScore(term, d);
      if (score > bestScore) { bestScore = score; bestMatch = d; }
    });
    if (bestMatch && bestScore >= 50) S.destinations.add(bestMatch.id);
  });
}

// Score matching satu term ke satu destinasi
function matchScore(term, d) {
  const t = term.toLowerCase().trim();
  const n = d.name.toLowerCase();

  // 1. Exact name match
  if (n === t) return 100;

  // 2. Alias match — hanya kalau alias cukup spesifik (minimal 4 karakter dan bukan substring pendek)
  if (d.aliases) {
    for (const a of d.aliases) {
      if (a.length < 4) continue; // skip alias terlalu pendek
      if (a === t) return 98;
      // Alias sama persis dengan term atau term sama persis dengan alias
      if (t === a) return 98;
      // Alias mengandung term (term lebih spesifik)
      if (a.includes(t) && t.length >= 5) return 90;
      // Term mengandung alias — hanya kalau alias panjang (>=8 char) supaya tidak false positive
      // "alas purwo" (10 char) boleh, tapi "jepang" (6 char) jangan match "taman nasional alas purwo"
      if (t.includes(a) && a.length >= 8) return 85;
    }
  }

  // 3. Nama mengandung term (min 4 karakter)
  if (t.length >= 4 && n.includes(t)) return 80;

  // 4. Term mengandung nama penuh (min 5 karakter)
  if (n.length >= 5 && t.includes(n)) return 75;

  // 5. Word-level — hitung kata bermakna yang cocok
  const skipWords = new Set(['dan','yang','ke','di','dari','untuk','dengan','atau','taman','nasional','pantai','air','goa','gua','pulau','bukit','gunung','perkebunan']);
  const nWords    = n.split(' ').filter(w => w.length > 2 && !skipWords.has(w));
  const termWords = t.split(' ').filter(w => w.length > 2 && !skipWords.has(w));
  if (!nWords.length || !termWords.length) return 0;

  const hits = termWords.filter(tw => nWords.some(nw => nw === tw || nw.startsWith(tw) || tw.startsWith(nw)));

  // Hitung coverage: berapa banyak kata nama yang ter-cover oleh term
  const coverage = hits.length / nWords.length;
  const precision = hits.length / termWords.length;
  // Pakai harmonic mean (F1-score style) supaya harus cocok di kedua sisi
  const f1 = coverage + precision > 0 ? 2 * coverage * precision / (coverage + precision) : 0;
  return f1 >= 0.5 ? Math.round(f1 * 60) : 0;
}


// Load penginapan terdekat dari Firebase berdasarkan destinasi terpilih
async function loadPenginapanOptions() {
  if (!db) { S.penginapanOptions = []; S.allPenginapan = []; return; }
  try {
    // Pakai cache dari loadDestinations kalau ada, hindari fetch ulang
    let allDocs;
    if (window._placesCache) {
      allDocs = window._placesCache;
    } else {
      const snap = await db.collection('places').get();
      allDocs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      window._placesCache = allDocs;
    }

    const all = allDocs.filter(d => {
      const t = (d.type||'').toLowerCase();
      return ['penginapan','hotel','homestay','villa','guesthouse'].includes(t);
    });
    S.allPenginapan = all;

    // Hitung terdekat dari destinasi terpilih (jika ada koordinat)
    if (S.destinations.size > 0) {
      const selDests = DESTINATIONS.filter(d=>S.destinations.has(d.id));
      const lats = selDests.map(d=>d.lat).filter(Boolean);
      const lngs = selDests.map(d=>d.lng).filter(Boolean);
      if (lats.length > 0) {
        const cLat = lats.reduce((a,b)=>a+b,0)/lats.length;
        const cLng = lngs.reduce((a,b)=>a+b,0)/lngs.length;
        S.penginapanOptions = all
          .filter(d => d.lat && d.lng)
          .map(d => ({ ...d, dist: haversineKm(cLat,cLng,d.lat,d.lng) }))
          .sort((a,b)=>a.dist-b.dist)
          .slice(0, 6);
      } else {
        S.penginapanOptions = all.slice(0, 6);
      }
    } else {
      S.penginapanOptions = all.slice(0, 6);
    }
  } catch(e) {
    console.warn('loadPenginapanOptions gagal:', e.message);
    S.penginapanOptions = []; S.allPenginapan = [];
  }
}

// Load kuliner dalam radius 1km dari penginapan terpilih
async function loadKulinerNearPenginapan(lat, lng) {
  if (!db) { S.kulinerOptions = []; return; }
  try {
    const snap = await db.collection('places').where('type','==','kuliner').get();
    S.kulinerOptions = snap.docs
      .map(doc => ({ id:doc.id, ...doc.data() }))
      .filter(d => d.lat && d.lng && d.nama)
      .map(d => ({ ...d, dist: haversineKm(lat,lng,d.lat,d.lng) }))
      .filter(d => d.dist <= 1.0)   // dalam 1km
      .sort((a,b)=>a.dist-b.dist)
      .slice(0, 5);
    console.log(`Kuliner terdekat (≤1km): ${S.kulinerOptions.length} ditemukan`);
  } catch(e) {
    S.kulinerOptions = [];
  }
}

      <div class="gaya-label">${g.label}</div>
      <div class="gaya-desc">${g.desc}</div>
    </div>`
  ).join('');

  // Penginapan: search dari Firebase + fallback tier list
  let penginapanSection = '';

  // Semua data penginapan dari Firebase (load sekali, cache di S.allPenginapan)
  const allHotels = S.allPenginapan || [];

  // Filter berdasarkan query search
  const hotelQuery = S.penginapanSearchQuery || '';
  const filteredHotels = hotelQuery.length >= 2
    ? allHotels.filter(p => {
        const n = (p.nama||'').toLowerCase();
        const q = hotelQuery.toLowerCase();
        return n.includes(q) || (p.kawasan||'').toLowerCase().includes(q) || (p.kategori||'').toLowerCase().includes(q);
      }).slice(0, 6)
    : S.penginapanOptions.slice(0, 4); // default: terdekat dari destinasi

  const hotelSuggestions = filteredHotels.map(p => {
    const sel = S.penginapanId === p.id;
    const distTxt = p.dist != null ? (p.dist < 1 ? Math.round(p.dist*1000)+'m' : p.dist.toFixed(1)+'km') : '';
    return `<div class="card-opt sm${sel?' selected':''}" data-penginapan-fb="${p.id}">
      <span class="card-opt-icon">🏨</span>
      <div style="flex:1;min-width:0">
        <div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.nama)}</div>
        <div class="card-opt-sub">${p.kawasan||''} ${distTxt?'· <span style="color:#e07b39">~'+distTxt+' dari destinasi</span>':''}${p.harga?' · Rp'+p.harga:''}</div>
      </div>
      <span class="card-opt-check">✓</span>
    </div>`;
  }).join('');

  penginapanSection = `
    <div class="autocomplete-wrap" style="margin-bottom:10px">
      <input type="text" id="input-penginapan-search"
        dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"
        placeholder="🔍 Cari nama penginapan..."
        value="${esc(hotelQuery)}"
        style="padding-right:36px">
      ${hotelQuery ? `<span id="btn-clear-hotel" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#5a7a5a;font-size:14px;padding:4px;z-index:1">✕</span>` : ''}
      <div class="autocomplete-dropdown" id="hotel-autocomplete" style="${hotelQuery.length>=1?'':'display:none'}">
        ${filteredHotels.length > 0
          ? filteredHotels.map(p => {
              const sel = S.penginapanId === p.id;
              const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):'';
              return `<div class="autocomplete-item\${sel?' active':''}" data-penginapan-ac="\${p.id}">
                <span style="font-size:20px">🏨</span>
                <div>
                  <div class="autocomplete-item-name">\${esc(p.nama)}\${sel?' ✓':''}</div>
                  <div class="autocomplete-item-sub">\${p.kawasan||''}\${distTxt?' · ~'+distTxt+' dari destinasi':''}\${p.harga?' · Rp'+p.harga:''}</div>
                </div>
              </div>`;
            }).join('')
          : `<div class="autocomplete-empty">Tidak ditemukan — coba kata kunci lain</div>`
        }
      </div>
    </div>
    ${S.penginapanId ? (() => {
        const sel = (S.allPenginapan||[]).find(p=>p.id===S.penginapanId) || (S.penginapanOptions||[]).find(p=>p.id===S.penginapanId);
        if (!sel) return '';
        return `<div class="card-opt sm selected" style="margin-bottom:10px;pointer-events:none">
          <span class="card-opt-icon">🏨</span>
          <div style="flex:1;min-width:0">
            <div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">\${esc(sel.nama)}</div>
            <div class="card-opt-sub">\${sel.kawasan||''}\${sel.harga?' · Rp'+sel.harga:''}</div>
          </div>
          <span class="card-opt-check">✓</span>
        </div>`;
      })() : ''}
    ${!S.penginapanId && !hotelQuery && S.penginapanOptions.length > 0 ? `
      <div style="font-size:11px;color:#4a6a4a;margin-bottom:8px">📍 Terdekat dari destinasimu:</div>
      <div class="card-list" id="hotel-suggestions">\${hotelSuggestions}</div>` : ''}
    ${allHotels.length === 0 ? `
      <div class="card-list">
        ${PENGINAPAN.map(p =>
          `<div class="card-opt sm${S.penginapan===p.v?' selected':''}" data-penginapan="${p.v}">
            <span class="card-opt-icon">${p.emoji}</span>
            <div><div class="card-opt-title">${p.label}</div><div class="card-opt-sub">${p.range}</div></div>
            <span class="card-opt-check">✓</span>
          </div>`).join('')}
      </div>` : ''}
    <div style="margin-top:10px">
      <label style="display:block;font-size:12px;color:#6a8a6a;margin-bottom:6px">Atau ketik langsung nama penginapan:</label>
      <input type="text" id="input-penginapan-custom"
        dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"
        placeholder="Contoh: Aston Banyuwangi, Ketapang Indah Hotel..."
        value="${esc(S.penginapanCustom)}">
    </div>`;

  return `
    <h2 class="step-title">Preferensi Trip</h2>
    <p class="step-sub">Sesuaikan dengan gaya traveling kamu</p>

    <div class="field-wrap">
      <label class="field-label">Durasi Perjalanan</label>
      <div class="pill-row">${durasiBtns}</div>
    </div>

    <div class="field-wrap">
      <label class="field-label">Gaya Perjalanan</label>
      <div class="gaya-row">${gayaCards}</div>
    </div>

    <div class="field-wrap">
      <label class="field-label">🏨 Penginapan</label>
      ${penginapanSection}
    </div>

    <div class="field-wrap">
      <label class="field-label">Jumlah Orang</label>
      <div class="counter-row">
        <button class="cnt-btn" id="btn-minus">−</button>
        <span class="cnt-val" id="cnt-val">${S.jumlahOrang}</span>
        <button class="cnt-btn" id="btn-plus">+</button>
        <span class="cnt-label">orang</span>
      </div>
    </div>`;
}

// ─── RENDER STEP 3 ───────────────────────────────────────────────────────────
function renderStep3() {

      <div class="loading-icon">🗺️</div>
      <h3 class="loading-title">Merencanakan perjalananmu<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></h3>
      <p class="loading-sub">AI sedang mengoptimasi rute, mengecek jam operasional,<br>dan menyusun jadwal terbaik untukmu</p>
      <div class="loading-tags">
        <span class="loading-tag">📍 Sorting rute</span>
        <span class="loading-tag">🕐 Estimasi waktu</span>
        <span class="loading-tag">💰 Kalkulasi biaya</span>
        <span class="loading-tag">✨ Finalisasi</span>
      </div>
    </div>`;

  if (S.error) return `
    <div class="error-screen">
      <div style="font-size:48px;margin-bottom:14px">⚠️</div>

  const it = S.itinerary;

  const highlights = (it.highlights||[])
    .map(h => `<span class="highlight-tag">★ ${esc(h)}</span>`)
    .join('');

  const days = (it.days||[]).map((day, di) => {
    const acts = (day.activities||[]).map((act, ai) => {
      const as = ACT_STYLE[act.type] || ACT_STYLE.aktivitas;
      const isLast = ai === day.activities.length - 1;
      return `
        <div class="act-item" style="animation-delay:${di*.12+ai*.07}s">
          <div class="act-timeline">
            <span class="act-icon">${as.icon}</span>
            ${!isLast ? '<div class="act-line"></div>' : ''}
          </div>
          <div class="act-body">
            <div class="act-meta">
              <div>
                <span class="act-time">${esc(act.time||'')}</span>
                ${act.duration ? `<span class="act-duration">· ${esc(act.duration)}</span>` : ''}
              </div>
              ${act.estimatedCost>0 ? `<span class="act-cost">~${fmt(act.estimatedCost)}</span>` : ''}
            </div>
            <div class="act-name">${esc(act.name)}</div>
            ${act.location&&act.location!==act.name ? `<div class="act-location">📍 ${esc(act.location)}</div>` : ''}
            <div class="act-desc">${esc(act.description||'')}</div>
            ${act.tips ? `<div class="act-tip" style="background:${as.bg};border-color:${as.color};color:${as.color}">💡 ${esc(act.tips)}</div>` : ''}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="day-section" style="animation-delay:${di*.15}s">
        <div class="day-header">
          <div class="day-num">${day.day}</div>
          <div>
            <div class="day-label">${esc(day.date_label||'')}</div>
            <div class="day-title-txt">${esc(day.title||'')}</div>
          </div>
        </div>
        <div class="act-list">${acts}</div>
      </div>`;
  }).join('');

  const packingTags = (it.packingTips||[])
    .map(t => `<span class="packing-tag">${esc(t)}</span>`)
    .join('');

  return `
    <div class="result-summary">
      <div class="result-top">
        <div class="result-title">Itinerary Banyuwangi ✨</div>
        <details style="cursor:pointer;outline:none;background:rgba(224,123,57,.1);padding:6px 12px;border-radius:12px;border:1px solid rgba(224,123,57,.3);flex-shrink:0">
          <summary style="list-style:none;user-select:none">
            <div class="result-budget-label" style="display:flex;align-items:center;justify-content:flex-end;gap:4px">Est. Budget/org <span style="font-size:8px">▼</span></div>
            <div class="result-budget-val">${fmt(it.estimatedBudget?.min)}–${fmt(it.estimatedBudget?.max)}</div>
          </summary>
          <div style="margin-top:10px;font-size:11px;text-align:left;background:rgba(0,0,0,.3);padding:10px;border-radius:8px;color:#d0d0d0;min-width:160px">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span>🚌 Transport</span><span style="color:#fff;font-weight:600">~${fmt(it.estimatedBudget?.details?.transportasi)}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span>🏨 Penginapan</span><span style="color:#fff;font-weight:600">~${fmt(it.estimatedBudget?.details?.akomodasi)}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:5px"><span>🍽️ Kuliner</span><span style="color:#fff;font-weight:600">~${fmt(it.estimatedBudget?.details?.kuliner)}</span></div>
            <div style="display:flex;justify-content:space-between"><span>🎫 Tiket Wisata</span><span style="color:#fff;font-weight:600">~${fmt(it.estimatedBudget?.details?.wisata)}</span></div>
          </div>
        </details>
      </div>
      <div class="result-desc">${esc(it.summary||'')}</div>
      <div class="highlight-tags">${highlights}</div>
      ${it.estimatedBudget?.note ? `<div class="budget-note">ℹ️ ${esc(it.estimatedBudget.note)}</div>` : ''}
    </div>

    ${days}

    ${packingTags ? `
      <div class="packing-box">
        <div class="packing-title">🎒 Perlengkapan yang Perlu Dibawa</div>
        <div class="packing-tags">${packingTags}</div>
      </div>` : ''}

    ${it.importantNotes ? `<div class="notes-box">⚠️ ${esc(it.importantNotes)}</div>` : ''}

    <button class="btn-ghost" id="btn-restart" style="width:100%;justify-content:center">
      ↺ Buat Itinerary Baru
    </button>`;
}

// ─── PARTIAL UPDATE STEP 0 ───────────────────────────────────────────────────
// Dipanggil saat user mengetik — update feedback tanpa re-render input,
// supaya cursor tidak loncat ke awal (penyebab teks terbalik di Android)
function updateDestFeedback() {
  const matched   = DESTINATIONS.filter(d=>S.destinations.has(d.id));
  const terms     = S.destInput.split(',').map(s=>s.trim()).filter(Boolean);
  const unmatched = terms.filter(t => !isTermMatched(t));

  // 1. Tags destinasi yang dikenali
  const tagsEl = document.getElementById('dest-tags-area');
  if (tagsEl) {
    if (matched.length > 0) {
      tagsEl.style.display = '';
      const tags = matched.map(d => `
        <div style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;
          background:rgba(224,123,57,.12);border:1.5px solid rgba(224,123,57,.4);
          border-radius:20px;margin:3px">
          <span>${d.emoji}</span>
          <span style="font-size:13px;font-weight:600;color:#e07b39">${esc(d.name)}</span>
          <span data-remove="${d.id}" style="cursor:pointer;color:#8fa08f;font-size:11px;
            margin-left:2px;padding:1px 3px;border-radius:50%">✕</span>
        </div>`).join('');
      document.getElementById('dest-tags-list').innerHTML = tags;
      // Re-attach remove listeners
      document.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
        const id = el.dataset.remove;
        S.destinations.delete(id);
        const d = DESTINATIONS.find(x=>x.id===id);
        if (d) {
          const parts = S.destInput.split(',').map(s=>s.trim())
            .filter(s=>!s.toLowerCase().includes(d.name.toLowerCase().split(' ')[0]));
          S.destInput = parts.join(', ');
          const inp = document.getElementById('dest-input');
          if (inp) inp.value = S.destInput;
        }
        updateDestFeedback();
        updateNav();
      }));
    } else {
      tagsEl.style.display = 'none';
    }
  }

  // 2. Warning "tidak ditemukan"
  const warnEl = document.getElementById('dest-warn-area');
  if (warnEl) {
    warnEl.style.display = (unmatched.length > 0 && S.destInput) ? '' : 'none';
    if (unmatched.length > 0 && S.destInput) {
      warnEl.innerHTML = `⚠️ Tidak ditemukan: <em>${unmatched.join(', ')}</em><br>
        <span style="color:#6a8a6a">Coba: Kawah Ijen, TN Baluran, Red Island, Green Bay, TN Alas Purwo, Kawah Wurung…</span>`;
    }
  }

  // 3. Label "Atau pilih" / "Tambah lagi"
  const lblEl = document.getElementById('dest-suggest-label');
  if (lblEl) lblEl.textContent = matched.length > 0 ? 'Tambah lagi:' : 'Atau pilih dari sini:';

  // 4. Suggestions — hapus yang sudah dipilih
  const sugEl = document.getElementById('dest-suggestions');
  if (sugEl) {
    const suggestions = DESTINATIONS
      .filter(d=>!S.destinations.has(d.id))
      .slice(0,6)
      .map(d=>`<button data-suggest="${d.id}" style="background:rgba(255,255,255,.05);
        border:1px solid rgba(255,255,255,.1);color:#8fa08f;border-radius:16px;
        padding:5px 11px;font-size:11px;cursor:pointer;font-family:inherit;
        transition:all .2s;white-space:nowrap">${d.emoji} ${d.name}</button>`).join('');
    sugEl.innerHTML = suggestions;
    // Re-attach suggest listeners
    sugEl.querySelectorAll('[data-suggest]').forEach(el => el.addEventListener('click', () => {
      const d = DESTINATIONS.find(x=>x.id===el.dataset.suggest);
      if (!d) return;
      S.destinations.add(d.id);
      S.destInput = S.destInput ? S.destInput.trimEnd().replace(/,$/,'')+', '+d.name : d.name;
      const inp = document.getElementById('dest-input');
      if (inp) inp.value = S.destInput;
      parseDestInput(S.destInput);
      updateDestFeedback();
      updateNav();
    }));
  }

  // 5. Tombol clear (✕ di dalam input)
  const clearBtn = document.getElementById('btn-clear-input');
  if (S.destInput && !clearBtn) {
    // Tambahkan clear button jika belum ada
    const wrap = document.getElementById('dest-input')?.parentElement;
    if (wrap) {
      const sp = document.createElement('span');
      sp.id = 'btn-clear-input';
      sp.style.cssText = 'position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#5a7a5a;font-size:16px;padding:4px';
      sp.textContent = '✕';
      sp.addEventListener('click', () => {
        S.destInput = ''; S.destinations.clear();
        const inp = document.getElementById('dest-input');
        if (inp) { inp.value = ''; inp.focus(); }
        updateDestFeedback(); updateNav();
        const cb = document.getElementById('btn-clear-input');
        if (cb) cb.remove();
      });
      wrap.appendChild(sp);
    }
  } else if (!S.destInput && clearBtn) {
    clearBtn.remove();
  }
}

// Partial update suggestions penginapan (tanpa re-render step 2)
function updateHotelSuggestions() {
  const q = (S.penginapanSearchQuery||'').toLowerCase();
  const all = S.allPenginapan || [];
  const filtered = q.length >= 1
    ? all.filter(p => {
        const n = (p.nama||'').toLowerCase();
        return n.includes(q)||(p.kawasan||'').toLowerCase().includes(q)||(p.kategori||'').toLowerCase().includes(q);
      }).slice(0, 8)
    : S.penginapanOptions.slice(0, 5);

  // Update autocomplete dropdown
  const acEl = document.getElementById('hotel-autocomplete');
  if (acEl) {
    acEl.style.display = q.length >= 1 ? '' : 'none';
    acEl.innerHTML = filtered.length > 0
      ? filtered.map(p => {
          const sel = S.penginapanId === p.id;
          const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):'';
          return `<div class="autocomplete-item${sel?' active':''}" data-penginapan-ac="${p.id}">
            <span style="font-size:20px">🏨</span>
            <div>
              <div class="autocomplete-item-name">${esc(p.nama)}${sel?' ✓':''}</div>
              <div class="autocomplete-item-sub">${p.kawasan||''}${distTxt?' · ~'+distTxt+' dari destinasi':''}${p.harga?' · Rp'+p.harga:''}</div>
            </div>
          </div>`;
        }).join('')
      : '<div class="autocomplete-empty">Tidak ditemukan — coba kata kunci lain</div>';

    // Re-attach click listeners
    acEl.querySelectorAll('[data-penginapan-ac]').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault(); // prevent blur before click
        const id = el.dataset.penginapanAc;
        S.penginapanId   = S.penginapanId === id ? '' : id;
        S.penginapanData = (S.allPenginapan||[]).find(p=>p.id===id) || (S.penginapanOptions||[]).find(p=>p.id===id) || null;
        S.penginapan     = S.penginapanId ? 'firebase' : '';
        S.penginapanSearchQuery = '';
        if (S.penginapanData?.lat && S.penginapanData?.lng) loadKulinerNearPenginapan(S.penginapanData.lat, S.penginapanData.lng);
        render();
      });
    });
  }

  // Update old card list jika ada
  const listEl = document.getElementById('hotel-suggestions');
  if (listEl) {
    listEl.innerHTML = filtered.map(p => {
      const sel = S.penginapanId === p.id;
      const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):'';
      return `<div class="card-opt sm${sel?' selected':''}" data-penginapan-fb="${p.id}">
        <span class="card-opt-icon">🏨</span>
        <div style="flex:1;min-width:0">
          <div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.nama)}</div>
          <div class="card-opt-sub">${p.kawasan||''} ${distTxt?'· ~'+distTxt+' dari destinasi':''}</div>
        </div>
        <span class="card-opt-check">✓</span>
      </div>`;
    }).join('') || '<div style="font-size:12px;color:#3a5a3a;padding:12px;text-align:center;font-style:italic">Tidak ditemukan</div>';
  }
}

function render() {
  const c = document.getElementById('content');
  try {
    switch (S.step) {
      case 0: c.innerHTML = renderStep0(); break;
      case 1: c.innerHTML = renderStep1(); break;
      case 2: c.innerHTML = renderStep2(); break;
      case 3:
        if (S.loading || S.error || S.itinerary) {
          c.innerHTML = renderStep3();
        } else {
          c.innerHTML = renderPlanningBoard();
          requestAnimationFrame(() => initSortableBoard());
        }
        break;
    }
  } catch(e) {
    console.error('render() error:', e);
    c.innerHTML = `<div style="padding:20px;color:#e07b39;font-size:13px">
      <b>⚠️ Error render:</b><br><pre style="white-space:pre-wrap;font-size:11px;color:#8fa08f;margin-top:8px">${esc(e.message)}\n${esc(e.stack||'')}</pre>
    </div>`;
  }
  updateProgress();
  updateNav();
  attachListeners();
}

// ─── LISTENERS ───────────────────────────────────────────────────────────────
function attachListeners() {
  const c = document.getElementById('content');

  // Step 0 — text input (PARTIAL UPDATE — tidak re-render agar cursor tidak reset)
  const destInput = document.getElementById('dest-input');
  if (destInput) {
    destInput.addEventListener('input', () => {
      S.destInput = destInput.value;
      parseDestInput(S.destInput);
      updateDestFeedback(); // partial update, bukan render()
      updateNav();
    });
    destInput.focus();
  }
  // Clear button
  const btnClear = document.getElementById('btn-clear-input');
  if (btnClear) btnClear.addEventListener('click', () => {
    S.destInput=''; S.destinations.clear();
    const inp = document.getElementById('dest-input');
    if (inp) { inp.value = ''; inp.focus(); }
    updateDestFeedback(); updateNav();
  });
  // Remove tag
  c.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.remove;
    S.destinations.delete(id);
    const d = DESTINATIONS.find(x=>x.id===id);
    if (d) {
      const parts = S.destInput.split(',').map(s=>s.trim()).filter(s=>!s.toLowerCase().includes(d.name.toLowerCase().split(' ')[0]));
      S.destInput = parts.join(', ');
      const inp = document.getElementById('dest-input');
      if (inp) inp.value = S.destInput;
    }
    updateDestFeedback(); updateNav();
  }));
  // Suggestion pills
  c.querySelectorAll('[data-suggest]').forEach(el => el.addEventListener('click', () => {
    const d = DESTINATIONS.find(x=>x.id===el.dataset.suggest);
    if (!d) return;
    S.destinations.add(d.id);
    S.destInput = S.destInput ? S.destInput.trimEnd().replace(/,$/,'')+', '+d.name : d.name;
    const inp = document.getElementById('dest-input');
    if (inp) inp.value = S.destInput;
    parseDestInput(S.destInput);
    updateDestFeedback(); updateNav();
  }));

  // Step 1 — kota asal
  const selKota = document.getElementById('sel-kota');
  if (selKota) selKota.addEventListener('change', () => {
    S.kotaAsal = selKota.value;
    S.kotaAsalCustom = '';
    render();
  });
  const inputKota = document.getElementById('input-kota-custom');
  if (inputKota) inputKota.addEventListener('input', () => {
    S.kotaAsalCustom = inputKota.value;
    updateNav();
  });

  // Step 0 — kuliner custom
  const kulCust = document.getElementById('input-kuliner-custom');
  if (kulCust) kulCust.addEventListener('input', () => { S.kulinerCustom = kulCust.value; });

  // Step 1 — transport (targeted: toggle class + sewa section)
  c.querySelectorAll('[data-transport]').forEach(el => el.addEventListener('click', () => {
    S.transport = el.dataset.transport;
    S.sewaLokal.clear();
    c.querySelectorAll('[data-transport]').forEach(e =>
      e.classList.toggle('selected', e.dataset.transport===S.transport));
    const subw = document.getElementById('sub-trans-wrap');
    if (subw) subw.classList.toggle('open', S.transport==='umum');
    const sw = document.getElementById('sewa-wrap');
    if (sw) sw.classList.toggle('open', S.transport==='umum');
    // Jam picker: tampil untuk semua transport
    const jw = document.getElementById('jam-wrap');
    if (jw) jw.classList.add('open');
    if (S.transport !== 'umum') S.subTransport = '';
    c.querySelectorAll('[data-sewa]').forEach(e => e.classList.remove('selected','sewa-sel'));
    updateNav();
  }));

  // Step 1 — sewa lokal (targeted)
  c.querySelectorAll('[data-sewa]').forEach(el => el.addEventListener('click', () => {
    const v = el.dataset.sewa;
    S.sewaLokal.has(v) ? S.sewaLokal.delete(v) : S.sewaLokal.add(v);
    el.classList.toggle('selected', S.sewaLokal.has(v));
    el.classList.toggle('sewa-sel', S.sewaLokal.has(v));
  }));

  // Step 1 — sub-transport (kereta/pesawat/bus)
  c.querySelectorAll('[data-sub]').forEach(el => el.addEventListener('click', () => {
    S.subTransport = el.dataset.sub;
    c.querySelectorAll('[data-sub]').forEach(e => e.classList.toggle('selected', e.dataset.sub===S.subTransport));
    const jw = document.getElementById('jam-wrap');
    if (jw) jw.classList.add('open');
    updateNav();
  }));

  // Step 1 — jam tiba & pulang
  const inpTiba = document.getElementById('input-waktu-tiba');
  if (inpTiba) inpTiba.addEventListener('change', () => { S.waktuTiba = inpTiba.value; });
  const inpPulang = document.getElementById('input-waktu-pulang');
  if (inpPulang) inpPulang.addEventListener('change', () => { S.waktuPulang = inpPulang.value; });

  // Step 2 — penginapan custom (ketik manual)
  const inpHotel = document.getElementById('input-penginapan-custom');
  if (inpHotel) inpHotel.addEventListener('input', () => {
    S.penginapanCustom = inpHotel.value;
    if (S.penginapanCustom.trim()) {
      // Clear Firebase & tier selection jika ketik manual
      S.penginapanId = ''; S.penginapan = 'custom';
      c.querySelectorAll('[data-penginapan-fb],[data-penginapan]').forEach(e => e.classList.remove('selected'));
    }
    updateNav();
  });

  // Step 2 — penginapan search (partial update, tidak re-render)
  const inpHotelSearch = document.getElementById('input-penginapan-search');
  if (inpHotelSearch) {
    inpHotelSearch.addEventListener('input', () => {
      S.penginapanSearchQuery = inpHotelSearch.value;
      // Clear selection jika user mengetik ulang
      if (S.penginapanSearchQuery && S.penginapanId) {
        S.penginapanId = ''; S.penginapanData = null; S.penginapan = '';
      }
      updateHotelSuggestions();
      updateNav();
    });
    // Tampilkan dropdown saat fokus
    inpHotelSearch.addEventListener('focus', () => {
      if (!S.penginapanId) updateHotelSuggestions();
    });
    // Sembunyikan dropdown saat blur (kecuali sedang klik item)
    inpHotelSearch.addEventListener('blur', () => {
      setTimeout(() => {
        const acEl = document.getElementById('hotel-autocomplete');
        if (acEl) acEl.style.display = 'none';
      }, 200);
    });
  }
  const btnClearHotel = document.getElementById('btn-clear-hotel');
  if (btnClearHotel) btnClearHotel.addEventListener('click', () => {
    S.penginapanSearchQuery = '';
    S.penginapanId = ''; S.penginapanData = null; S.penginapan = '';
    render();
  });
  const hotelList = document.getElementById('hotel-suggestions');
  if (hotelList) hotelList.addEventListener('click', e => {
    const card = e.target.closest('[data-penginapan-fb]');
    if (!card) return;
    const id = card.dataset.penginapanFb;
    S.penginapanId   = S.penginapanId === id ? '' : id;
    S.penginapanData = (S.allPenginapan||[]).find(p=>p.id===id) || S.penginapanOptions.find(p=>p.id===id) || null;
    S.penginapan     = S.penginapanId ? 'firebase' : '';
    if (S.penginapanData?.lat && S.penginapanData?.lng) loadKulinerNearPenginapan(S.penginapanData.lat, S.penginapanData.lng);
    updateHotelSuggestions();
    updateNav();
  });

  // Step 2 — durasi (targeted)
  c.querySelectorAll('[data-durasi]').forEach(el => el.addEventListener('click', () => {
    S.durasi = el.dataset.durasi;
    c.querySelectorAll('[data-durasi]').forEach(e =>
      e.classList.toggle('selected', e.dataset.durasi===S.durasi));
    updateNav();
  }));

  // Step 2 — gaya (targeted)
  c.querySelectorAll('[data-gaya]').forEach(el => el.addEventListener('click', () => {
    S.gayaPerjalanan = el.dataset.gaya;
    c.querySelectorAll('[data-gaya]').forEach(e =>
      e.classList.toggle('selected', e.dataset.gaya===S.gayaPerjalanan));
    updateNav();
  }));

  // Step 2 — penginapan Firebase
  c.querySelectorAll('[data-penginapan-fb]').forEach(el => el.addEventListener('click', () => {
    S.penginapanId = el.dataset.penginapanFb;
    S.penginapan = 'firebase';
    const lat = parseFloat(el.dataset.lat), lng = parseFloat(el.dataset.lng);
    const d = S.penginapanOptions.find(p=>p.id===S.penginapanId);
    S.penginapanData = d || null;
    if (!isNaN(lat) && !isNaN(lng)) loadKulinerNearPenginapan(lat, lng);
    c.querySelectorAll('[data-penginapan-fb]').forEach(e =>
      e.classList.toggle('selected', e.dataset.penginapanFb===S.penginapanId));
    c.querySelectorAll('[data-penginapan]').forEach(e => e.classList.remove('selected'));
    updateNav();
  }));
  // Step 2 — penginapan tipe (targeted)
  c.querySelectorAll('[data-penginapan]').forEach(el => el.addEventListener('click', () => {
    S.penginapan = el.dataset.penginapan;
    S.penginapanId = '';
    S.penginapanData = null;
    c.querySelectorAll('[data-penginapan]').forEach(e =>
      e.classList.toggle('selected', e.dataset.penginapan===S.penginapan));
    c.querySelectorAll('[data-penginapan-fb]').forEach(e => e.classList.remove('selected'));
    updateNav();
  }));

  // Step 2 — counter
  const minus = document.getElementById('btn-minus');
  const plus  = document.getElementById('btn-plus');
  const cntEl = document.getElementById('cnt-val');
  if (minus) minus.addEventListener('click', () => {
    S.jumlahOrang = Math.max(1, S.jumlahOrang-1);
    if (cntEl) cntEl.textContent = S.jumlahOrang;
  });
  if (plus) plus.addEventListener('click', () => {
    S.jumlahOrang = Math.min(20, S.jumlahOrang+1);
    if (cntEl) cntEl.textContent = S.jumlahOrang;
  });

  // Step 3 — planning board reset button
  const btnReset = document.getElementById('btn-reset-plan');
  if (btnReset) btnReset.addEventListener('click', () => {
    initPlanDays();
    render();
  });

  // Result — retry & restart
  const retry   = document.getElementById('btn-retry');
  const restart = document.getElementById('btn-restart');
  if (retry)   retry.addEventListener('click', () => { S.error=null; S.loading=true; render(); generate(); });
  if (restart) restart.addEventListener('click', () => {
    Object.assign(S, {
      step:0, kotaAsal:'', kotaAsalCustom:'', destInput:'',
      transport:'', subTransport:'', durasi:'', gayaPerjalanan:'',
      penginapan:'', penginapanId:'', penginapanData:null,
      penginapanCustom:'', kulinerCustom:'', jumlahOrang:2,
      planDays:[], planBacklog:[],
      loading:false, itinerary:null, error:null,
    });
    S.destinations.clear();
    S.sewaLokal.clear();
    render();
  });
}

document.getElementById('btn-back').addEventListener('click', () => {

});

document.getElementById('btn-next').addEventListener('click', async () => {
  if (S.step===3) {

    readPlanFromDOM();

    S.step++;
    render();
  }
});

// ── Time helpers ─────────────────────────────────────────────────────────────
function addMin(t, m) {
  const [h,mn] = t.split(':').map(Number);
  const tot = h*60+mn+m;
  return `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;
}
function durLabel(m) {
  const h=Math.floor(m/60), mn=m%60;
  return h&&mn?`${h} jam ${mn} menit`:h?`${h} jam`:`${mn} menit`;
}
function pickRand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function parseDurasi(v) {
  return {'1D':[1,0],'2D1N':[2,1],'3D2N':[3,2],'4D3N':[4,3],'5D4N':[5,4]}[v]||[2,1];
}

// ── Build kuliner activity ────────────────────────────────────────────────────
function buildMakan(waktu, zone, overrideTime) {
  const timeMap = { pagi:'07:00', siang:'12:30', malam:'19:00' };
  const labelMap = { pagi:'Sarapan', siang:'Makan Siang', malam:'Makan Malam' };
  const finalTime = overrideTime || timeMap[waktu];
  // Pakai kuliner custom user jika ada
  if (S.kulinerCustom && S.kulinerCustom.trim()) {
    return { time:finalTime, name:`${labelMap[waktu]} — ${S.kulinerCustom.trim()}`,
      location:S.kulinerCustom.trim(), duration:'1 jam',
      description:`${labelMap[waktu]} di ${S.kulinerCustom.trim()} — pilihan kuliner incaran kamu.`,
      tips:'Sesuaikan dengan jam operasional tempat makan.', estimatedCost:30000, type:'makan' };
  }
  // Pakai kuliner dari Firebase jika ada (terdekat dari penginapan terpilih)
  if (S.kulinerOptions && S.kulinerOptions.length > 0) {
    const k = pickRand(S.kulinerOptions);
    const timeMap = { pagi:'07:00', siang:'12:30', malam:'19:00' };
    const labelMap = { pagi:'Sarapan', siang:'Makan Siang', malam:'Makan Malam' };
    return {
      time: timeMap[waktu],
      name: `${labelMap[waktu]} — ${k.nama}`,
      location: k.nama,
      duration: '1 jam',
      description: `${labelMap[waktu]} di ${k.nama}. ${k.catatan||k.menu_andalan||k.kategori||''}`,
      tips: `±${Math.round(k.dist*1000)}m dari penginapan — bisa jalan kaki.`,
      estimatedCost: k.harga ? parseInt(String(k.harga).replace(/\D/g,''))||25000 : 25000,
      type: 'makan',
    };
  }
  const db = KULINER_DB[zone] || KULINER_DB.kota;
  const w  = pickRand(db);
  return {
    time: finalTime,
    name: `${labelMap[waktu]} — ${w.name}`,
    location: w.name,
    duration: '1 jam',
    description: `${labelMap[waktu]} dengan menu ${w.menu}. Warung lokal favorit di kawasan ini.`,
    tips: 'Datang agak awal kalau ramai. Harga terjangkau, rasa autentik.',
    estimatedCost: w.est,
    type: 'makan',
  };
}

// ── Day 1: Kedatangan ─────────────────────────────────────────────────────────
function buildArrivalDay(kota, transport, penginapan) {
  const isUmum = transport === 'umum';
  const subLabel = {kereta:'Kereta Api (Mutiara Timur/Sri Tanjung)',pesawat:'Pesawat',bus:'Bus PO'}[S.subTransport] || 'Kendaraan Umum';
  const jamTiba  = parseInt((S.waktuTiba||'10:00').split(':')[0]);
  const finalHotel = getFinalHotelName();
  const acts = [];

  // Transport ke BWI
  const berangkat = isUmum ? '07:00' : '09:00';
  const durTrans  = isUmum ? {kereta:'±6 jam',pesawat:'±2 jam',bus:'±8 jam'}[S.subTransport]||'±6 jam' : '±4–5 jam';
  const costTrans = {kereta:250000,pesawat:1500000,bus:150000}[S.subTransport] || (isUmum?200000:80000);
  acts.push({ time:berangkat, name:`Perjalanan dari ${kota} ke Banyuwangi`,
    location:kota, duration:durTrans,
    description: isUmum
      ? `Naik ${subLabel} dari ${kota} menuju Banyuwangi.`
      : `Berkendara dari ${kota}. Pastikan kendaraan prima dan tangki penuh.`,
    tips: isUmum ? 'Pesan tiket minimal H-7. Bawa bekal ringan.' : 'Istirahat di rest area setiap 2 jam.',
    estimatedCost:costTrans, type:'transport' });

  // Logika berdasarkan jam tiba
  if (jamTiba < 11) {
    // Tiba pagi → bisa aktivitas ringan dulu
    acts.push({ time:S.waktuTiba, name:'Tiba di Banyuwangi',
      location: isUmum ? 'Stasiun/Bandara Banyuwangi' : 'Banyuwangi',
      duration:'30 menit', description:'Selamat datang di Banyuwangi! 🎉',
      tips:'', estimatedCost:0, type:'transport' });
    acts.push({ time:addMin(S.waktuTiba,30), name:'Titip Tas & Sewa Kendaraan',
      location:'Locker Wangi / Area Stasiun', duration:'45 menit',
      description:'Titip koper di Locker Wangi agar jalan-jalan pagi leluasa sebelum jam check-in hotel.',
      tips:'Locker Wangi: lockerwangi.com | WA: 0851-4717-8692. Tarif ~25K/tas.',
      estimatedCost:25000, type:'aktivitas' });
    acts.push(buildMakan('pagi','kota'));
    acts.push({ time:addMin(S.waktuTiba,105), name:'Wisata Pagi — Pantai Boom / Taman Blambangan',
      location:'Pusat Kota Banyuwangi', duration:'2 jam',
      description:'Jalan santai di Pantai Boom atau Taman Blambangan. Nikmati suasana kota.',
      tips:'Santai saja, simpan energi.', estimatedCost:5000, type:'aktivitas' });
    acts.push({ time:'13:00', name:'Ambil Tas & Check-in Penginapan',
      location:finalHotel, duration:'1 jam',
      description:`Ambil kembali tas dari Locker Wangi, lalu check-in ${finalHotel}.`,
      tips:'', estimatedCost:0, type:'penginapan' });
    acts.push(buildMakan('malam','kota'));
  } else if (jamTiba >= 11 && jamTiba < 18) {
    // Tiba siang-sore → langsung check-in
    acts.push({ time:S.waktuTiba, name:'Tiba & Check-in Penginapan',
      location:finalHotel, duration:'1 jam',
      description:`Check-in ${finalHotel}. Istirahat dan eksplorasi santai sekitar penginapan.`,
      tips:'', estimatedCost:0, type:'penginapan' });
    acts.push({ time:addMin(S.waktuTiba,90), name:'Eksplorasi Ringan Kota',
      location:'Pusat Kota Banyuwangi', duration:'2 jam',
      description:'Jalan sore santai, beli oleh-oleh kecil, nikmati suasana kota.',
      tips:'', estimatedCost:5000, type:'aktivitas' });
    acts.push(buildMakan('malam','kota'));
  } else {
    // Tiba malam
    acts.push(buildMakan('malam','kota'));
    acts.push({ time:addMin(S.waktuTiba,45), name:'Check-in & Istirahat',
      location:finalHotel, duration:'Malam',
      description:'Tiba malam, langsung check-in dan istirahat. Perjalanan esok lebih seru!',
      tips:'', estimatedCost:0, type:'penginapan' });
  }

  return { day:1, date_label:'Hari 1', title:`Kedatangan dari ${kota}`, activities:sortActivities(acts) };
}

// Tambah destinasi ekstra dari arrival bucket ke hari 1
function injectArrivalExtras(arrivalDay) {
  const extras = (S.planArrivalExtras||[])
    .map(id => DESTINATIONS.find(d=>d.id===id))
    .filter(Boolean);
  if (extras.length === 0) return arrivalDay;
  // Sisipkan setelah aktivitas terakhir sebelum makan malam
  const insertBefore = arrivalDay.activities.findIndex(a=>a.type==='kuliner'&&a.name.toLowerCase().includes('malam'));
  const extraActs = extras.map((d,i) => {
    const ext = DEST_EXT[d.id]||{};
    return { time: addMin('15:30', i*60),
      name: d.name, location: d.name+', Banyuwangi',
      duration: durLabel(ext.dur||120),
      description: ext.desc||d.desc||'',
      tips: ext.tips||'', estimatedCost: ext.tiket||d.tiket||0, type:'aktivitas' };
  });
  if (insertBefore >= 0) {
    arrivalDay.activities.splice(insertBefore, 0, ...extraActs);
  } else {
    arrivalDay.activities.push(...extraActs);
  }
  // Sort ulang setelah inject
  arrivalDay.activities = sortActivities(arrivalDay.activities);
  return arrivalDay;
}

// ── Build activity day ─────────────────────────────────────────────────────────
function buildActivityDay(dayNum, spots, zone, form, opts={}) {
  const hasIjen = spots.some(s=>s.id==='ijen');
  const hasSukamade = spots.some(s=>s.id==='sukamade');

  // Sort: normal → sunset → night
  // Jika opts.honorOrder=true (dari planning board), hanya geser night activities ke belakang
  // tapi tetap pertahankan urutan relatif user
  const sorted = opts.honorOrder
    ? (() => {
        const normal  = spots.filter(s=>!DEST_EXT[s.id]?.isNight);
        const nightly = spots.filter(s=>DEST_EXT[s.id]?.isNight);
        return [...normal, ...nightly];
      })()
    : [...spots].sort((a,b) => {
        const score = s => (DEST_EXT[s.id]?.isSunset?10:0) + (DEST_EXT[s.id]?.isNight?20:0);
        return score(a)-score(b);
      });

  const acts = [];
  const distKm = ZONE_DIST[zone]||30;
  const transMin = form.transport==='pribadi_motor'
    ? Math.round(distKm/40*60) : Math.round(distKm/45*60);

  // ── IJEN DAY ──
  if (hasIjen) {
    acts.push({ time:'23:15', name:`Berangkat ke Kawah Ijen via ${S.subTransport==='kereta'?'DAMRI dari Stasiun BWI':'Kendaraan dari '+getFinalHotelName()}`,
      location:`${getFinalHotelName()} → Paltuding`,
      duration:'1 jam 15 menit',
      description:'Berangkat menuju Paltuding (gerbang Ijen). Bus DAMRI tersedia dari Stasiun Banyuwangi Kota tujuan Ijen.',
      tips:'Bawa masker gas N95, headlamp, jaket sangat tebal. Bus DAMRI: ~Rp15.000 dari stasiun.',
      estimatedCost:15000, type:'transport' });
    acts.push({ time:'00:30', name:'Tiba di Paltuding — Antri Tiket',
      location:'Pos Paltuding, Kawah Ijen', duration:'1 jam',
      description:'Tiba di gerbang Paltuding. Antri tiket masuk dan istirahat sejenak di warung sebelum trekking dimulai.',
      tips:'Siapkan KTP asli untuk tiket. Antrian bisa sangat panjang di akhir pekan.',
      estimatedCost:20000, type:'aktivitas' });
    acts.push({ time:'01:30', name:'Mulai Trekking Kawah Ijen',
      location:'Gerbang Paltuding → Puncak Kawah', duration:'1 jam 30 menit',
      description:'Trekking ±3km menuju puncak kawah. Nikmati langit berbintang. Semakin dekat puncak, tercium bau belerang — pasang masker!',
      tips:'Jaga pace, atur napas. Ikuti headlamp di depan. Jangan berlari.',
      estimatedCost:0, type:'aktivitas' });
    acts.push({ time:'03:00', name:'Kawah Ijen — Blue Fire & Sunrise',
      location:'Kawah Ijen, Banyuwangi', duration:'4 jam',
      description:'Trekking ~3km (±1.5 jam) menuju puncak. Saksikan fenomena blue fire unik sebelum subuh, dilanjutkan sunrise spektakuler di atas kawah sulfur.',
      tips:'Ikuti jalur resmi. Sewa masker gas di pos (Rp10K). Jangan turun ke kawah tanpa pemandu resmi.',
      estimatedCost:5000+10000, type:'aktivitas' });
    acts.push({ time:'07:00', name:'Turun & Sarapan di Sekitar Paltuding',
      location:'Warung sekitar Paltuding', duration:'1 jam 30 menit',
      description:'Turun dari kawah dan sarapan di warung sekitar Paltuding. Istirahat dan nikmati udara segar pegunungan.',
      tips:'Beli kopi hangat — sangat dibutuhkan setelah trekking dini hari.',
      estimatedCost:25000, type:'makan' });

    if (form.gayaPerjalanan==='santai') {
      // Ijen hangover rule: santai = rest the rest of the day
      acts.push({ time:'09:00', name:'Kembali ke Penginapan — Istirahat Wajib',
        location:'Penginapan', duration:'5 jam',
        description:'Kembali ke penginapan untuk istirahat total. Trekking dini hari Ijen sangat menguras energi — pemulihan fisik adalah prioritas.',
        tips:'Tidur siang adalah pilihan paling bijak. Jangan memforsir tubuh setelah Ijen.',
        estimatedCost:0, type:'istirahat' });
    } else {
      // Eksplorasi: boleh tambah 1 spot searah (Kawah Wurung atau Jagir)
      const extra = sorted.find(s=>s.id!=='ijen');
      if (extra) {
        const ext = DEST_EXT[extra.id]||{};
        acts.push({ time:'09:30', name: extra.name,
          location: extra.name+', Banyuwangi', duration: durLabel(ext.dur||120),
          description: ext.desc||'', tips: ext.tips||'',
          estimatedCost: ext.tiket||0, type:'aktivitas' });
      }
      acts.push({ time:'12:00', name:'Kembali & Istirahat Siang',
        location:'Penginapan', duration:'3 jam',
        description:'Kembali ke penginapan. Istirahat setelah Ijen tetap sangat dianjurkan meski gaya eksplorasi.',
        tips:'Tidur 1–2 jam akan membuat badan jauh lebih segar untuk malam hari.',
        estimatedCost:0, type:'istirahat' });
    }
    acts.push(buildMakan('malam','barat'));

  // ── SUKAMADE DAY ──
  } else if (hasSukamade) {
    acts.push(buildMakan('pagi', zone));
    acts.push({ time:'08:00', name:'Perjalanan Menuju Sukamade',
      location:'Rute menuju Sukamade', duration:'3–4 jam',
      description:'Perjalanan panjang menuju Sukamade melewati jalan lintas hutan. Jalur menantang terutama musim hujan.',
      tips:'Gunakan kendaraan 4WD atau motor trail. Cek kondisi jalan sehari sebelumnya.',
      estimatedCost:0, type:'transport' });
    acts.push({ time:'12:00', name:'Tiba & Eksplorasi Pantai Sukamade',
      location:'Pantai Sukamade', duration:'3 jam',
      description:'Tiba di Sukamade. Eksplor pantai di siang hari dan check-in penginapan sederhana di kawasan.',
      tips:'Penginapan sangat terbatas — wajib reservasi jauh-jauh hari.',
      estimatedCost:10000, type:'aktivitas' });
    acts.push(buildMakan('siang','selatan'));
    acts.push({ time:'20:00', name:'Program Malam — Penyu Hijau Bertelur',
      location:'Pantai Sukamade', duration:'2–3 jam',
      description:'Dipandu ranger, saksikan penyu hijau raksasa naik ke pantai untuk bertelur. Momen langka dan sangat emosional.',
      tips:'Ikuti instruksi ranger sepenuhnya. Dilarang menggunakan flash kamera. Gunakan senter dengan filter merah.',
      estimatedCost:50000, type:'aktivitas' });

  // ── REGULAR DAY ──
  } else {
    // Transport to zone
    if (distKm > 15) {
      const berangkat = addMin('07:00', -transMin-10);
      acts.push({ time: berangkat,
        name:`Berangkat menuju ${ZONE_LABEL_SHORT[zone]||zone}`,
        location:'Penginapan → Destinasi', duration: durLabel(transMin),
        description:`Berangkat menuju klaster destinasi hari ini. Jarak ±${distKm}km dari kota, tempuh ±${durLabel(transMin)}.`,
        tips:'Pastikan bahan bakar penuh. Sarapan ringan dulu sebelum berangkat.',
        estimatedCost:0, type:'transport' });
    }

    let cur = '07:00';
    const mainSpots = sorted.filter(s=>!DEST_EXT[s.id]?.isSunset&&!DEST_EXT[s.id]?.isNight);
    const sunsetSpots = sorted.filter(s=>DEST_EXT[s.id]?.isSunset);

    mainSpots.forEach((spot, i) => {
      const ext = DEST_EXT[spot.id]||{};
      acts.push({ time:cur, name:spot.name,
        location:spot.name+', Banyuwangi', duration:durLabel(ext.dur||180),
        description:ext.desc||spot.desc||'', tips:ext.tips||'',
        estimatedCost:ext.tiket||0, type:'aktivitas' });
      cur = addMin(cur, (ext.dur||180)+35);

      // Insert lunch roughly in the middle
      if (i===Math.floor((mainSpots.length-1)/2)) {
        const makan = buildMakan('siang', zone);
        makan.time = cur;
        acts.push(makan);
        cur = addMin(cur, 70);
      }
    });

    // Sunset spots always at 15:00
    sunsetSpots.forEach(spot => {
      const ext = DEST_EXT[spot.id]||{};
      acts.push({ time:'15:00', name:spot.name+' — Sunset',
        location:spot.name, duration:durLabel(ext.dur||180),
        description:ext.desc||'', tips:ext.tips||'',
        estimatedCost:ext.tiket||0, type:'aktivitas' });
    });

    // If only sunset spots and no lunch added yet
    if (mainSpots.length===0 && sunsetSpots.length>0) {
      acts.unshift(buildMakan('siang', zone));
    }

    acts.push(buildMakan('malam', zone));
    acts.push({ time:'21:00', name:'Istirahat di Penginapan',
      location:'Penginapan Banyuwangi', duration:'8 jam',
      description:'Istirahat yang cukup untuk mempersiapkan energi hari berikutnya.',
      tips:'Siapkan perlengkapan untuk besok malam ini agar tidak terburu-buru.',
      estimatedCost:0, type:'penginapan' });
  }

  // Day title
  const names = spots.map(s=>s.name);
  const title = names.length<=2 ? names.join(' & ') : `Eksplorasi ${ZONE_LABEL_SHORT[zone]||zone} (${names.length} Destinasi)`;
  return { day:dayNum, date_label:`Hari ${dayNum}`, title, activities:sortActivities(acts) };
}

// Convert "HH:MM" ke menit untuk sorting
function timeToMin(t) {
  if (!t || typeof t !== 'string') return 9999;
  const [h, m] = t.split(':').map(Number);
  return (h||0)*60 + (m||0);
}

// Sort activities dalam satu hari berdasarkan waktu
function sortActivities(acts) {
  return [...acts].sort((a,b) => timeToMin(a.time) - timeToMin(b.time));
}

const ZONE_LABEL_SHORT = { barat:'Barat/Ijen', utara:'Utara', selatan:'Selatan', kota:'Kota BWI' };

// ── Budget calculator ─────────────────────────────────────────────────────────
function calculateBudget(spots, form, totalDays) {
  const tiket   = spots.reduce((s,d)=>s+(DEST_EXT[d.id]?.tiket||0),0);
  const makan   = totalDays*3*27000;
  const nights  = Math.max(0,totalDays-1);
  const hotelEst= {hotel45:700000,hotel3:300000,hotel12:150000,homestay:80000,none:0,firebase:150000};
  const hotel   = (hotelEst[form.penginapan]||100000)*nights;
  const sewaEst = [...(form.sewaLokal||[])].reduce((s,v)=>s+({motor:120000,mobil_driver:500000,ojek:30000}[v]||0)*totalDays,0);
  const transPP = {kereta:250000,pesawat:1500000,bus:150000}[form.subTransport]
    || (form.transport==='pribadi_mobil'?400000:form.transport==='pribadi_motor'?150000:200000);
  const totalTransport = transPP + sewaEst;
  const min = tiket+makan+hotel+totalTransport;
  return {
    min: Math.round(min/1000)*1000,
    max: Math.round(min*1.35/1000)*1000,
    details: { transportasi:totalTransport, akomodasi:hotel, kuliner:makan, wisata:tiket },
    note:`Per orang · ${totalDays} hari · Belum termasuk oleh-oleh`,
  };
}

  const base = new Set(['Sunscreen SPF50+','Uang tunai (ATM terbatas di lokasi wisata)','Powerbank','Kartu identitas','Obat-obatan pribadi']);
  spots.forEach(s=>(PACKING_DB[s.id]||[]).forEach(t=>base.add(t)));
