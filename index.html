}
function buildNotes(spots) {
  const n=[];
  if(spots.some(s=>s.id==='ijen'))     n.push('Kawah Ijen ditutup saat cuaca ekstrem — selalu cek update terbaru sebelum berangkat.');
  if(spots.some(s=>s.id==='sukamade')) n.push('Akses Sukamade bisa terputus di musim hujan.');
  if(spots.some(s=>['menjangan','tabuhan'].includes(s.id))) n.push('Perjalanan ke pulau tergantung kondisi laut.');
  return n.join(' ')||'Selalu cek kondisi cuaca dan jalan sebelum berangkat. Jaga kebersihan dan hormati alam Banyuwangi.';
}

// ─── PLANNING BOARD ENGINE ────────────────────────────────────────────────────

// Inisialisasi planDays dari auto-suggestion zone clustering
function initPlanDays() {
  const [totalDays] = parseDurasi(S.durasi);
  // actDays = hari aktif untuk drag (exclude hari 1 kedatangan dan hari terakhir kepulangan)
  // Tapi juga pastikan cukup slot untuk semua destinasi
  const selected  = DESTINATIONS.filter(d => S.destinations.has(d.id));
  const spotsPerDay = S.gayaPerjalanan === 'santai' ? 2 : 3;
  const minActDays  = Math.ceil(selected.length / spotsPerDay);
  const naturalAct  = Math.max(1, totalDays - (totalDays > 1 ? 2 : 0));
  // Pakai yang lebih besar antara natural dan minimum yang dibutuhkan
  // tapi tidak melebihi totalDays - 1 (sisakan 1 hari kepulangan)
  const actDays = Math.min(Math.max(naturalAct, minActDays), Math.max(1, totalDays - 1));
  S.planDays    = Array.from({length: actDays}, () => []);
  S.planBacklog = [];
  const byZone = {};
  selected.forEach(d => {
    const z = DEST_EXT[d.id]?.zone || d.zone || 'kota';
    if (!byZone[z]) byZone[z] = [];
    byZone[z].push(d.id);
  });
  if (byZone.barat) { const ord=['ijen','kawah_wurung','jagir']; byZone.barat.sort((a,b)=>ord.indexOf(a)-ord.indexOf(b)); }
  if (byZone.selatan) { byZone.selatan.sort((a,b)=>(a==='sukamade'?1:0)-(b==='sukamade'?1:0)); }
  let di = 0;
  ['barat','utara','selatan','kota'].forEach(zone => {
    if (!byZone[zone] || di >= actDays) return;
    const spots = byZone[zone];
    if (zone==='barat' && spots.includes('ijen')) {
      const ig = S.gayaPerjalanan==='eksplorasi' ? ['ijen',...spots.filter(s=>s!=='ijen').slice(0,1)] : ['ijen'];
      if (di<actDays) S.planDays[di++] = ig;
      const rem = spots.filter(s=>!ig.includes(s));
      if (rem.length>0 && di<actDays) S.planDays[di++] = rem;
      return;
    }
    if (spots.includes('sukamade')) {
      const others = spots.filter(s=>s!=='sukamade');
      for (let i=0;i<others.length;i+=spotsPerDay) if(di<actDays) S.planDays[di++]=others.slice(i,i+spotsPerDay);
      if (di<actDays) S.planDays[di++] = ['sukamade'];
      return;
    }
    for (let i=0;i<spots.length;i+=spotsPerDay) if(di<actDays) S.planDays[di++]=spots.slice(i,i+spotsPerDay);
  });
  S.planBacklog = selected.map(d=>d.id).filter(id=>!S.planDays.flat().includes(id));
}

// Baca state planning board dari DOM (setelah SortableJS menggeser kartu)
function readPlanFromDOM() {
  S.planDays = S.planDays.map((_,i) => {
    const el = document.getElementById(`bucket-day${i}`);
    return el ? [...el.querySelectorAll('.drag-item')].map(c=>c.dataset.id) : [];
  });
  // Baca juga arrival day (opsional)
  const arrEl = document.getElementById('bucket-day-arrival');
  S.planArrivalExtras = arrEl
    ? [...arrEl.querySelectorAll('.drag-item')]
        .map(c=>c.dataset.id)
        .filter(id => !id.startsWith('hotel_checkin_'))
    : [];
  const bEl = document.getElementById('bucket-unassigned');
  S.planBacklog = bEl
    ? [...bEl.querySelectorAll('.drag-item')]
        .map(c=>c.dataset.id)
        .filter(id => !id.startsWith('hotel_checkin_'))
    : [];
}

    return `<div class="drag-item" data-id="${id}">
      <span class="drag-handle">≡</span>

  // Ekstrak hotel dari penginapanCustom (pisah koma) atau penginapanData

    <div class="plan-col" style="border-color:rgba(255,255,255,.06)">
      <div class="plan-col-header">
        <span class="plan-day-badge">1</span> Hari 1 — Kedatangan

      </div>
      <div class="plan-col-body" id="bucket-day-arrival">
        <div class="plan-empty" style="font-size:11px">Opsional: tambah destinasi sore hari kedatangan</div>
      </div>
    </div>`;

  const actDayHTML = S.planDays.map((ids, i) => {

    const warnHTML  = ijenWarn
      ? `<div class="plan-warn">⚠️ Ijen sebaiknya hari tersendiri — fisik sangat terkuras</div>`

      ? `<div class="plan-warn">⚠️ Gaya santai: disarankan maks 2 destinasi/hari</div>`

    return `

        <div class="plan-col-body" id="bucket-day${i}">
          ${ids.map(id => id.startsWith('hotel_checkin_') ? hotelCard(parseInt(id.split('_')[2]), hotelNames[parseInt(id.split('_')[2])]||'Penginapan') : destCard(id)).join('')}
          ${ids.length===0?'<div class="plan-empty">Seret destinasi ke sini</div>':''}
        </div>
      </div>`;
  }).join('');

  const depHTML = totalDays > 1 ? `
    <div class="plan-col locked" style="border-color:rgba(74,122,74,.2);opacity:.5">
      <div class="plan-col-header">
        <span class="plan-day-badge" style="background:#4a7a4a">${totalDays}</span>
        Hari ${totalDays} — Kepulangan 🔒
        <span style="font-size:10px;color:#3a5a3a;margin-left:auto">Otomatis</span>
      </div>
    </div>` : '';

  return `
    <h2 class="step-title">Susun Perjalananmu</h2>
    <p class="step-sub">Tahan lalu seret destinasi ke hari yang diinginkan</p>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:11px;color:#5a7a5a">
        ${S.destinations.size} destinasi · ${totalDays} hari
        ${S.planBacklog.length>0?`<span style="color:#e07b39"> · ${S.planBacklog.length} belum dijadwalkan</span>`:''}
      </div>
      <button id="btn-reset-plan" style="font-size:11px;color:#8fa08f;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:5px 10px;cursor:pointer;font-family:inherit">
        ↺ Saran Otomatis
      </button>
    </div>
    ${hotelNames.length>1?`<div style="font-size:12px;color:#c47bd4;background:rgba(196,123,212,.08);padding:10px 12px;border-radius:8px;margin-bottom:14px;line-height:1.5;border:1px solid rgba(196,123,212,.2)">
      💡 <b>Multi-penginapan terdeteksi</b> — kartu check-in ungu bisa kamu seret ke hari pindah penginapan
    </div>`:''}
    <div class="planning-board">
      ${backlogHTML}${arrivalHTML}${actDayHTML}${depHTML}
    </div>`;
}

// ─── SORTABLEJS INIT ─────────────────────────────────────────────────────────
// Menggantikan native HTML5 drag-drop — jauh lebih smooth di mobile touch
let _sortableInstances = [];

function initSortableBoard() {
  // Destroy semua instance lama
  _sortableInstances.forEach(s => s.destroy());
  _sortableInstances = [];

  const containers = document.querySelectorAll('.plan-col-body');
  containers.forEach(col => {
    // Skip: locked departure day tidak perlu SortableJS
    if (col.closest('.plan-col.locked')) return;
    const inst = new Sortable(col, {
      group:            'wandr-board',
      animation:        280,
      easing:           'cubic-bezier(0.25, 1, 0.5, 1)',
      delay:            150,
      delayOnTouchOnly: true,
      fallbackTolerance: 5,
      scroll:           true,
      scrollSensitivity:80,
      scrollSpeed:      20,
      bubbleScroll:     true,
      forceFallback:    true,
      fallbackOnBody:   true,
      ghostClass:       'sortable-ghost',
      chosenClass:      'sortable-chosen',
      dragClass:        'sortable-drag',
      onEnd: () => readPlanFromDOM(),
    });
    _sortableInstances.push(inst);
  });
}

// ─── GENERATE (rule-based, no API) ──────────────────────────────────────────
function generate() {
  S.loading = true; S.itinerary = null; S.error = null;
  render();

  setTimeout(() => {
    try {
      // Jika planning board sudah diisi, pakai susunan manual
      if (S.planDays && S.planDays.some(d=>d.length>0)) {
        generateFromPlan(); return;
      }
      const selected = DESTINATIONS.filter(d=>S.destinations.has(d.id))
        .map(d=>({...d,...(DEST_EXT[d.id]||{})}));

      const [totalDays] = parseDurasi(S.durasi);
      const spotsPerDay = S.gayaPerjalanan==='santai' ? 2 : 3;
      const kota = S.kotaAsal==='Lainnya' ? S.kotaAsalCustom : S.kotaAsal;

      const days = [];

      // Day 1: Arrival
      days.push(injectArrivalExtras(buildArrivalDay(kota, S.transport, S.penginapan)));

      // Group by zone
      const byZone = {};
      selected.forEach(d=>{
        const z=d.zone||'kota';
        if(!byZone[z]) byZone[z]=[];
        byZone[z].push(d);
      });
      // Sort barat: Ijen first, then Kawah Wurung, then Jagir
      if(byZone.barat){
        const ord=['ijen','kawah_wurung','jagir'];
        byZone.barat.sort((a,b)=>ord.indexOf(a.id)-ord.indexOf(b.id));
      }
      // Sort selatan: Sukamade last (night activity)
      if(byZone.selatan){
        byZone.selatan.sort((a,b)=>(a.id==='sukamade'?1:0)-(b.id==='sukamade'?1:0));
      }

      let dayNum = 2;
      const lastDay = totalDays > 1 ? totalDays : totalDays;
      const actDayLimit = totalDays > 1 ? totalDays-1 : totalDays;

      ['barat','utara','selatan','kota'].forEach(zone=>{
        if(!byZone[zone]||dayNum>actDayLimit) return;
        const spots = byZone[zone];

        if(zone==='barat' && spots.some(s=>s.id==='ijen')) {
          // Ijen day: Ijen + 1 optional (eksplorasi only)
          const ijenSpot = spots.find(s=>s.id==='ijen');
          const others   = spots.filter(s=>s.id!=='ijen');
          const ijenGroup= S.gayaPerjalanan==='eksplorasi'&&others.length
            ? [ijenSpot, others[0]] : [ijenSpot];
          if(dayNum<=actDayLimit) { days.push(buildActivityDay(dayNum++,ijenGroup,zone,S)); }
          const remaining = S.gayaPerjalanan==='eksplorasi' ? others.slice(1) : others;
          for(let i=0;i<remaining.length;i+=spotsPerDay){
            if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,remaining.slice(i,i+spotsPerDay),zone,S));
          }
          return;
        }

        if(spots.some(s=>s.id==='sukamade')) {
          // Sukamade: its own day
          const sukamade = spots.find(s=>s.id==='sukamade');
          const others   = spots.filter(s=>s.id!=='sukamade');
          for(let i=0;i<others.length;i+=spotsPerDay){
            if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,others.slice(i,i+spotsPerDay),zone,S));
          }
          if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,[sukamade],zone,S));
          return;
        }

        for(let i=0;i<spots.length;i+=spotsPerDay){
          if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,spots.slice(i,i+spotsPerDay),zone,S));
        }
      });

      // Last day: Departure
      if(totalDays>1) days.push(buildDepartureDay(totalDays,kota,S.transport));

      S.itinerary = {
        summary: buildSummary(selected,totalDays,S.gayaPerjalanan,kota),
        totalDays,
        highlights: selected.slice(0,3).map(d=>d.name),
        estimatedBudget: calculateBudget(selected,S,totalDays),
        days: days.slice(0,totalDays),
        packingTips: buildPackingTips(selected),
        importantNotes: buildNotes(selected),
      };
    } catch(e) {
      S.error = 'Terjadi kesalahan: '+e.message;
      console.error(e);
    } finally {
      S.loading = false;
      render();
    }
  }, 800); // Loading animation agar terasa proses
}


// Generate itinerary berdasarkan susunan manual dari planning board
function generateFromPlan() {
  try {
    const kota = S.kotaAsal==='Lainnya' ? S.kotaAsalCustom : S.kotaAsal;
    const [totalDays] = parseDurasi(S.durasi);
    const allSelected = DESTINATIONS.filter(d=>S.destinations.has(d.id));
    const hotelNames  = getHotelNames();
    const days = [];

    // Hari 1: Kedatangan (selalu)
    days.push(injectArrivalExtras(buildArrivalDay(kota, S.transport, S.penginapan)));

    // Hari dari planning board
    S.planDays.forEach((allIds, i) => {
      const dayNum = i + 2;
      if (dayNum >= totalDays || allIds.length === 0) return;

      // Pisahkan hotel check-in vs destinasi wisata
      const hotelCheckIns = allIds
        .filter(id => id.startsWith('hotel_checkin_'))
        .map(id => {
          const idx = parseInt(id.split('_')[2]);
          return { id, name: `Check-in: ${hotelNames[idx]||'Penginapan'}`, hotelName: hotelNames[idx]||'Penginapan', type:'penginapan' };
        });
      const spots = allIds
        .filter(id => !id.startsWith('hotel_checkin_'))
        .map(id => DESTINATIONS.find(d=>d.id===id))
        .filter(Boolean)
        .map(d => ({...d,...(DEST_EXT[d.id]||{})}));

      // Kalau hanya hotel check-in tanpa wisata, lewati (check-in akan masuk di buildActivityDay dengan injeksi)
      if (spots.length === 0 && hotelCheckIns.length > 0) {
        const act = hotelCheckIns.map(h => ({
          time: '14:00', name: h.name, location: h.hotelName,
          duration: '1 jam', description: 'Check-in penginapan. Taruh barang dan istirahat sejenak.',
          tips: 'Siapkan dokumen booking.', estimatedCost: 0, type: 'penginapan',
        }));
        days.push({ day:dayNum, date_label:`Hari ${dayNum}`, title:'Check-in Penginapan', activities:sortActivities(act) });
        return;
      }
      if (spots.length === 0) return;

      const zone = spots[0]?.zone || 'kota';
      const builtDay = buildActivityDay(dayNum, spots, zone, S, { honorOrder: true });

      // Inject hotel check-in activities ke awal atau akhir hari
      if (hotelCheckIns.length > 0) {
        const checkinActs = hotelCheckIns.map(h => ({
          time: '14:00', name: h.name, location: h.hotelName,
          duration: '1 jam', description: 'Check-in penginapan baru.',
          tips: '', estimatedCost: 0, type: 'penginapan',
        }));
        builtDay.activities = sortActivities([...builtDay.activities, ...checkinActs]);
      }

      days.push(builtDay);
    });

    // Hari terakhir: Kepulangan (jika multi-hari)
    if (totalDays > 1) days.push(buildDepartureDay(totalDays, kota, S.transport));

    S.itinerary = {
      summary: buildSummary(allSelected, totalDays, S.gayaPerjalanan, kota),
      totalDays,
      highlights: allSelected.slice(0,3).map(d=>d.name),
      estimatedBudget: calculateBudget(allSelected, S, totalDays),
      days: days.slice(0, totalDays),
      packingTips: buildPackingTips(allSelected),
      importantNotes: buildNotes(allSelected),
    };
  } catch(e) {
    S.error = 'Terjadi kesalahan: ' + e.message;
    console.error(e);
  } finally {
    S.loading = false;
    render();
  }
}
