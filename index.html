<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wandr — Buat Itinerary Banyuwangi</title>
  <meta name="description" content="Generate itinerary perjalanan Banyuwangi secara otomatis dengan AI. Masukkan destinasi, pilih kendaraan dan durasi, itinerary langsung jadi.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* [STYLE SAMA PERSIS DENGAN SEBELUMNYA - tidak diubah] */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      background: #0c1a0c;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      color: #f0e8d8;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }
    #app { max-width: 640px; margin: 0 auto; padding: 0 20px; }
    #header { padding-top: 20px; margin-bottom: 18px; display: flex; align-items: center; gap: 9px; position: relative; }
    .logo-icon { width: 30px; height: 30px; background: #e07b39; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .logo-text { font-family: 'Playfair Display', Georgia, serif; font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
    .logo-badge { font-size: 10px; color: #4a6a4a; background: rgba(74,106,74,.18); padding: 2px 9px; border-radius: 20px; font-weight: 500; }
    #progress-area { margin-bottom: 20px; }
    .step-labels { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .step-label { font-size: 10px; font-weight: 400; color: #2a4a2a; letter-spacing: .04em; transition: color .3s; }
    .step-label.active { font-weight: 700; color: #e07b39; }
    .step-label.done   { color: #4a7a4a; }
    .progress-bar { height: 2px; background: rgba(255,255,255,.05); border-radius: 1px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #c96a2a, #e07b39); border-radius: 1px; transition: width .5s ease; }
    #nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 32px; border-top: 1px solid rgba(255,255,255,.04); margin-top: 4px; }
    .dest-count { font-size: 11px; color: #3a5a3a; }
    .btn-pri { background: #e07b39; color: #fff; border: none; border-radius: 10px; padding: 12px 22px; font-family: inherit; font-weight: 600; font-size: 15px; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; }
    .btn-pri:hover:not(:disabled) { background: #c96a2a; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(224,123,57,.3); }
    .btn-pri:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
    .btn-ghost { background: transparent; color: #8fa08f; border: 1.5px solid rgba(255,255,255,.1); border-radius: 10px; padding: 12px 22px; font-family: inherit; font-weight: 500; font-size: 15px; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-ghost:hover  { border-color: rgba(255,255,255,.22); color: #c0d4c0; }
    .btn-ghost.hidden { visibility: hidden; }
    .step-title { font-family: 'Playfair Display', Georgia, serif; font-size: 26px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
    .step-sub { color: #6a8a6a; font-size: 14px; margin-bottom: 20px; }
    .field-label { display: block; font-size: 12px; font-weight: 600; color: #6a8a6a; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
    .field-wrap { margin-bottom: 20px; }
    .cat-filter { display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap; }
    .cat-btn { background: rgba(255,255,255,.06); color: #8fa08f; border: none; border-radius: 20px; padding: 5px 13px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all .2s; }
    .cat-btn.active { background: #e07b39; color: #fff; }
    .dest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .dest-chip { padding: 13px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; transition: all .2s; user-select: none; }
    .dest-chip:hover { transform: translateY(-2px); }
    .dest-chip.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .dest-chip-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .dest-emoji { font-size: 22px; }
    .dest-check { width: 18px; height: 18px; border-radius: 50%; background: #e07b39; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; flex-shrink: 0; opacity: 0; transition: opacity .2s; }
    .dest-chip.selected .dest-check { opacity: 1; }
    .dest-name  { font-size: 13px; font-weight: 600; color: #f0e8d8; line-height: 1.3; margin-top: 8px; }
    .dest-desc  { font-size: 11px; color: #5a7a5a; margin-top: 3px; line-height: 1.4; }
    .dest-meta  { margin-top: 7px; display: flex; align-items: center; gap: 6px; }
    .cat-tag    { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
    .cat-tag.alam   { background: rgba(74,144,74,.15);  color: rgba(74,144,74,.95);  border: 1px solid rgba(74,144,74,.4); }
    .cat-tag.pantai { background: rgba(57,157,224,.15); color: rgba(57,157,224,.95); border: 1px solid rgba(57,157,224,.4); }
    .cat-tag.diving { background: rgba(57,224,200,.15); color: rgba(57,224,200,.95); border: 1px solid rgba(57,224,200,.4); }
    .cat-tag.budaya { background: rgba(224,178,57,.15); color: rgba(224,178,57,.95); border: 1px solid rgba(224,178,57,.4); }
    .best-time  { font-size: 10px; color: #4a6a4a; }
    .dest-notice { margin-top: 14px; padding: 10px 14px; background: rgba(224,123,57,.07); border: 1px solid rgba(224,123,57,.2); border-radius: 10px; font-size: 12px; color: #b08060; display: none; }
    .dest-notice.show { display: block; }
    select, input[type="text"], input[type="time"], input[type="email"], input[type="password"], textarea {
      background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.1); color: #f0e8d8; border-radius: 10px; padding: 11px 14px; font-family: inherit; font-size: 14px; outline: none; transition: border-color .2s; width: 100%; appearance: none; direction: ltr !important; text-align: left !important; unicode-bidi: plaintext; -webkit-rtl-ordering: logical;
    }
    select:focus, input:focus { border-color: rgba(224,123,57,.7); background: rgba(255,255,255,.07); }
    select option { background: #1a2e1a; color: #f0e8d8; }
    .select-wrap { position: relative; }
    .select-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #5a7a5a; font-size: 12px; }
    .autocomplete-wrap { position: relative; }
    .autocomplete-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 100; background: #1a2e1a; border: 1.5px solid rgba(224,123,57,.35); border-radius: 10px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,.5); max-height: 260px; overflow-y: auto; }
    .autocomplete-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.04); transition: background .15s; display: flex; align-items: center; gap: 10px; }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover, .autocomplete-item.active { background: rgba(224,123,57,.12); }
    .autocomplete-item-name { font-size: 13px; font-weight: 600; color: #f0e8d8; }
    .autocomplete-item-sub  { font-size: 11px; color: #5a7a5a; margin-top: 1px; }
    .autocomplete-empty { padding: 14px; text-align: center; font-size: 12px; color: #3a5a3a; font-style: italic; }
    .card-list { display: flex; flex-direction: column; gap: 8px; }
    .card-opt { padding: 13px 15px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 13px; }
    .card-opt:hover { transform: translateY(-2px); }
    .card-opt.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .card-opt.sm { padding: 11px 13px; border-radius: 10px; }
    .card-opt-icon { font-size: 24px; flex-shrink: 0; }
    .card-opt.sm .card-opt-icon { font-size: 20px; }
    .card-opt-title { font-size: 14px; font-weight: 600; color: #f0e8d8; transition: color .2s; }
    .card-opt.sm .card-opt-title { font-size: 13px; font-weight: 500; }
    .card-opt.selected .card-opt-title { color: #e07b39; }
    .card-opt-sub { font-size: 12px; color: #5a7a5a; margin-top: 2px; }
    .card-opt.sm .card-opt-sub { font-size: 11px; }
    .card-opt-check { color: #e07b39; font-size: 14px; flex-shrink: 0; margin-left: auto; opacity: 0; transition: opacity .2s; }
    .card-opt.selected .card-opt-check { opacity: 1; }
    .sewa-wrap { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .35s ease, opacity .35s ease; }
    .sewa-wrap.open { max-height: 420px; opacity: 1; }
    .sewa-box { padding: 15px; border-radius: 12px; background: rgba(107,159,212,.06); border: 1.5px solid rgba(107,159,212,.2); margin-bottom: 4px; }
    .sewa-title { font-size: 13px; font-weight: 700; color: #6b9fd4; margin-bottom: 4px; }
    .sewa-sub   { font-size: 12px; color: #5a7a5a; margin-bottom: 12px; line-height: 1.5; }
    .card-opt.sewa-sel { background: rgba(107,159,212,.12) !important; border-color: rgba(107,159,212,.6) !important; }
    .card-opt.sewa-sel .card-opt-title { color: #6b9fd4 !important; }
    .card-opt.sewa-sel .card-opt-check { opacity: 1 !important; color: #6b9fd4 !important; }
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill-opt { padding: 10px 15px; border-radius: 10px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; transition: all .2s; text-align: center; }
    .pill-opt:hover { transform: translateY(-1px); }
    .pill-opt.selected { background: rgba(224,123,57,.13); border-color: #e07b39; }
    .pill-label { font-size: 13px; font-weight: 700; color: #f0e8d8; transition: color .2s; }
    .pill-opt.selected .pill-label { color: #e07b39; }
    .pill-sub { font-size: 10px; color: #5a7a5a; margin-top: 2px; }
    .gaya-row { display: flex; gap: 10px; }
    .gaya-card { flex: 1; padding: 15px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; transition: all .2s; text-align: center; }
    .gaya-card:hover { transform: translateY(-2px); }
    .gaya-card.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .gaya-emoji { font-size: 28px; margin-bottom: 8px; }
    .gaya-label { font-size: 14px; font-weight: 700; color: #f0e8d8; transition: color .2s; }
    .gaya-card.selected .gaya-label { color: #e07b39; }
    .gaya-desc  { font-size: 11px; color: #5a7a5a; margin-top: 7px; line-height: 1.6; white-space: pre-line; }
    .counter-row { display: flex; align-items: center; gap: 14px; }
    .cnt-btn { background: rgba(255,255,255,.07); color: #f0e8d8; border: 1.5px solid rgba(255,255,255,.12); border-radius: 8px; width: 36px; height: 36px; font-size: 18px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; font-family: inherit; }
    .cnt-btn:hover { background: rgba(255,255,255,.13); }
    .cnt-val   { font-size: 22px; font-weight: 700; min-width: 30px; text-align: center; }
    .cnt-label { font-size: 13px; color: #5a7a5a; }
    .loading-screen { text-align: center; padding: 64px 0; }
    .loading-icon { font-size: 52px; margin-bottom: 18px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .loading-title { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; margin-bottom: 10px; line-height: 1.3; }
    .loading-sub  { color: #5a7a5a; font-size: 13px; line-height: 1.6; }
    .loading-tags { display: flex; gap: 7px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .loading-tag  { font-size: 11px; color: #4a6a4a; background: rgba(74,106,74,.15); padding: 4px 11px; border-radius: 20px; }
    .dot { animation: bou 1.4s ease-in-out infinite; display: inline-block; }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bou { 0%,80%,100%{transform:translateY(0);opacity:.5} 40%{transform:translateY(-7px);opacity:1} }
    .error-screen { text-align: center; padding: 64px 0; }
    .result-summary { padding: 18px; background: rgba(224,123,57,.07); border: 1.5px solid rgba(224,123,57,.2); border-radius: 16px; margin-bottom: 22px; }
    .result-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .result-title { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; font-weight: 700; flex: 1; line-height: 1.3; }
    .result-budget-label { font-size: 10px; color: #6a8a6a; text-align: right; }
    .result-budget-val   { font-size: 16px; font-weight: 700; color: #e07b39; }
    .result-desc  { font-size: 13px; color: #a0b090; line-height: 1.6; margin-bottom: 10px; }
    .highlight-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .highlight-tag  { font-size: 11px; padding: 3px 9px; background: rgba(224,123,57,.1); border: 1px solid rgba(224,123,57,.25); border-radius: 20px; color: #b08060; }
    .budget-note { font-size: 11px; color: #4a6a4a; }
    .day-section { margin-bottom: 24px; animation: fdi .5s ease both; }
    @keyframes fdi { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .day-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .day-num { width: 32px; height: 32px; background: #e07b39; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .day-label    { font-size: 10px; color: #5a7a5a; text-transform: uppercase; letter-spacing: .05em; }
    .day-title-txt { font-family: 'Playfair Display', Georgia, serif; font-size: 17px; font-weight: 600; line-height: 1.3; }
    .act-list { padding-left: 4px; }
    .act-item { display: flex; gap: 12px; margin-bottom: 12px; animation: sli .45s ease both; }
    @keyframes sli { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .act-timeline { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 22px; }
    .act-icon { font-size: 15px; }
    .act-line { width: 1px; flex: 1; background: rgba(255,255,255,.05); margin: 4px 0; min-height: 12px; }
    .act-body { flex: 1; padding-bottom: 4px; }
    .act-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .act-time     { font-size: 11px; color: #5a7a5a; font-weight: 500; }
    .act-duration { font-size: 11px; color: #3d5a3d; margin-left: 7px; }
    .act-cost     { font-size: 11px; color: #6a8a6a; background: rgba(255,255,255,.04); padding: 2px 7px; border-radius: 6px; flex-shrink: 0; }
    .act-name     { font-size: 14px; font-weight: 600; color: #f0e8d8; line-height: 1.3; }
    .act-location { font-size: 11px; color: #4a6a4a; margin-top: 2px; }
    .act-desc     { font-size: 12px; color: #7a9a7a; line-height: 1.55; margin-top: 4px; }
    .act-tip      { margin-top: 7px; padding: 6px 10px; border-radius: 7px; font-size: 11px; line-height: 1.5; border-left: 2px solid; }
    .packing-box  { padding: 15px; background: rgba(255,255,255,.03); border-radius: 12px; margin-bottom: 14px; border: 1px solid rgba(255,255,255,.07); }
    .packing-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
    .packing-tags  { display: flex; gap: 6px; flex-wrap: wrap; }
    .packing-tag   { font-size: 11px; padding: 4px 10px; background: rgba(255,255,255,.05); border-radius: 20px; color: #7a9a7a; }
    .notes-box { padding: 13px; background: rgba(224,178,57,.06); border-radius: 10px; border: 1px solid rgba(224,178,57,.15); margin-bottom: 22px; font-size: 12px; color: #a09040; line-height: 1.5; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }
    .sortable-chosen  { box-shadow: 0 8px 24px rgba(0,0,0,.5); background: #1a2e1a !important; border-color: #e07b39 !important; transform: scale(1.02); }
    .sortable-ghost   { opacity: .3; background: rgba(224,123,57,.1) !important; border: 2px dashed #e07b39 !important; }
    .sortable-drag    { cursor: grabbing !important; z-index: 9999 !important; background: #1a2e1a !important; border: 1px solid #e07b39 !important; box-shadow: 0 15px 35px rgba(0,0,0,.7) !important; opacity: 1 !important; will-change: transform, left, top !important; pointer-events: none !important; transition: none !important; }
    .drag-item        { cursor: grab; user-select: none; -webkit-user-select: none; touch-action: pan-y; }
    .planning-board   { display: flex; flex-direction: column; gap: 10px; }
    .plan-col         { border: 1px solid rgba(255,255,255,.08); border-radius: 14px; background: rgba(255,255,255,.02); overflow: hidden; }
    .plan-col.locked  { opacity: .6; }
    .plan-col-header  { display: flex; align-items: center; gap: 8px; padding: 11px 14px; font-size: 13px; font-weight: 600; color: #7a9a7a; border-bottom: 1px solid rgba(255,255,255,.05); background: rgba(255,255,255,.02); }
    .plan-col-body    { padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 48px; }
    .plan-day-badge   { width: 22px; height: 22px; border-radius: 50%; background: #3a5a3a; color: #a0c090; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .plan-warn        { font-size: 11px; color: #a07840; background: rgba(255,180,50,.07); padding: 6px 12px; border-left: 2px solid rgba(255,180,50,.3); }
    .plan-empty       { font-size: 12px; color: #3a5a3a; text-align: center; padding: 14px; font-style: italic; }
    .drag-item        { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.03); transition: background .15s, border-color .15s; }
    .drag-handle      { font-size: 16px; color: #3a5a3a; flex-shrink: 0; line-height: 1; padding: 2px; }
    .drag-emoji       { font-size: 22px; flex-shrink: 0; line-height: 1; }
    .drag-info        { flex: 1; min-width: 0; }
    .drag-title       { font-size: 13px; font-weight: 600; color: #c8d8b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .drag-zone        { font-size: 11px; color: #5a7a5a; margin-top: 2px; }
    .user-menu {
      position: absolute; top: 58px; right: 20px; z-index: 100;
      background: #1a2e1a; border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px; padding: 6px; min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      display: none;
    }
    .user-menu.open { display: block; animation: fadeIn .2s ease; }
    .user-menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; color: #a0b090; cursor: pointer; transition: background .15s; }
    .user-menu-item:hover { background: rgba(255,255,255,.07); }
    .user-menu-item.danger { color: #e07b39; }
    @media (max-width: 380px) {
      .step-title { font-size: 22px; }
      .dest-grid  { gap: 7px; }
    }
  </style>
</head>

<!-- LOGIN MODAL -->
<div id="modalLogin" style="display:none;position:fixed;inset:0;background:rgba(12,26,12,.7);backdrop-filter:blur(6px);z-index:9999;align-items:center;justify-content:center;padding:20px">
  <div style="background:#1a2e1a;border-radius:20px;width:100%;max-width:320px;padding:28px;border:1px solid rgba(255,255,255,.1);box-shadow:0 20px 60px rgba(0,0,0,.6)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px">
      <div><div style="font-size:18px;font-weight:700;color:#f0e8d8">🔐 Masuk Admin</div><div style="font-size:11px;color:#4a6a4a;margin-top:3px">Wandr · Banyuwangi</div></div>
      <button id="closeLogin" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#6a8a6a;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer">✕</button>

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';

  }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {

// ======================== HELPER FUNCTIONS ==================================
function fmt(n) { if (!n) return '–'; if (n >= 1000000) return (n/1000000).toFixed(1) + 'JT'; if (n >= 1000) return Math.round(n/1000) + 'K'; return String(n); }
const haversineKm = (lat1,lng1,lat2,lng2) => { const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180; const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2; return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); };
function matchScore(term, d) {
  const t = term.toLowerCase().trim();
  const n = d.name.toLowerCase();
  if (n === t) return 100;
  if (d.aliases) { for (const a of d.aliases) { if (a.length < 4) continue; if (a === t) return 98; if (a.includes(t) && t.length >= 5) return 90; if (t.includes(a) && a.length >= 8) return 85; } }
  if (t.length >= 4 && n.includes(t)) return 80;
  if (n.length >= 5 && t.includes(n)) return 75;
  const skipWords = new Set(['dan','yang','ke','di','dari','untuk','dengan','atau','taman','nasional','pantai','air','goa','gua','pulau','bukit','gunung','perkebunan']);
  const nWords = n.split(' ').filter(w => w.length > 2 && !skipWords.has(w));
  const termWords = t.split(' ').filter(w => w.length > 2 && !skipWords.has(w));
  if (!nWords.length || !termWords.length) return 0;
  const hits = termWords.filter(tw => nWords.some(nw => nw === tw || nw.startsWith(tw) || tw.startsWith(nw)));
  const coverage = hits.length / nWords.length;
  const precision = hits.length / termWords.length;
  const f1 = coverage + precision > 0 ? 2 * coverage * precision / (coverage + precision) : 0;
  return f1 >= 0.5 ? Math.round(f1 * 60) : 0;
}
function parseDestInput(text) { S.destinations.clear(); const terms = text.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean); terms.forEach(term => { let bestMatch = null, bestScore = 0; DESTINATIONS.forEach(d => { const score = matchScore(term, d); if (score > bestScore) { bestScore = score; bestMatch = d; } }); if (bestMatch && bestScore >= 50) S.destinations.add(bestMatch.id); }); }

function addMin(t, m) { const [h,mn] = t.split(':').map(Number); const tot = h*60+mn+m; return `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`; }
function durLabel(m) { const h=Math.floor(m/60), mn=m%60; return h&&mn?`${h} jam ${mn} menit`:h?`${h} jam`:`${mn} menit`; }
function pickRand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function parseDurasi(v) { return {'1D':[1,0],'2D1N':[2,1],'3D2N':[3,2],'4D3N':[4,3],'5D4N':[5,4]}[v]||[2,1]; }
function timeToMin(t) { if (!t || typeof t !== 'string') return 9999; const [h, m] = t.split(':').map(Number); return (h||0)*60 + (m||0); }
function sortActivities(acts) { return [...acts].sort((a,b) => timeToMin(a.time) - timeToMin(b.time)); }

async function loadPenginapanOptions() {
  if (!db) { S.penginapanOptions = []; S.allPenginapan = []; return; }
  try {
    let allDocs = window._placesCache;
    if (!allDocs) { const snap = await db.collection('places').get(); allDocs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); window._placesCache = allDocs; }
    const all = allDocs.filter(d => { const t = (d.type||'').toLowerCase(); return ['penginapan','hotel','homestay','villa','guesthouse'].includes(t); });
    S.allPenginapan = all;
    if (S.destinations.size > 0) {
      const selDests = DESTINATIONS.filter(d=>S.destinations.has(d.id));
      const lats = selDests.map(d=>d.lat).filter(Boolean);
      const lngs = selDests.map(d=>d.lng).filter(Boolean);
      if (lats.length > 0) {
        const cLat = lats.reduce((a,b)=>a+b,0)/lats.length;
        const cLng = lngs.reduce((a,b)=>a+b,0)/lngs.length;
        S.penginapanOptions = all.filter(d => d.lat && d.lng).map(d => ({ ...d, dist: haversineKm(cLat,cLng,d.lat,d.lng) })).sort((a,b)=>a.dist-b.dist).slice(0, 6);
      } else { S.penginapanOptions = all.slice(0, 6); }
    } else { S.penginapanOptions = all.slice(0, 6); }
  } catch(e) { console.warn('loadPenginapanOptions gagal:', e.message); S.penginapanOptions = []; S.allPenginapan = []; }
}

function renderStep1() { const transOpts = [{ v:'pribadi_motor', label:'Motor Pribadi', emoji:'🏍️', sub:'Fleksibel, hemat, masuk jalan kecil' },{ v:'pribadi_mobil', label:'Mobil Pribadi', emoji:'🚗', sub:'Nyaman, bawa lebih banyak barang' },{ v:'umum', label:'Kendaraan Umum', emoji:'🚂', sub:'Kereta / Bus / Pesawat ke BWI' }]; const sewaOpts = [{ v:'motor', label:'Sewa Motor', emoji:'🏍️', sub:'~100K–150K/hari' },{ v:'mobil_driver', label:'Sewa Mobil + Driver', emoji:'🚐', sub:'~450K–650K/hari' },{ v:'ojek', label:'Ojek / Online', emoji:'📱', sub:'Gojek, Grab, ojek pangkalan' }]; const kotaOpts = KOTA.map(k => `<option value="${k}"${S.kotaAsal===k?' selected':''}>${k}</option>`).join(''); const transCards = transOpts.map(t => `<div class="card-opt${S.transport===t.v?' selected':''}" data-transport="${t.v}"><span class="card-opt-icon">${t.emoji}</span><div><div class="card-opt-title">${t.label}</div><div class="card-opt-sub">${t.sub}</div></div><span class="card-opt-check">✓</span></div>`).join(''); const sewaCards = sewaOpts.map(s => `<div class="card-opt sm${S.sewaLokal.has(s.v)?' selected sewa-sel':''}" data-sewa="${s.v}"><span class="card-opt-icon">${s.emoji}</span><div><div class="card-opt-title">${s.label}</div><div class="card-opt-sub">${s.sub}</div></div><span class="card-opt-check">✓</span></div>`).join(''); return `<h2 class="step-title">Naik apa?</h2><p class="step-sub">Pilih kota asal dan kendaraan ke Banyuwangi</p><div class="field-wrap"><label class="field-label">Kota Asal</label><div class="select-wrap"><select id="sel-kota"><option value="">Pilih kota asal...</option>${kotaOpts}</select><span class="select-arrow">▾</span></div>${S.kotaAsal==='Lainnya' ? `<input type="text" id="input-kota-custom" dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Tulis kota asal…" value="${esc(S.kotaAsalCustom)}" style="margin-top:8px">` : ''}</div><div class="field-wrap"><label class="field-label">Kendaraan ke Banyuwan -list">${sewaCards}</div></div></div>`; }
function renderStep2() { const durasiBtns = DURASI.map(d => `<div class="pill-opt${S.durasi===d.v?' selected':''}" data-durasi="${d.v}"><div class="pill-label">${d.label}</div><div class="pill-sub">${d.sub}</div></div>`).join(''); const gayaCards = [{ v:'santai', emoji:'🌴', label:'Santai', desc:'Maks 2 destinasi/hari\nBanyak waktu menikmati' },{ v:'eksplorasi', emoji:'⚡', label:'Eksplorasi', desc:'3–4 destinasi/hari\nEfisien & terpadatkan' }].map(g => `<div class="gaya-card${S.gayaPerjalanan===g.v?' selected':''}" data-gaya="${g.v}"><div class="gaya-emoji">${g.emoji}</div><div class="gaya-label">${g.label}</div><div class="gaya-desc">${g.desc}</div></div>`).join(''); const allHotels = S.allPenginapan || []; const hotelQuery = S.penginapanSearchQuery || ''; const filteredHotels = hotelQuery.length >= 2 ? allHotels.filter(p => { const n = (p.nama||'').toLowerCase(); const q = hotelQuery.toLowerCase(); return n.includes(q) || (p.kawasan||'').toLowerCase().includes(q) || (p.kategori||'').toLowerCase().includes(q); }).slice(0, 6) : S.penginapanOptions.slice(0, 4); const hotelSuggestions = filteredHotels.map(p => { const sel = S.penginapanIds.has(p.id); const distTxt = p.dist != null ? (p.dist < 1 ? Math.round(p.dist*1000)+'m' : p.dist.toFixed(1)+'km') : ''; return `<div class="card-opt sm${sel?' selected':''}" data-penginapan-fb="${p.id}"><span class="card-opt-icon">🏨</span><div style="flex:1;min-width:0"><div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.nama)}</div><div class="card-opt-sub">${p.kawasan||''} ${distTxt?'· <span style="color:#e07b39">~'+distTxt+' dari destinasi</span>':''}${p.harga?' · Rp'+p.harga:''}</div></div><span class="card-opt-check">✓</span></div>`; }).join(''); const penginapanSection = `<div class="autocomplete-wrap" style="margin-bottom:10px"><input type="text" id="input-penginapan-search" dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="🔍 Cari nama penginapan..." value="${esc(hotelQuery)}" style="padding-right:36px">${hotelQuery ? `<span id="btn-clear-hotel" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#5a7a5a;font-size:14px;padding:4px;z-index:1">✕</span>` : ''}<div class="autocomplete-dropdown" id="hotel-autocomplete" style="${hotelQuery.length>=1?'':'display:none'}">${filteredHotels.length > 0 ? filteredHotels.map(p => { const sel = S.penginapanIds.has(p.id); const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):''; return '<div class="autocomplete-item'+(sel?' active':'')+'" data-penginapan-ac="'+p.id+'"><span style="font-size:20px">🏨</span><div><div class="autocomplete-item-name">'+esc(p.nama)+(sel?' ✓':'')+'</div><div class="autocomplete-item-sub">'+(p.kawasan||'')+(distTxt?' · ~'+distTxt+' dari destinasi':'')+(p.harga?' · Rp'+p.harga:'')+'</div></div></div>'; }).join('') : '<div class="autocomplete-empty">Tidak ditemukan — coba kata kunci lain</div>'}</div></div>${(function() { if (S.penginapanIds.size === 0) return ''; const selectedList = S.penginapanDataList || []; if (selectedList.length === 0) return ''; return selectedList.map(sel => '<div class="card-opt sm selected" style="margin-bottom:8px;pointer-events:none"><span class="card-opt-icon">🏨</span><div style="flex:1;min-width:0"><div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(sel.nama)+'</div><div class="card-opt-sub">'+(sel.kawasan||'')+(sel.harga?' · Rp'+sel.harga:'')+'</div></div><span class="card-opt-check">✓</span></div>').join(''); })()}${!S.penginapanIds.size && !hotelQuery && S.penginapanOptions.length > 0 ? '<div style="font-size:11px;color:#4a6a4a;margin-bottom:8px">📍 Terdekat dari destinasimu:</div><div class="card-list" id="hotel-suggestions">'+hotelSuggestions+'</div>' : ''}${allHotels.length === 0 ? `<div class="card-list">${PENGINAPAN.map(p => `<div class="card-opt sm${S.penginapan===p.v?' selected':''}" data-penginapan="${p.v}"><span class="card-opt-icon">${p.emoji}</span><div><div class="card-opt-title">${p.label}</div><div class="card-opt-sub">${p.range}</div></div><span class="card-opt-check">✓</span></div>`).join('')}</div>` : ''}<div style="margin-top:10px"><label style="display:block;font-size:12px;color:#6a8a6a;margin-bottom:6px">Atau ketik langsung nama penginapan:</label><input type="text" id="input-penginapan-custom" dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Contoh: Aston Banyuwangi, Ketapang Indah Hotel..." value="${esc(S.penginapanCustom)}"></div>`; return `<h2 class="step-title">Preferensi Trip</h2><p class="step-sub">Sesuaikan dengan gaya traveling kamu</p><div class="field-wrap"><label class="field-label">Durasi Perjalanan</label><div class="pill-row">${durasiBtns}</div></div><div class="field-wrap"><label class="field-label">Gaya Perjalanan</label><div class="gaya-row">${gayaCards}</div></div><div class="field-wrap"><label class="field-label">🏨 Penginapan</label>${penginapanSection}</div><div class="field-wrap"><label class="field-label">Jumlah Orang</label><div class="counter-row"><button class="cnt-btn" id="btn-minus">−</button><span class="cnt-val" id="cnt-val">${S.jumlahOrang}</span><button class="cnt-btn" id="btn-plus">+</button><span class="cnt-label">orang</span></div></div>`; }
function renderStep3() { if (S.loading) return `<div class="loading-screen"><div class="loading-icon">🗺️</div><h3 class="loading-title">Merencanakan perjalananmu<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></h3><p class="loading-sub">AI sedang mengoptimasi rute, mengecek jam operasional,<br>dan menyusun jadwal terbaik untukmu</p><div class="loading-tags"><span class="loading-tag">📍 Sorting rute</span><span class="loading-tag">🕐 Estimasi waktu</span><span class="loading-tag">💰 Kalkulasi biaya</span><span class="loading-tag">✨ Finalisasi</span></div></div>`; if (S.error) return `<div class="error-screen"><div style="font-size:48px;margin-bottom:14px">⚠️</div><h3 style="font-size:18px;margin-bottom:8px">Gagal generate</h3><p style="color:#5a7a5a;font-size:13px;margin-bottom:22px">${esc(S.error)}</p><button class="btn-pri" id="btn-retry">↺ Coba Lagi</button></div>`; if (!S.itinerary) return ''; const it = S.itinerary; const highlights = (it.highlights||[]).map(h => `<span class="highlight-tag">★ ${esc(h)}</span>`).join(''); const days = (it.days||[]).map((day, di) => { const acts = (day.activities||[]).map((act, ai) => { const as = ACT_STYLE[act.type] || ACT_STYLE.aktivitas; const isLast = ai === day.activities.length - 1; return `<div class="act-item" style="animation-delay:${di*.12+ai*.07}s"><div class="act-timeline"><span class="act-icon">${as.icon}</span>${!isLast ? '<div class="act-line"></div>' : ''}</div><div class="act-body"><div class="act-meta"><div><span class="act-time">${esc(act.time||'')}</span>${act.duration ? `<span class="act-duration">· ${esc(act.duration)}</span>` : ''}</div>${act.estimatedCost>0 ? `<span class="act-cost">~${fmt(act.estimatedCost)}</span>` : ''}</div><div class="act-name">${esc(act.name)}</div>${act.location&&act.location!==act.name ? `<div class="act-location">📍 ${esc(act.location)}</div>` : ''}<div class="act-desc">${esc(act.description||'')}</div>${act.tips ? `<div class="act-tip" style="background:${as.bg};border-color:${as.color};color:${as.color}">💡 ${esc(act.tips)}</div>` : ''}</div></div>`; }).join(''); return `<div class="day-section" style="animation-delay:${di*.15}s"><div class="day-header"><div class="day-num">${day.day}</div><div><div class="day-label">${esc(day.date_label||'')}</div><div class="day-title-txt">${esc(day.title||'')}</div></div></div><div class="act-list">${acts}</div></div>`; }).join(''); const packingTags = (it.packingTips||[]).map(t => `<span class="packing-tag">${esc(t)}</span>`).join(''); return `<div class="result-summary"><div class="result-top"><div class="result-title">Itinerary Banyuwangi ✨</div><details style="cursor:pointer;outline:none;background:rgba(224,123,57,.1);padding:6px 12px;border-radius:12px;border:1px solid rgba(224,123,57,.3);flex-shrink:0"><summary style="list-style:none;user-select:none"><div class="result-budget-label" style="display:flex;align-items:center;justify-content:flex-end;gap:4px">Est. Budget/org <span style="font-size:8px">▼</span></div><div class="result-budget-val">${fmt(it.estimatedBudget?.min)}–${fmt(it.estimatedBudget?.max)}</div></summary><div style="margin-top:10px;font-size:11px;text-align:left;background:rgba(0,0,0,.3);padding:10px;border-radius:8px;color:#d0d0d0;min-width:160px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span>🚌 Transport</span><span style="color:#fff;font-weight:600">~${fmt(it.estimatedBudget?.details?.transportasi)}</span></div><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span>🏨 Penginapan</span><span style="color:#fff;font-weight:600">~${fmt(it.estimatedBudget?.details?.akomodasi)}</span></div><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span>🍽️ Kuliner</span><span style="color:#fff;font-weight:600">~${fmt(it.estimatedBudget?.details?.kuliner)}</span></div><div style="display:flex;justify-content:space-between"><span>🎫 Tiket Wisata</span><span style="color:#fff;font-weight:600"> function buildActivityDay(dayNum, spots, zone, form, opts={}) { const hasIjen = spots.some(s=>s.id==='ijen'); const hasSukamade = spots.some(s=>s.id==='sukamade'); const hasMenjangan = spots.some(s=>s.id==='menjangan'); const hasTabuhan = spots.some(s=>s.id==='tabuhan'); if (hasMenjangan || hasTabuhan) { const title = (hasMenjangan && hasTabuhan) ? 'Snorkeling Menjangan & Tabuhan' : hasMenjangan ? 'Snorkeling Pulau Menjangan' : 'Pulau Tabuhan'; const biaya = (hasMenjangan && hasTabuhan) ? 275000 : hasMenjangan ? 250000 : 100000; const sisaSpots = spots.filter(s=>s.id!=='menjangan'&&s.id!=='tabuhan'); const gwdCoords = { lat:-8.0737, lng:114.4269 }; const malamAct = buildMakan('malam','utara',null,getHotelCoords()?.lat,getHotelCoords()?.lng); malamAct.time = '19:00'; const acts = [ { time:'06:30', name:`Berangkat Menuju Grand Watu Dodol`, location:`${getFinalHotelName()} → Pantai Grand Watu Dodol`, duration:'±45 menit', description:'Perjalanan menuju meeting point open trip di Pantai Grand Watu Dodol (area Watu Dodol, ~35km utara kota).', tips:'Tiket masuk Grand Watu Dodol 8K/orang + parkir 10K. Bisa via ojek dari Stasiun Ketapang ~15 menit.', estimatedCost:18000, type:'transport' }, { time:'07:30', name:`Meeting Point & Briefing — ${title}`, location:'Pantai Grand Watu Dodol (Sunrise Boat)', duration:'30 menit', description:'Registrasi, fitting alat snorkeling, dan briefing singkat dari guide. Pastikan hadir tepat waktu.', tips:`Open trip tersedia setiap Sabtu-Minggu & libur nasional via Yukbanyuwangi. Booking H-1 agar pasti dapat slot. Biaya ~${biaya.toLocaleString('id-ID')}/orang sudah all-in termasuk makan siang.`, estimatedCost:biaya, type:'aktivitas' } ]; if (hasMenjangan) acts.push({ time:'08:15', name:'Menyeberang & Snorkeling Pulau Menjangan', location:'Pulau Menjangan, TN Bali Barat', duration:'±4 jam', description:'Perjalanan laut ±45 menit ke Menjangan. Explore pantai pasir putih, snorkeling di Sandy Slope dan Coral Garden — visibilitas hingga 30m. Ada ar ime:'09:00', name:'Kembali ke Penginapan — Istirahat Wajib', location:'Penginapan', duration:'5 jam', description:'Kembali ke penginapan untuk istirahat total. Trekking dini hari Ijen sangat menguras energi — pemulihan fisik adalah prioritas.', tips:'Tidur siang adalah pilihan paling bijak. Jangan memforsir tubuh setelah Ijen.', estimatedCost:0, type:'istirahat' }); else { const extra = sorted.find(s=>s.id!=='ijen'); if (extra) { const ext = DEST_EXT[extra.id]||{}; acts.push({ time:'09:30', name: extra.name, location: extra.name+', Banyuwangi', duration: durLabel(ext.dur||120), description: ext.desc||'', tips: ext.tips||'', estimatedCost: ext.tiket||0, type:'aktivitas' }); } acts.push({ time:'12:00', name:'Kembali & Istirahat Siang', location:'Penginapan', duration:'3 jam', description:'Kembali ke penginapan. Istirahat setelah Ijen tetap sangat dianjurkan meski gaya eksplorasi.', tips:'Tidur 1–2 jam akan membuat badan jauh lebih segar untuk malam hari.', estimatedCost:0, type:'istirahat' }); } acts.push(buildMakan('malam','barat', null, getHotelCoords()?.lat, getHotelCoords()?.lng)); } else if (hasSukamade) { acts.push(buildMakan('pagi', zone, null, DEST_EXT.sukamade?.lat, DEST_EXT.sukamade?.lng)); acts.push({ time:'08:00', name:'Perjalanan Menuju Sukamade', location:'Rute menuju Sukamade', duration:'3–4 jam', description:'Perjalanan panjang menuju Sukamade melewati jalan lintas hutan. Jalur menantang terutama musim hujan.', tips:'Gunakan kendaraan 4WD atau motor trail. Cek kondisi jalan sehari sebelumnya.', estimatedCost:0, type:'transport' }); acts.push({ time:'12:00', name:'Tiba & Eksplorasi Pantai Sukamade', location:'Pantai Sukamade', duration:'3 jam', description:'Tiba di Sukamade. Eksplor pantai di siang hari dan check-in penginapan sederhana di kawasan.', tips:'Penginapan sangat terbatas — wajib reservasi jauh-jauh hari.', estimatedCost:10000, type:'aktivitas' }); acts.push(buildMakan('siang','selatan', null, DEST_EXT.sukamade?.lat, DEST_EXT.sukamade?.lng)); acts.push({ time:'20:00', name:'Program Malam — Penyu Hijau Bertelur', location:'Pantai Sukamade', duration:'2–3 jam', description:'Dipandu ranger, saksikan penyu hijau raksasa naik ke pantai untuk bertelur. Momen langka dan sangat emosional.', tips:'Ikuti instruksi ranger sepenuhnya. Dilarang menggunakan flash kamera. Gunakan senter dengan filter merah.', estimatedCost:50000, type:'aktivitas' }); } else { if (distKm > 15) { const berangkat = addMin('07:00', -transMin-10); acts.push({ time: berangkat, name:`Berangkat menuju ${ZONE_LABEL_SHORT[zone]||zone}`, location:'Penginapan → Destinasi', duration: durLabel(transMin), description:`Berangkat menuju klaster destinasi hari ini. Jarak ±${distKm}km dari kota, tempuh ±${durLabel(transMin)}.`, tips:'Pastikan bahan bakar penuh. Sarapan ringan dulu sebelum berangkat.', estimatedCost:0, type:'transport' }); } let cur = '07:00'; const mainSpots = sorted.filter(s=>!DEST_EXT[s.id]?.isSunset&&!DEST_EXT[s.id]?.isNight); const sunsetSpots = sorted.filter(s=>DEST_EXT[s.id]?.isSunset); mainSpots.forEach((spot, i) => { const ext = DEST_EXT[spot.id]||{}; const sCoord = getDestCoords(spot); acts.push({ time:cur, name:spot.name, location:spot.name+', Banyuwangi', duration:durLabel(ext.dur||180), description:ext.desc||spot.desc||'', tips:ext.tips||'', estimatedCost:ext.tiket||0, type:'aktivitas' }); cur = addMin(cur, (ext.dur||180)+35); if (i===Math.floor((mainSpots.length-1)/2)) { const nextSpot = mainSpots[i+1]; const nextCoord = nextSpot ? getDestCoords(nextSpot) : null; const refCoord = midpoint(sCoord, nextCoord) || sCoord || getHotelCoords(); const makan = buildMakan('siang', zone, cur, refCoord?.lat, refCoord?.lng); makan.time = cur; acts.push(makan); cur = addMin(cur, 70); } }); sunsetSpots.forEach(spot => { const ext = DEST_EXT[spot.id]||{}; acts.push({ time:'15:00', name:spot.name+' — Sunset', location:spot.name, duration:durLabel(ext.dur||180), description:ext.desc||'', tips:ext.tips||'', estimatedCost:ext.tiket||0, type:'aktivitas' }); }); if (mainSpots.length===0 && sunsetSpots.length>0) { const sCoord = getDestCoords(sunsetSpots[0]); acts.unshift(buildMakan('siang', zone, null, sCoord?.lat, sCoord?.lng)); } const hotelC = getHotelCoords(); acts.push(buildMakan('malam', zone, null, hotelC?.lat, hotelC?.lng)); acts.push({ time:'21:00', name:'Istirahat di Penginapan', location: getFinalHotelName(), duration:'8 jam', description:'Istirahat yang cukup untuk mempersiapkan energi hari berikutnya.', tips:'Siapkan perlengkapan untuk besok malam ini agar tidak terburu-buru.', estimatedCost:0, type:'penginapan' }); } const names = spots.map(s=>s.name); const title = names.length<=2 ? names.join(' & ') : `Eksplorasi ${ZONE_LABEL_SHORT[zone]||zone} (${names.length} Destinasi)`; return { day:dayNum, date_label:`Hari ${dayNum}`, title, activities:sortActivities(acts) }; }
function calculateBudget(spots, form, totalDays) { const tiket = spots.reduce((s,d)=>s+(DEST_EXT[d.id]?.tiket||0),0); const makan = totalDays*3*27000; const nights = Math.max(0,totalDays-1); const hotelEst = {hotel45:700000,hotel3:300000,hotel12:150000,homestay:80000,none:0,firebase:150000}; const hotel = (hotelEst[form.penginapan]||100000)*nights; const sewaEst = [...(form.sewaLokal||[])].reduce((s,v)=>s+({motor:120000,mobil_driver:500000,ojek:30000}[v]||0)*totalDays,0); const transPP = {kereta:250000,pesawat:1500000,bus:150000}[form.subTransport] || (form.transport==='pribadi_mobil'?400000:form.transport==='pribadi_motor'?150000:200000); const totalTransport = transPP + sewaEst; const min = tiket+makan+hotel+totalTransport; return { min: Math.round(min/1000)*1000, max: Math.round(min*1.35/1000)*1000, details: { transportasi:totalTransport, akomodasi:hotel, kuliner:makan, wisata:tiket }, note:`Per orang · ${totalDays} hari · Belum termasuk oleh-oleh`, }; }
function buildPackingTips(spots) { const base = new Set(['Sunscreen SPF50+','Uang tunai (ATM terbatas di lokasi wisata)','Powerbank','Kartu identitas','Obat-obatan pribadi']); spots.forEach(s=>(PACKING_DB[s.id]||[]).forEach(t=>base.add(t))); return [...base].slice(0,8); }
function buildSummary(spots, totalDays, gaya, kota) { return `Itinerary ${totalDays} hari dari ${kota} ke ${spots.length} destinasi terbaik Banyuwangi, disusun dengan gaya ${gaya==='santai'?'santai — menikmati setiap momen tanpa terburu-buru':'eksplorasi — efisien namun tetap berkesan'}.`; }
function buildNotes(spots) { const n=[]; if(spots.some(s=>s.id==='ijen')) n.push('Kawah Ijen ditutup saat cuaca ekstrem — selalu cek update terbaru sebelum berangkat.'); if(spots.some(s=>s.id==='sukamade')) n.push('Akses Sukamade bisa terputus di musim hujan.'); if(spots.some(s=>['menjangan','tabuhan'].includes(s.id))) n.push('Perjalanan ke pulau tergantung kondisi laut.'); return n.join(' ')||'Selalu cek kondisi cuaca dan jalan sebelum berangkat. Jaga kebersihan dan hormati alam Banyuwangi.'; }
async function loadKulinerNearPenginapan(lat, lng) { if (!db) { S.kulinerOptions = []; return; } try { const snap = await db.collection('places').where('type','==','kuliner').get(); S.kulinerOptions = snap.docs.map(doc => ({ id:doc.id, ...doc.data() })).filter(d => d.lat && d.lng && d.nama).map(d => ({ ...d, dist: haversineKm(lat,lng,d.lat,d.lng) })).filter(d => d.dist <= 1.0).sort((a,b)=>a.dist-b.dist).slice(0,5); } catch(e) { S.kulinerOptions = []; } }
function generate() { S.loading = true; S.itinerary = null; S.error = null; render(); setTimeout(() => { try { if (S.planDays && S.planDays.some(d=>d.length>0)) { generateFromPlan(); return; } const selected = DESTINATIONS.filter(d=>S.destinations.has(d.id)).map(d=>({...d,...(DEST_EXT[d.id]||{})})); const [totalDays] = parseDurasi(S.durasi); const spotsPerDay = S.gayaPerjalanan==='santai' ? 2 : 3; const kota = S.kotaAsal==='Lainnya' ? S.kotaAsalCustom : S.kotaAsal; const days = []; days.push(injectArrivalExtras(buildArrivalDay(kota, S.transport))); const byZone = {}; selected.forEach(d=>{ const z=d.zone||'kota'; if(!byZone[z]) byZone[z]=[]; byZone[z].push(d); }); if(byZone.barat){ const ord=['ijen','kawah_wurung','jagir']; byZone.barat.sort((a,b)=>ord.indexOf(a.id)-ord.indexOf(b.id)); } if(byZone.selatan){ byZone.selatan.sort((a,b)=>(a.id==='sukamade'?1:0)-(b.id==='sukamade'?1:0)); } let dayNum = 2; const actDayLimit = totalDays > 1 ? totalDays-1 : totalDays; ['barat','utara','selatan','kota'].forEach(zone=>{ if(!byZone[zone]||dayNum>actDayLimit) return; const spots = byZone[zone]; if(zone==='barat' && spots.some(s=>s.id==='ijen')) { const ijenSpot = spots.find(s=>s.id==='ijen'); const others = spots.filter(s=>s.id!=='ijen'); const ijenGroup= S.gayaPerjalanan==='eksplorasi'&&others.length ? [ijenSpot, others[0]] : [ijenSpot]; if(dayNum<=actDayLimit) { days.push(buildActivityDay(dayNum++,ijenGroup,zone,S)); } const remaining = S.gayaPerjalanan==='eksplorasi' ? others.slice(1) : others; for(let i=0;i<remaining.length;i+=spotsPerDay){ if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,remaining.slice(i,i+spotsPerDay),zone,S)); } return; } if(spots.some(s=>s.id==='sukamade')) { const sukamade = spots.find(s=>s.id==='sukamade'); const others = spots.filter(s=>s.id!=='sukamade'); for(let i=0;i<others.length;i+=spotsPerDay){ if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,others.slice(i,i+spotsPerDay),zone,S)); } if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,[sukamade],zone,S)); return; } for(let i=0;i<spots.length;i+=spotsPerDay){ if(dayNum<=actDayLimit) days.push(buildActivityDay(dayNum++,spots.slice(i,i+spotsPerDay),zone,S)); } }); if(totalDays>1) days.push(buildDepartureDay(totalDays,kota)); S.itinerary = { summary: buildSummary(selected,totalDays,S.gayaPerjalanan,kota), totalDays, highlights: selected.slice(0,3).map(d=>d.name), estimatedBudget: calculateBudget(selected,S,totalDays), days: days.slice(0,totalDays), packingTips: buildPackingTips(selected), importantNotes: buildNotes(selected), }; } catch(e) { S.error = 'Terjadi kesalahan: '+e.message; console.error(e); } finally { S.loading = false; render(); } }, 800); }
function generateFromPlan() { try { const kota = S.kotaAsal==='Lainnya' ? S.kotaAsalCustom : S.kotaAsal; const [totalDays] = parseDurasi(S.durasi); const allSelected = DESTINATIONS.filter(d=>S.destinations.has(d.id)); const hotelNames = getHotelNames(); const days = []; days.push(injectArrivalExtras(buildArrivalDay(kota, S.transport))); S.planDays.forEach((allIds, i) => { const dayNum = i + 2; if (dayNum >= totalDays || allIds.length === 0) return; const hotelCheckIns = allIds.filter(id => id.startsWith('hotel_checkin_')).map(id => { const idx = parseInt(id.split('_')[2]); return { id, name: `Check-in: ${hotelNames[idx]||'Penginapan'}`, hotelName: hotelNames[idx]||'Penginapan', type:'penginapan' }; }); const spots = allIds.filter(id => !id.startsWith('hotel_checkin_')).map(id => DESTINATIONS.find(d=>d.id===id)).filter(Boolean).map(d => ({...d,...(DEST_EXT[d.id]||{})})); if (spots.length === 0 && hotelCheckIns.length > 0) { const act = hotelCheckIns.map(h => ({ time: '14:00', name: h.name, location: h.hotelName, duration: '1 jam', description: 'Check-in penginapan. Taruh barang dan istirahat sejenak.', tips: 'Siapkan dokumen booking.', estimatedCost: 0, type: 'penginapan', })); days.push({ day:dayNum, date_label:`Hari ${dayNum}`, title:'Check-in Penginapan', activities:sortActivities(act) }); return; } if (spots.length === 0) return; const zone = spots[0]?.zone || 'kota'; const builtDay = buildActivityDay(dayNum, spots, zone, S, { honorOrder: true }); if (hotelCheckIns.length > 0) { const checkinActs = hotelCheckIns.map(h => ({ time: '14:00', name: h.name, location: h.hotelName, duration: '1 jam', description: 'Check-in penginapan baru.', tips: '', estimatedCost: 0, type: 'penginapan', })); builtDay.activities = sortActivities([...builtDay.activities, ...checkinActs]); } days.push(builtDay); }); if (totalDays > 1) days.push(buildDepartureDay(totalDays, kota)); S.itinerary = { summary: buildSummary(allSelected, totalDays, S.gayaPerjalanan, kota), totalDays, highlights: allSelected.slice(0,3).map(d=>d.name), estimatedBudget: calculateBudget(allSelected, S, totalDays), days: days.slice(0, totalDays), packingTips: buildPackingTips(allSelected), importantNotes: buildNotes(allSelected), }; } catch(e) { S.error = 'Terjadi kesalahan: ' + e.message; console.error(e); } finally { S.loading = false; render(); } }
const PACKING_DB = { ijen: ['Masker gas / N95','Headlamp + baterai cadangan','Jaket sangat tebal (suhu <10°C)'], kawah_wurung:['Jaket tebal','Tripod untuk foto sunrise'], menjangan: ['Peralatan snorkeling','Tabir surya SPF50+','Dry bag'], tabuhan: ['Peralatan snorkeling','Tabir surya','Sandal air'], sukamade: ['Senter','Pakaian berwarna gelap','Repellent nyamuk'], green_bay: ['Sandal gunung','Air minum 1.5L','Camilan'], alas_purwo: ['Sepatu hiking','Repellent','Air minum cukup'], baluran: ['Kamera telephoto (untuk satwa)','Air minum','Topi lebar'], };

// ======================== NAVIGATION & INIT ===================================
document.getElementById('btn-back').addEventListener('click', () => { S.step--; render(); });
document.getElementById('btn-next').addEventListener('click', async () => { if (S.step===3) { readPlanFromDOM(); S.loading=true; S.itinerary=null; S.error=null; render(); generate(); } else if (S.step===2) { S.step=3; initPlanDays(); render(); } else if (S.step===1) { S.step=2; render(); await loadPenginapanOptions(); render(); } else { S.step++; render(); } });
(async () => { await loadDestinations(); document.getElementById('progress-area').style.display = ''; render(); })();
</script>
