<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wandr — Buat Itinerary Banyuwangi</title>
  <meta name="description" content="Generate itinerary perjalanan Banyuwangi secara otomatis. Masukkan destinasi, pilih kendaraan dan durasi, itinerary langsung jadi.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & BASE ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      background: #0c1a0c;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      color: #f0e8d8;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ────────────────────────────────────────────────────────── */
    #app { max-width: 640px; margin: 0 auto; padding: 0 20px; }

    /* ── HEADER ────────────────────────────────────────────────────────── */
    #header {
      padding-top: 20px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: #e07b39;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .logo-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 18px; font-weight: 700;
      letter-spacing: -.01em;
    }
    .logo-badge {
      font-size: 10px; color: #4a6a4a;
      background: rgba(74,106,74,.18);
      padding: 2px 9px; border-radius: 20px; font-weight: 500;
    }

    /* ── PROGRESS ──────────────────────────────────────────────────────── */
    #progress-area { margin-bottom: 20px; }
    .step-labels { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .step-label { font-size: 10px; font-weight: 400; color: #2a4a2a; letter-spacing: .04em; transition: color .3s; }
    .step-label.active { font-weight: 700; color: #e07b39; }
    .step-label.done   { color: #4a7a4a; }
    .progress-bar { height: 2px; background: rgba(255,255,255,.05); border-radius: 1px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #c96a2a, #e07b39);
      border-radius: 1px;
      transition: width .5s ease;
    }

    /* ── NAV ───────────────────────────────────────────────────────────── */
    #nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0 32px;
      border-top: 1px solid rgba(255,255,255,.04);
      margin-top: 4px;
    }
    .dest-count { font-size: 11px; color: #3a5a3a; }

    /* ── BUTTONS ───────────────────────────────────────────────────────── */
    .btn-pri {
      background: #e07b39; color: #fff; border: none;
      border-radius: 10px; padding: 12px 22px;
      font-family: inherit; font-weight: 600; font-size: 15px;
      cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 8px;
      white-space: nowrap;
    }
    .btn-pri:hover:not(:disabled) { background: #c96a2a; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(224,123,57,.3); }
    .btn-pri:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
    .btn-ghost {
      background: transparent; color: #8fa08f;
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: 12px 22px;
      font-family: inherit; font-weight: 500; font-size: 15px;
      cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-ghost:hover  { border-color: rgba(255,255,255,.22); color: #c0d4c0; }
    .btn-ghost.hidden { visibility: hidden; }

    /* ── STEP TYPOGRAPHY ───────────────────────────────────────────────── */
    .step-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px; font-weight: 700;
      margin-bottom: 6px; line-height: 1.3;
    }
    .step-sub { color: #6a8a6a; font-size: 14px; margin-bottom: 20px; }
    .field-label {
      display: block; font-size: 12px; font-weight: 600;
      color: #6a8a6a; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .field-wrap { margin-bottom: 20px; }

    /* ── SELECT & INPUT ────────────────────────────────────────────────── */
    select, input[type="text"], input[type="time"] {
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.1);
      color: #f0e8d8; border-radius: 10px; padding: 11px 14px;
      font-family: inherit; font-size: 14px;
      outline: none; transition: border-color .2s;
      width: 100%; appearance: none; -webkit-appearance: none;
    }
    select:focus, input:focus { border-color: rgba(224,123,57,.7); background: rgba(255,255,255,.07); }
    select option { background: #1a2e1a; color: #f0e8d8; }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .select-wrap { position: relative; }
    .select-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #5a7a5a; font-size: 12px; }

    /* ── DETAILS / SUMMARY FIX ─────────────────────────────────────────── */
    summary::-webkit-details-marker { display: none; }
    summary { list-style: none; }

    /* ── CARD OPTIONS ──────────────────────────────────────────────────── */
    .card-list { display: flex; flex-direction: column; gap: 8px; }
    .card-opt {
      padding: 13px 15px; border-radius: 12px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(255,255,255,.08);
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; gap: 13px;
    }
    .card-opt:hover { transform: translateY(-2px); }
    .card-opt.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .card-opt.sm { padding: 11px 13px; border-radius: 10px; }
    .card-opt-icon { font-size: 24px; flex-shrink: 0; }
    .card-opt.sm .card-opt-icon { font-size: 20px; }
    .card-opt-title { font-size: 14px; font-weight: 600; color: #f0e8d8; transition: color .2s; }
    .card-opt.sm .card-opt-title { font-size: 13px; font-weight: 500; }
    .card-opt.selected .card-opt-title { color: #e07b39; }
    .card-opt-sub { font-size: 12px; color: #5a7a5a; margin-top: 2px; }
    .card-opt.sm .card-opt-sub { font-size: 11px; }
    .card-opt-check { color: #e07b39; font-size: 14px; flex-shrink: 0; margin-left: auto; opacity: 0; transition: opacity .2s; }
    .card-opt.selected .card-opt-check { opacity: 1; }

    /* ── SEWA LOKAL ────────────────────────────────────────────────────── */
    .sewa-wrap {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height .35s ease, opacity .35s ease;
    }
    .sewa-wrap.open { max-height: 420px; opacity: 1; overflow: visible; }
    .sewa-box {
      padding: 15px; border-radius: 12px;
      background: rgba(107,159,212,.06);
      border: 1.5px solid rgba(107,159,212,.2);
      margin-bottom: 4px;
    }
    .sewa-title { font-size: 13px; font-weight: 700; color: #6b9fd4; margin-bottom: 4px; }
    .sewa-sub   { font-size: 12px; color: #5a7a5a; margin-bottom: 12px; line-height: 1.5; }
    .card-opt.sewa-sel { background: rgba(107,159,212,.12) !important; border-color: rgba(107,159,212,.6) !important; }
    .card-opt.sewa-sel .card-opt-title { color: #6b9fd4 !important; }
    .card-opt.sewa-sel .card-opt-check { opacity: 1 !important; color: #6b9fd4 !important; }

    /* ── PILL OPTIONS ──────────────────────────────────────────────────── */
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill-opt {
      padding: 10px 15px; border-radius: 10px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(255,255,255,.08);
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .pill-opt:hover { transform: translateY(-1px); }
    .pill-opt.selected { background: rgba(224,123,57,.13); border-color: #e07b39; }
    .pill-label { font-size: 13px; font-weight: 700; color: #f0e8d8; transition: color .2s; }
    .pill-opt.selected .pill-label { color: #e07b39; }
    .pill-sub { font-size: 10px; color: #5a7a5a; margin-top: 2px; }

    /* ── GAYA CARDS ────────────────────────────────────────────────────── */
    .gaya-row { display: flex; gap: 10px; }
    .gaya-card {
      flex: 1; padding: 15px; border-radius: 12px;
      background: rgba(255,255,255,.04);
      border: 1.5px solid rgba(255,255,255,.08);
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .gaya-card:hover { transform: translateY(-2px); }
    .gaya-card.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .gaya-emoji { font-size: 28px; margin-bottom: 8px; }
    .gaya-label { font-size: 14px; font-weight: 700; color: #f0e8d8; transition: color .2s; }
    .gaya-card.selected .gaya-label { color: #e07b39; }
    .gaya-desc  { font-size: 11px; color: #5a7a5a; margin-top: 7px; line-height: 1.6; white-space: pre-line; }

    /* ── COUNTER ───────────────────────────────────────────────────────── */
    .counter-row { display: flex; align-items: center; gap: 14px; }
    .cnt-btn {
      background: rgba(255,255,255,.07); color: #f0e8d8;
      border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 8px; width: 36px; height: 36px;
      font-size: 18px; cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit;
    }
    .cnt-btn:hover { background: rgba(255,255,255,.13); }
    .cnt-val   { font-size: 22px; font-weight: 700; min-width: 30px; text-align: center; }
    .cnt-label { font-size: 13px; color: #5a7a5a; }

    /* ── LOADING & RESULT ──────────────────────────────────────────────── */
    .loading-screen { text-align: center; padding: 64px 0; }
    .loading-icon { font-size: 52px; margin-bottom: 18px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .loading-title { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; margin-bottom: 10px; line-height: 1.3; }
    .loading-sub  { color: #5a7a5a; font-size: 13px; line-height: 1.6; }
    .error-screen { text-align: center; padding: 64px 0; }
    
    .result-summary { padding: 18px; background: rgba(224,123,57,.07); border: 1.5px solid rgba(224,123,57,.2); border-radius: 16px; margin-bottom: 22px; }
    .result-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .result-title { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; font-weight: 700; flex: 1; line-height: 1.3; }
    .result-budget-label { font-size: 10px; color: #6a8a6a; text-align: right; }
    .result-budget-val   { font-size: 16px; font-weight: 700; color: #e07b39; }
    .result-desc  { font-size: 13px; color: #a0b090; line-height: 1.6; margin-bottom: 10px; }
    
    /* ── DAY & ACTIVITY ────────────────────────────────────────────────── */
    .day-section { margin-bottom: 24px; animation: fdi .5s ease both; }
    @keyframes fdi { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .day-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .day-num { width: 32px; height: 32px; background: #e07b39; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .day-label    { font-size: 10px; color: #5a7a5a; text-transform: uppercase; letter-spacing: .05em; }
    .day-title-txt { font-family: 'Playfair Display', Georgia, serif; font-size: 17px; font-weight: 600; line-height: 1.3; }

    .act-list { padding-left: 4px; }
    .act-item { display: flex; gap: 12px; margin-bottom: 12px; animation: sli .45s ease both; }
    @keyframes sli { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .act-timeline { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 22px; }
    .act-icon { font-size: 15px; }
    .act-line { width: 1px; flex: 1; background: rgba(255,255,255,.05); margin: 4px 0; min-height: 12px; }
    .act-body { flex: 1; padding-bottom: 4px; }
    .act-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .act-time     { font-size: 11px; color: #5a7a5a; font-weight: 500; }
    .act-duration { font-size: 11px; color: #3d5a3d; margin-left: 7px; }
    .act-cost     { font-size: 11px; color: #6a8a6a; background: rgba(255,255,255,.04); padding: 2px 7px; border-radius: 6px; flex-shrink: 0; }
    .act-name     { font-size: 14px; font-weight: 600; color: #f0e8d8; line-height: 1.3; }
    .act-location { font-size: 11px; color: #4a6a4a; margin-top: 2px; }
    .act-desc     { font-size: 12px; color: #7a9a7a; line-height: 1.55; margin-top: 4px; }
    .act-tip      { margin-top: 7px; padding: 6px 10px; border-radius: 7px; font-size: 11px; line-height: 1.5; border-left: 2px solid; }
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <div class="logo-icon">🗺️</div>
    <span class="logo-text">Wandr</span>
    <span class="logo-badge">Banyuwangi</span>
  </div>

  <div id="progress-area">
    <div class="step-labels">
      <span class="step-label active" data-i="0">Destinasi</span>
      <span class="step-label"        data-i="1">Transport</span>
      <span class="step-label"        data-i="2">Preferensi</span>
      <span class="step-label"        data-i="3">Generate</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="content"></div>

  <div id="nav">
    <button class="btn-ghost hidden" id="btn-back">← Kembali</button>
    <span class="dest-count" id="dest-count"></span>
    <button class="btn-pri" id="btn-next" disabled>Lanjut →</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ─── ALGORITMA RADIUS & DATABASE KOORDINAT ──────────────────────────────────
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371; 
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

// Data Penginapan Hardcode
const PENGINAPAN_DB = [
  { id: 'h1', name: 'Luminor Hotel (Pusat Kota)', lat: -8.2045, lng: 114.3644, type: 'hotel3' },
  { id: 'h2', name: 'Dialoog Banyuwangi (Kalipuro)', lat: -8.1465, lng: 114.3965, type: 'hotel45' },
  { id: 'h3', name: 'Jiwa Jawa Resort (Ijen/Barat)', lat: -8.1255, lng: 114.2690, type: 'hotel45' },
  { id: 'h4', name: 'Homestay Desa Kemiren (Barat)', lat: -8.2198, lng: 114.3218, type: 'homestay' },
  { id: 'h5', name: 'Jajag Indah Hotel (Selatan)', lat: -8.4521, lng: 114.1750, type: 'hotel12' },
  { id: 'h6', name: 'Kampoeng Joglo Ijen (Barat)', lat: -8.1883, lng: 114.3015, type: 'hotel3' },
  { id: 'h7', name: 'Ketapang Indah Hotel (Utara)', lat: -8.1565, lng: 114.3892, type: 'hotel45' },
  { id: 'h8', name: 'G-Land Joyo Surf Camp (Selatan)', lat: -8.7255, lng: 114.3600, type: 'homestay' }
];

if (!firebase.apps.length) {
  firebase.initializeApp({
    apiKey:            'AIzaSyCHWWjnxX5-Fk9-gRTZVwyC3WDDfnLPh_s',
    authDomain:        'banyuwangi-db.firebaseapp.com',
    projectId:         'banyuwangi-db',
  });
}
const db = firebase.firestore();

const KAWASAN_ZONE = {
  'Licin':'barat', 'Wongsorejo':'utara', 'Pesanggaran':'selatan', 'Pusat Kota':'kota'
};

const DEST_COORDS = {
  'ijen': {lat: -8.0584, lng: 114.2420}, 'baluran': {lat: -7.8384, lng: 114.3949},
  'alas_purwo': {lat: -8.6750, lng: 114.3750}, 'kawah_wurung': {lat: -8.0667, lng: 114.2000},
  'jagir': {lat: -8.2120, lng: 114.2880}, 'red_island': {lat: -8.6046, lng: 114.0264},
  'tabuhan': {lat: -8.0433, lng: 114.4533}, 'city': {lat: -8.2192, lng: 114.3692}
};

function mapToWandr(id, d) {
  if (d.type !== 'wisata' || d.status === 'pending') return null;
  return { id, name:d.nama, desc:d.catatan||d.kategori||'', zone: KAWASAN_ZONE[d.kawasan]||'kota' };
}

let DESTINATIONS = [];
const DESTINATIONS_FALLBACK = [
  { id:'ijen', name:'Kawah Ijen', desc:'Blue fire & kawah asam', zone:'barat'},
  { id:'baluran', name:'TN Baluran', desc:'Afrika van Java', zone:'utara'},
  { id:'tabuhan', name:'Pulau Tabuhan', desc:'Pasir putih & snorkeling', zone:'utara'},
  { id:'city', name:'City Tour BWI', desc:'Kuliner & wisata kota', zone:'kota'},
];

async function loadDestinations() {
  try {
    const query = db.collection('places').where('type','==','wisata').get();
    const snap = await Promise.race([query, new Promise((_,rej) => setTimeout(()=>rej(new Error()), 6000))]);
    const loaded = snap.docs.map(doc => mapToWandr(doc.id, doc.data())).filter(Boolean);
    DESTINATIONS = loaded.length > 0 ? loaded : DESTINATIONS_FALLBACK;
  } catch(e) { DESTINATIONS = DESTINATIONS_FALLBACK; }
}

const KOTA = ['Surabaya','Jakarta','Bali/Denpasar','Malang','Yogyakarta','Bandung','Lainnya'];
const DURASI = [
  { v:'1D', label:'1 Hari', sub:'One Day Trip' }, { v:'2D1N', label:'2H 1M', sub:'Weekend Trip' },
  { v:'3D2N', label:'3H 2M', sub:'Long Weekend' }, { v:'4D3N', label:'4H 3M', sub:'Mini Vacation' }
];

const ACT_STYLE = {
  aktivitas: { color:'#e07b39', bg:'rgba(224,123,57,.1)', icon:'🎯' },
  makan: { color:'#4ab06a', bg:'rgba(74,176,106,.1)', icon:'🍽️' },
  transport: { color:'#6b9fd4', bg:'rgba(107,159,212,.1)', icon:'🚌' },
  penginapan: { color:'#c47bd4', bg:'rgba(196,123,212,.1)', icon:'🏨' },
  istirahat: { color:'#8fa08f', bg:'rgba(143,160,143,.1)', icon:'☕' },
};

// ─── STATE ───────────────────────────────────────────────────────────────────
const S = {
  step: 0, destinations: new Set(), inputText: '',
  penginapanId: null, penginapanType: '', penginapanName: '',
  penginapanCustom: '', kulinerCustom: '',
  kotaAsal: '', kotaAsalCustom: '', transport: '', subTransport: '', 
  waktuTiba: '10:00', waktuPulang: '13:00',
  sewaLokal: new Set(), durasi: '', gayaPerjalanan: '', jumlahOrang: 2,
  loading: false, itinerary: null, error: null,
};

const fmt = n => n >= 1000 ? Math.round(n/1000) + 'K' : String(n);
const esc = s => String(s).replace(/</g,'<').replace(/>/g,'>');
function getFinalHotelName() { return S.penginapanCustom.trim() !== '' ? S.penginapanCustom : (S.penginapanName || 'Penginapan'); }

// ─── PROGRESS & NAV ──────────────────────────────────────────────────────────
function updateProgress() {
  document.getElementById('progress-fill').style.width = (S.step / 3) * 100 + '%';
  document.querySelectorAll('.step-label').forEach(el => {
    el.className = 'step-label' + (+el.dataset.i === S.step ? ' active' : +el.dataset.i < S.step ? ' done' : '');
  });
  document.getElementById('progress-area').style.display = S.step===3 ? 'none' : '';
}

function updateNav() {
  const nav = document.getElementById('nav');
  if (S.step===3) { nav.style.display='none'; return; }
  nav.style.display = 'flex';
  document.getElementById('btn-back').className = 'btn-ghost' + (S.step===0?' hidden':'');
  
  let ok = false;
  if (S.step===0) ok = S.destinations.size > 0 && (S.penginapanId || S.penginapanCustom.trim().length > 0); 
  if (S.step===1) {
    let ok1 = S.kotaAsal && (S.kotaAsal!=='Lainnya'||S.kotaAsalCustom.trim()) && S.transport;
    if (S.transport === 'umum' && !S.subTransport) ok1 = false;
    ok = ok1;
  }
  if (S.step===2) ok = S.durasi && S.gayaPerjalanan;

  document.getElementById('btn-next').disabled = !ok;
  document.getElementById('btn-next').textContent = S.step===2 ? '✨ Generate Itinerary' : 'Lanjut →';
}

// ─── RENDER STEP 0 ──────────────────────────────────────────────────────────
function renderStep0() {
  return `
    <h2 class="step-title">Ke Banyuwangi, mau kemana aja?</h2>
    <p class="step-sub">Pisahkan dengan tanda koma (contoh: kawah ijen, pulau merah, baluran)</p>

// ─── LOGIC & ENGINE ─────────────────────────────────────────────────────────
function processDestInput(inputVal) {
  const keywords = inputVal.split(',').map(s => s.trim().toLowerCase()).filter(s => s.length > 2);
  S.destinations.clear(); let matchedDestinations = [];
  keywords.forEach(kw => {
    const match = DESTINATIONS.find(d => d.name.toLowerCase().includes(kw) || d.desc.toLowerCase().includes(kw));
    if (match && !S.destinations.has(match.id)) { S.destinations.add(match.id); matchedDestinations.push(match); }
  });
  const noticeEl = document.getElementById('dest-match-notice');
  const accSection = document.getElementById('accommodation-section');
  if (S.destinations.size > 0) {
    noticeEl.textContent = `✓ Terdeteksi: ${matchedDestinations.map(d => d.name).join(', ')}`;
    accSection.style.display = 'block';
    let avgLat = 0, avgLng = 0;
    const destCoords = matchedDestinations.map(d => DEST_COORDS[d.id] || {lat: -8.2192, lng: 114.3692});
    destCoords.forEach(c => { avgLat += c.lat; avgLng += c.lng; });
    avgLat /= destCoords.length; avgLng /= destCoords.length;

    const sortedHotels = PENGINAPAN_DB.map(h => ({ ...h, distance: getDistance(avgLat, avgLng, h.lat, h.lng) }))
      .filter(h => h.distance <= 2.5).sort((a, b) => a.distance - b.distance);
    
    if(sortedHotels.length === 0) {
       sortedHotels.push(...PENGINAPAN_DB.map(h => ({ ...h, distance: getDistance(avgLat, avgLng, h.lat, h.lng) })).sort((a, b) => a.distance - b.distance).slice(0, 2));
    }

    document.getElementById('hotel-suggestions').innerHTML = sortedHotels.map(h => `
      <div class="card-opt sm ${S.penginapanId === h.id ? 'selected' : ''}" onclick="selectHotel('${h.id}', '${h.name}', '${h.type}', event)">
        <span class="card-opt-icon">🏨</span>
        <div><div class="card-opt-title">${h.name}</div><div class="card-opt-sub">± ${h.distance.toFixed(1)} km dari titik destinasi</div></div>
      </div>`).join('');
  } else {
    noticeEl.textContent = ''; accSection.style.display = 'none'; S.penginapanId = null;
  }
  updateNav();
}

window.selectHotel = function(id, name, type, event) {
  S.penginapanId = id; S.penginapanName = name; S.penginapanType = type; S.penginapanCustom = '';
  document.getElementById('input-hotel-custom').value = '';
  document.querySelectorAll('#hotel-suggestions .card-opt').forEach(el => el.classList.remove('selected'));
  if (event) event.currentTarget.classList.add('selected');
  updateNav();
};

function attachListeners() {
  const c = document.getElementById('content');
  if (c.querySelector('#input-dest-text')) {
    if (S.inputText) processDestInput(S.inputText);
    c.querySelector('#input-dest-text').addEventListener('input', e => { S.inputText = e.target.value; processDestInput(S.inputText); });
    c.querySelector('#input-hotel-custom').addEventListener('input', e => {
      S.penginapanCustom = e.target.value;
      if(S.penginapanCustom.trim() !== '') { document.querySelectorAll('#hotel-suggestions .card-opt').forEach(el => el.classList.remove('selected')); S.penginapanId = null; }
      updateNav();
    });
    c.querySelector('#input-kuliner-custom').addEventListener('input', e => { S.kulinerCustom = e.target.value; });
  }

  if (c.querySelector('#sel-kota')) {
    c.querySelector('#sel-kota').addEventListener('change', e => { S.kotaAsal = e.target.value; S.kotaAsalCustom = ''; render(); });
    if(c.querySelector('#input-kota-custom')) c.querySelector('#input-kota-custom').addEventListener('input', e => { S.kotaAsalCustom = e.target.value; updateNav(); });

    c.querySelectorAll('[data-transport]').forEach(el => el.addEventListener('click', () => {
      S.transport = el.dataset.transport; S.sewaLokal.clear();
      c.querySelectorAll('[data-transport]').forEach(e => e.classList.toggle('selected', e.dataset.transport===S.transport));
      
      const subw = document.getElementById('sub-trans-wrap');
      if (subw) subw.classList.toggle('open', S.transport === 'umum');
      
      const jw = document.getElementById('jam-wrap');
      if (S.transport === 'pribadi_motor' || S.transport === 'pribadi_mobil') {
          if (jw) jw.classList.add('open');
      } else {
          if (jw && !S.subTransport) jw.classList.remove('open');
      }
      updateNav();
    }));

    c.querySelectorAll('[data-sub]').forEach(el => el.addEventListener('click', () => {
      S.subTransport = el.dataset.sub;
      c.querySelectorAll('[data-sub]').forEach(e => e.classList.toggle('selected', e.dataset.sub===S.subTransport));
      const jw = document.getElementById('jam-wrap');
      if (jw) jw.classList.add('open');
      updateNav();
    }));

    c.querySelector('#input-waktu-tiba').addEventListener('change', e => { S.waktuTiba = e.target.value; updateNav(); });
    c.querySelector('#input-waktu-pulang').addEventListener('change', e => { S.waktuPulang = e.target.value; updateNav(); });
  }

  c.querySelectorAll('[data-durasi]').forEach(el => el.addEventListener('click', () => { S.durasi = el.dataset.durasi; render(); }));
  c.querySelectorAll('[data-gaya]').forEach(el => el.addEventListener('click', () => { S.gayaPerjalanan = el.dataset.gaya; render(); }));
  
  if(c.querySelector('#btn-restart')) c.querySelector('#btn-restart').addEventListener('click', () => location.reload());
}

document.getElementById('btn-back').addEventListener('click', () => { S.step--; render(); });
document.getElementById('btn-next').addEventListener('click', () => {
  if (S.step===2) { S.step=3; S.loading=true; render(); generate(); } else { S.step++; render(); }
});

// ─── ROUTING ALGORITHM ──────────────────────────────────────────────────────
function addMin(t, m) {
  const [h,mn] = t.split(':').map(Number);
  const tot = h*60+mn+m;
  return `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;
}

function buildMakan(waktu, customKuliner, specificTime = null) {
  let label = { pagi:'Sarapan', siang:'Makan Siang', malam:'Makan Malam' }[waktu];
  let timeStr = specificTime || { pagi:'07:30', siang:'12:30', malam:'19:00' }[waktu];
  
  if (waktu === 'siang' && parseInt(timeStr.split(':')[0]) < 11) { label = 'Sarapan Pagi / Brunch'; }

  return {
    time: timeStr, name: `${label} — ${customKuliner || 'Kuliner Lokal'}`, location: customKuliner || 'Warung Lokal Area Wisata',
    duration: '1 jam', description: 'Waktunya mengisi perut.', tips: customKuliner ? 'Pilihan pribadimu.' : 'Coba kuliner khas lokal.', estimatedCost: 30000, type: 'makan'
  };
}

function buildArrivalDay(kota, form) {
  const jamTiba = parseInt(form.waktuTiba.split(':')[0]);
  const isUmum = form.transport === 'umum';
  const transportName = isUmum ? form.subTransport : form.transport.replace('pribadi_', '');
  const acts = [];
  
  acts.push({ time: addMin(form.waktuTiba, -240), name:`Perjalanan dari ${kota}`, location:kota, duration:'Sesuai moda', description:`Menggunakan ${transportName} menuju Banyuwangi.`, tips:'', estimatedCost: isUmum?150000:60000, type:'transport' });
  acts.push({ time: form.waktuTiba, name:'Tiba di Banyuwangi', location:'Stasiun/Bandara', duration:'30 menit', description:'Selamat datang di Banyuwangi!', tips:'', estimatedCost:0, type:'transport' });

  if (jamTiba < 11) {
     acts.push({ time: addMin(form.waktuTiba, 30), name:'Sewa Kendaraan & Titip Tas di Locker Wangi', location: 'Locker Wangi', duration:'45 menit', description:'Ambil sewa kendaraan di depan stasiun. Titip koper/tas besar di Locker Wangi agar jalan-jalan pagi ini leluasa sebelum jam check-in hotel.', tips:'Web: https://lockerwangi.com/ | WA: 0851-4717-8692', estimatedCost:25000, type:'aktivitas' });
     acts.push(buildMakan('pagi', form.kulinerCustom, addMin(form.waktuTiba, 75)));
     acts.push({ time: addMin(form.waktuTiba, 135), name:'Wisata Pagi: Sendang Seruni', location: 'Sendang Seruni, Licin', duration:'2 jam', description:'Pemandian alami bersumber mata air pegunungan yang jernih.', tips:'Bawa baju ganti secukupnya di ransel kecil.', estimatedCost:15000, type:'aktivitas' });
     let mknSiangWaktu = Math.max(parseInt(addMin(form.waktuTiba, 285).split(':')[0]), 12);
     acts.push(buildMakan('siang', form.kulinerCustom, `${mknSiangWaktu}:00`));
     acts.push({ time: `${mknSiangWaktu+1}:00`, name:'Ambil Barang di Locker Wangi', location: 'Locker Wangi', duration:'30 menit', description:'Mengambil kembali koper yang dititipkan.', tips:'', estimatedCost:0, type:'aktivitas' });
     acts.push({ time: `${mknSiangWaktu+1}:30`, name:'Check-in Penginapan', location: getFinalHotelName(), duration:'Sore hari', description:'Tiba di penginapan, bersih-bersih dan istirahat.', tips:'', estimatedCost:0, type:'penginapan' });
     acts.push(buildMakan('malam', form.kulinerCustom, '19:00'));
  } else if (jamTiba >= 11 && jamTiba < 18) {
     acts.push({ time: addMin(form.waktuTiba, 45), name:'Check-in Penginapan', location: getFinalHotelName(), duration:'1 jam', description:'Tiba di penginapan, istirahat dan eksplorasi santai.', tips:'', estimatedCost:0, type:'penginapan' });
     acts.push(buildMakan('malam', form.kulinerCustom, '19:00'));
  } else {
     acts.push(buildMakan('malam', form.kulinerCustom, addMin(form.waktuTiba, 45)));
     acts.push({ time: addMin(form.waktuTiba, 120), name:'Check-in & Istirahat', location: getFinalHotelName(), duration:'Malam', description:'Istirahat memulihkan tenaga.', tips:'', estimatedCost:0, type:'penginapan' });
  }
  return { day:1, date_label:'Hari 1', title: `Kedatangan dari ${kota}`, activities: acts };
}

function buildActivityDay(dayNum, spots, form) {
  const hasIjen = spots.some(s=>s.id==='ijen');
  const acts = [];
  const finalHotel = getFinalHotelName();

  if (hasIjen) {
    acts.push({ time:'23:15', name:'Berangkat menuju Kawah Ijen dengan DAMRI / Sewa', location:`Stasiun BWI Kota / ${finalHotel} → Paltuding`, duration:'1 jam 15 menit', description:'Bus angkutan DAMRI tujuan Ijen tersedia via Stasiun Banyuwangi Kota.', tips:'Bawa masker gas N95, headlamp, dan jaket tebal.', estimatedCost:15000, type:'transport' });
    acts.push({ time:'00:30', name:'Tiba di Pos Paltuding', location:'Pos Paltuding', duration:'1 jam', description:'Istirahat sejenak di warung. Mengantri tiket masuk.', tips:'Siapkan KTP asli.', estimatedCost:15000, type:'aktivitas' });
    acts.push({ time:'01:30', name:'Mulai Trekking Kawah Ijen', location:'Jalur Pendakian', duration:'4 jam 30 menit', description:'Trekking ±3km menuju puncak kawah. Menyaksikan Blue Fire.', tips:'Jalan pelan, atur ritme nafas.', estimatedCost:0, type:'aktivitas' });
    acts.push({ time:'06:00', name:'Turun & Sarapan Pagi', location:'Warung Paltuding', duration:'1 jam 30 menit', description:'Perjalanan turun dan sarapan.', tips:'DAMRI kembali berangkat pukul 09.00 WIB.', estimatedCost:25000, type:'makan' });
    acts.push({ time:'09:00', name:'Kembali ke Penginapan — Istirahat Wajib', location: finalHotel, duration:'5 jam', description:'Istirahat total.', tips:'Tidur siang panjang mutlak diperlukan.', estimatedCost:15000, type:'istirahat' });
    acts.push(buildMakan('malam', form.kulinerCustom, '19:00'));
  } else {
    let cur = '08:00';
    spots.forEach((spot, i) => {
      acts.push({ time:cur, name:spot.name, location:spot.name, duration:'2 jam', description:spot.desc, tips:'', estimatedCost:15000, type:'aktivitas' });
      cur = addMin(cur, 120 + 30);
      if (i > 0 && parseInt(cur.split(':')[0]) >= 11 && acts.filter(a=>a.type==='makan' && a.name.includes('Siang')).length === 0) {
         acts.push(buildMakan('siang', form.kulinerCustom, cur));
         cur = addMin(cur, 60);
      }
    });
    acts.push(buildMakan('malam', form.kulinerCustom, '19:00'));
    acts.push({ time:'21:00', name:'Istirahat', location: finalHotel, duration:'8 jam', description:'Persiapkan energi.', tips:'', estimatedCost:0, type:'penginapan' });
  }
  return { day:dayNum, date_label:`Hari ${dayNum}`, title: spots.map(s=>s.name).join(' & '), activities:acts };
}

// ─── PERHITUNGAN BUDGET MENDETAIL ──────────────────────────────────────────
function calculateBudget(spots, form, totalDays) {
  // 1. Wisata
  const totalWisata = spots.length * 15000;
  
  // 2. Kuliner (Asumsi 3x sehari)
  const totalKuliner = totalDays * 3 * 25000;
  
  // 3. Akomodasi
  const hotelEst = {hotel45:700000, hotel3:300000, hotel12:150000, homestay:80000};
  // Fallback harga hotel Rp 150.000 jika diketik manual/custom
  const hargaHotelMalam = hotelEst[form.penginapanType] || 150000; 
  const totalAkomodasi = hargaHotelMalam * Math.max(0, totalDays - 1);
  
  // 4. Transportasi (PP Kota Asal + Sewa Lokal)
  let transportPP = 200000; 
  if (form.transport === 'umum') {
     if (form.subTransport === 'kereta') transportPP = 250000;
     else if (form.subTransport === 'pesawat') transportPP = 1500000;
     else if (form.subTransport === 'bus') transportPP = 300000;
  } else if (form.transport === 'pribadi_mobil') {
     transportPP = 400000;
  } else if (form.transport === 'pribadi_motor') {
     transportPP = 150000;
  }
  
  let sewaLokal = 0;
  if (form.sewaLokal.has('motor')) sewaLokal += 100000 * totalDays;
  if (form.sewaLokal.has('mobil_driver')) sewaLokal += 500000 * totalDays;
  if (form.sewaLokal.has('ojek')) sewaLokal += 50000 * totalDays;

  const totalTransport = transportPP + sewaLokal;
  
  const minTotal = totalWisata + totalKuliner + totalAkomodasi + totalTransport;

  return { 
    min: Math.round(minTotal/1000)*1000, 
    max: Math.round((minTotal*1.3)/1000)*1000, 
    details: {
      transportasi: totalTransport,
      akomodasi: totalAkomodasi,
      kuliner: totalKuliner,
      wisata: totalWisata
    },
    note: 'Klik angka budget untuk melihat rincian biaya.' 
  };
}

function generate() {
  setTimeout(() => {
    try {
      const selected = DESTINATIONS.filter(d=>S.destinations.has(d.id));
      const totalDays = parseInt(S.durasi.charAt(0)) || 2;
      const kota = S.kotaAsal==='Lainnya' ? S.kotaAsalCustom : S.kotaAsal;
      const days = [];
      
      days.push(buildArrivalDay(kota, S));
      
      let dayNum = 2;
      const actLimit = totalDays > 1 ? totalDays-1 : totalDays;
      if (dayNum <= actLimit) days.push(buildActivityDay(dayNum++, selected, S));
      
      if(totalDays > 1) {
         days.push({ day:totalDays, date_label:`Hari ${totalDays}`, title:'Kepulangan', activities: [
           { time: '07:00', name: 'Sarapan Pagi', location: 'Penginapan', duration: '1 jam', description: 'Sarapan terakhir.', tips: '', estimatedCost: 20000, type: 'makan' },
           { time: addMin(S.waktuPulang, -120), name:'Check-out & Menuju Stasiun/Bandara', location:'Banyuwangi', duration:'1 jam', description:'Kembali ke kota asal.', tips:'Hati-hati di jalan!', estimatedCost:0, type:'transport' }
         ]});
      }

      S.itinerary = {
        summary: `Itinerary ${totalDays} hari dari ${kota} ke Banyuwangi. Menginap di ${getFinalHotelName()}.`,
        estimatedBudget: calculateBudget(selected, S, totalDays),
        days: days.slice(0,totalDays),
      };
    } catch(e) {}
    S.loading = false; render();
  }, 1000);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
(async () => { await loadDestinations(); document.getElementById('progress-area').style.display = ''; render(); })();
</script>
