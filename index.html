<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wandr — Itinerary Banyuwangi</title>
  <meta name="description" content="Generate itinerary perjalanan Banyuwangi secara otomatis.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── WANDR CSS (DARK THEME) ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { min-height: 100vh; background: #0c1a0c; font-family: 'DM Sans', sans-serif; color: #f0e8d8; -webkit-font-smoothing: antialiased; padding-bottom: 40px; }
    #app { max-width: 640px; margin: 0 auto; padding: 0 20px; }
    
    #header { padding-top: 20px; margin-bottom: 18px; display: flex; align-items: center; justify-content: space-between; }
    .hdr-left { display: flex; align-items: center; gap: 9px; }
    .logo-icon { width: 30px; height: 30px; background: #e07b39; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .logo-text { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
    .hdr-right { display: flex; gap: 8px; }
    .btn-icon { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #f0e8d8; cursor: pointer; transition: .2s; }
    .btn-icon:hover { background: rgba(255,255,255,.15); }
    
    #progress-area { margin-bottom: 20px; }
    .step-labels { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .step-label { font-size: 10px; font-weight: 400; color: #2a4a2a; letter-spacing: .04em; transition: color .3s; }
    .step-label.active { font-weight: 700; color: #e07b39; }
    .step-label.done   { color: #4a7a4a; }
    .progress-bar { height: 2px; background: rgba(255,255,255,.05); border-radius: 1px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #c96a2a, #e07b39); border-radius: 1px; transition: width .5s ease; }
    
    #nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 32px; border-top: 1px solid rgba(255,255,255,.04); margin-top: 4px; }
    .dest-count { font-size: 11px; color: #3a5a3a; }
    
    .btn-pri { background: #e07b39; color: #fff; border: none; border-radius: 10px; padding: 12px 22px; font-weight: 600; font-size: 15px; cursor: pointer; transition: .2s; }
    .btn-pri:hover:not(:disabled) { background: #c96a2a; transform: translateY(-1px); }
    .btn-pri:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
    .btn-ghost { background: transparent; color: #8fa08f; border: 1.5px solid rgba(255,255,255,.1); border-radius: 10px; padding: 12px 22px; font-weight: 500; font-size: 15px; cursor: pointer; }
    
    .step-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .step-sub { color: #6a8a6a; font-size: 14px; margin-bottom: 20px; }
    
    .cat-filter { display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap; }
    .cat-btn { background: rgba(255,255,255,.06); color: #8fa08f; border: none; border-radius: 20px; padding: 5px 13px; font-size: 12px; cursor: pointer; transition: .2s; }
    .cat-btn.active { background: #e07b39; color: #fff; }
    
    .dest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .dest-chip { padding: 13px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; position: relative; overflow: hidden;}
    .dest-chip.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .dest-emoji { font-size: 22px; }
    .dest-check { position: absolute; right: 10px; top: 10px; width: 18px; height: 18px; border-radius: 50%; background: #e07b39; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; opacity: 0; }
    .dest-chip.selected .dest-check { opacity: 1; }
    .dest-name  { font-size: 13px; font-weight: 600; color: #f0e8d8; margin-top: 8px; line-height: 1.3; }
    .dest-desc  { font-size: 11px; color: #5a7a5a; margin-top: 3px; }
    
    .admin-acts { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 4px; }
    .btn-edit { background: rgba(255,255,255,.1); border: none; border-radius: 4px; width: 24px; height: 24px; font-size: 11px; cursor: pointer; color: #fff; }
    .btn-edit:hover { background: rgba(255,255,255,.25); }
    
    select, input[type="text"], input[type="number"], input[type="url"], input[type="password"], input[type="email"], textarea { background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.1); color: #f0e8d8; border-radius: 10px; padding: 11px 14px; font-size: 14px; width: 100%; outline: none; }
    select:focus, input:focus, textarea:focus { border-color: #e07b39; }
    select option { background: #1a2e1a; color: #f0e8d8; }
    
    .field-wrap { margin-bottom: 20px; text-align: left; }
    .field-label { display: block; font-size: 12px; font-weight: 600; color: #6a8a6a; margin-bottom: 8px; text-transform: uppercase; }
    .fr { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    
    .card-list { display: flex; flex-direction: column; gap: 8px; }
    .card-opt { padding: 13px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; display: flex; align-items: center; gap: 13px; }
    .card-opt.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .card-opt-icon { font-size: 24px; }
    .card-opt-title { font-size: 14px; font-weight: 600; }
    .card-opt-sub { font-size: 12px; color: #5a7a5a; }
    
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill-opt { padding: 10px 15px; border-radius: 10px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; text-align: center; }
    .pill-opt.selected { background: rgba(224,123,57,.13); border-color: #e07b39; }
    .pill-label { font-size: 13px; font-weight: 700; }
    
    .gaya-row { display: flex; gap: 10px; }
    .gaya-card { flex: 1; padding: 15px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; text-align: center; }
    .gaya-card.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .gaya-emoji { font-size: 28px; margin-bottom: 8px; }
    .gaya-label { font-size: 14px; font-weight: 700; }

    /* Wandr Output (Itinerary) */
    .w-day-box { margin-bottom: 20px; }
    .w-day-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .w-day-num { width: 28px; height: 28px; background: #e07b39; color: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .w-day-title { font-size: 15px; font-weight: 700; color: #fff; }
    .w-act-item { display: flex; gap: 12px; margin-bottom: 10px; }
    .w-act-time { font-size: 11px; font-weight: 700; color: #8fa08f; width: 40px; flex-shrink: 0; padding-top:2px; }
    .w-act-card { flex: 1; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 12px; }
    .w-act-name { font-size: 13px; font-weight: 700; color: #f0e8d8; margin-bottom: 2px; }
    .w-act-desc { font-size: 11px; color: #8fa08f; line-height: 1.5; }
    .w-summary { background: rgba(224,123,57,.08); border: 1px solid rgba(224,123,57,.2); padding: 16px; border-radius: 16px; margin-bottom: 20px; }

    /* Modals for Firebase */
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:1000; align-items:flex-end; justify-content:center; padding: 16px; backdrop-filter: blur(4px); }
    .modal.open { display:flex; animation: fadeIn .2s; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    .mbox { background: #0c1a0c; border: 1px solid rgba(255,255,255,.1); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 24px; max-height: 85vh; overflow-y: auto; }
    .mbox.center { border-radius: 20px; align-self: center; }
    .mtitle { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .mc { background: none; border: none; color: #8fa08f; font-size: 20px; cursor: pointer; }
    .factions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* Toast */
    .toast { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -20px); background: #e07b39; color: #fff; padding: 12px 24px; border-radius: 50px; font-size: 13px; font-weight: 600; opacity: 0; transition: .3s; z-index: 2000; pointer-events: none; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="hdr-left">
      <div class="logo-icon">🗺️</div>
      <span class="logo-text">Wandr</span>
    </div>
    <div class="hdr-right">
      <button class="btn-icon" id="btnAdmin" title="Admin">🔐</button>
    </div>
  </div>
  
  <div id="progress-area">
    <div class="step-labels">
      <span class="step-label active" data-i="0">Destinasi</span>
      <span class="step-label"        data-i="1">Transport</span>
      <span class="step-label"        data-i="2">Preferensi</span>
      <span class="step-label"        data-i="3">Generate</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  
  <div id="content">
    <div style="text-align:center; padding: 60px 0; color: #6a8a6a;">
      <div style="font-size:32px; animation: bounce 1.5s infinite; margin-bottom: 10px;">☁️</div>
      Memuat database Firebase...
    </div>
  </div>
  <style>@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }</style>
  
  <div id="nav" style="display:none;">
    <button class="btn-ghost hidden" id="btn-back">← Kembali</button>
    <span class="dest-count" id="dest-count"></span>
    <button class="btn-pri" id="btn-next" disabled>Lanjut →</button>
  </div>
</div>

<div class="modal" id="modalLogin">
  <div class="mbox center" style="max-width:320px">
    <div class="mtitle"><span>Masuk Admin</span><button class="mc" onclick="closeM('modalLogin')">✕</button></div>
    <div class="field-wrap"><input type="email" id="loginEmail" placeholder="Email Admin"></div>
    <div class="field-wrap"><input type="password" id="loginPass" placeholder="Password"></div>
    <button id="btnDoLogin" class="btn-pri" style="width:100%">Login</button>
  </div>
</div>

<div class="modal" id="modalAdminActs">
  <div class="mbox center" style="max-width:320px; text-align:center;">
    <div class="mtitle" style="justify-content:center; position:relative;">
      <span>🛠️ Admin Panel</span>
      <button class="mc" onclick="closeM('modalAdminActs')" style="position:absolute; right:0;">✕</button>
    </div>
    <button class="btn-pri" style="width:100%; margin-bottom:12px; background:#4ab06a;" onclick="openAdd()">➕ Tambah Destinasi</button>
    <button class="btn-ghost" style="width:100%; margin-bottom:12px; color:#f0e8d8;" id="btnExport">💾 Export Database (JSON)</button>
    <button class="btn-ghost" style="width:100%; color:#ef4444; border-color:rgba(239,68,68,.3);" id="btnLogout">🚪 Logout</button>
  </div>
</div>

<div class="modal" id="modalForm">
  <div class="mbox">
    <div class="mtitle"><span id="formTitle">Tambah Data</span><button class="mc" onclick="closeM('modalForm')">✕</button></div>
    
    <div class="field-wrap">
      <label class="field-label">Tipe Data</label>
      <select id="fType" onchange="updateFormFields()">
        <option value="wisata">⛺ Wisata</option>
        <option value="penginapan">🏨 Penginapan</option>
        <option value="kuliner">🍜 Kuliner & Café</option>
      </select>
    </div>
    
    <div class="field-wrap"><label class="field-label">Nama Tempat</label><input type="text" id="fNama"></div>
    
    <div class="fr">
      <div class="field-wrap"><label class="field-label">Kategori (Pantai/Gunung)</label><input type="text" id="fKat"></div>
      <div class="field-wrap"><label class="field-label">Kawasan (Kecamatan)</label><input type="text" id="fKaw"></div>
    </div>
    
    <div class="field-wrap"><label class="field-label" id="labelHarga">HTM / Harga (Rp)</label><input type="number" id="fHarga" value="0"></div>
    
    <div class="field-wrap"><label class="field-label">Catatan</label><textarea id="fCat" rows="3" placeholder="Keunikan, tips..."></textarea></div>
    
    <div class="factions">
      <button class="btn-ghost" onclick="closeM('modalForm')">Batal</button>
      <button class="btn-pri" id="btnSaveForm">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// --- KONFIGURASI FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyCHWWjnxX5-Fk9-gRTZVwyC3WDDfnLPh_s",
  authDomain: "banyuwangi-db.firebaseapp.com",
  projectId: "banyuwangi-db",
  storageBucket: "banyuwangi-db.firebasestorage.app",
  messagingSenderId: "973498690850",
  appId: "1:973498690850:web:b2d67373174542167a497b"
};
const app = initializeApp(firebaseConfig);
const dbFs = getFirestore(app);
const colRef = collection(dbFs, "places");
const auth = getAuth(app);

// --- GLOBAL UTILS ---
window.closeM = id => document.getElementById(id).classList.remove('open');
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  clearTimeout(t._t); t._t = setTimeout(() => t.className = 'toast', 3000);
}

// --- STATE MANAGEMENT ---
let DATA = [], isAdmin = false;
const S = {
  step: 0, destinations: new Set(), activeCat: 'semua',
  transport: '', durasi: '', gayaPerjalanan: '', penginapan: '',
  loading: false, itinerary: null
};

// --- DATA LISTENER ---
let unsubSnapshot = null;
function listenData(user) {
  if (unsubSnapshot) unsubSnapshot();
  // Filter wajib! Minta Firestore memberikan data yg BUKAN pending agar lolos Security Rules
  const q = user ? colRef : query(colRef, where("status", "==", "active"));
  
  unsubSnapshot = onSnapshot(q, snap => {
    DATA = [];
    snap.forEach(ds => DATA.push(ds.data()));
    
    // Sort A-Z by default
    DATA.sort((a,b) => (a.nama||'').localeCompare(b.nama||''));
    render(); // Update Tampilan Wandr
  }, err => {
    console.error("Firebase Error:", err);
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444">Gagal memuat database. Pastikan koneksi internet aktif.</div>';
  });
}

// --- AUTH LISTENER ---
onAuthStateChanged(auth, user => {
  isAdmin = !!user;
  document.getElementById('btnAdmin').textContent = isAdmin ? '👨‍💻' : '🔐';
  listenData(user); // Panggil data setelah status Auth diketahui
});

// --- ADMIN ACTS ---
document.getElementById('btnAdmin').addEventListener('click', () => {
  if (isAdmin) document.getElementById('modalAdminActs').classList.add('open');
  else document.getElementById('modalLogin').classList.add('open');
});

document.getElementById('btnDoLogin').addEventListener('click', async () => {
  const e = document.getElementById('loginEmail').value;
  const p = document.getElementById('loginPass').value;
  try { 
    await signInWithEmailAndPassword(auth, e, p); 
    closeM('modalLogin'); 
    toast('Berhasil masuk sebagai Admin'); 
  } catch(er) { toast('Gagal: ' + er.message); }
});

document.getElementById('btnLogout').addEventListener('click', () => {
  signOut(auth); closeM('modalAdminActs'); toast('Logout berhasil');
});

// --- ADD / EDIT DATA ---
let editId = null;
window.updateFormFields = () => {
  const t = document.getElementById('fType').value;
  document.getElementById('labelHarga').textContent = (t === 'wisata') ? 'HTM (Rp)' : 'Estimasi Harga/Malam (Rp)';
};

window.openAdd = () => {
  closeM('modalAdminActs');
  editId = null; 
  document.getElementById('formTitle').textContent = 'Tambah Data Database';
  document.getElementById('fNama').value = ''; 
  document.getElementById('fHarga').value = '0';
  document.getElementById('modalForm').classList.add('open');
};

window.openEdit = (id) => {
  const d = DATA.find(x => x.id === id); if(!d) return;
  editId = id; 
  document.getElementById('formTitle').textContent = 'Edit Data';
  document.getElementById('fType').value = d.type; updateFormFields();
  document.getElementById('fNama').value = d.nama;
  document.getElementById('fKat').value = d.kategori || '';
  document.getElementById('fKaw').value = d.kawasan || '';
  document.getElementById('fHarga').value = d.type === 'wisata' ? (d.htm||0) : (d.harga||0);
  document.getElementById('fCat').value = d.catatan || '';
  document.getElementById('modalForm').classList.add('open');
};

window.doDelete = async (id) => {
  if(confirm('Hapus destinasi ini dari Cloud secara permanen?')) {
    try { 
      await deleteDoc(doc(dbFs, 'places', id)); 
      toast('Terhapus dari Database'); 
      S.destinations.delete(id); render(); 
    } catch(e) { toast('Gagal hapus'); }
  }
};

document.getElementById('btnSaveForm').addEventListener('click', async () => {
  const nama = document.getElementById('fNama').value.trim();
  if(!nama) return toast('Nama wajib diisi');
  
  const type = document.getElementById('fType').value;
  const harga = parseInt(document.getElementById('fHarga').value) || 0;
  
  const payload = {
    nama, type, status: isAdmin ? 'active' : 'pending',
    kategori: document.getElementById('fKat').value || '—',
    kawasan: document.getElementById('fKaw').value || '—',
    catatan: document.getElementById('fCat').value || '—'
  };
  
  if (type === 'wisata') payload.htm = harga; else payload.harga = harga;
  
  const btn = document.getElementById('btnSaveForm');
  btn.textContent = "Menyimpan..."; btn.disabled = true;
  
  try {
    const id = editId || (type.charAt(0) + Date.now());
    await setDoc(doc(dbFs, 'places', id), { ...payload, id });
    closeM('modalForm'); toast('Data berhasil diperbarui di Cloud!');
  } catch(e) { toast('Gagal simpan: ' + e.message); }
  finally { btn.textContent = "Simpan"; btn.disabled = false; }
});

// --- EXPORT JSON ---
document.getElementById('btnExport').addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(DATA, null, 2));
  a.download = 'banyuwangi_database_backup.json'; 
  a.click(); 
  closeM('modalAdminActs'); toast('Mendownload JSON...');
});


// ==============================================
// ── WANDR UI RENDERER & ROUTE GENERATOR ──
// ==============================================

const DURASI = [ { v:'1', label:'1 Hari', sub:'Day Trip' }, { v:'2', label:'2H 1M', sub:'Weekend' }, { v:'3', label:'3H 2M', sub:'Long Weekend' } ];
const PENGINAPAN = [ { v:'300000', label:'Hotel Bintang 3', sub:'~ 300K/mlm' }, { v:'100000', label:'Homestay', sub:'~ 100K/mlm' }, { v:'0', label:'Tanpa Penginapan', sub:'Day trip' } ];

// Helper Ikon berdasarkan kategori
function getEmoji(nm, kat) {
  const s = (nm + ' ' + kat).toLowerCase();
  if(s.includes('ijen')||s.includes('kawah')) return '🌋';
  if(s.includes('pantai')||s.includes('teluk')||s.includes('pulau')) return '🌊';
  if(s.includes('air terjun')) return '💧';
  if(s.includes('hutan')||s.includes('taman')||s.includes('savana')) return '🌳';
  if(s.includes('sejarah')||s.includes('situs')||s.includes('candi')) return '🏛️';
  return '📍';
}

function renderStep0() {
  const cats = ['semua','pantai','hutan','gunung','sejarah'];
  const catBtns = cats.map(c => `<button class="cat-btn${S.activeCat===c?' active':''}" data-cat="${c}" style="text-transform:capitalize">${c}</button>`).join('');
  
  // Ambil hanya data wisata dari Firebase
  const wisata = DATA.filter(d => d.type === 'wisata' && d.status === 'active');
  const list = S.activeCat === 'semua' ? wisata : wisata.filter(d => (d.kategori||'').toLowerCase().includes(S.activeCat) || (d.nama||'').toLowerCase().includes(S.activeCat));
  
  if(wisata.length === 0) return `<div style="text-align:center;padding:40px 0;color:#6a8a6a;">Belum ada data wisata di Database. ${isAdmin?'Tambah data sekarang!':''}</div>`;

  const chips = list.map(d => {
    const sel = S.destinations.has(d.id);
    // Tombol Edit/Delete MUNCUL jika Admin login
    const admBtn = isAdmin ? `<div class="admin-acts"><button class="btn-edit" onclick="event.stopPropagation();openEdit('${d.id}')">✏️</button><button class="btn-edit" style="background:rgba(239,68,68,.3)" onclick="event.stopPropagation();doDelete('${d.id}')">🗑️</button></div>` : '';
    
    return `<div class="dest-chip${sel?' selected':''}" data-dest="${d.id}">
      <div class="dest-emoji">${getEmoji(d.nama, d.kategori)}</div><div class="dest-check">✓</div>
      <div class="dest-name">${d.nama}</div><div class="dest-desc">${d.kawasan||''}</div>
      ${admBtn}
    </div>`;
  }).join('');
  
  return `<h2 class="step-title">Mau ke mana?</h2><p class="step-sub">Pilih destinasi dari Database BWI-App</p>
    <div class="cat-filter">${catBtns}</div><div class="dest-grid">${chips}</div>`;
}

function renderStep1() {
  return `<h2 class="step-title">Naik apa?</h2><p class="step-sub">Pilih kendaraan selama di Banyuwangi</p>
    <div class="card-list">
      <div class="card-opt${S.transport==='motor'?' selected':''}" data-transport="motor"><div class="card-opt-icon">🏍️</div><div><div class="card-opt-title">Motor / Sewa Motor</div><div class="card-opt-sub">Fleksibel masuk rute kecil</div></div></div>
      <div class="card-opt${S.transport==='mobil'?' selected':''}" data-transport="mobil"><div class="card-opt-icon">🚗</div><div><div class="card-opt-title">Mobil / Travel</div><div class="card-opt-sub">Lebih nyaman</div></div></div>
    </div>`;
}

function renderStep2() {
  const dur = DURASI.map(d => `<div class="pill-opt${S.durasi===d.v?' selected':''}" data-dur="${d.v}"><div class="pill-label">${d.label}</div><div style="font-size:10px;color:#5a7a5a;margin-top:2px">${d.sub}</div></div>`).join('');
  const gay = [{v:'santai',l:'Santai',e:'🌴'},{v:'eksplorasi',l:'Eksplorasi',e:'⚡'}].map(g => `<div class="gaya-card${S.gayaPerjalanan===g.v?' selected':''}" data-gay="${g.v}"><div class="gaya-emoji">${g.e}</div><div class="gaya-label">${g.l}</div></div>`).join('');
  const peng = PENGINAPAN.map(p => `<div class="card-opt${S.penginapan===p.v?' selected':''}" data-peng="${p.v}" style="padding:10px;border-radius:10px"><div><div class="card-opt-title">${p.label}</div><div class="card-opt-sub">${p.sub}</div></div></div>`).join('');
  return `<h2 class="step-title">Preferensi Trip</h2><p class="step-sub">Sesuaikan gaya liburanmu</p>
    <div class="field-wrap"><label class="field-label">Durasi Trip</label><div class="pill-row">${dur}</div></div>
    <div class="field-wrap"><label class="field-label">Gaya Perjalanan</label><div class="gaya-row">${gay}</div></div>
    <div class="field-wrap"><label class="field-label">Target Penginapan / Malam</label><div class="card-list">${peng}</div></div>`;
}

function renderStep3() {
  if(S.loading) return `<div style="text-align:center;padding:64px 0;"><div style="font-size:52px;animation:bounce 1.5s infinite;margin-bottom:15px">🗺️</div><h3 class="step-title" style="font-size:20px;">Menyusun Rute Searah...</h3><p style="color:#6a8a6a;font-size:12px;">Mengkalkulasi rute dari Database BWI-App</p></div>`;
  
  if(!S.itinerary) return '';
  const it = S.itinerary;
  
  let h = `<div class="w-summary"><div style="font-size:12px;color:#8fa08f;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">✨ Itinerary Auto-Generated</div><div style="font-size:22px;font-weight:700;color:#e07b39">Est. Rp ${it.budget.toLocaleString('id')} /org</div><div style="font-size:12px;color:#8fa08f;margin-top:5px">Menggabungkan <strong>${Array.from(S.destinations).length} destinasi</strong> ke dalam rute searah ${S.durasi} Hari.</div></div>`;
  
  it.days.forEach(d => {
    h += `<div class="w-day-box"><div class="w-day-hdr"><div class="w-day-num">${d.day}</div><div class="w-day-title">Hari ${d.day}</div></div>`;
    d.acts.forEach(a => {
      let b = a.type==='makan'?'#4ab06a':a.type==='transport'?'#6b9fd4':a.type==='istirahat'?'#8b5cf6':'#e07b39';
      h += `<div class="w-act-item"><div class="w-act-time">${a.time}</div><div class="w-act-card" style="border-left:3px solid ${b}"><div class="w-act-name">${a.name}</div><div class="w-act-desc">${a.desc}</div>${a.cost>0?`<div style="font-size:11px;color:${b};margin-top:6px;font-weight:700">Rp ${a.cost.toLocaleString('id')}</div>`:''}</div></div>`;
    });
    h += `</div>`;
  });
  h += `<button class="btn-ghost" style="width:100%;justify-content:center;margin-top:10px" onclick="restart()">↺ Buat Rute Baru</button>`;
  return h;
}

function updateNav() {
  const nav = document.getElementById('nav');
  if(S.step===3) { nav.style.display='none'; return; }
  nav.style.display = 'flex';
  document.getElementById('btn-back').className = 'btn-ghost' + (S.step===0?' hidden':'');
  document.getElementById('dest-count').textContent = S.destinations.size>0 ? S.destinations.size+' dipilih' : '';
  
  let ok = false;
  if(S.step===0) ok = S.destinations.size > 0;
  if(S.step===1) ok = !!S.transport;
  if(S.step===2) ok = S.durasi && S.gayaPerjalanan && S.penginapan;
  
  document.getElementById('btn-next').disabled = !ok;
  document.getElementById('btn-next').textContent = S.step===2 ? '✨ Generate' : 'Lanjut →';
}

function render() {
  const c = document.getElementById('content');
  if(DATA.length===0) return; // Menunggu Firebase
  
  if(S.step===0) c.innerHTML = renderStep0();
  else if(S.step===1) c.innerHTML = renderStep1();
  else if(S.step===2) c.innerHTML = renderStep2();
  else if(S.step===3) c.innerHTML = renderStep3();
  
  document.getElementById('progress-fill').style.width = (S.step/3*100) + '%';
  document.querySelectorAll('.step-label').forEach(el => {
    let i = +el.dataset.i; el.className = 'step-label' + (i===S.step?' active': i<S.step?' done':'');
  });
  
  document.getElementById('progress-area').style.display = S.step===3 ? 'none' : 'block';
  updateNav(); attachListeners();
}

window.restart = () => { S.step=0; S.destinations.clear(); S.itinerary=null; render(); };

function attachListeners() {
  const c = document.getElementById('content');
  c.querySelectorAll('[data-cat]').forEach(el => el.onclick = () => { S.activeCat = el.dataset.cat; render(); });
  c.querySelectorAll('[data-dest]').forEach(el => el.onclick = () => {
    const id = el.dataset.dest; S.destinations.has(id)?S.destinations.delete(id):S.destinations.add(id); render();
  });
  c.querySelectorAll('[data-transport]').forEach(el => el.onclick = () => { S.transport = el.dataset.transport; render(); });
  c.querySelectorAll('[data-dur]').forEach(el => el.onclick = () => { S.durasi = el.dataset.dur; render(); });
  c.querySelectorAll('[data-gay]').forEach(el => el.onclick = () => { S.gayaPerjalanan = el.dataset.gay; render(); });
  c.querySelectorAll('[data-peng]').forEach(el => el.onclick = () => { S.penginapan = el.dataset.peng; render(); });
}

document.getElementById('btn-back').onclick = () => { S.step--; render(); };
document.getElementById('btn-next').onclick = () => {
  if(S.step===2) { S.step=3; generateRute(); } else { S.step++; render(); }
};

// ── MESIN ITINERARY WANDR (ALGORITMA ZONA SEARAH) ──
async function generateRute() {
  S.loading = true; render();
  await new Promise(r => setTimeout(r, 800)); // Animasi berpikir
  
  const selected = Array.from(S.destinations).map(id => DATA.find(d=>d.id===id));
  const kulinerDB = DATA.filter(d=>d.type==='kuliner'); // Ambil database Kuliner
  
  let totalBiaya = 0;
  let zones = { 'Utara':[], 'Selatan':[], 'Barat':[], 'Kota':[] };
  
  // Kelompokkan Destinasi Pilihan ke Zona Geografis
  selected.forEach(d => {
    let cost = d.htm||0; totalBiaya += cost;
    let kaw = (d.kawasan||'').toLowerCase(); let nm = d.nama.toLowerCase();
    let z = 'Kota';
    
    if(kaw.includes('wongsorejo')||nm.includes('baluran')||nm.includes('tabuhan')) z='Utara';
    else if(kaw.includes('pesanggaran')||kaw.includes('tegaldlimo')||nm.includes('merah')||nm.includes('purwo')) z='Selatan';
    else if(kaw.includes('licin')||nm.includes('ijen')||nm.includes('wurung')) z='Barat';
    
    zones[z].push({ name:d.nama, cost, isIjen: nm.includes('ijen'), desc: d.catatan||d.kategori });
  });

  let days = []; 
  let availableZones = Object.keys(zones).filter(k=>zones[k].length>0);
  let durasiNum = parseInt(S.durasi);
  let isSantai = S.gayaPerjalanan === 'santai';
  
  // Rancang Per Hari
  for(let i=1; i<=durasiNum; i++) {
    let acts = [];
    let curZone = availableZones.shift();
    let spots = curZone ? zones[curZone] : [];
    
    // Gabung zona jika terlalu sedikit
    if(spots.length < 2 && availableZones.length > 0) {
        spots = spots.concat(zones[availableZones.shift()]);
    }
    
    if(spots.some(s => s.isIjen)) {
      // MODE HANGOVER IJEN
      let ij = spots.find(s=>s.isIjen);
      acts.push({ time:"00:30", name:"Perjalanan ke Kawah Ijen", type:"transport", desc:"Bangun tengah malam, siapkan stamina.", cost:0 });
      acts.push({ time:"02:00", name:ij.name, type:"aktivitas", desc:"Trekking Blue Fire & Sunrise.", cost:ij.cost });
      acts.push({ time:"10:00", name:"Ijen Hangover (Istirahat)", type:"istirahat", desc:"Kembali ke penginapan, tidur.", cost:0 });
      let kul = kulinerDB[i%kulinerDB.length];
      acts.push({ time:"18:00", name:"Makan Malam: "+(kul?kul.nama:'Kuliner Lokal'), type:"makan", desc:(kul?kul.kawasan:'Pusat Kota'), cost:35000 });
    
    } else if(spots.length > 0) {
      // MODE WISATA NORMAL
      acts.push({ time:"07:30", name:"Sarapan Pagi", type:"makan", desc:"Isi energi sebelum berwisata", cost:20000 });
      let jam = 9;
      spots.forEach((s, idx) => {
        acts.push({ time:`${jam.toString().padStart(2,'0')}:00`, name:s.name, type:"aktivitas", desc:s.desc, cost:s.cost });
        jam += 3;
        // Penyelipan Makan Siang dari Firebase
        if(idx === 0) {
          let kul = kulinerDB[(i+2)%kulinerDB.length];
          acts.push({ time:`13:00`, name:"Makan Siang: "+(kul?kul.nama:'Sego Tempong'), type:"makan", desc:kul?kul.catatan:'Kuliner otentik', cost:35000 });
          jam = 14;
        }
      });
      acts.push({ time:"19:00", name:"Makan Malam & Istirahat", type:"istirahat", desc:"Kembali ke penginapan", cost:30000 });
    
    } else {
      // JIKA HARI KOSONG
      acts.push({ time:"09:00", name:"Beli Oleh-oleh / Free Time", type:"aktivitas", desc:"Santai keliling pusat kota Banyuwangi.", cost:50000 });
    }
    
    acts.sort((a,b)=>a.time.localeCompare(b.time));
    days.push({ day: i, acts });
  }

  // Kalkulasi Total
  totalBiaya += (durasiNum-1) * parseInt(S.penginapan);
  totalBiaya += durasiNum * 85000; // Est makan harian
  
  S.itinerary = { budget: totalBiaya, days };
  S.loading = false; render();
}
</script>
