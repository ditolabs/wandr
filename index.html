<!DOCTYPE html>
<html lang="id" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wandr — Buat Itinerary Banyuwangi</title>
  <meta name="description" content="Generate itinerary perjalanan Banyuwangi secara otomatis.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <style>
    /* ── TOKENS ────────────────────────────────────────────────────────────── */
    :root {
      --ink:      #111111;
      --ink-2:    #444444;
      --ink-3:    #888888;
      --ink-4:    #bbbbbb;
      --paper:    #f8f7f4;
      --paper-2:  #f0ede8;
      --line:     #e0dbd4;
      --red:      #c0392b;   /* aksen tunggal — merah editorial Jepang */
      --red-lt:   #e74c3c;
      --white:    #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      background: var(--paper);
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overscroll-behavior-y: none;
    }

    /* ── LAYOUT ────────────────────────────────────────────────────────────── */
    #app { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── HEADER ────────────────────────────────────────────────────────────── */
    #header {
      padding: 20px 24px 16px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 2px solid var(--ink);
      position: sticky; top: 0; z-index: 50;
      background: var(--paper);
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .logo-text {
      font-family: 'Noto Serif', Georgia, serif;
      font-size: 20px; font-weight: 700; font-style: italic;
      color: var(--ink); letter-spacing: -0.02em;
    }
    .logo-badge {
      font-size: 10px; color: var(--ink-3);
      letter-spacing: 0.14em; text-transform: uppercase;
      font-weight: 500;
      margin-left: 2px;
    }
    /* Vertical red rule — ciri khas editorial Jepang */
    .logo-divider {
      width: 2px; height: 22px;
      background: var(--red);
      margin: 0 4px;
    }

    /* ── PROGRESS ──────────────────────────────────────────────────────────── */
    #progress-area { padding: 0 24px; margin: 20px 0 0; }
    .step-labels {
      display: flex; gap: 0; margin-bottom: 10px;
    }
    .step-label {
      font-size: 10px; font-weight: 500; color: var(--ink-4);
      letter-spacing: 0.12em; text-transform: uppercase;
      flex: 1; text-align: center;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
      transition: color .3s, border-color .3s;
    }
    .step-label.active {
      color: var(--ink); font-weight: 700;
      border-bottom: 2px solid var(--ink);
    }
    .step-label.done {
      color: var(--red);
      border-bottom: 2px solid var(--red);
    }
    .progress-bar { display: none; } /* step labels sudah cukup */

    /* ── CONTENT AREA ──────────────────────────────────────────────────────── */
    #content-wrap { padding: 0 24px; flex: 1; margin-top: 24px; }

    /* ── NAV ───────────────────────────────────────────────────────────────── */
    #nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px 32px;
      border-top: 1px solid var(--line);
      margin-top: 8px;
      background: var(--paper);
    }
    .dest-count {
      font-size: 11px; color: var(--ink-3);
      letter-spacing: 0.08em; font-weight: 500;
    }

    /* ── BUTTONS ───────────────────────────────────────────────────────────── */
    .btn-pri {
      background: var(--ink); color: var(--white);
      border: none; padding: 12px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .2s;
      display: inline-flex; align-items: center; gap: 8px;
      white-space: nowrap; letter-spacing: 0.04em;
    }
    .btn-pri:hover:not(:disabled) { background: var(--red); }
    .btn-pri:disabled { background: var(--ink-4); cursor: not-allowed; }
    .btn-ghost {
      background: transparent; color: var(--ink-2);
      border: 1px solid var(--line); padding: 11px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: border-color .2s, color .2s;
      display: inline-flex; align-items: center; gap: 8px;
      letter-spacing: 0.02em;
    }
    .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }
    .btn-ghost.hidden { visibility: hidden; }

    /* ── STEP TYPOGRAPHY ───────────────────────────────────────────────────── */
    .step-title {
      font-family: 'Noto Serif', Georgia, serif;
      font-size: 30px; font-weight: 700; font-style: italic;
      margin-bottom: 6px; line-height: 1.2;
      color: var(--ink); letter-spacing: -0.02em;
    }
    /* Red underline aksen */
    .step-title span { color: var(--red); }
    .step-sub {
      color: var(--ink-3); font-size: 13px;
      margin-bottom: 24px; line-height: 1.6; font-weight: 400;
    }
    .field-label {
      display: block; font-size: 10px; font-weight: 600;
      color: var(--ink-3); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.14em;
    }
    .field-wrap { margin-bottom: 20px; }

    /* ── HORIZONTAL RULE ───────────────────────────────────────────────────── */
    .jp-rule {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0;
    }
    .jp-rule::before, .jp-rule::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }
    .jp-rule span {
      font-size: 10px; color: var(--ink-4);
      letter-spacing: 0.14em; text-transform: uppercase; white-space: nowrap;
    }

    /* ── CATEGORY FILTER ───────────────────────────────────────────────────── */
    .cat-filter { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--line); }
    .cat-btn {
      background: transparent; color: var(--ink-3);
      border: none; border-bottom: 2px solid transparent;
      padding: 8px 14px; margin-bottom: -1px;
      font-size: 11px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: color .2s, border-color .2s;
    }
    .cat-btn.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 700; }

    /* ── DESTINATION CARDS ─────────────────────────────────────────────────── */
    .dest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--line); border: 1px solid var(--line); }
    .dest-chip {
      padding: 14px 12px;
      background: var(--paper);
      cursor: pointer; transition: background .15s; user-select: none;
    }
    .dest-chip:hover { background: var(--paper-2); }
    .dest-chip.selected { background: var(--ink); }
    .dest-chip-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .dest-emoji { font-size: 20px; }
    .dest-check {
      width: 16px; height: 16px;
      border: 1px solid var(--ink-4);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--ink); flex-shrink: 0;
      opacity: 0; transition: opacity .15s;
      background: var(--white);
    }
    .dest-chip.selected .dest-check { opacity: 1; background: var(--red); border-color: var(--red); color: var(--white); }
    .dest-name { font-size: 12px; font-weight: 700; color: var(--ink); line-height: 1.3; margin-top: 8px; font-family: 'Noto Serif', serif; }
    .dest-chip.selected .dest-name { color: var(--white); }
    .dest-desc { font-size: 10px; color: var(--ink-3); margin-top: 2px; line-height: 1.4; }
    .dest-chip.selected .dest-desc { color: var(--ink-4); }
    .dest-meta { margin-top: 6px; display: flex; align-items: center; gap: 5px; }
    .cat-tag { font-size: 9px; padding: 1px 5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .cat-tag.alam   { background: #e8f5e8; color: #2d6e2d; }
    .cat-tag.pantai { background: #e8f0f8; color: #1a4a80; }
    .cat-tag.diving { background: #e0f5f2; color: #0a5a4a; }
    .cat-tag.budaya { background: #fdf0e0; color: #7a4a0a; }
    .dest-chip.selected .cat-tag { opacity: 0.7; }
    .best-time { font-size: 10px; color: var(--ink-3); }
    .dest-chip.selected .best-time { color: var(--ink-4); }
    .dest-notice {
      margin-top: 14px; padding: 10px 14px;
      border-left: 3px solid var(--red);
      background: var(--paper-2);
      font-size: 12px; color: var(--ink-2);
      display: none;
    }
    .dest-notice.show { display: block; }

    /* ── INPUTS ────────────────────────────────────────────────────────────── */
    select, input[type="text"], input[type="time"],
    input[type="email"], input[type="password"], textarea {
      background: var(--white);
      border: none;
      border-bottom: 1.5px solid var(--ink);
      color: var(--ink); padding: 10px 0;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color .2s;
      width: 100%; appearance: none; -webkit-appearance: none;
      border-radius: 0 !important;
      direction: ltr !important; text-align: left !important;
      unicode-bidi: isolate !important;
      background: transparent;
    }
    select:focus, input:focus { border-bottom-color: var(--red); }
    select option { background: var(--white); color: var(--ink); }
    .select-wrap { position: relative; border-bottom: 1.5px solid var(--ink); }
    .select-wrap select { border-bottom: none; padding-right: 24px; }
    .select-arrow { position: absolute; right: 0; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--ink-3); font-size: 11px; }

    /* ── AUTOCOMPLETE ──────────────────────────────────────────────────────── */
    .autocomplete-wrap { position: relative; }
    .autocomplete-dropdown {
      position: absolute; top: calc(100% + 2px); left: 0; right: 0; z-index: 100;
      background: var(--white);
      border: 1px solid var(--line);
      border-top: 2px solid var(--ink);
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      max-height: 220px; overflow-y: auto;
    }
    .autocomplete-item {
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
      transition: background .12s;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover, .autocomplete-item.active { background: var(--paper-2); }
    .autocomplete-item-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .autocomplete-item-sub  { font-size: 11px; color: var(--ink-3); margin-top: 1px; }
    .autocomplete-empty { padding: 14px; text-align: center; font-size: 12px; color: var(--ink-3); font-style: italic; }

    /* ── CARD OPTIONS ──────────────────────────────────────────────────────── */
    .card-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--line); }
    .card-opt {
      padding: 14px 16px;
      background: var(--white);
      border-bottom: 1px solid var(--line);
      cursor: pointer; transition: background .15s;
      display: flex; align-items: center; gap: 14px;
    }
    .card-opt:last-child { border-bottom: none; }
    .card-opt:hover { background: var(--paper-2); }
    .card-opt.selected { background: var(--ink); }
    .card-opt.sm { padding: 11px 14px; }
    .card-opt-icon { font-size: 22px; flex-shrink: 0; }
    .card-opt-title { font-size: 14px; font-weight: 600; color: var(--ink); font-family: 'Noto Serif', serif; }
    .card-opt.selected .card-opt-title { color: var(--white); }
    .card-opt-sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
    .card-opt.selected .card-opt-sub { color: var(--ink-4); }
    .card-opt-check { color: var(--red); font-size: 16px; flex-shrink: 0; margin-left: auto; opacity: 0; transition: opacity .15s; }
    .card-opt.selected .card-opt-check { opacity: 1; color: var(--white); }

    /* ── SEWA LOKAL ────────────────────────────────────────────────────────── */
    .sewa-wrap { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .35s ease, opacity .35s ease; }
    .sewa-wrap.open { max-height: 420px; opacity: 1; }
    .sewa-box { padding: 14px; background: var(--paper-2); border-left: 3px solid var(--ink-3); margin-bottom: 4px; }
    .sewa-title { font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 3px; font-family: 'Noto Serif', serif; }
    .sewa-sub   { font-size: 11px; color: var(--ink-2); margin-bottom: 10px; line-height: 1.5; }
    .card-opt.sewa-sel { background: var(--paper-2) !important; }
    .card-opt.sewa-sel .card-opt-title { color: var(--ink) !important; }

    /* ── PILL OPTIONS ──────────────────────────────────────────────────────── */
    .pill-row { display: flex; gap: 0; flex-wrap: wrap; border: 1px solid var(--line); }
    .pill-opt {
      padding: 11px 16px;
      background: var(--white);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      cursor: pointer; transition: background .15s; text-align: center;
    }
    .pill-opt:hover { background: var(--paper-2); }
    .pill-opt.selected { background: var(--ink); }
    .pill-label { font-size: 13px; font-weight: 700; color: var(--ink); font-family: 'Noto Serif', serif; }
    .pill-opt.selected .pill-label { color: var(--white); }
    .pill-sub { font-size: 10px; color: var(--ink-3); margin-top: 2px; }
    .pill-opt.selected .pill-sub { color: var(--ink-4); }

    /* ── GAYA CARDS ────────────────────────────────────────────────────────── */
    .gaya-row { display: flex; gap: 1px; background: var(--line); border: 1px solid var(--line); }
    .gaya-card {
      flex: 1; padding: 18px 12px;
      background: var(--white);
      cursor: pointer; transition: background .15s; text-align: center;
    }
    .gaya-card:hover { background: var(--paper-2); }
    .gaya-card.selected { background: var(--ink); }
    .gaya-emoji { font-size: 26px; margin-bottom: 8px; }
    .gaya-label { font-size: 13px; font-weight: 700; color: var(--ink); font-family: 'Noto Serif', serif; }
    .gaya-card.selected .gaya-label { color: var(--white); }
    .gaya-desc  { font-size: 10px; color: var(--ink-3); margin-top: 6px; line-height: 1.6; white-space: pre-line; }
    .gaya-card.selected .gaya-desc { color: var(--ink-4); }

    /* ── COUNTER ───────────────────────────────────────────────────────────── */
    .counter-row { display: flex; align-items: center; gap: 16px; }
    .cnt-btn {
      background: transparent; color: var(--ink);
      border: 1px solid var(--line);
      width: 36px; height: 36px; font-size: 18px;
      cursor: pointer; transition: border-color .2s, background .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .cnt-btn:hover { border-color: var(--ink); background: var(--ink); color: var(--white); }
    .cnt-val   { font-size: 24px; font-weight: 700; min-width: 32px; text-align: center; font-family: 'Noto Serif', serif; }
    .cnt-label { font-size: 12px; color: var(--ink-3); }

    /* ── LOADING ───────────────────────────────────────────────────────────── */
    .loading-screen { text-align: center; padding: 60px 0; }
    .loading-icon { font-size: 48px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .loading-title { font-family: 'Noto Serif', serif; font-size: 22px; font-weight: 700; font-style: italic; margin-bottom: 10px; color: var(--ink); }
    .loading-sub  { color: var(--ink-3); font-size: 13px; line-height: 1.6; }
    .loading-tags { display: flex; gap: 6px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .loading-tag  { font-size: 10px; color: var(--ink-3); background: var(--paper-2); padding: 3px 10px; border: 1px solid var(--line); letter-spacing: 0.08em; text-transform: uppercase; }
    .dot { animation: bou 1.4s ease-in-out infinite; display: inline-block; }
    .dot:nth-child(1){animation-delay:0s} .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    @keyframes bou { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-7px);opacity:1} }

    /* ── ERROR ─────────────────────────────────────────────────────────────── */
    .error-screen { text-align: center; padding: 60px 0; }

    /* ── RESULT ────────────────────────────────────────────────────────────── */
    .result-summary {
      padding: 20px 0;
      border-top: 2px solid var(--ink);
      border-bottom: 1px solid var(--line);
      margin-bottom: 28px;
    }
    .result-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .result-title { font-family: 'Noto Serif', serif; font-size: 22px; font-weight: 700; font-style: italic; flex: 1; line-height: 1.25; color: var(--ink); }
    .result-budget-label { font-size: 9px; color: var(--ink-3); text-align: right; letter-spacing: 0.12em; text-transform: uppercase; }
    .result-budget-val   { font-size: 18px; font-weight: 700; color: var(--red); font-family: 'Noto Serif', serif; }
    .result-desc  { font-size: 13px; color: var(--ink-2); line-height: 1.65; margin-bottom: 12px; }
    .highlight-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .highlight-tag  { font-size: 10px; padding: 2px 8px; border: 1px solid var(--ink); color: var(--ink); letter-spacing: 0.06em; text-transform: uppercase; }
    .budget-note { font-size: 11px; color: var(--ink-3); }

    /* ── DAY SECTION ───────────────────────────────────────────────────────── */
    .day-section { margin-bottom: 32px; animation: fdi .5s ease both; }
    @keyframes fdi { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .day-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--line); }
    .day-num {
      font-family: 'Noto Serif', serif;
      font-size: 36px; font-weight: 700; font-style: italic;
      color: var(--ink); line-height: 1; flex-shrink: 0;
      min-width: 28px;
    }
    .day-label    { font-size: 9px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.12em; }
    .day-title-txt { font-family: 'Noto Serif', serif; font-size: 16px; font-weight: 700; color: var(--ink); line-height: 1.3; }

    /* ── ACTIVITY ──────────────────────────────────────────────────────────── */
    .act-list { padding-left: 0; }
    .act-item { display: flex; gap: 14px; margin-bottom: 14px; animation: sli .45s ease both; }
    @keyframes sli { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .act-timeline { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 20px; }
    .act-icon { font-size: 14px; }
    .act-line { width: 1px; flex: 1; background: var(--line); margin: 4px 0; min-height: 12px; }
    .act-body { flex: 1; padding-bottom: 4px; }
    .act-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .act-time     { font-size: 11px; color: var(--red); font-weight: 700; letter-spacing: 0.04em; }
    .act-duration { font-size: 10px; color: var(--ink-3); margin-left: 6px; }
    .act-cost     { font-size: 10px; color: var(--ink-2); background: var(--paper-2); padding: 2px 7px; flex-shrink: 0; border: 1px solid var(--line); }
    .act-name     { font-size: 14px; font-weight: 700; color: var(--ink); font-family: 'Noto Serif', serif; line-height: 1.3; }
    .act-location { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
    .act-desc     { font-size: 12px; color: var(--ink-2); line-height: 1.6; margin-top: 4px; }
    .act-tip      { margin-top: 7px; padding: 7px 10px; font-size: 11px; line-height: 1.5; border-left: 2px solid; background: var(--paper-2); }

    /* ── PACKING & NOTES ───────────────────────────────────────────────────── */
    .packing-box  { padding: 16px; background: var(--paper-2); margin-bottom: 14px; border-top: 2px solid var(--ink); }
    .packing-title { font-size: 12px; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink); }
    .packing-tags  { display: flex; gap: 5px; flex-wrap: wrap; }
    .packing-tag   { font-size: 11px; padding: 3px 9px; background: var(--white); border: 1px solid var(--line); color: var(--ink-2); }
    .notes-box { padding: 14px; background: var(--paper-2); border-left: 3px solid var(--red); margin-bottom: 24px; font-size: 12px; color: var(--ink-2); line-height: 1.6; }

    /* ── SCROLLBAR ─────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--line); }

    /* ── SORTABLEJS ────────────────────────────────────────────────────────── */
    .sortable-chosen  { box-shadow: 0 4px 16px rgba(0,0,0,.12); background: var(--white) !important; }
    .sortable-ghost   { opacity: .2; background: var(--paper-2) !important; outline: 1px dashed var(--ink); }
    .sortable-drag    { cursor: grabbing !important; z-index: 9999 !important; }
    .drag-item        { cursor: grab; user-select: none; -webkit-user-select: none; touch-action: pan-y; }

    /* ── PLANNING BOARD ────────────────────────────────────────────────────── */
    .planning-board { display: flex; flex-direction: column; gap: 8px; }
    .plan-col { border: 1px solid var(--line); background: var(--white); overflow: hidden; }
    .plan-col.locked { opacity: .6; }
    .plan-col-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; font-size: 12px; font-weight: 700;

// ─── AUTH ────────────────────────────────────────────────────────────────────
let isAdmin = false;

function setAdmin(val, email) {
  isAdmin = val;
  const btn = document.getElementById('btnLogin');
  if (val) {
    btn.textContent = '🔓';
    btn.title = 'Keluar dari Admin';
    btn.style.color = '#c0392b';

    btn.style.color = '#888888';

  }
}

document.getElementById('btnLogin').addEventListener('click', (e) => {
  e.stopPropagation();
  if (isAdmin) {
    document.getElementById('user-menu').classList.toggle('open');
  } else {
    const m = document.getElementById('modalLogin');
    m.style.display = 'flex';

document.getElementById('closeLogin').addEventListener('click', () => {

  document.getElementById('loginErr').style.display = 'none';
});
document.getElementById('modalLogin').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalLogin')) {
    document.getElementById('modalLogin').style.display = 'none';
    document.getElementById('loginErr').style.display = 'none';
  }
});
document.getElementById('loginPass').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('btnDoLogin').click();
});

document.getElementById('btnDoLogin').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const btn   = document.getElementById('btnDoLogin');
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent = 'Email & password wajib diisi'; errEl.style.display = 'block'; return; }
  btn.textContent = '⏳ Memproses...'; btn.disabled = true;
  try {
    if (auth) {

      document.getElementById('modalLogin').style.display = 'none';
      document.getElementById('loginEmail').value = '';

});

if (auth) {

    else      setAdmin(false);
  });
}
</script>
<script>
// ─── KAWASAN → ZONE ──────────────────────────────────────────────────────────
const KAWASAN_ZONE = {
  'Licin':'barat','Licin / Paltuding':'barat','Kalibendo':'barat',
  'Kalibaru':'barat','Songgon':'barat','Kemiren':'barat','Glenmore':'barat',
  'Wongsorejo':'utara','Banyuputih':'utara','Kalipuro':'utara',
  'Pesanggaran':'selatan','Tegaldlimo':'selatan','Purwoharjo':'selatan',
  'Muncar':'selatan','Benculuk':'selatan','Grajagan':'selatan',
  'Pusat Kota':'kota','Glagah':'kota','Rogojampi':'kota','Banyuwangi':'kota',
};

function mapToWandr(id, d) {
  if (d.type !== 'wisata' || d.status === 'pending') return null;
  const nama = (d.nama||'').toLowerCase();
  const kat  = (d.kategori||'').toLowerCase();
  let cat = 'alam';
  if (kat.includes('pantai')||kat.includes('beach')||kat.includes('teluk')) cat='pantai';
  if (kat.includes('snorkel')||kat.includes('diving')||kat.includes('pulau')) cat='diving';
  if (kat.includes('kota')||kat.includes('budaya')||kat.includes('sejarah')) cat='budaya';
  const emojiBase = {alam:'🌿',pantai:'🌊',diving:'🤿',budaya:'🏛️'};
  const emojiOvr  = {'kawah ijen':'🌋','ijen':'🌋','air terjun':'💧','baluran':'🦌',
    'sukamade':'🐢','red island':'🏄','g-land':'🏄','menjangan':'🤿',
    'tabuhan':'🏝️','kawah wurung':'🏔️','green bay':'🌊','city tour':'🏛️'};
  let emoji = emojiBase[cat]||'🗺️';
  for (const [k,v] of Object.entries(emojiOvr)) { if(nama.includes(k)){emoji=v;break;} }
  const isIjen=nama.includes('ijen'), isSunset=nama.includes('red island')||nama.includes('pulau merah');
  const isNight=nama.includes('sukamade'), isCity=nama.includes('city tour');
  let bestTime='pagi';
  if(isSunset) bestTime='sore'; if(isNight) bestTime='malam'; if(isIjen) bestTime='dini hari';
  const NAMA_ZONE_OVERRIDE = {
    'kawah wurung':'barat','kawah ijen':'barat','ijen':'barat','lider':'barat',
    'telunjuk':'barat','jagir':'barat','malangsari':'barat','beji':'barat',
    'baluran':'utara','menjangan':'utara','tabuhan':'utara','wongsorejo':'utara',
    'sukamade':'selatan','alas purwo':'selatan','red island':'selatan',
    'pulau merah':'selatan','green bay':'selatan','teluk ijo':'selatan',
    'g-land':'selatan','grajagan':'selatan','wedi ireng':'selatan',
  };
  let zone = KAWASAN_ZONE[d.kawasan] || 'kota';
  for (const [key, z] of Object.entries(NAMA_ZONE_OVERRIDE)) {
    if (nama.includes(key)) { zone = z; break; }
  }
  const dur  = isIjen?300:cat==='diving'?360:kat.includes('terjun')?120:180;
  const namaWords = nama.split(' ').filter(w => w.length > 2);
  const autoAliases = new Set([nama]);
  const skipWords = new Set(['pura','taman','nasional','pantai','air','gua','goa','pulau','kebun','perkebunan','padang']);
  const meaningfulWords = namaWords.filter(w => !skipWords.has(w));
  if (meaningfulWords.length > 0) {
    autoAliases.add(meaningfulWords.join(' '));
    meaningfulWords.forEach(w => autoAliases.add(w));
    for (let i = 0; i < meaningfulWords.length - 1; i++) {
      autoAliases.add(meaningfulWords[i] + ' ' + meaningfulWords[i+1]);
    }
  }

function haversineKm(lat1,lng1,lat2,lng2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function parseDestInput(text) {
  S.destinations.clear();
  // Normalize: hapus spasi berlebih tapi jangan ubah nilai S.destInput
  const terms = text.split(',').map(s=>s.trim().toLowerCase()).filter(s=>s.length>=2);
  terms.forEach(term => {
    if (!term) return;
    let bestMatch = null, bestScore = 0;
    DESTINATIONS.forEach(d => {
      const score = matchScore(term, d);
      if (score > bestScore) { bestScore = score; bestMatch = d; }
    });
    if (bestMatch && bestScore >= 45) S.destinations.add(bestMatch.id);
  });
}

function matchScore(term, d) {
  const t = term.toLowerCase().trim();
  const n = d.name.toLowerCase();
  if (n === t) return 100;
  if (d.aliases) {
    for (const a of d.aliases) {
      if (a.length < 4) continue;
      if (a === t) return 98;
      if (a.includes(t) && t.length >= 5) return 90;
      if (t.includes(a) && a.length >= 8) return 85;
    }
  }
  if (t.length >= 4 && n.includes(t)) return 80;
  if (n.length >= 5 && t.includes(n)) return 75;
  const skipWords = new Set(['dan','yang','ke','di','dari','untuk','dengan','atau','taman','nasional','pantai','air','goa','gua','pulau','bukit','gunung','perkebunan']);
  const nWords    = n.split(' ').filter(w => w.length > 2 && !skipWords.has(w));
  const termWords = t.split(' ').filter(w => w.length > 2 && !skipWords.has(w));
  if (!nWords.length || !termWords.length) return 0;
  const hits = termWords.filter(tw => nWords.some(nw => nw === tw || nw.startsWith(tw) || tw.startsWith(nw)));
  const coverage = hits.length / nWords.length;
  const precision = hits.length / termWords.length;
  const f1 = coverage + precision > 0 ? 2 * coverage * precision / (coverage + precision) : 0;
  return f1 >= 0.5 ? Math.round(f1 * 60) : 0;
}

      const lngs = selDests.map(d=>d.lng).filter(Boolean);
      if (lats.length > 0) {
        const cLat = lats.reduce((a,b)=>a+b,0)/lats.length;

        S.penginapanOptions = all

          .map(d => ({ ...d, dist: haversineKm(cLat,cLng,d.lat,d.lng) }))
          .sort((a,b)=>a.dist-b.dist)

      } else {
        S.penginapanOptions = all.slice(0, 6);

    } else {
      S.penginapanOptions = all.slice(0, 6);
    }
  } catch(e) {
    console.warn('loadPenginapanOptions gagal:', e.message);

  }
}

      .slice(0, 14);
  } else {
    const pool = DESTINATIONS.filter(d => activeCat==='semua' || d.cat===activeCat);
    if (!S._shuffledDests || S._lastCat !== activeCat) {
      S._shuffledDests = [...pool].sort(() => Math.random() - 0.5);
      S._lastCat = activeCat;
    }
    displayDests = S._shuffledDests.slice(0, 14);
  }

  const cats = ['semua','alam','pantai','diving','budaya'];
  const catEmoji = { semua:'🗺️', alam:'🌿', pantai:'🌊', diving:'🤿', budaya:'🏛️' };
  const catBtns = cats.map(ct => {
    const sel = activeCat===ct;
    return `<button data-cat="${ct}" style="display:inline-flex;align-items:center;gap:4px;
      padding:6px 13px;border-radius:0;font-size:12px;font-weight:600;flex-shrink:0;
      cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .18s;
      ${sel
        ? 'background:#c0392b;color:#fff;border:1px solid transparent;'
        : 'background:#f0ede8;color:#444444;border:1px solid #e0dbd4;'}">${catEmoji[ct]} ${ct.charAt(0).toUpperCase()+ct.slice(1)}</button>`;
  }).join('');

  const chips = matched.map(d =>
    `<div style="display:inline-flex;align-items:center;gap:5px;padding:5px 9px 5px 11px;
      border-radius:18px;white-space:nowrap;flex-shrink:0;
      background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);">
      <span style="font-size:12px">${d.emoji}</span>
      <span style="font-size:11px;font-weight:600;color:#c0392b">${esc(d.name)}</span>
      <span data-remove="${d.id}" style="font-size:13px;color:#a07050;cursor:pointer;padding:0 2px">✕</span>
    </div>`
  ).join('');

  const CAT_DOT = { alam:'#4ab06a', pantai:'#4a9fd4', diving:'#4ad4c0', budaya:'#d4a04a' };
  const rows = displayDests.length ? displayDests.map(d => {
    const sel = S.destinations.has(d.id);
    const rating = DEST_RATINGS[d.id];
    const dot = CAT_DOT[d.cat]||'#888888';
    return `<div data-dest-card="${d.id}" style="display:flex;align-items:center;gap:12px;
      padding:12px 13px;border-radius:11px;cursor:pointer;transition:all .15s;margin-bottom:5px;
      background:${sel?'rgba(192,57,43,.07)':'#ffffff'};
      border:1px solid ${sel?'rgba(192,57,43,.38)':'#e0dbd4'};">
      <div style="width:40px;height:40px;border-radius:9px;flex-shrink:0;font-size:20px;
        display:flex;align-items:center;justify-content:center;
        background:${sel?'rgba(192,57,43,.13)':'#f0ede8'};">${d.emoji}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:600;margin-bottom:3px;
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
          color:${sel?'#c0392b':'#888888'};">${esc(d.name)}</div>
        <div style="display:flex;align-items:center;gap:5px;">
          <span style="width:5px;height:5px;border-radius:0;background:${dot};flex-shrink:0;"></span>
          <span style="font-size:11px;color:#666666;">${DEST_CAT_LABEL[d.cat]||d.cat}</span>
          ${rating?`<span style="font-size:10px;color:#888888;">·</span><span style="font-size:11px;color:#7a9040;">★${rating}</span>`:''}
          ${d.bestTime?`<span style="font-size:10px;color:#888888;">·</span><span style="font-size:11px;color:#4a7a6a;">${d.bestTime}</span>`:''}
        </div>
      </div>
      <div style="width:22px;height:22px;border-radius:0;flex-shrink:0;
        display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;
        ${sel?'background:#c0392b;color:#fff;border:none;':'background:transparent;border:1.5px solid rgba(0,0,0,0.12);color:transparent;'}">${sel?'✓':''}</div>
    </div>`;
  }).join('') : `<div style="text-align:center;padding:28px;color:#444444;font-size:13px;">Tidak ada destinasi</div>`;

  // Quick-pick chips: top 8 destinations utk horizontal scroll
  const QUICK_IDS = ['ijen','baluran','alas_purwo','red_island','green_bay','kawah_wurung','sukamade','tabuhan'];
  const quickDests = DESTINATIONS.filter(d => QUICK_IDS.includes(d.id)).slice(0,8);
  const quickChips = quickDests.map(d => {
    const sel = S.destinations.has(d.id);
    return `<div data-dest-card="${d.id}" style="display:inline-flex;align-items:center;gap:6px;
      padding:8px 14px;border-radius:0;white-space:nowrap;flex-shrink:0;cursor:pointer;
      transition:all .18s;font-family:inherit;
      background:${sel?'rgba(192,57,43,.12)':'#f0ede8'};
      border:1.5px solid ${sel?'rgba(192,57,43,.5)':'rgba(0,0,0,.2)'};
      box-shadow:${sel?'0 2px 8px rgba(192,57,43,.15)':'none'};">
      <span style="font-size:15px;line-height:1">${d.emoji}</span>
      <span style="font-size:13px;font-weight:700;color:${sel?'#c0392b':'#111111'}">${esc(d.name)}</span>
      ${sel?`<span style="font-size:11px;color:#c0392b;font-weight:700">✓</span>`:''}
    </div>`;
  }).join('');

  return `
    <h2 class="step-title" style="font-size:25px;margin-bottom:4px;">Ke Banyuwangi,<br><span style="color:#c0392b;">mau kemana aja?</span></h2>
    <p class="step-sub" style="margin-bottom:14px;">Pilih destinasi — bisa lebih dari satu.</p>

    ${matched.length>0?`<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;scrollbar-width:none;" id="dest-chips">${chips}</div>`:''}

    <div style="font-size:10px;font-weight:700;color:#111111;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;">
      Populer — ketuk untuk pilih:
    </div>
    <div style="display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none;-webkit-overflow-scrolling:touch;">
      ${quickChips}
    </div>

    <div style="font-size:10px;font-weight:700;color:#111111;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;">
      Atau cari destinasi lain:
    </div>
    <div style="position:relative;margin-bottom:11px;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#888888;font-size:14px;">🔍</span>
      <input type="text" id="dest-input" dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"
        value="${esc(S.destInput)}" placeholder="Cari: Pulau Merah, Teluk Hijau..."
        style="padding:10px 38px 10px 36px;font-size:14px;border-radius:0;">
      ${S.destInput?`<span id="btn-clear-input" style="position:absolute;right:11px;top:50%;transform:translateY(-50%);cursor:pointer;color:#888888;font-size:14px;padding:4px;">✕</span>`:''}
    </div>

    ${query?`<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px;scrollbar-width:none;" id="cat-btns">${catBtns}</div>`:''}

    <div id="dest-warn-area" style="display:${query&&displayDests.length===0?'block':'none'};padding:8px 12px;background:rgba(200,150,30,.07);border:1px solid rgba(200,150,30,.2);border-radius:0;font-size:12px;color:#444444;margin-bottom:10px;">
      ⚠️ Tidak ditemukan untuk "<em>${esc(S.destInput)}</em>"
    </div>

    ${query?`<div id="dest-cards-list">${rows}</div>`:''}

    ${matched.length>0?`<div style="margin-top:10px;padding:12px;background:#f0ede8;border-radius:0;border:1.5px solid rgba(0,0,0,.15);">
      <div style="font-size:11px;color:#666666;margin-bottom:6px;">🍽️ Kuliner yang diincar? <span style="color:#888888;">(opsional)</span></div>
      <input type="text" id="input-kuliner-custom" dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"
        placeholder="Cth: Sego Tempong Mbok Wah..." value="${esc(S.kulinerCustom)}" style="font-size:13px;padding:8px 11px;">
    </div>`:''}
    <div style="height:12px;"></div>`;
}


// ─── RENDER STEP 1 ───────────────────────────────────────────────────────────
function renderStep1() {
  const kotaOpts = KOTA.map(k => `<option value="${k}"${S.kotaAsal===k?' selected':''}>${k}</option>`).join('');

  function transCard(v, icon, label, sub, tags=[]) {
    const sel = S.transport===v;
    return `<div data-transport="${v}" style="padding:16px;border-radius:0;cursor:pointer;
      transition:all .2s;margin-bottom:10px;
      background:${sel?'rgba(192,57,43,.08)':'#ffffff'};
      border:${sel?'2px solid #c0392b':'1px solid #e0dbd4'}">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:44px;height:44px;border-radius:0;flex-shrink:0;
          background:${sel?'rgba(192,57,43,.12)':'#f0ede8'};
          display:flex;align-items:center;justify-content:center;font-size:20px;
          border:1px solid ${sel?'rgba(192,57,43,.4)':'#e0dbd4'}">
          ${icon}
        </div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700;color:${sel?'#c0392b':'#111111'};margin-bottom:2px">${label}</div>
          <div style="font-size:12px;color:#666666">${sub}</div>
          ${tags.length?`<div style="display:flex;gap:5px;margin-top:7px">${tags.map(t=>`<span style="font-size:10px;padding:2px 8px;border-radius:0;background:#f0ede8;color:#666666;border:0.5px solid rgba(0,0,0,0.08)">${t}</span>`).join('')}</div>`:''}
        </div>
        <div style="width:20px;height:20px;border-radius:0;border:2px solid ${sel?'#c0392b':'rgba(0,0,0,0.15)'};
          display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${sel?`<div style="width:10px;height:10px;border-radius:0;background:#c0392b"></div>`:''}
        </div>
      </div>
    </div>`;
  }

  function sewaCard(v, icon, label, sub) {
    const sel = S.sewaLokal.has(v);
    return `<div data-sewa="${v}" style="padding:13px 14px;border-radius:0;cursor:pointer;
      transition:all .2s;display:flex;align-items:center;gap:12px;margin-bottom:8px;
      background:${sel?'rgba(107,159,212,.1)':'#ffffff'};
      border:1.5px solid ${sel?'rgba(107,159,212,.5)':'#e0dbd4'}">
      <div style="width:38px;height:38px;border-radius:0;flex-shrink:0;
        background:${sel?'rgba(107,159,212,.2)':'#f0ede8'};
        display:flex;align-items:center;justify-content:center;font-size:18px">
        ${icon}
      </div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:600;color:${sel?'#6b9fd4':'#c0d4c0'}">${label}</div>
        <div style="font-size:11px;color:#888888;margin-top:2px">${sub}</div>
      </div>
      <div style="width:18px;height:18px;border-radius:0;
        background:${sel?'#6b9fd4':'transparent'};
        border:2px solid ${sel?'#6b9fd4':'rgba(0,0,0,0.15)'};
        display:flex;align-items:center;justify-content:center;flex-shrink:0;
        font-size:11px;color:#fff">
        ${sel?'✓':''}
      </div>
    </div>`;
  }

  return `
    <div style="font-size:11px;font-weight:700;color:#c0392b;letter-spacing:.1em;margin-bottom:6px">STEP 2 OF 4</div>
    <h2 class="step-title">Kota Asal</h2>

    <div style="margin-bottom:22px">
      <div style="position:relative">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px">📍</span>
        <select id="sel-kota" style="padding-left:42px">
          <option value="">Pilih kota asal...</option>
          ${kotaOpts}
        </select>
        <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#888888;pointer-events:none;font-size:14px">▾▾</span>
      </div>
      ${S.kotaAsal==='Lainnya' ? `<input type="text" id="input-kota-custom" dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="Tulis kota asal…" value="${esc(S.kotaAsalCustom)}" style="margin-top:8px">` : ''}
    </div>

    <h2 class="step-title" style="font-size:22px">Naik apa?</h2>
    <div style="margin-bottom:16px">
      ${transCard('pribadi_mobil','🚗','Mobil Pribadi','Perjalanan fleksibel & santai',['AC','NYAMAN'])}
      ${transCard('pribadi_motor','🏍️','Motor Pribadi','Ekonomis & gesit',['HEMAT','LINCAH'])}
      ${transCard('umum','🚌','Kendaraan Umum','Kereta, Bus, atau Travel',['KERETA','BUS','TRAVEL'])}
    </div>

    <div class="sewa-wrap${S.transport==='umum'?' open':''}" id="sub-trans-wrap" style="margin-bottom:16px">
      <div style="padding:14px;border-radius:0;background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.2)">
        <div style="font-size:12px;font-weight:700;color:#c0392b;margin-bottom:12px">🎫 PILIH JALUR</div>
        <div style="display:flex;gap:8px">
          ${[{v:'kereta',l:'Kereta Api',e:'🚂'},{v:'pesawat',l:'Pesawat',e:'✈️'},{v:'bus',l:'Bus',e:'🚌'}].map(t=>{
            const sel=S.subTransport===t.v;
            return `<div data-sub="${t.v}" style="flex:1;padding:12px 8px;text-align:center;border-radius:0;
              cursor:pointer;transition:all .2s;
              background:${sel?'rgba(192,57,43,.2)':'#f0ede8'};
              border:1.5px solid ${sel?'#c0392b':'rgba(0,0,0,0.08)'}">
              <div style="font-size:22px;margin-bottom:5px">${t.e}</div>
              <div style="font-size:11px;font-weight:600;color:${sel?'#c0392b':'#888888'}">${t.l}</div>
            </div>`;}).join('')}
        </div>
      </div>
    </div>

    <div style="margin-bottom:20px">
      <div style="font-size:11px;font-weight:700;color:#888888;letter-spacing:.08em;margin-bottom:10px">JAM PERJALANAN</div>
      <div style="display:flex;gap:10px">
        <div style="flex:1">
          <div style="font-size:11px;color:#444444;margin-bottom:6px">Tiba di BWI</div>
          <input type="time" id="input-waktu-tiba" value="${S.waktuTiba}"
            style="width:100%;padding:12px;background:#f0ede8;border:1.5px solid rgba(0,0,0,.22);color:#111111;border-radius:0;font-family:inherit;font-size:15px;outline:none">
        </div>
        <div style="flex:1">
          <div style="font-size:11px;color:#444444;margin-bottom:6px">Pulang dari BWI</div>
          <input type="time" id="input-waktu-pulang" value="${S.waktuPulang}"
            style="width:100%;padding:12px;background:#f0ede8;border:1.5px solid rgba(0,0,0,.22);color:#111111;border-radius:0;font-family:inherit;font-size:15px;outline:none">
        </div>
      </div>
    </div>

    <div class="sewa-wrap${S.transport==='umum'?' open':''}" id="sewa-wrap">
      <div style="padding:14px;border-radius:0;background:rgba(107,159,212,.05);border:1px solid rgba(107,159,212,.2);margin-bottom:4px">
        <div style="font-size:12px;font-weight:700;color:#6b9fd4;margin-bottom:4px">🚉 MOBILITAS LOKAL</div>
        <div style="font-size:12px;color:#888888;margin-bottom:12px">Kendaraan setelah tiba. Boleh pilih lebih dari satu.</div>
        ${sewaCard('motor','🏍️','Sewa Motor','~100K–150K/hari')}
        ${sewaCard('mobil_driver','🚐','Sewa Mobil + Driver','~450K–650K/hari')}
        ${sewaCard('ojek','📱','Ojek / Online','Gojek, Grab, ojek pangkalan')}
      </div>
    </div>`;
}

// ─── RENDER STEP 2 ───────────────────────────────────────────────────────────
function renderStep2() {
  const durasiBtns = DURASI.map(d => {
    const sel = S.durasi===d.v;
    return `<div data-durasi="${d.v}" style="padding:10px 16px;border-radius:22px;cursor:pointer;
      transition:all .2s;text-align:center;
      background:${sel?'#c0392b':'rgba(255,255,255,.05)'};
      border:1.5px solid ${sel?'#c0392b':'rgba(0,0,0,0.08)'};
      box-shadow:${sel?'0 4px 16px rgba(192,57,43,.35)':'none'}">
      <div style="font-size:14px;font-weight:700;color:${sel?'#c0392b':'#111111'}">${d.label}</div>
      <div style="font-size:10px;color:${sel?'rgba(255,255,255,.7)':'#5a7a5a'};margin-top:2px">${d.sub}</div>
    </div>`;
  }).join('');

  const gayaCards = [
    { v:'santai',    emoji:'🌴', label:'Santai',    desc:'Maks 2 destinasi/hari. Banyak waktu menikmati setiap momen.' },
    { v:'eksplorasi',emoji:'⚡', label:'Eksplorasi', desc:'3–4 destinasi/hari. Efisien & terpadatkan.' },
  ].map(g => {
    const sel = S.gayaPerjalanan===g.v;
    return `<div data-gaya="${g.v}" style="flex:1;padding:16px;border-radius:0;cursor:pointer;
      transition:all .25s;text-align:center;
      background:${sel?'rgba(192,57,43,.1)':'rgba(255,255,255,.03)'};
      border:1.5px solid ${sel?'#c0392b':'rgba(0,0,0,0.08)'}">
      <div style="font-size:30px;margin-bottom:10px">${g.emoji}</div>
      <div style="font-size:15px;font-weight:700;color:${sel?'#c0392b':'#111111'};margin-bottom:8px">${g.label}</div>
      <div style="font-size:11px;color:#666666;line-height:1.6">${g.desc}</div>
    </div>`;
  }).join('');

  const allHotels = S.allPenginapan || [];
  const hotelQuery = S.penginapanSearchQuery || '';
  const filteredHotels = hotelQuery.length >= 2
    ? allHotels.filter(p => {
        const n = (p.nama||'').toLowerCase();
        const q = hotelQuery.toLowerCase();
        return n.includes(q) || (p.kawasan||'').toLowerCase().includes(q) || (p.kategori||'').toLowerCase().includes(q);
      }).slice(0, 6)
    : S.penginapanOptions.slice(0, 4);

  const hotelSuggestions = filteredHotels.map(p => {
    const sel = S.penginapanIds.has(p.id);
    const distTxt = p.dist != null ? (p.dist < 1 ? Math.round(p.dist*1000)+'m' : p.dist.toFixed(1)+'km') : '';
    return `<div class="card-opt sm${sel?' selected':''}" data-penginapan-fb="${p.id}">
      <span class="card-opt-icon">🏨</span>
      <div style="flex:1;min-width:0">
        <div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.nama)}</div>
        <div class="card-opt-sub">${p.kawasan||''} ${distTxt?'· <span style="color:#c0392b">~'+distTxt+' dari destinasi</span>':''}${p.harga?' · Rp'+p.harga:''}</div>
      </div>
      <span class="card-opt-check">✓</span>
    </div>`;
  }).join('');

  const selectedListHTML = (function() {
    if (S.penginapanIds.size === 0) return '';
    const selectedList = S.penginapanDataList || [];
    if (selectedList.length === 0) return '';
    return selectedList.map(sel =>
      '<div class="card-opt sm selected" style="margin-bottom:8px;pointer-events:none">'
      +'<span class="card-opt-icon">🏨</span>'
      +'<div style="flex:1;min-width:0">'
      +'<div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(sel.nama)+'</div>'
      +'<div class="card-opt-sub">'+(sel.kawasan||'')+(sel.harga?' · Rp'+sel.harga:'')+'</div>'
      +'</div>'
      +'<span class="card-opt-check">✓</span>'
      +'</div>'
    ).join('');
  })();

  const penginapanSection = `
    <div class="autocomplete-wrap" style="margin-bottom:10px">
      <input type="text" id="input-penginapan-search"
        dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"
        placeholder="🔍 Cari nama penginapan..."
        value="${esc(hotelQuery)}"
        style="padding-right:36px">
      ${hotelQuery ? `<span id="btn-clear-hotel" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#888888;font-size:14px;padding:4px;z-index:1">✕</span>` : ''}
      <div class="autocomplete-dropdown" id="hotel-autocomplete" style="${hotelQuery.length>=1?'':'display:none'}">
        ${filteredHotels.length > 0
          ? filteredHotels.map(p => {
              const sel = S.penginapanIds.has(p.id);
              const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):'';
              return '<div class="autocomplete-item'+(sel?' active':'')+'\" data-penginapan-ac="'+p.id+'">'
                +'<span style="font-size:20px">🏨</span>'
                +'<div>'
                +'<div class="autocomplete-item-name">'+esc(p.nama)+(sel?' ✓':'')+'</div>'
                +'<div class="autocomplete-item-sub">'+(p.kawasan||'')+(distTxt?' · ~'+distTxt+' dari destinasi':'')+(p.harga?' · Rp'+p.harga:'')+'</div>'
                +'</div>'
                +'</div>';
            }).join('')
          : '<div class="autocomplete-empty">Tidak ditemukan — coba kata kunci lain</div>'
        }
      </div>
    </div>
    ${selectedListHTML}
    ${!S.penginapanIds.size && !hotelQuery && S.penginapanOptions.length > 0
      ? '<div style="font-size:11px;color:#444444;margin-bottom:8px">📍 Terdekat dari destinasimu:</div>'
        +'<div class="card-list" id="hotel-suggestions">'+hotelSuggestions+'</div>'
      : ''}
    ${allHotels.length === 0 ? `
      <div class="card-list">
        ${PENGINAPAN.map(p =>
          `<div class="card-opt sm${S.penginapan===p.v?' selected':''}" data-penginapan="${p.v}">
            <span class="card-opt-icon">${p.emoji}</span>

function buildPrintHTML(it) {
  const totalDays = it.days?.length || 1;

  const transport = { motor:'Motor Pribadi', mobil:'Mobil Pribadi', umum:'Kendaraan Umum' }[S.transport] || S.transport;
  const budget = it.estimatedBudget;
  const budgetStr = budget ? `Rp${(budget.min/1e6).toFixed(1)}jt – Rp${(budget.max/1e6).toFixed(1)}jt` : '–';
  const today = new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});

  const daysHTML = (it.days||[]).map((day, di) => {
    const acts = (day.activities||[]).map((act, ai) => {
      const isLast = ai === day.activities.length - 1;
      return `<div class="print-act">

          ${!isLast ? '<div class="print-act-rule"></div>' : ''}

    return `<div class="print-day">
      <div class="print-day-header">
        <div class="print-day-num">${di+1}</div>
        <div class="print-day-info">
          <div class="print-day-lbl">Hari ke-${di+1}</div>

async function exportItinerary(format) {
  const it = S.itinerary;
  if (!it) return;

  const modal = document.getElementById('export-modal');
  const progress = document.getElementById('export-progress');
  const progressBar = document.getElementById('export-progress-bar');
  const progressText = document.getElementById('export-progress-text');

  // Show progress
  progress.style.display = 'block';
  const btns = modal.querySelectorAll('button:not([onclick])');
  btns.forEach(b => b.disabled = true);

  function setProgress(pct, text) {
    progressBar.style.width = pct + '%';
    progressText.textContent = text;
  }

  try {
    setProgress(10, 'Menyiapkan layout...');

    // Build print canvas
    const printEl = document.getElementById('itinerary-print');
    printEl.innerHTML = buildPrintHTML(it);
    printEl.style.left = '-9999px';

    // Wait for fonts/images
    await new Promise(r => setTimeout(r, 600));
    setProgress(30, 'Merender halaman...');

    const canvas = await html2canvas(printEl, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      width: 794,
      windowWidth: 794,
      logging: false,
    });

    setProgress(70, 'Memproses file...');
    const filename = `itinerary-banyuwangi-${new Date().toISOString().slice(0,10)}`;

    if (format === 'jpg') {
      setProgress(85, 'Membuat JPG...');
      const link = document.createElement('a');
      link.download = filename + '.jpg';
      link.href = canvas.toDataURL('image/jpeg', 0.92);
      link.click();

    } else {
      setProgress(80, 'Membuat PDF...');
      const { jsPDF } = window.jspdf;
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pdfW = 210; // A4 mm
      const pdfH = (canvas.height / canvas.width) * pdfW;

      // Multi-page jika terlalu panjang
      const pageH = 297; // A4 height mm
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

      if (pdfH <= pageH) {
        pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
      } else {
        // Split into multiple pages
        const totalPages = Math.ceil(pdfH / pageH);
        for (let pg = 0; pg < totalPages; pg++) {
          if (pg > 0) pdf.addPage();
          const yOffset = -(pg * pageH);
          pdf.addImage(imgData, 'JPEG', 0, yOffset, pdfW, pdfH);
          setProgress(80 + (pg / totalPages) * 15, `Halaman ${pg+1}/${totalPages}...`);
        }
      }

      pdf.save(filename + '.pdf');
    }

    setProgress(100, 'Selesai! ✓');
    await new Promise(r => setTimeout(r, 800));
    modal.classList.remove('open');

  } catch(err) {
    console.error('Export error:', err);
    progressText.textContent = '⚠️ Gagal export. Coba lagi.';
    progressText.style.color = '#c0392b';
  } finally {
    btns.forEach(b => b.disabled = false);
    setTimeout(() => {
      progress.style.display = 'none';
      progressBar.style.width = '0%';
      progressText.style.color = '';
    }, 1200);
  }
}


// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function updateDestFeedback() {
  const matched   = DESTINATIONS.filter(d=>S.destinations.has(d.id));
  const terms     = S.destInput.split(',').map(s=>s.trim()).filter(Boolean);
  const unmatched = terms.filter(t => !isTermMatched(t));

  const tagsEl = document.getElementById('dest-tags-area');
  if (tagsEl) {
    if (matched.length > 0) {
      tagsEl.style.display = '';
      const tags = matched.map(d => `
        <div style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;
          background:#f0ede8;border:1px solid #111;
          border-radius:20px;margin:3px">
          <span>${d.emoji}</span>
          <span style="font-size:13px;font-weight:600;color:#c0392b">${esc(d.name)}</span>
          <span data-remove="${d.id}" style="cursor:pointer;color:#8b6f47;font-size:11px;
            margin-left:2px;padding:1px 3px;border-radius:50%">✕</span>
        </div>`).join('');
      document.getElementById('dest-tags-list').innerHTML = tags;
      document.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
        const id = el.dataset.remove;
        S.destinations.delete(id);
        const d = DESTINATIONS.find(x=>x.id===id);
        if (d) {
          const parts = S.destInput.split(',').map(s=>s.trim())
            .filter(s=>!s.toLowerCase().includes(d.name.toLowerCase().split(' ')[0]));
          S.destInput = parts.join(', ');
          const inp = document.getElementById('dest-input');
          if (inp) inp.value = S.destInput;
        }
        updateDestFeedback();
        updateNav();
      }));
    } else {
      tagsEl.style.display = 'none';
    }
  }

  const warnEl = document.getElementById('dest-warn-area');
  if (warnEl) {
    const show = unmatched.length > 0 && S.destInput;
    warnEl.style.display = show ? '' : 'none';
    if (show) {
      warnEl.innerHTML = `⚠️ Tidak ditemukan: <em>${unmatched.join(', ')}</em><br>
        <span style="color:#8b6f47">Coba: Kawah Ijen, TN Baluran, Red Island, Green Bay, TN Alas Purwo, Kawah Wurung…</span>`;
    }
  }

  const lblEl = document.getElementById('dest-suggest-label');
  if (lblEl) lblEl.textContent = matched.length > 0 ? 'Tambah lagi:' : 'Atau pilih dari sini:';

  const sugEl = document.getElementById('dest-suggestions');
  if (sugEl) {
    const suggestions = DESTINATIONS
      .filter(d=>!S.destinations.has(d.id))
      .slice(0,6)
      .map(d=>`<button data-suggest="${d.id}" style="background:#ede4d3;
        border:1px solid rgba(255,255,255,.1);color:#8b6f47;border-radius:0;
        padding:5px 11px;font-size:11px;cursor:pointer;font-family:inherit;
        transition:all .2s;white-space:nowrap">${d.emoji} ${d.name}</button>`).join('');
    sugEl.innerHTML = suggestions;
    sugEl.querySelectorAll('[data-suggest]').forEach(el => el.addEventListener('click', () => {
      const d = DESTINATIONS.find(x=>x.id===el.dataset.suggest);
      if (!d) return;
      S.destinations.add(d.id);
      S.destInput = S.destInput ? S.destInput.trimEnd().replace(/,$/,'')+', '+d.name : d.name;
      const inp = document.getElementById('dest-input');
      if (inp) inp.value = S.destInput;
      parseDestInput(S.destInput);
      updateDestFeedback();
      updateNav();
    }));
  }

  const clearBtn = document.getElementById('btn-clear-input');
  if (S.destInput && !clearBtn) {
    const wrap = document.getElementById('dest-input')?.parentElement;
    if (wrap) {
      const sp = document.createElement('span');
      sp.id = 'btn-clear-input';
      sp.style.cssText = 'position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#a89070;font-size:16px;padding:4px';
      sp.textContent = '✕';
      sp.addEventListener('click', () => {
        S.destInput = ''; S.destinations.clear();
        const inp = document.getElementById('dest-input');
        if (inp) { inp.value = ''; inp.focus(); }
        updateDestFeedback(); updateNav();
        const cb = document.getElementById('btn-clear-input');
        if (cb) cb.remove();
      });
      wrap.appendChild(sp);
    }
  } else if (!S.destInput && clearBtn) {
    clearBtn.remove();
  }
}

function updateHotelSuggestions() {
  const q = (S.penginapanSearchQuery||'').toLowerCase();
  const all = S.allPenginapan || [];
  const filtered = q.length >= 1
    ? all.filter(p => {
        const n = (p.nama||'').toLowerCase();
        return n.includes(q)||(p.kawasan||'').toLowerCase().includes(q)||(p.kategori||'').toLowerCase().includes(q);
      }).slice(0, 8)
    : S.penginapanOptions.slice(0, 5);

  const acEl = document.getElementById('hotel-autocomplete');
  if (acEl) {
    acEl.style.display = q.length >= 1 ? '' : 'none';
    acEl.innerHTML = filtered.length > 0
      ? filtered.map(p => {
          const sel = S.penginapanIds.has(p.id);
          const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):'';
          return `<div class="autocomplete-item${sel?' active':''}" data-penginapan-ac="${p.id}">
            <span style="font-size:20px">🏨</span>
            <div>
              <div class="autocomplete-item-name">${esc(p.nama)}${sel?' ✓':''}</div>
              <div class="autocomplete-item-sub">${p.kawasan||''}${distTxt?' · ~'+distTxt+' dari destinasi':''}${p.harga?' · Rp'+p.harga:''}</div>
            </div>
          </div>`;
        }).join('')
      : '<div class="autocomplete-empty">Tidak ditemukan — coba kata kunci lain</div>';
    acEl.querySelectorAll('[data-penginapan-ac]').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const id = el.dataset.penginapanAc;
        const hotelData = (S.allPenginapan||[]).find(p=>p.id===id) || (S.penginapanOptions||[]).find(p=>p.id===id) || null;
        if (S.penginapanIds.has(id)) {
          S.penginapanIds.delete(id);
          S.penginapanDataList = (S.penginapanDataList||[]).filter(p=>p.id!==id);
        } else {
          S.penginapanIds.add(id);
          if (hotelData) S.penginapanDataList = [...(S.penginapanDataList||[]), hotelData];
        }
        S.penginapan = S.penginapanIds.size > 0 ? 'firebase' : '';
        S.penginapanSearchQuery = '';
        const firstWithCoord = (S.penginapanDataList||[]).find(p=>p.lat&&p.lng);
        if (firstWithCoord) loadKulinerNearPenginapan(firstWithCoord.lat, firstWithCoord.lng);
        render();
      });
    });
  }

  const listEl = document.getElementById('hotel-suggestions');
  if (listEl) {
    listEl.innerHTML = filtered.map(p => {
      const sel = S.penginapanIds.has(p.id);
      const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):'';
      return `<div class="card-opt sm${sel?' selected':''}" data-penginapan-fb="${p.id}">
        <span class="card-opt-icon">🏨</span>
        <div style="flex:1;min-width:0">
          <div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.nama)}</div>
          <div class="card-opt-sub">${p.kawasan||''} ${distTxt?'· ~'+distTxt+' dari destinasi':''}</div>
        </div>
        <span class="card-opt-check">✓</span>
      </div>`;
    }).join('') || '<div style="font-size:12px;color:#a89070;padding:12px;text-align:center;font-style:italic">Tidak ditemukan</div>';
  }
}

function render() {
  const c = document.getElementById('content');
  try {
    switch (S.step) {
      case 0: c.innerHTML = renderStep0(); break;
      case 1: c.innerHTML = renderStep1(); break;
      case 2: c.innerHTML = renderStep2(); break;
      case 3:
        if (S.loading || S.error || S.itinerary) {
          c.innerHTML = renderStep3();
        } else {
          c.innerHTML = renderPlanningBoard();
          requestAnimationFrame(() => initSortableBoard());
        }
        break;
    }
  } catch(e) {
    console.error('render() error:', e);
    c.innerHTML = `<div style="padding:20px;color:#c0392b;font-size:13px">
      <b>⚠️ Error render:</b><br><pre style="white-space:pre-wrap;font-size:11px;color:#666666;margin-top:8px">${esc(e.message)}\n${esc(e.stack||'')}</pre>
    </div>`;
  }
  updateProgress();
  updateNav();
  attachListeners();
}

// ─── LISTENERS ───────────────────────────────────────────────────────────────
function attachListeners() {
  const c = document.getElementById('content');

  const destInput = document.getElementById('dest-input');
  if (destInput) {
    let _destTimer = null;
    destInput.addEventListener('input', () => {
      const val = destInput.value;
      const pos = destInput.selectionStart;
      S.destInput = val;
      const q = val.toLowerCase().trim();

      // Selalu parse langsung — trim sudah handle spasi
      parseDestInput(S.destInput);

      // Debounce render 120ms agar tidak re-render tiap keystroke
      clearTimeout(_destTimer);
      _destTimer = setTimeout(() => {
        if (q.length === 0) S._shuffledDests = null;
        render();
        // Restore cursor setelah re-render
        requestAnimationFrame(() => {
          const newInp = document.getElementById('dest-input');
          if (newInp) {
            newInp.focus();
            try { newInp.setSelectionRange(pos, pos); } catch(e){}
          }
        });
      }, 120);

      // Langsung update nav tanpa tunggu render
      updateDestFeedback();
      updateNav();
    });
  }
  const btnClear = document.getElementById('btn-clear-input');
  if (btnClear) btnClear.addEventListener('click', () => {
    S.destInput=''; S.destinations.clear(); S._shuffledDests = null;
    render();
  });
  c.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.remove;
    S.destinations.delete(id);
    const d = DESTINATIONS.find(x=>x.id===id);
    if (d) {
      // Match alias dan nama penuh, bukan hanya kata pertama
      const allNames = [d.name.toLowerCase(), ...(d.aliases||[]).map(a=>a.toLowerCase())];
      const parts = S.destInput.split(',').map(s=>s.trim()).filter(s => {
        const sl = s.toLowerCase();
        return !allNames.some(n => sl.includes(n.split(' ')[0]) || n.includes(sl));
      });
      S.destInput = parts.join(', ');
      const inp = document.getElementById('dest-input');
      if (inp) inp.value = S.destInput;
    }
    parseDestInput(S.destInput);
    render();
  }));
  c.querySelectorAll('[data-suggest]').forEach(el => el.addEventListener('click', () => {
    const d = DESTINATIONS.find(x=>x.id===el.dataset.suggest);
    if (!d) return;
    S.destinations.add(d.id);
    S.destInput = S.destInput ? S.destInput.trimEnd().replace(/,$/,'')+', '+d.name : d.name;
    const inp = document.getElementById('dest-input');
    if (inp) inp.value = S.destInput;
    parseDestInput(S.destInput);
    updateDestFeedback(); updateNav();
  }));

  const kulCust = document.getElementById('input-kuliner-custom');
  if (kulCust) kulCust.addEventListener('input', () => { S.kulinerCustom = kulCust.value; });

  const selKota = document.getElementById('sel-kota');
  if (selKota) selKota.addEventListener('change', () => { S.kotaAsal = selKota.value; S.kotaAsalCustom = ''; render(); });
  const inputKota = document.getElementById('input-kota-custom');
  if (inputKota) inputKota.addEventListener('input', () => { S.kotaAsalCustom = inputKota.value; updateNav(); });

  c.querySelectorAll('[data-transport]').forEach(el => el.addEventListener('click', () => {
    S.transport = el.dataset.transport;
    S.sewaLokal.clear();
    if (S.transport !== 'umum') S.subTransport = '';
    render(); // re-render agar inline style ${sel?...} update
  }));
  c.querySelectorAll('[data-sewa]').forEach(el => el.addEventListener('click', () => {
    const v = el.dataset.sewa;
    S.sewaLokal.has(v) ? S.sewaLokal.delete(v) : S.sewaLokal.add(v);
    render();
  }));
  c.querySelectorAll('[data-sub]').forEach(el => el.addEventListener('click', () => {
    S.subTransport = el.dataset.sub;
    render();
  }));

  const inpTiba = document.getElementById('input-waktu-tiba');
  if (inpTiba) inpTiba.addEventListener('change', () => { S.waktuTiba = inpTiba.value; });
  const inpPulang = document.getElementById('input-waktu-pulang');
  if (inpPulang) inpPulang.addEventListener('change', () => { S.waktuPulang = inpPulang.value; });

  const inpHotel = document.getElementById('input-penginapan-custom');
  if (inpHotel) inpHotel.addEventListener('input', () => {
    S.penginapanCustom = inpHotel.value;
    if (S.penginapanCustom.trim()) {
      S.penginapanIds.clear(); S.penginapanDataList = []; S.penginapan = 'custom';
      c.querySelectorAll('[data-penginapan-fb],[data-penginapan]').forEach(e => e.classList.remove('selected'));
    }
    updateNav();
  });

  const inpHotelSearch = document.getElementById('input-penginapan-search');
  if (inpHotelSearch) {
    inpHotelSearch.addEventListener('input', () => {
      S.penginapanSearchQuery = inpHotelSearch.value;
      updateHotelSuggestions();
      updateNav();
    });
    inpHotelSearch.addEventListener('focus', () => {
      if (!S.penginapanIds.size) updateHotelSuggestions();
    });
    inpHotelSearch.addEventListener('blur', () => {
      setTimeout(() => {
        const acEl = document.getElementById('hotel-autocomplete');
        if (acEl) acEl.style.display = 'none';
      }, 200);
    });
  }
  const btnClearHotel = document.getElementById('btn-clear-hotel');
  if (btnClearHotel) btnClearHotel.addEventListener('click', () => {
    S.penginapanSearchQuery = '';
    S.penginapanIds.clear(); S.penginapanDataList = []; S.penginapan = '';
    render();
  });
  const hotelList = document.getElementById('hotel-suggestions');
  if (hotelList) hotelList.addEventListener('click', e => {
    const card = e.target.closest('[data-penginapan-fb]');
    if (!card) return;
    const id = card.dataset.penginapanFb;
    const hotelData = (S.allPenginapan||[]).find(p=>p.id===id) || S.penginapanOptions.find(p=>p.id===id) || null;
    if (S.penginapanIds.has(id)) {
      S.penginapanIds.delete(id);
      S.penginapanDataList = (S.penginapanDataList||[]).filter(p=>p.id!==id);
    } else {
      S.penginapanIds.add(id);
      if (hotelData) S.penginapanDataList = [...(S.penginapanDataList||[]), hotelData];
    }
    S.penginapan = S.penginapanIds.size > 0 ? 'firebase' : '';
    const firstWithCoord = (S.penginapanDataList||[]).find(p=>p.lat&&p.lng);
    if (firstWithCoord) loadKulinerNearPenginapan(firstWithCoord.lat, firstWithCoord.lng);
    updateHotelSuggestions();
    updateNav();
  });

  c.querySelectorAll('[data-durasi]').forEach(el => el.addEventListener('click', () => {
    S.durasi = el.dataset.durasi;
    render();
  }));
  c.querySelectorAll('[data-gaya]').forEach(el => el.addEventListener('click', () => {
    S.gayaPerjalanan = el.dataset.gaya;
    render();
  }));
  c.querySelectorAll('[data-penginapan-fb]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.penginapanFb;
    const hotelData = S.penginapanOptions.find(p=>p.id===id) || (S.allPenginapan||[]).find(p=>p.id===id) || null;
    if (S.penginapanIds.has(id)) {
      S.penginapanIds.delete(id);
      S.penginapanDataList = (S.penginapanDataList||[]).filter(p=>p.id!==id);
    } else {
      S.penginapanIds.add(id);
      if (hotelData) S.penginapanDataList = [...(S.penginapanDataList||[]), hotelData];
    }
    S.penginapan = S.penginapanIds.size > 0 ? 'firebase' : '';
    const firstWithCoord = (S.penginapanDataList||[]).find(p=>p.lat&&p.lng);
    if (firstWithCoord) loadKulinerNearPenginapan(firstWithCoord.lat, firstWithCoord.lng);
    c.querySelectorAll('[data-penginapan-fb]').forEach(e => e.classList.toggle('selected', S.penginapanIds.has(e.dataset.penginapanFb)));
    c.querySelectorAll('[data-penginapan]').forEach(e => e.classList.remove('selected'));
    updateNav();
  }));
  c.querySelectorAll('[data-penginapan]').forEach(el => el.addEventListener('click', () => {
    S.penginapan = el.dataset.penginapan;
    S.penginapanIds.clear(); S.penginapanDataList = [];
    c.querySelectorAll('[data-penginapan]').forEach(e => e.classList.toggle('selected', e.dataset.penginapan===S.penginapan));
    c.querySelectorAll('[data-penginapan-fb]').forEach(e => e.classList.remove('selected'));
    updateNav();
  }));

  const minus = document.getElementById('btn-minus');
  const plus  = document.getElementById('btn-plus');
  const cntEl = document.getElementById('cnt-val');
  if (minus) minus.addEventListener('click', () => { S.jumlahOrang = Math.max(1, S.jumlahOrang-1); if (cntEl) cntEl.textContent = S.jumlahOrang; });
  if (plus)  plus.addEventListener('click',  () => { S.jumlahOrang = Math.min(20, S.jumlahOrang+1); if (cntEl) cntEl.textContent = S.jumlahOrang; });

  // Day tabs
  c.querySelectorAll('[data-day-tab]').forEach(el => el.addEventListener('click', () => {
    _activeDay = parseInt(el.dataset.dayTab);
    render();
  }));

  // Category filter
  c.querySelectorAll('[data-cat]').forEach(el => el.addEventListener('click', () => {
    S._catFilter = el.dataset.cat;
    render();
  }));

  // Dest cards
  c.querySelectorAll('[data-dest-card]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.destCard;
    if (S.destinations.has(id)) S.destinations.delete(id);
    else S.destinations.add(id);
    render();
    updateNav();
  }));

  const btnReset = document.getElementById('btn-reset-plan');
  if (btnReset) btnReset.addEventListener('click', () => { initPlanDays(); render(); });

  const retry   = document.getElementById('btn-retry');
  const restart = document.getElementById('btn-restart');
  const exportBtn = document.getElementById('btn-export');
  if (exportBtn) exportBtn.addEventListener('click', () => {
    document.getElementById('export-modal').classList.add('open');
  });
  const btnExportPdf = document.getElementById('btn-export-pdf');
  const btnExportJpg = document.getElementById('btn-export-jpg');
  if (btnExportPdf) btnExportPdf.addEventListener('click', () => exportItinerary('pdf'));
  if (btnExportJpg) btnExportJpg.addEventListener('click', () => exportItinerary('jpg'));
  if (retry)   retry.addEventListener('click', () => { S.error=null; S.loading=true; render(); generate(); });
  if (restart) restart.addEventListener('click', () => {
    Object.assign(S, {
      step:0, kotaAsal:'', kotaAsalCustom:'', destInput:'',
      transport:'', subTransport:'', durasi:'', gayaPerjalanan:'',
      penginapan:'', penginapanCustom:'', kulinerCustom:'', jumlahOrang:2,
      planDays:[], planBacklog:[],
      loading:false, itinerary:null, error:null,
    });
    S.destinations.clear();
    S.sewaLokal.clear();
    S.penginapanIds.clear();
    S.penginapanDataList = [];
    render();
  });
}

// ─── STATIC NAV LISTENERS ────────────────────────────────────────────────────
document.getElementById('btn-back').addEventListener('click', () => { S.step--; render(); });
document.getElementById('btn-next').addEventListener('click', async () => {
  if (S.step===3) {
    readPlanFromDOM();
    S.loading=true; S.itinerary=null; S.error=null;
    render();
    generate();
  } else if (S.step===2) {
    S.step=3;
    initPlanDays();
    render();
  } else if (S.step===1) {
    S.step=2;
    render();
    await loadPenginapanOptions();
    render();
  } else {
    S.step++;
    render();
  }
});
</script>

// ─── TIME HELPERS ─────────────────────────────────────────────────────────────
function addMin(t, m) {
  const [h,mn] = t.split(':').map(Number);
  const tot = h*60+mn+m;
  return `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;
}
function durLabel(m) {
  const h=Math.floor(m/60), mn=m%60;
  return h&&mn?`${h} jam ${mn} menit`:h?`${h} jam`:`${mn} menit`;
}
function pickRand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function parseDurasi(v) {
  return {'1D':[1,0],'2D1N':[2,1],'3D2N':[3,2],'4D3N':[4,3],'5D4N':[5,4]}[v]||[2,1];
}
function timeToMin(t) {
  if (!t || typeof t !== 'string') return 9999;
  const [h,m] = t.split(':').map(Number);
  return (h||0)*60+(m||0);
}
function sortActivities(acts) {
  return [...acts].sort((a,b) => timeToMin(a.time)-timeToMin(b.time));
}

// ─── TRANSPORT HELPERS ────────────────────────────────────────────────────────
function hasMotor()  { return S.transport==='pribadi_motor' || S.sewaLokal.has('motor'); }
function hasMobil()  { return S.transport==='pribadi_mobil' || S.sewaLokal.has('mobil_driver'); }
function hasOjek()   { return S.sewaLokal.has('ojek'); }
function getTransportLabel() {
  if (hasMotor()) return 'motor';
  if (hasMobil()) return 'mobil';
  if (hasOjek())  return 'ojek online';
  return 'kendaraan';
}
function tipsKembaliDaratan() {
  if (hasMotor() || hasMobil()) return 'Kendaraanmu sudah standby di parkiran GWD. Perjalanan balik ke penginapan ±45 menit.';
  if (hasOjek())  return 'Grab/Gojek terbatas di area GWD — sebaiknya pesan ojek pangkalan atau arrange jemputan H-1.';
  return 'Transportasi umum tidak tersedia di area GWD. Pastikan sudah arrange kendaraan pulang dari H-1.';
}
function travelMinutes(coord1, coord2) {
  if (!coord1 || !coord2) return 20;
  const dist = haversineKm(coord1.lat, coord1.lng, coord2.lat, coord2.lng);
  const speed = hasMotor() ? 35 : hasMobil() ? 40 : 35;
  return Math.round((dist/speed)*60)+10;
}

<script>
// ─── KULINER HELPERS ──────────────────────────────────────────────────────────
function getKulinerNear(lat, lng, radiusKm=1, maxResult=5) {
  if (!lat || !lng) return [];
  const cache = window._placesCache || [];
  return cache
    .filter(d => {
      const t = ((d.type||'')+(d.kategori||'')).toLowerCase();
      return t.includes('kuliner')||t.includes('cafe')||t.includes('kafe')||
             t.includes('restoran')||t.includes('warung')||t.includes('rumah makan')||
             t.includes('seafood')||t.includes('makan')||t.includes('kedai')||
             t.includes('depot')||t.includes('lesehan')||t.includes('kopi');
    })
    .filter(d => d.lat && d.lng && d.nama)
    .map(d => ({...d, dist: haversineKm(lat, lng, d.lat, d.lng)}))
    .filter(d => d.dist <= radiusKm)
    .sort((a,b)=>a.dist-b.dist)
    .slice(0, maxResult);
}

function kulinerActivity(k, waktu, labelWaktu, fallbackZone) {
  const timeMap = { pagi:'07:00', siang:'12:30', malam:'19:00' };
  const distTxt = k.dist<1 ? `${Math.round(k.dist*1000)}m dari lokasi` : `${k.dist.toFixed(1)}km dari lokasi`;
  return {
    time: timeMap[waktu]||timeMap.siang,
    name: `${labelWaktu} — ${k.nama}`,
    location: k.nama+(k.kawasan?`, ${k.kawasan}`:''),
    duration: '1 jam',
    description: `${labelWaktu} di ${k.nama}. ${k.catatan||k.menu_andalan||k.kategori||''}`.trim(),
    tips: `~${distTxt}${k.harga?' · Rp'+k.harga:''}`,
    estimatedCost: k.harga ? parseInt(String(k.harga).replace(/\D/g,''))||25000 : 25000,
    type: 'makan',
  };
}

function getDestCoords(destOrId) {
  const id = typeof destOrId==='string' ? destOrId : destOrId?.id;
  const d  = typeof destOrId==='object' ? destOrId : DESTINATIONS.find(x=>x.id===id);
  if (d?.lat && d?.lng) return {lat:d.lat, lng:d.lng};
  const ext = DEST_EXT[id];
  if (ext?.lat && ext?.lng) return {lat:ext.lat, lng:ext.lng};
  return null;
}
function midpoint(c1, c2) {
  if (!c1||!c2) return c1||c2||null;
  return {lat:(c1.lat+c2.lat)/2, lng:(c1.lng+c2.lng)/2};
}

function buildMakan(waktu, zone, overrideTime, refLat, refLng) {
  const timeMap  = { pagi:'07:00', siang:'12:30', malam:'19:00' };
  const labelMap = { pagi:'Sarapan', siang:'Makan Siang', malam:'Makan Malam' };
  const finalTime = overrideTime || timeMap[waktu];
  const label = labelMap[waktu];

  if (S.kulinerCustom && S.kulinerCustom.trim()) {
    return { time:finalTime, name:`${label} — ${S.kulinerCustom.trim()}`,
      location:S.kulinerCustom.trim(), duration:'1 jam',
      description:`${label} di ${S.kulinerCustom.trim()} — pilihan kuliner incaran kamu.`,
      tips:'Sesuaikan dengan jam operasional.', estimatedCost:30000, type:'makan' };
  }

  const hotelC = getHotelCoords();
  const coords = (refLat && refLng) ? {lat:refLat, lng:refLng} : hotelC;
  if (!window._usedKuliner) window._usedKuliner = new Set();

  const nearby = getKulinerNear(coords.lat, coords.lng, 1, 5);
  if (nearby.length > 0) {
    const fresh = nearby.filter(k => !window._usedKuliner.has(k.id||k.nama));
    const k = fresh.length > 0 ? fresh[0] : nearby[0];
    window._usedKuliner.add(k.id||k.nama);
    return kulinerActivity(k, waktu, label, zone);
  }
  const nearby3 = getKulinerNear(coords.lat, coords.lng, 3, 5);
  if (nearby3.length > 0) {
    const fresh = nearby3.filter(k => !window._usedKuliner.has(k.id||k.nama));
    const k = fresh.length > 0 ? fresh[0] : nearby3[0];
    window._usedKuliner.add(k.id||k.nama);
    return kulinerActivity(k, waktu, label, zone);
  }

  const genDesc = {
    pagi:  'Cari warung sarapan lokal — Sego Tempong, nasi pecel, atau lontong sayur khas Banyuwangi.',
    siang: 'Cari warung makan terdekat. Menu andalan: Rujak Soto, Rawon, atau Pecel Pitik.',
    malam: 'Cari warung makan malam di sekitar penginapan. Banyak pilihan seafood dan warung kaki lima.',
  };
  return {
    time:finalTime, name:`${label} — Warung Lokal Sekitar Lokasi`,
    location:'Warung terdekat dari lokasi', duration:'1 jam',
    description:genDesc[waktu],
    tips:'Tanya rekomendasi ke warga lokal atau penginapan.',
    estimatedCost: waktu==='pagi'?20000:waktu==='siang'?25000:30000,
    type:'makan',
  };
}

function getHotelCoords() {
  const h = (S.penginapanDataList||[]).find(p=>p.lat&&p.lng);
  if (h) return {lat:h.lat, lng:h.lng};
  return BWI_COORDS.pusat;
}
