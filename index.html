<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wandr — Buat Itinerary Banyuwangi</title>
  <meta name="description" content="Generate itinerary perjalanan Banyuwangi secara otomatis dengan AI. Masukkan destinasi, pilih kendaraan dan durasi, itinerary langsung jadi.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            beige: '#F4EFEA',      // Latar luar
            appBg: '#FAFAFA',      // Latar dalam app
            dark: '#1C1C1E',       // Hitam elegan
            grayLight: '#F3F4F6',  // Abu-abu terang
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* ── RESET & BASE ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { background-color: #E5DFD3; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { display: none; }
    
    /* ── KELAS CSS KHUSUS YANG DIMANIPULASI OLEH JAVASCRIPT (JANGAN DIHAPUS) ── */
    /* Karena JS menggunakan `className = '...'`, kita harus mempertahankan nama kelas ini */
    
    .step-labels { display: flex; justify-content: space-between; margin-bottom: 12px; padding: 0 4px; }
    .step-label { font-size: 10px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.3s; }
    .step-label.active { color: #1C1C1E; font-weight: 800; }
    .step-label.done   { color: #1C1C1E; opacity: 0.5; }
    
    .progress-bar { height: 4px; background: #E5E7EB; border-radius: 4px; overflow: hidden; margin-bottom: 30px; }
    .progress-fill { height: 100%; background: #1C1C1E; border-radius: 4px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

    .btn-pri {
      background: #1C1C1E; color: white; border: none; border-radius: 9999px; padding: 14px 28px;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      display: inline-flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap;
    }
    .btn-pri:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .btn-pri:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none; }
    
    .btn-ghost {
      background: transparent; color: #6B7280; border: none; padding: 14px 0;
      font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: color 0.2s;
    }
    .btn-ghost:hover { color: #1C1C1E; }
    .btn-ghost.hidden { visibility: hidden; display: none !important; }

    /* ── ANIMASI & DRAG AND DROP ── */
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .sortable-chosen { background: #F3F4F6 !important; border-color: #1C1C1E !important; transform: scale(1.02); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .sortable-ghost { opacity: 0.3; border: 2px dashed #1C1C1E !important; background: transparent !important; }

    /* Fix input focus outline & RTL bug in Android */
    input, select, textarea { direction: ltr !important; text-align: left !important; outline: none !important; }
    input:focus, select:focus, textarea:focus { border-color: #1C1C1E !important; ring: 1px !important; }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen font-sans text-dark">

<div id="modalLogin" style="display:none;position:fixed;inset:0;background:rgba(28, 28, 30, 0.4);backdrop-filter:blur(4px);z-index:9999;align-items:center;justify-content:center;padding:24px;">
  <div class="bg-white rounded-[30px] w-full max-w-[360px] p-8 shadow-2xl">
    <div class="flex justify-between items-start mb-8">
      <div>
        <div class="font-serif text-3xl font-bold text-dark mb-1">Login Admin</div>
        <div class="text-xs font-semibold text-gray-400">Wandr · Banyuwangi</div>
      </div>
      <button id="closeLogin" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full text-gray-500 font-bold hover:bg-gray-200">✕</button>
    </div>
    <div class="mb-5">
      <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Email</label>
      <input type="email" id="loginEmail" class="w-full bg-grayLight border-2 border-transparent rounded-2xl px-4 py-3.5 text-sm font-medium transition focus:border-dark" placeholder="admin@email.com">
    </div>
    <div class="mb-8">
      <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Password</label>
      <input type="password" id="loginPass" class="w-full bg-grayLight border-2 border-transparent rounded-2xl px-4 py-3.5 text-sm font-medium transition focus:border-dark" placeholder="••••••••">
    </div>
    <button id="btnDoLogin" class="w-full bg-dark text-white rounded-full py-4 font-bold text-sm shadow-xl hover:bg-black transition">Masuk Workspace</button>
    <p id="loginErr" style="display:none;" class="text-xs font-bold text-red-500 mt-4 text-center"></p>
  </div>
</div>

<div class="user-menu" id="user-menu" style="position:absolute;top:80px;right:24px;z-index:100;background:white;border-radius:24px;padding:12px;box-shadow:0 10px 40px rgba(0,0,0,0.08);display:none;border:1px solid #F3F4F6;width:200px;">
  <div class="px-4 py-2 mb-2 border-b border-gray-50">
    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Logged in as</div>
    <div id="menu-username" class="font-bold text-sm text-dark truncate mt-1">Admin</div>
  </div>
  <div onclick="window.location.href='admin.html'" class="px-4 py-3 text-sm font-semibold text-dark hover:bg-grayLight rounded-xl cursor-pointer transition flex items-center gap-3">
    <span>📊</span> Dashboard
  </div>
  <div id="menu-logout" class="px-4 py-3 text-sm font-semibold text-red-500 hover:bg-red-50 rounded-xl cursor-pointer transition mt-1 flex items-center gap-3">
    <span>🚪</span> Sign Out
  </div>
</div>

<div id="app" class="w-full max-w-[414px] bg-appBg min-h-screen sm:min-h-[850px] sm:h-[850px] sm:rounded-[40px] sm:shadow-2xl overflow-x-hidden relative flex flex-col mx-auto">

  <div id="header" class="pt-12 pb-6 px-6 flex justify-between items-center bg-appBg z-10 relative">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-white border border-gray-100 rounded-[14px] flex items-center justify-center text-xl shadow-sm">🗺️</div>
      <div>
        <div class="font-serif text-2xl font-bold text-dark leading-none">Wandr</div>
        <div class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-1">Banyuwangi</div>
      </div>
    </div>
    <button id="btnLogin" title="Login admin" class="w-10 h-10 flex items-center justify-center bg-white border border-gray-100 rounded-full text-lg shadow-sm hover:bg-gray-50 transition">
      🔐
    </button>
  </div>

  <div id="progress-area" class="px-6">
    <div class="step-labels">
      <span class="step-label active" data-i="0">Destinasi</span>
      <span class="step-label"        data-i="1">Transport</span>
      <span class="step-label"        data-i="2">Preferensi</span>
      <span class="step-label"        data-i="3">Susun</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="content" class="flex-1 px-6 pb-28 overflow-y-auto no-scrollbar"></div>

  <div id="nav" class="absolute bottom-0 left-0 right-0 px-6 py-5 bg-white/80 backdrop-blur-md border-t border-gray-100 flex justify-between items-center sm:rounded-b-[40px] z-20">
    <button class="btn-ghost hidden" id="btn-back">← Kembali</button>
    <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest" id="dest-count"></span>
    <button class="btn-pri" id="btn-next" disabled>Lanjut →</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ── FIREBASE CONFIG ──
let db = null, auth = null;
try {
  if (typeof firebase !== 'undefined') {
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey:            'AIzaSyCHWWjnxX5-Fk9-gRTZVwyC3WDDfnLPh_s',
        authDomain:        'banyuwangi-db.firebaseapp.com',
        projectId:         'banyuwangi-db',
        storageBucket:     'banyuwangi-db.firebasestorage.app',
        messagingSenderId: '973498690850',
        appId:             '1:973498690850:web:b2d67373174542167a497b',
      });
    }
    db   = firebase.firestore();
    auth = firebase.auth();
  }
} catch(e) { db = null; auth = null; }

// ── AUTH LOGIC ──
let isAdmin = false;
function setAdmin(val, email) {
  isAdmin = val;
  const btn = document.getElementById('btnLogin');
  if (val) {
    btn.textContent = '🔓';
    btn.classList.replace('bg-white', 'bg-dark');
    btn.classList.replace('text-gray-500', 'text-white');
    document.getElementById('menu-username').textContent = email || 'Admin';
  } else {
    btn.textContent = '🔐';
    btn.classList.replace('bg-dark', 'bg-white');
    btn.classList.replace('text-white', 'text-gray-500');
  }
}

document.getElementById('btnLogin').addEventListener('click', (e) => {
  e.stopPropagation();
  if (isAdmin) { document.getElementById('user-menu').style.display = document.getElementById('user-menu').style.display === 'block' ? 'none' : 'block'; } 
  else { document.getElementById('modalLogin').style.display = 'flex'; setTimeout(() => document.getElementById('loginEmail').focus(), 100); }
});
document.getElementById('closeLogin').addEventListener('click', () => { document.getElementById('modalLogin').style.display = 'none'; });
document.getElementById('btnDoLogin').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim(), pass = document.getElementById('loginPass').value, errEl = document.getElementById('loginErr'), btn = document.getElementById('btnDoLogin');
  errEl.style.display = 'none'; if (!email || !pass) { errEl.textContent = 'Required'; errEl.style.display = 'block'; return; }
  btn.textContent = 'Memproses...'; btn.disabled = true;
  try {
    if (auth) { await auth.signInWithEmailAndPassword(email, pass); document.getElementById('modalLogin').style.display = 'none'; } 
    else { setAdmin(true, email); document.getElementById('modalLogin').style.display = 'none'; }
  } catch(e) { errEl.textContent = e.message; errEl.style.display = 'block'; } 
  finally { btn.textContent = 'Masuk Workspace'; btn.disabled = false; }
});
document.addEventListener('click', () => { const m = document.getElementById('user-menu'); if(m) m.style.display='none'; });
document.getElementById('menu-logout').addEventListener('click', async () => { if(auth) await auth.signOut(); else setAdmin(false); });
if (auth) { auth.onAuthStateChanged(user => { if (user) setAdmin(true, user.email || user.displayName); else setAdmin(false); }); }

// ── APP LOGIC & DATA ──
const KAWASAN_ZONE = { 'Licin':'barat','Wongsorejo':'utara','Pesanggaran':'selatan','Pusat Kota':'kota' }; 
function mapToWandr(id, d) {
  if (d.type !== 'wisata' || d.status === 'pending') return null;
  const nama = (d.nama||'').toLowerCase(), kat = (d.kategori||'').toLowerCase();
  let cat = 'alam'; if(kat.includes('pantai')||kat.includes('teluk')) cat='pantai'; if(kat.includes('snork')) cat='diving'; if(kat.includes('kota')) cat='budaya';
  const emojiBase = {alam:'🌿',pantai:'🌊',diving:'🤿',budaya:'🏛️'}, emojiOvr = {'ijen':'🌋','air terjun':'💧','sukamade':'🐢','red island':'🏄'};
  let emoji = emojiBase[cat]||'🗺️'; for (const [k,v] of Object.entries(emojiOvr)) { if(nama.includes(k)){emoji=v;break;} }
  const isIjen=nama.includes('ijen'), isSunset=nama.includes('pulau merah'), isNight=nama.includes('sukamade'), isCity=nama.includes('city');
  let bestTime='pagi'; if(isSunset) bestTime='sore'; if(isNight) bestTime='malam'; if(isIjen) bestTime='dini hari';
  let zone = KAWASAN_ZONE[d.kawasan] || 'kota';
  const namaWords = nama.split(' ').filter(w => w.length > 2); const autoAliases = new Set([nama]);
  return { id, name:d.nama, cat, emoji, desc:d.catatan||d.kategori||'', bestTime, zone, tiket:d.htm||0, dur: isIjen?300:180, isIjen, isSunset, isNight, isCity, aliases: [...autoAliases], tips:d.catatan||'', lat:d.lat||null, lng:d.lng||null };
}

let DESTINATIONS = [];
const DESTINATIONS_FALLBACK = [
  { id:'ijen', name:'Kawah Ijen', cat:'alam', emoji:'🌋', desc:'Blue fire', bestTime:'dini hari', zone:'barat', tiket:5000, dur:300, isIjen:true, aliases:['ijen','kawah ijen'] },
  { id:'baluran', name:'TN Baluran', cat:'alam', emoji:'🦌', desc:'Afrika van Java', bestTime:'pagi', zone:'utara', tiket:15000, dur:240, aliases:['baluran'] },
  { id:'red_island', name:'Red Island', cat:'pantai', emoji:'🏄', desc:'Sunset', bestTime:'sore', zone:'selatan', tiket:10000, dur:180, isSunset:true, aliases:['red island'] },
];

function showLoadingDest() {
  document.getElementById('content').innerHTML = `<div class="text-center py-20"><div class="text-5xl mb-6" style="animation: float 3s ease-in-out infinite;">🌿</div><div class="font-serif text-2xl font-bold text-dark mb-2">Memuat data...</div></div>`;
  document.getElementById('nav').style.display='none'; document.getElementById('progress-area').style.display='none';
}

async function loadDestinations() {
  showLoadingDest();
  if (!db) { DESTINATIONS = DESTINATIONS_FALLBACK; return; }
  try {
    const snap = await db.collection('places').get(); window._placesCache = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    const loaded = snap.docs.map(doc => mapToWandr(doc.id, doc.data())).filter(Boolean);
    DESTINATIONS = loaded.length > 0 ? loaded : DESTINATIONS_FALLBACK;
  } catch(e) { DESTINATIONS = DESTINATIONS_FALLBACK; }
}

const KOTA = ['Surabaya','Jakarta','Bali','Malang','Lainnya'];
const DURASI = [ { v:'1D', label:'1 Hari', sub:'One Day' }, { v:'2D1N', label:'2H 1M', sub:'Weekend' }, { v:'3D2N', label:'3H 2M', sub:'Long Weekend' } ];
const PENGINAPAN = [ { v:'hotel45', label:'Hotel 4-5', range:'400K+', emoji:'🏨' }, { v:'hotel12', label:'Budget Hotel', range:'100K+', emoji:'🏪' } ];
const ACT_STYLE = {
  aktivitas:  { color:'text-green-600', bg:'bg-green-50',  icon:'🎯' },
  makan:      { color:'text-orange-600', bg:'bg-orange-50',  icon:'🍽️' },
  transport:  { color:'text-blue-600', bg:'bg-blue-50', icon:'🚌' },
  penginapan: { color:'text-purple-600', bg:'bg-purple-50', icon:'🏨' },
  istirahat:  { color:'text-gray-600', bg:'bg-gray-100', icon:'☕' },
};

const S = { step: 0, destinations: new Set(), destInput: '', kotaAsal: '', kotaAsalCustom: '', transport: '', subTransport: '', waktuTiba: '10:00', waktuPulang: '13:00', sewaLokal: new Set(), durasi: '', gayaPerjalanan: '', penginapan: '', penginapanId: '', penginapanData: null, penginapanCustom: '', penginapanSearchQuery: '', penginapanOptions: [], allPenginapan: [], kulinerOptions: [], kulinerCustom: '', jumlahOrang: 2, planDays: [], planBacklog: [], planArrivalExtras: [], loading: false, itinerary: null, error: null };
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = n => n>=1000?Math.round(n/1000)+'K':String(n);

function updateProgress() {
  document.getElementById('progress-fill').style.width = (S.step >= 4 ? 100 : (S.step / 4) * 100) + '%';
  document.querySelectorAll('.step-label').forEach(el => el.className = 'step-label' + (+el.dataset.i===S.step?' active': +el.dataset.i<S.step?' done':''));
  document.getElementById('progress-area').style.display = (S.step===3 && (S.loading || S.itinerary)) ? 'none' : '';
}

function updateNav() {
  const nav = document.getElementById('nav'); if (S.step===3 && (S.loading || S.itinerary)) { nav.style.display='none'; return; } nav.style.display = 'flex';
  document.getElementById('btn-back').className = 'btn-ghost' + (S.step===0?' hidden':'');
  document.getElementById('dest-count').textContent = S.destinations.size>0 ? S.destinations.size+' DESTINASI' : '';
  document.getElementById('btn-next').disabled = !canNext(); document.getElementById('btn-next').textContent = S.step===3 ? '✨ Generate' : 'Lanjut →';
}

function canNext() {
  if (S.step===0) return S.destinations.size > 0;
  if (S.step===1) return S.kotaAsal && S.transport && (S.transport==='umum' ? !!S.subTransport : true);
  if (S.step===2) return S.durasi && S.gayaPerjalanan && (S.penginapan || S.penginapanId || S.penginapanCustom.trim());
  return true;
}

function matchScore(term, d) { return d.name.toLowerCase().includes(term.toLowerCase().trim()) ? 100 : 0; }
function parseDestInput(text) { S.destinations.clear(); text.split(',').map(s=>s.trim()).filter(Boolean).forEach(t => { DESTINATIONS.forEach(d => { if(matchScore(t, d) > 50) S.destinations.add(d.id); }); }); }

// ── RENDER ENGINE DENGAN KELAS TAILWIND ──
function renderStep0() {
  const matched = DESTINATIONS.filter(d=>S.destinations.has(d.id));
  const tags = matched.map(d => `<div class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-full m-1 shadow-sm"><span class="text-lg">${d.emoji}</span><span class="text-xs font-bold text-dark">${esc(d.name)}</span><span data-remove="${d.id}" class="cursor-pointer text-gray-400 hover:text-red-500 text-xs ml-1 font-bold">✕</span></div>`).join('');
  const suggestions = DESTINATIONS.filter(d=>!S.destinations.has(d.id)).slice(0,6).map(d=>`<button data-suggest="${d.id}" class="bg-transparent border border-gray-200 text-gray-500 hover:bg-white hover:text-dark hover:border-gray-300 rounded-full px-4 py-2 text-xs font-bold cursor-pointer m-1 transition-colors">${d.emoji} ${d.name}</button>`).join('');

  return `
    <h2 class="font-serif text-3xl font-bold text-dark mb-2 leading-tight">Ke Banyuwangi,<br>mau kemana?</h2>
    <p class="text-sm font-medium text-gray-400 mb-8">Ketik nama destinasi impianmu</p>
    
    <div class="mb-6 relative">
     <input type="text" id="dest-input" dir="ltr" lang="en" autocomplete="off" spellcheck="false" placeholder="Kawah Ijen, Baluran..." value="${esc(S.destInput)}" class="w-full bg-white border-2 border-transparent rounded-2xl px-5 py-4 text-sm font-medium shadow-sm transition focus:border-dark placeholder-gray-300">
    </div>
    
    <div id="dest-tags-area" style="${matched.length>0?'':'display:none'};" class="mb-8">
      <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">✓ Terpilih</div>
      <div id="dest-tags-list" class="flex flex-wrap -ml-1">${tags}</div>
    </div>
    
    <div class="mb-8">
      <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Saran Destinasi</div>
      <div id="dest-suggestions" class="flex flex-wrap -ml-1">${suggestions}</div>
    </div>`;
}

function renderStep1() {
  const transCards = [ { v:'pribadi_motor', l:'Kendaraan Pribadi', e:'🚗' }, { v:'umum', l:'Transportasi Umum', e:'🚆' } ].map(t => `<div class="flex items-center gap-4 p-4 rounded-2xl cursor-pointer transition-all border-2 ${S.transport===t.v ? 'border-dark bg-white shadow-md' : 'border-transparent bg-white shadow-sm'} mb-3" data-transport="${t.v}"><span class="text-2xl">${t.e}</span><div class="font-bold text-sm text-dark flex-1">${t.l}</div>${S.transport===t.v ? '<span class="text-dark font-bold text-lg">✓</span>' : ''}</div>`).join('');
  return `
    <h2 class="font-serif text-3xl font-bold text-dark mb-2 leading-tight">Naik apa?</h2>
    <p class="text-sm font-medium text-gray-400 mb-8">Pilih kota asal dan kendaraan</p>
    
    <div class="mb-6">
      <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Kota Asal</label>
      <div class="relative">
        <select id="sel-kota" class="w-full bg-white border-2 border-transparent rounded-2xl px-5 py-4 text-sm font-medium shadow-sm transition focus:border-dark appearance-none">
          <option value="">Pilih kota...</option>${KOTA.map(k=>`<option value="${k}"${S.kotaAsal===k?' selected':''}>${k}</option>`).join('')}
        </select>
        <span class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 font-bold pointer-events-none">▾</span>
      </div>
    </div>
    
    <div class="mb-4">
      <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Kendaraan ke Banyuwangi</label>
      <div>${transCards}</div>
    </div>
    
    <div class="overflow-hidden transition-all duration-300 ${S.transport==='umum'?'max-h-[500px] opacity-100 mt-2':'max-h-0 opacity-0'}">
      <div class="bg-grayLight p-5 rounded-2xl border border-gray-100">
        <div class="text-xs font-bold text-dark mb-4">Pilih Transportasi Umum</div>
        <div class="flex gap-3">
          ${[{v:'kereta',l:'Kereta Api',e:'🚂'},{v:'pesawat',l:'Pesawat',e:'✈️'}].map(t=>`
            <div class="flex-1 flex flex-col items-center gap-2 p-4 rounded-xl cursor-pointer transition-all border-2 ${S.subTransport===t.v ? 'border-dark bg-white shadow-sm' : 'border-transparent bg-white shadow-sm opacity-70'}" data-sub="${t.v}">
              <span class="text-3xl">${t.e}</span><div class="text-xs font-bold text-dark">${t.l}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>`;
}

function renderStep2() {
  const durasiBtns = DURASI.map(d => `<div class="flex-1 text-center py-3 rounded-xl cursor-pointer transition-all border-2 ${S.durasi===d.v ? 'bg-dark text-white border-dark font-bold' : 'bg-white text-gray-500 border-transparent font-semibold shadow-sm'}" data-durasi="${d.v}"><div class="text-sm">${d.label}</div></div>`).join('');
  const gayaCards = [{ v:'santai', e:'🌴', l:'Santai' }, { v:'eksplorasi', e:'⚡', l:'Eksplorasi' }].map(g => `<div class="flex-1 flex flex-col items-center py-5 rounded-2xl cursor-pointer transition-all border-2 ${S.gayaPerjalanan===g.v ? 'border-dark bg-white shadow-md' : 'border-transparent bg-white shadow-sm opacity-80'}" data-gaya="${g.v}"><div class="text-3xl mb-3">${g.e}</div><div class="font-bold text-sm text-dark">${g.l}</div></div>`).join('');
  return `
    <h2 class="font-serif text-3xl font-bold text-dark mb-2 leading-tight">Preferensi</h2>
    <p class="text-sm font-medium text-gray-400 mb-8">Sesuaikan gaya perjalananmu</p>
    
    <div class="mb-6">
      <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Durasi</label>
      <div class="flex gap-3">${durasiBtns}</div>
    </div>
    
    <div class="mb-6">
      <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Gaya Liburan</label>
      <div class="flex gap-3">${gayaCards}</div>
    </div>
    
    <div class="mb-6">
      <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Jumlah Orang</label>
      <div class="inline-flex items-center gap-4 bg-white px-3 py-2 rounded-2xl shadow-sm border border-gray-50">
        <button id="btn-minus" class="w-10 h-10 flex items-center justify-center bg-grayLight text-dark rounded-xl font-bold text-xl hover:bg-gray-200 transition">−</button>
        <span id="cnt-val" class="font-serif text-2xl font-bold w-6 text-center">${S.jumlahOrang}</span>
        <button id="btn-plus" class="w-10 h-10 flex items-center justify-center bg-grayLight text-dark rounded-xl font-bold text-xl hover:bg-gray-200 transition">+</button>
        <span class="text-xs font-bold text-gray-400 pr-2 uppercase tracking-widest">Orang</span>
      </div>
    </div>
    
    <div class="mb-8">
      <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 ml-1">Nama Penginapan (Opsional)</label>
      <input type="text" id="input-penginapan-custom" class="w-full bg-white border-2 border-transparent rounded-2xl px-5 py-4 text-sm font-medium shadow-sm transition focus:border-dark placeholder-gray-300" placeholder="Ketik nama hotel..." value="${esc(S.penginapanCustom)}">
    </div>`;
}

function renderPlanningBoard() {
  if (!S.planDays || S.planDays.length === 0) { S.planDays = [['ijen'], ['baluran']]; } // Mock initialization
  const actDayHTML = S.planDays.map((ids, i) => {
    return `
    <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden mb-4">
      <div class="flex items-center gap-3 px-5 py-4 bg-grayLight/50 border-b border-gray-100">
        <span class="w-7 h-7 bg-dark text-white rounded-lg flex items-center justify-center text-xs font-bold">${i+1}</span>
        <span class="font-bold text-sm text-dark">Hari ${i+1}</span>
      </div>
      <div class="plan-col-body p-3 min-h-[80px] flex flex-col gap-2" id="bucket-day${i}">
        ${ids.map(id => { 
          const d = DESTINATIONS.find(x=>x.id===id); 
          return d ? `
          <div class="drag-item flex items-center gap-3 p-3 bg-white border border-gray-200 rounded-2xl cursor-grab transition-all hover:shadow-md" data-id="${id}">
            <span class="text-gray-300 hover:text-gray-500 font-bold">≡</span>
            <span class="text-2xl">${d.emoji}</span>
            <div class="font-bold text-sm text-dark truncate">${d.name}</div>
          </div>` : ''; 
        }).join('')}
      </div>
    </div>`;
  }).join('');
  return `
    <h2 class="font-serif text-3xl font-bold text-dark mb-2 leading-tight">Susun Rute</h2>
    <p class="text-sm font-medium text-gray-400 mb-8">Tahan dan geser kartu sesuai keinginan</p>
    <div class="planning-board">${actDayHTML}</div>`;
}

function renderStep3() {
  if (S.loading) return `
    <div class="flex flex-col items-center justify-center py-20 text-center animate-fade-in">
      <div class="text-6xl mb-6" style="animation: float 3s ease-in-out infinite;">✨</div>
      <h3 class="font-serif text-2xl font-bold text-dark mb-3">Menyusun Rute Terbaik</h3>
      <p class="text-sm font-medium text-gray-400 leading-relaxed max-w-[250px]">AI sedang mengatur jadwal perjalananmu agar sempurna...</p>
    </div>`;
  
  if (S.itinerary) {
    const days = S.itinerary.days.map((day, di) => {
      const acts = day.activities.map((act, ai) => {
        const as = ACT_STYLE[act.type] || ACT_STYLE.aktivitas;
        return `
        <div class="flex gap-4 mb-5 group">
          <div class="flex flex-col items-center w-6 shrink-0 pt-1">
            <span class="text-xl bg-appBg z-10 p-1">${as.icon}</span>
            ${ai!==day.activities.length-1?'<div class="w-[2px] flex-1 bg-gray-200 my-1 rounded-full group-hover:bg-dark transition-colors"></div>':''}
          </div>
          <div class="flex-1 bg-white p-5 rounded-3xl shadow-sm border border-gray-100 transition-all hover:shadow-md">
            <div class="flex justify-between items-start mb-2">
              <span class="text-sm font-black text-dark tracking-tight">${act.time}</span>
              ${act.estimatedCost ? `<span class="text-[10px] font-bold text-gray-500 bg-gray-100 px-2.5 py-1 rounded-lg">~${fmt(act.estimatedCost)}</span>` : ''}
            </div>
            <div class="font-bold text-[15px] text-dark leading-snug mb-1">${act.name}</div>
            <div class="text-xs font-medium text-gray-500 leading-relaxed">${act.description}</div>
            ${act.tips?`<div class="mt-3 px-3 py-2 rounded-xl text-[11px] font-bold ${as.bg} ${as.color}">💡 ${act.tips}</div>`:''}
          </div>
        </div>`;
      }).join('');
      return `
      <div class="mb-10 animate-slide-up" style="animation-delay: ${di * 0.1}s">
        <div class="flex items-center gap-3 mb-6">
          <div class="w-10 h-10 bg-dark text-white rounded-xl flex items-center justify-center font-bold text-lg shadow-md">${day.day}</div>
          <div>
            <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${day.date_label}</div>
            <div class="font-serif text-xl font-bold text-dark leading-tight">${day.title}</div>
          </div>
        </div>
        ${acts}
      </div>`;
    }).join('');
    
    return `
      <div class="bg-dark rounded-3xl p-6 mb-8 text-white shadow-2xl relative overflow-hidden">
        <div class="absolute -right-4 -top-4 text-6xl opacity-10">🗺️</div>
        <div class="font-serif text-2xl font-bold mb-2 relative z-10">Itinerary Banyuwangi</div>
        <div class="text-xs font-medium text-gray-300 mb-4 relative z-10">Siap untuk petualanganmu!</div>
        <div class="inline-block bg-white/20 backdrop-blur-sm px-4 py-2 rounded-xl border border-white/10 relative z-10">
          <div class="text-[10px] font-bold uppercase tracking-widest opacity-80 mb-0.5">Estimasi Budget</div>
          <div class="font-bold text-lg">Rp 1.5JT - 2JT <span class="text-xs font-normal opacity-80">/ org</span></div>
        </div>
      </div>
      ${days}
      <button class="w-full bg-white border border-gray-200 text-dark rounded-full py-4 font-bold text-sm shadow-sm hover:bg-gray-50 transition mt-4 mb-10" id="btn-restart">Buat Itinerary Baru</button>`;
  }
  return '';
}

function updateDestFeedback() {
  const matched = DESTINATIONS.filter(d=>S.destinations.has(d.id));
  const tags = matched.map(d => `<div class="inline-flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-full m-1 shadow-sm"><span class="text-lg">${d.emoji}</span><span class="text-xs font-bold text-dark">${esc(d.name)}</span><span data-remove="${d.id}" class="cursor-pointer text-gray-400 hover:text-red-500 text-xs ml-1 font-bold">✕</span></div>`).join('');
  const suggestions = DESTINATIONS.filter(d=>!S.destinations.has(d.id)).slice(0,6).map(d=>`<button data-suggest="${d.id}" class="bg-transparent border border-gray-200 text-gray-500 hover:bg-white hover:text-dark hover:border-gray-300 rounded-full px-4 py-2 text-xs font-bold cursor-pointer m-1 transition-colors">${d.emoji} ${d.name}</button>`).join('');

  const tagsArea = document.getElementById('dest-tags-area');
  const tagsList = document.getElementById('dest-tags-list');
  const suggestArea = document.getElementById('dest-suggestions');

  if(tagsArea) tagsArea.style.display = matched.length > 0 ? '' : 'none';
  if(tagsList) tagsList.innerHTML = tags;
  if(suggestArea) suggestArea.innerHTML = suggestions;

  updateNav();
  attachDynamicDestListeners();
}

function attachDynamicDestListeners() {
  const c = document.getElementById('content');
  c.querySelectorAll('[data-suggest]').forEach(el => el.addEventListener('click', () => {
    const d = DESTINATIONS.find(x=>x.id===el.dataset.suggest);
    if(d){
      S.destinations.add(d.id);
      S.destInput = S.destInput ? S.destInput+', '+d.name : d.name;
      const inp = document.getElementById('dest-input');
      if (inp) inp.value = S.destInput;
      updateDestFeedback();
    }
  }));
  c.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
    S.destinations.delete(el.dataset.remove);
    updateDestFeedback();
  }));
}

function render() {
  const c = document.getElementById('content');
  if(S.step===0) c.innerHTML = renderStep0();
  else if(S.step===1) c.innerHTML = renderStep1();
  else if(S.step===2) c.innerHTML = renderStep2();
  else if(S.step===3) c.innerHTML = S.itinerary ? renderStep3() : (S.loading ? renderStep3() : renderPlanningBoard());
  
  updateProgress(); updateNav(); attachListeners();
  if(S.step===3 && !S.loading && !S.itinerary) initSortableBoard();
}

function attachListeners() {
  const c = document.getElementById('content');
  
  const destInput = document.getElementById('dest-input'); 
  if (destInput) { 
    destInput.addEventListener('input', () => { 
      S.destInput = destInput.value; 
      parseDestInput(S.destInput); 
      updateDestFeedback(); 
    }); 
    destInput.focus(); 
  }
  if(S.step === 0) attachDynamicDestListeners();

  const selKota = document.getElementById('sel-kota'); if (selKota) selKota.addEventListener('change', () => { S.kotaAsal = selKota.value; render(); });
  c.querySelectorAll('[data-transport]').forEach(el => el.addEventListener('click', () => { S.transport = el.dataset.transport; render(); }));
  c.querySelectorAll('[data-sub]').forEach(el => el.addEventListener('click', () => { S.subTransport = el.dataset.sub; render(); }));
  c.querySelectorAll('[data-durasi]').forEach(el => el.addEventListener('click', () => { S.durasi = el.dataset.durasi; render(); }));
  c.querySelectorAll('[data-gaya]').forEach(el => el.addEventListener('click', () => { S.gayaPerjalanan = el.dataset.gaya; render(); }));
  const inpHotel = document.getElementById('input-penginapan-custom'); if (inpHotel) inpHotel.addEventListener('input', () => { S.penginapanCustom = inpHotel.value; S.penginapan='custom'; updateNav(); });
  const minus = document.getElementById('btn-minus'), plus = document.getElementById('btn-plus');
  if (minus) minus.addEventListener('click', () => { S.jumlahOrang = Math.max(1, S.jumlahOrang-1); render(); });
  if (plus) plus.addEventListener('click', () => { S.jumlahOrang = Math.min(20, S.jumlahOrang+1); render(); });
  const restart = document.getElementById('btn-restart'); if (restart) restart.addEventListener('click', () => { window.location.reload(); });
}

document.getElementById('btn-back').addEventListener('click', () => { S.step--; render(); });
document.getElementById('btn-next').addEventListener('click', async () => {
  if (S.step===3) { S.loading=true; render(); setTimeout(mockGenerate, 1500); } 
  else { S.step++; render(); }
});

function initSortableBoard() { document.querySelectorAll('.plan-col-body').forEach(col => { new Sortable(col, { group: 'wandr-board', animation: 200, ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen' }); }); }
function mockGenerate() { S.loading=false; S.itinerary = { days: [{ day:1, date_label:'Hari 1', title:'Kedatangan & Eksplorasi', activities:[{time:'10:00', type:'transport', name:'Tiba di Banyuwangi', description:'Sampai di kota tercinta.', tips:'', estimatedCost:0}, {time:'13:00', type:'makan', name:'Makan Siang Sego Tempong', description:'Kuliner pedas khas.', tips:'Pilih Sego Tempong Mbok Wah.', estimatedCost:25000}] }] }; render(); }

(async () => { await loadDestinations(); document.getElementById('progress-area').style.display = ''; render(); })();
</script>
</body>
</html>
