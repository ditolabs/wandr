<!DOCTYPE html>
<html lang="id" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wandr — Buat Itinerary Banyuwangi</title>
  <meta name="description" content="Generate itinerary perjalanan Banyuwangi secara otomatis.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <style>
    /* ── TOKENS ────────────────────────────────────────────────────────────── */
    :root {
      /* Brand — Warm terracotta (Deepseek) */
      --primary:      #c0392b;
      --primary-dark: #a93226;
      --primary-light:#e74c3c;
      --surface:      #ffffff;
      --bg:           #f4f2ee;
      --text:         #2d2d2d;
      --text-muted:   #7f8c8d;
      --border:       #e0dbd4;
      --shadow:       0 2px 8px rgba(0,0,0,.06);
      --shadow-lg:    0 8px 24px rgba(0,0,0,.08);
      --radius:       12px;

      /* Navy accent for result cards & activity colors */
      --navy:     #0F3460;
      --navy-2:   #16527a;
      --navy-lt:  #e8f0fa;

      /* Compat aliases (for JS inline styles that still ref old tokens) */
      --brand:    #c0392b;
      --brand-2:  #a93226;
      --brand-lt: rgba(192,57,43,.06);
      --accent:   #c0392b;
      --accent-lt:rgba(192,57,43,.06);
      --ink:      #2d2d2d;
      --ink-2:    #4a4a4a;
      --ink-3:    #7f8c8d;
      --ink-4:    #bdc3c7;
      --paper:    #f4f2ee;
      --paper-2:  #ede9e2;
      --line:     #e0dbd4;
      --white:    #ffffff;
      --sh-sm:    0 2px 8px rgba(0,0,0,.06);
      --sh-md:    0 4px 20px rgba(0,0,0,.08);
      --sh-lg:    0 8px 32px rgba(0,0,0,.10);
      --r-sm:     8px;
      --r-md:     12px;
      --r-lg:     16px;
      --r-xl:     24px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overscroll-behavior-y: none;
    }

    /* ── LAYOUT ────────────────────────────────────────────────────────────── */
    #app { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── HEADER ────────────────────────────────────────────────────────────── */
    #header {
      padding: 14px 20px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0; color: #fff;
      box-shadow: 0 2px 6px rgba(192,57,43,.25);
    }
    .logo-text {
      font-family: 'Inter', sans-serif;
      font-size: 20px; font-weight: 700;
      color: var(--text); letter-spacing: -0.02em;
    }
    .logo-badge {
      font-size: 9px; color: #fff;
      letter-spacing: 0.10em; text-transform: uppercase;
      font-weight: 600; background: var(--primary);
      padding: 3px 10px; border-radius: 20px;
      margin-left: 4px;
    }
    .logo-divider {
      width: 1px; height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    /* ── PROGRESS (Kertas — flat text tabs with sliding indicator) ──────────── */
    #progress-area { padding: 0 22px; margin: 18px 0 0; }
    .step-labels {
      position: relative;
      display: flex;
      gap: 22px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0;
    }
    .step-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--ink-4);
      padding: 0 0 12px;
      cursor: default;
      transition: color .3s ease;
    }
    .step-label.active { color: var(--primary); }
    .step-label.done { color: var(--ink-2); }
    .step-indicator {
      position: absolute;
      bottom: -1px; height: 2px; background: var(--primary);
      transition: left .38s cubic-bezier(.65,0,.35,1), width .38s cubic-bezier(.65,0,.35,1);
    }
    .progress-bar { display: none; }


    /* ── CONTENT AREA (Kertas: flat, no card/shadow) ─────────────────────────── */
    #content-wrap {
      padding: 0 22px 16px;
      flex: 1;
    }

    /* ── NAV ───────────────────────────────────────────────────────────────── */
    #nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 20px 24px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
      background: var(--surface);
      box-shadow: 0 -2px 8px rgba(0,0,0,.04);
    }
    .dest-count {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.04em; font-weight: 500;
    }

    /* ── BUTTONS (Deepseek rounded + Inter) ────────────────────────────────── */
    .btn-pri {
      background: var(--primary);
      color: #fff;
      border: none; padding: 12px 24px;
      border-radius: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 8px;
      white-space: nowrap; letter-spacing: 0.02em;
      box-shadow: 0 4px 12px rgba(192,57,43,.25);
    }
    .btn-pri:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(192,57,43,.35);
    }
    .btn-pri:active { transform: translateY(0); }
    .btn-pri:disabled {
      background: var(--border); cursor: not-allowed;
      box-shadow: none; transform: none;
      color: var(--text-muted);
    }
    .btn-ghost {
      background: transparent; color: var(--text-muted);
      border: 1.5px solid var(--border); padding: 11px 20px;
      border-radius: 40px;
      font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 8px;
      letter-spacing: 0.02em;
    }
    .btn-ghost:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(192,57,43,.04);
    }
    .btn-ghost.hidden { visibility: hidden; }

    /* ── STEP TYPOGRAPHY ───────────────────────────────────────────────────── */
    .step-title {
      font-family: 'Inter', sans-serif;
      font-size: 26px; font-weight: 700;
      margin-bottom: 4px; line-height: 1.2;
      color: var(--text); letter-spacing: -0.02em;
    }
    .step-title span { color: var(--primary); }
    .step-sub {
      color: var(--text-muted); font-size: 13px;
      margin-bottom: 20px; line-height: 1.6; font-weight: 400;
    }
    .field-label {
      display: block; font-size: 10px; font-weight: 600;
      color: var(--text-muted); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.14em;
    }
    .field-wrap { margin-bottom: 20px; }

    /* ── HORIZONTAL RULE ───────────────────────────────────────────────────── */
    .jp-rule {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0;
    }
    .jp-rule::before, .jp-rule::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }
    .jp-rule span {
      font-size: 10px; color: var(--ink-4);
      letter-spacing: 0.14em; text-transform: uppercase; white-space: nowrap;
    }

    /* ── CATEGORY FILTER ───────────────────────────────────────────────────── */
    .cat-filter {
      display: flex; gap: 6px; margin-bottom: 16px;
      border-bottom: none;
      flex-wrap: wrap;
    }
    .cat-btn {
      background: var(--surface); color: var(--text-muted);
      border: 1.5px solid var(--border);
      border-bottom: 1.5px solid var(--border);
      padding: 6px 14px; margin-bottom: 0;
      font-size: 11px; font-weight: 500; cursor: pointer;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.04em; text-transform: uppercase;
      transition: all .18s;
      border-radius: 30px;
    }
    .cat-btn:hover { border-color: var(--primary); color: var(--primary); }
    .cat-btn.active {
      color: #fff; border-color: var(--primary);
      background: var(--primary); font-weight: 600;
      box-shadow: 0 2px 8px rgba(192,57,43,.2);
    }

    /* ── STEP 0 — HERO / WIZARD INTRO (full-bleed) ───────────────────────── */
    .hero-wrap {
      margin: -24px -24px 0; padding: 40px 26px 44px;
      min-height: calc(100vh - 140px);
      display: flex; flex-direction: column; justify-content: flex-end;
      box-sizing: border-box; position: relative; overflow: hidden;
      background:
        linear-gradient(to bottom, rgba(15,20,25,.15) 0%, rgba(15,20,25,.25) 45%, rgba(20,15,15,.90) 100%),
        radial-gradient(120% 70% at 20% 15%, #d98b5f 0%, transparent 55%),
        radial-gradient(140% 90% at 80% 100%, var(--navy) 0%, transparent 60%),
        linear-gradient(160deg, #f4d9a8 0%, #e6975f 28%, #a9563e 55%, #3a2c3f 78%, #14181f 100%);
    }
    .hero-eyebrow {
      font-family: 'DM Sans', sans-serif; font-size: 11.5px; font-weight: 800;
      color: #f4d9a8; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 10px;
    }
    .hero-title {
      font-family: 'Noto Serif', serif; font-weight: 400; font-size: 32px; line-height: 1.18;
      color: #fff; margin: 0 0 14px; text-shadow: 0 2px 18px rgba(0,0,0,.35);
    }
    .hero-title em { font-style: italic; color: #ffd9b0; }
    .hero-sub {
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: rgba(255,255,255,.85);
      line-height: 1.55; margin: 0 0 28px; max-width: 300px;
    }
    .hero-cta-wrap { display: flex; justify-content: center; }
    .hero-cta {
      font-family: 'DM Sans', sans-serif; background: #f4d9a8; color: #3a2c1f; border: none;
      border-radius: 32px; padding: 16px 30px; font-weight: 800; font-size: 15px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,.35); letter-spacing: .01em;
    }
    .hero-cta:active { transform: scale(.98); }
    .hero-hint {
      text-align: center; font-family: 'DM Sans', sans-serif; font-size: 11px;
      color: rgba(255,255,255,.65); margin-top: 14px;
    }
    .s0-badge-opt {
      display: inline-block; font-family: 'DM Sans', sans-serif; font-size: 10.5px; font-weight: 800;
      color: var(--navy); background: var(--navy-lt); border-radius: 20px; padding: 2px 10px;
      margin-left: 6px; vertical-align: middle; text-transform: none;
    }

    /* ── STEP 0 — "KERTAS" (minimalist redesign) ─────────────────────────────
       Serif headline + hairline rules instead of boxed cards. Scoped to
       .s0-* so other steps / other tabs are untouched. */
    .s0-h1 {
      font-family: 'Noto Serif', serif; font-weight: 400;
      font-size: 25px; line-height: 1.32; color: var(--ink);
      margin-bottom: 6px;
    }
    .s0-h1 em { font-style: italic; color: var(--primary); }
    .s0-sub {
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      color: var(--ink-3); margin-bottom: 22px;
    }
    .s0-eyebrow {
      display: flex; align-items: center; gap: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 800;
      letter-spacing: .12em; text-transform: uppercase; color: var(--ink);
      margin: 24px 0 8px;
    }
    .s0-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--line); }
    .s0-eyebrow--wrap {
      display: block; white-space: normal; line-height: 1.5; letter-spacing: .03em;
    }
    .s0-eyebrow--wrap::after { display: none; }
    .s0-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 0; border-bottom: 1px solid var(--line); cursor: pointer;
    }
    .s0-row:first-child { padding-top: 1px; }
    .s0-num {
      font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink-4);
      width: 15px; flex-shrink: 0;
    }
    .s0-emoji { font-size: 15px; width: 15px; flex-shrink: 0; text-align: center; }
    .s0-name {
      flex: 1; min-width: 0; font-family: 'Noto Serif', serif; font-size: 15.5px;
      color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .s0-name.sel { color: var(--primary); font-weight: 700; }
    .s0-meta { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink-3); flex-shrink: 0; }
    .s0-check {
      width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border);
      flex-shrink: 0; position: relative;
    }
    .s0-check.sel { background: var(--primary); border-color: var(--primary); }
    .s0-check.sel::after {
      content: ''; position: absolute; left: 5px; top: 2px; width: 4px; height: 8px;
      border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg);
    }
    .s0-search-wrap { position: relative; }
    .s0-search {
      width: 100%; border: none; border-bottom: 1.5px solid var(--ink); background: transparent;
      padding: 9px 22px 9px 2px; font-family: 'DM Sans', sans-serif; font-size: 14px;
      color: var(--ink); border-radius: 0;
    }
    .s0-search::placeholder { color: var(--ink); opacity: .8; font-style: italic; font-weight: 600; }
    .s0-search-clear {
      position: absolute; right: 2px; top: 50%; transform: translateY(-50%);
      cursor: pointer; color: var(--ink-4); font-size: 13px; padding: 4px;
    }
    .s0-cats {
      display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
      font-family: 'DM Sans', sans-serif; font-size: 12px; margin: 14px 0 2px;
    }
    .s0-cat {
      color: var(--ink-3); cursor: pointer; padding: 3px 8px 5px;
      border-bottom: 1.5px solid transparent;
    }
    .s0-cat.active { color: var(--primary); font-weight: 700; border-bottom-color: var(--primary); }
    .s0-warn {
      font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink-3);
      font-style: italic; padding: 10px 0;
    }
    .s0-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .s0-chip {
      display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif;
      font-size: 11.5px; font-weight: 600; color: var(--primary);
      border: 1px solid var(--primary); border-radius: 14px; padding: 5px 6px 5px 10px;
    }
    .s0-chip-x { cursor: pointer; color: var(--primary); opacity: .6; font-size: 11px; padding: 0 3px; }
    .s0-kuliner { margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--line); }
    .s0-kuliner-label { font-family: 'DM Sans', sans-serif; font-size: 12.5px; font-weight: 800; color: var(--ink); margin-bottom: 8px; }
    .s0-kuliner input {
      width: 100%; border: none; border-bottom: 1.5px solid var(--ink); background: transparent;
      padding: 7px 2px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; color: var(--ink);
    }
    .s0-kuliner input::placeholder { color: var(--ink); opacity: .8; font-style: italic; font-weight: 600; }
    #kuliner-suggest-list:not(:empty) { margin-top: 4px; }
    .s0-empty {
      text-align: center; padding: 20px 0; font-family: 'DM Sans', sans-serif;
      font-size: 12.5px; color: var(--ink-3); font-style: italic;
    }
    .s0-guide {
      display: flex; gap: 14px; margin-bottom: 22px; padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    .s0-guide-step { flex: 1; font-family: 'DM Sans', sans-serif; }
    .s0-guide-num {
      font-family: 'Noto Serif', serif; font-style: italic; font-size: 15px;
      color: var(--primary); display: block; margin-bottom: 3px;
    }
    .s0-guide-txt { font-size: 10.5px; line-height: 1.35; color: var(--ink-3); }
    .s0-hint {
      font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--ink-4);
      font-style: italic; margin: -2px 0 10px;
    }

    /* ── Compact search bar (dest search & kuliner custom, dipindah ke atas) ── */
    .s0-search-compact-wrap {
      display: flex; align-items: center; gap: 8px; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: 22px; padding: 10px 16px;
      margin-bottom: 4px; position: relative;
    }
    .s0-search-compact-wrap .s0-sc-icon { font-size: 14px; opacity: .55; flex-shrink: 0; }
    .s0-search-compact-wrap input {
      border: none; background: transparent; flex: 1; min-width: 0;
      font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--ink);
    }
    .s0-search-compact-wrap input::placeholder { color: var(--ink-3); font-style: italic; }
    .s0-sc-clear { cursor: pointer; color: var(--ink-4); font-size: 13px; padding: 2px 4px; flex-shrink: 0; }
    .s0-search-caption {
      font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink-4);
      font-style: italic; margin: 6px 0 4px;
    }

    /* ── Populer: grid card minimalis (ganti list panjang) ───────────────── */
    .s0-grid {
      display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap: 8px; margin-bottom: 4px;
    }
    .s0-card {
      position: relative; display: flex; align-items: center; gap: 8px;
      padding: 12px 10px; border: 1px solid var(--line); cursor: pointer;
      background: var(--paper);
    }
    .s0-card.sel { border-color: var(--primary); background: #f8ece9; }
    .s0-card-emoji { font-size: 16px; flex-shrink: 0; }
    .s0-card-name {
      flex: 1; min-width: 0; font-family: 'Noto Serif', serif; font-size: 13.5px;
      line-height: 1.25; color: var(--ink); overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .s0-card.sel .s0-card-name { color: var(--primary); font-weight: 700; }
    .s0-card-check {
      position: absolute; top: 8px; right: 8px; width: 13px; height: 13px;
      border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0;
    }
    .s0-card-check.sel { background: var(--primary); border-color: var(--primary); }
    .s0-card-check.sel::after {
      content: ''; position: absolute; left: 4px; top: 1.5px; width: 3px; height: 6.5px;
      border: solid #fff; border-width: 0 1.3px 1.3px 0; transform: rotate(45deg);
    }
    .s0-more-toggle {
      text-align: center; font-family: 'DM Sans', sans-serif; font-size: 11.5px;
      font-weight: 600; color: var(--primary); cursor: pointer;
      padding: 10px 0 2px; letter-spacing: .02em;
    }

    /* ── Kuliner Populer: card info, non-toggle tapi bisa diketuk untuk isi input ── */
    .s0-kuliner-pop-hint {
      font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--ink-4);
      font-style: italic; margin: -2px 0 10px;
    }
    .s0-kul-card {
      display: flex; align-items: center; gap: 9px; padding: 10px; border: 1px solid var(--line);
      cursor: pointer; background: var(--paper); min-width: 0;
    }
    .s0-kul-emoji { font-size: 15px; flex-shrink: 0; }
    .s0-kul-body { flex: 1; min-width: 0; }
    .s0-kul-name {
      font-family: 'Noto Serif', serif; font-size: 13px; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .s0-kul-meta { font-family: 'DM Sans', sans-serif; font-size: 10.5px; color: var(--ink-3); margin-top: 1px; }
    .s0-kul-empty {
      text-align: center; padding: 14px 0; font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--ink-3); font-style: italic;
    }

    /* ── Shared: big selectable row (Transport moda, Preferensi gaya trip) ──── */
    .rowbig { display: flex; align-items: flex-start; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--line); cursor: pointer; }
    .rowbig:first-of-type { padding-top: 1px; }
    .rowbig-ic { font-size: 19px; width: 24px; flex-shrink: 0; }
    .rowbig-title { font-family: 'Noto Serif', serif; font-size: 16px; margin-bottom: 2px; color: var(--ink); }
    .rowbig-title.sel { color: var(--primary); font-weight: 700; }
    .rowbig-sub { font-size: 12px; color: var(--ink-3); line-height: 1.5; }
    .radio { width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; margin-top: 2px; position: relative; }
    .radio.sel { border-color: var(--primary); }
    .radio.sel::after { content: ''; position: absolute; inset: 3px; border-radius: 50%; background: var(--primary); }

    /* ── Shared: inline text-toggle group (Transport jalur, Preferensi durasi) ─ */
    .taglist { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; font-family: 'DM Sans', sans-serif; font-size: 12px; margin: 2px 0 20px; }
    .tag { color: var(--ink-3); cursor: pointer; padding: 3px 8px 5px; border-bottom: 1.5px solid transparent; }
    .tag.active { color: var(--primary); font-weight: 700; border-bottom-color: var(--primary); }

    .pillrow { display: flex; gap: 18px; flex-wrap: wrap; margin: 2px 0 22px; }
    .pill { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink-3); cursor: pointer; padding-bottom: 6px; border-bottom: 2px solid transparent; }
    .pill.sel { color: var(--primary); font-weight: 700; border-bottom-color: var(--primary); }
    .pill-sub { display: block; font-size: 10px; color: var(--ink-4); font-weight: 400; margin-top: 1px; }

    .stepper { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin-top: 22px; }
    .stepper-label { font-family: 'Noto Serif', serif; font-size: 15.5px; color: var(--ink); }
    .stepper-sub { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink-3); }
    .stepper-ctrl { display: flex; align-items: center; gap: 16px; }
    .stepper-btn {
      width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--ink);
      background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .stepper-val { font-family: 'Noto Serif', serif; font-size: 17px; min-width: 14px; text-align: center; color: var(--ink); }

    /* ── Susun — timeline view for the generated itinerary ───────────────────── */
    .daytabs { display: flex; gap: 20px; overflow-x: auto; margin: 4px 0 20px; scrollbar-width: none; }
    .daytab {
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; color: var(--ink-4);
      padding-bottom: 8px; border-bottom: 2px solid transparent; cursor: pointer;
      white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none;
    }
    .daytab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .summary { font-family: 'Noto Serif', serif; font-size: 14px; font-style: italic; color: var(--ink-2); margin-bottom: 6px; line-height: 1.55; }
    .budgetline { font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--ink-3); margin-bottom: 22px; }
    .budgetline b { color: var(--primary); font-weight: 700; }
    .daymeta { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
    .daymeta-title { font-family: 'Noto Serif', serif; font-size: 17px; color: var(--ink); }
    .daymeta-count { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink-3); flex-shrink: 0; }
    .timeline { position: relative; padding-left: 20px; }
    .timeline::before { content: ''; position: absolute; left: 4px; top: 6px; bottom: 6px; width: 1px; background: var(--line); }
    .tl-item { position: relative; padding-bottom: 28px; }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-dot { position: absolute; left: -20px; top: 3px; width: 9px; height: 9px; border-radius: 50%; background: var(--bg); border: 1.5px solid var(--primary); }
    .tl-time { font-family: 'DM Sans', sans-serif; font-size: 10.5px; color: var(--ink-4); font-weight: 700; letter-spacing: .04em; margin-bottom: 2px; }
    .tl-name { font-family: 'Noto Serif', serif; font-size: 16px; color: var(--ink); margin-bottom: 3px; }
    .tl-type { font-family: 'DM Sans', sans-serif; font-size: 10.5px; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .tl-desc { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink-3); line-height: 1.6; white-space: pre-line; }
    .tl-tip { margin-top: 8px; font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--ink-2); font-style: italic; padding-left: 12px; border-left: 2px solid var(--line); line-height: 1.55; }
    .tl-cost { margin-top: 6px; font-family: 'DM Sans', sans-serif; font-size: 11.5px; color: var(--primary); font-weight: 700; }
    .pack-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--line); cursor: pointer; user-select: none; }
    .pack-row:first-child { padding-top: 1px; }
    .pack-row .cb { width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; position: relative; }
    .pack-row .cb.checked { background: var(--primary); border-color: var(--primary); }
    .pack-row .cb.checked::after { content: ''; position: absolute; left: 5px; top: 2px; width: 4px; height: 8px; border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg); }
    .pack-row-label { font-family: 'DM Sans', sans-serif; font-size: 12.5px; color: var(--ink-2); }

    /* ── Shared: schedule card with left accent rule (Transport jadwal) ─────── */
    .schedcard { border-left: 2px solid var(--border); padding: 8px 0 8px 14px; margin-bottom: 8px; cursor: pointer; }
    .schedcard.sel { border-left-color: var(--primary); }
    .schedcard-top { display: flex; justify-content: space-between; gap: 8px; font-size: 12.5px; font-weight: 700; font-family: 'Noto Serif', serif; color: var(--ink); }
    .schedcard.sel .schedcard-top { color: var(--primary); }
    .schedcard-sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; font-family: 'DM Sans', sans-serif; }

    /* ── DESTINATION CARDS ─────────────────────────────────────────────────── */
    .dest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: transparent; border: none; }
    .dest-chip {
      padding: 14px 12px;
      background: var(--surface);
      cursor: pointer;
      transition: all .18s ease;
      user-select: none;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
    }
    .dest-chip:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); border-color: var(--primary-light); }
    .dest-chip.selected {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 4px 16px rgba(192,57,43,.25);
      transform: translateY(-1px);
    }
    .dest-chip-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .dest-emoji { font-size: 22px; }
    .dest-check {
      width: 18px; height: 18px;
      border: 1.5px solid var(--ink-4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--ink); flex-shrink: 0;
      opacity: 0; transition: opacity .15s;
      background: var(--white);
    }
    .dest-chip.selected .dest-check { opacity: 1; background: #fff; border-color: #fff; color: var(--primary); }
    .dest-name { font-size: 12px; font-weight: 700; color: var(--ink); line-height: 1.3; margin-top: 8px; font-family: 'Inter', sans-serif; }
    .dest-chip.selected .dest-name { color: #fff; }
    .dest-desc { font-size: 10px; color: var(--ink-3); margin-top: 2px; line-height: 1.4; }
    .dest-chip.selected .dest-desc { color: rgba(255,255,255,.7); }
    .dest-meta { margin-top: 6px; display: flex; align-items: center; gap: 5px; }
    .cat-tag { font-size: 9px; padding: 2px 7px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 20px; }
    .cat-tag.alam   { background: #e6f7ee; color: #1a7a45; }
    .cat-tag.pantai { background: #e6f0fb; color: #1a4a8c; }
    .cat-tag.diving { background: #e0f7f4; color: #0a6a5a; }
    .cat-tag.budaya { background: #fef3e2; color: #8a5a00; }
    .dest-chip.selected .cat-tag { opacity: 0.75; }
    .best-time { font-size: 10px; color: var(--ink-3); }
    .dest-chip.selected .best-time { color: rgba(255,255,255,.55); }
    .dest-notice {
      margin-top: 14px; padding: 12px 14px;
      border-left: 3px solid var(--accent);
      background: var(--accent-lt);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      font-size: 12px; color: var(--ink-2);
      display: none;
    }
    .dest-notice.show { display: block; }

    /* ── INPUTS (Kertas: flat underline, no boxes) ───────────────────────────── */
    select, input[type="text"], input[type="time"],
    input[type="email"], input[type="password"], textarea {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--ink);
      border-radius: 0;
      color: var(--ink); padding: 9px 22px 9px 2px;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color .2s;
      width: 100%; appearance: none; -webkit-appearance: none;
      direction: ltr !important; text-align: left !important;
    }
    select:focus, input:focus {
      border-color: var(--primary);
      box-shadow: none;
    }
    select::placeholder, input::placeholder, textarea::placeholder {
      color: var(--ink-4); font-style: italic;
    }
    select option { background: var(--surface); color: var(--text); }
    .select-wrap { position: relative; }
    .select-wrap select { padding-right: 36px; font-family: 'Noto Serif', serif; font-size: 15.5px; }
    .select-arrow {
      position: absolute; right: 2px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: var(--ink-4); font-size: 11px;
    }

    /* ── AUTOCOMPLETE (floating overlay — keeps a surface, unlike page content) ── */
    .autocomplete-wrap { position: relative; }
    .autocomplete-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 100;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 4px;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
      max-height: 220px; overflow-y: auto;
    }
    .autocomplete-item {
      padding: 11px 14px; cursor: pointer;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
      transition: background .12s;
    }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover, .autocomplete-item.active { background: var(--bg); }
    .autocomplete-item-name { font-family: 'Noto Serif', serif; font-size: 14.5px; color: var(--ink); }
    .autocomplete-item-sub  { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink-3); margin-top: 1px; }
    .autocomplete-empty { padding: 14px; text-align: center; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--ink-3); font-style: italic; }
    .autocomplete-use-custom {
      padding: 12px 14px; text-align: center; cursor: pointer;
      font-family: 'DM Sans', sans-serif; font-size: 12.5px; font-weight: 700; color: var(--primary);
      border-top: 1px solid var(--line);
    }

    /* ── CARD OPTIONS (flat hairline rows, Kertas) ───────────────────────────── */
    .card-list { display: flex; flex-direction: column; border: none; }
    .card-opt {
      padding: 13px 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      cursor: pointer; transition: color .15s;
      display: flex; align-items: center; gap: 12px;
      box-shadow: none;
    }
    .card-opt:last-child { border-bottom: 1px solid var(--line); }
    .card-opt:hover { background: transparent; transform: none; box-shadow: none; }
    .card-opt.selected {
      background: transparent;
      border-color: var(--line);
      box-shadow: none;
    }
    .card-opt.sm { padding: 12px 0; }
    .card-opt-icon { font-size: 16px; flex-shrink: 0; width: 16px; text-align: center; }
    .card-opt-title { font-family: 'Noto Serif', serif; font-size: 15px; color: var(--ink); }
    .card-opt.selected .card-opt-title { color: var(--primary); font-weight: 700; }
    .card-opt-sub { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
    .card-opt.selected .card-opt-sub { color: var(--ink-3); }
    .card-opt-check {
      width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--border);
      flex-shrink: 0; margin-left: auto; position: relative; font-size: 0;
    }
    .card-opt.selected .card-opt-check {
      background: var(--primary); border-color: var(--primary);
    }
    .card-opt.selected .card-opt-check::after {
      content: ''; position: absolute; left: 5px; top: 2px; width: 4px; height: 8px;
      border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg);
    }

    /* ── SEWA LOKAL ────────────────────────────────────────────────────────── */
    .sewa-wrap { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .35s ease, opacity .35s ease; }
    .sewa-wrap.open { max-height: 420px; opacity: 1; }
    .sewa-box {
      padding: 14px; background: var(--brand-lt);
      border-left: 3px solid var(--brand);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      margin-bottom: 4px;
    }
    .sewa-title { font-size: 12px; font-weight: 700; color: var(--brand); margin-bottom: 3px; font-family: 'Inter', sans-serif; }
    .sewa-sub   { font-size: 11px; color: var(--ink-2); margin-bottom: 10px; line-height: 1.5; }
    .card-opt.sewa-sel { background: var(--brand-lt) !important; border-color: var(--brand) !important; }
    .card-opt.sewa-sel .card-opt-title { color: var(--brand) !important; }

    /* ── PILL OPTIONS ──────────────────────────────────────────────────────── */
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; border: none; }
    .pill-opt {
      padding: 11px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer; transition: all .18s; text-align: center;
      box-shadow: var(--shadow);
    }
    .pill-opt:hover { border-color: var(--primary-light); background: rgba(192,57,43,.02); transform: translateY(-1px); }
    .pill-opt.selected {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 3px 10px rgba(192,57,43,.2);
    }
    .pill-label { font-size: 13px; font-weight: 700; color: var(--ink); font-family: 'Inter', sans-serif; }
    .pill-opt.selected .pill-label { color: #fff; }
    .pill-sub { font-size: 10px; color: var(--ink-3); margin-top: 2px; }
    .pill-opt.selected .pill-sub { color: rgba(255,255,255,.7); }

    /* ── GAYA CARDS ────────────────────────────────────────────────────────── */
    .gaya-row { display: flex; gap: 10px; background: transparent; border: none; }
    .gaya-card {
      flex: 1; padding: 18px 12px;
      background: var(--surface);
      cursor: pointer; transition: all .18s; text-align: center;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow);
    }
    .gaya-card:hover { border-color: var(--primary-light); background: rgba(192,57,43,.02); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .gaya-card.selected {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 4px 16px rgba(192,57,43,.25);
      transform: translateY(-2px);
    }
    .gaya-emoji { font-size: 26px; margin-bottom: 8px; }
    .gaya-label { font-size: 13px; font-weight: 700; color: var(--ink); font-family: 'Inter', sans-serif; }
    .gaya-card.selected .gaya-label { color: #fff; }
    .gaya-desc  { font-size: 10px; color: var(--ink-3); margin-top: 6px; line-height: 1.6; white-space: pre-line; }
    .gaya-card.selected .gaya-desc { color: rgba(255,255,255,.7); }

    /* ── COUNTER ───────────────────────────────────────────────────────────── */
    .counter-row { display: flex; align-items: center; gap: 16px; }
    .cnt-btn {
      background: var(--white); color: var(--brand);
      border: 1.5px solid var(--border);
      border-radius: 50%;
      width: 38px; height: 38px; font-size: 18px;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow);
    }
    .cnt-btn:hover { border-color: var(--primary); background: var(--primary); color: #fff; box-shadow: var(--shadow-lg); }
    .cnt-val   { font-size: 26px; font-weight: 700; min-width: 32px; text-align: center; font-family: 'Inter', sans-serif; color: var(--primary); }
    .cnt-label { font-size: 12px; color: var(--ink-3); }

    /* ── LOADING ───────────────────────────────────────────────────────────── */
    .loading-screen { text-align: center; padding: 60px 0; }
    .loading-icon { font-size: 48px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .loading-title { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 700;  margin-bottom: 10px; color: var(--brand); }
    .loading-sub  { color: var(--ink-3); font-size: 13px; line-height: 1.6; }
    .loading-tags { display: flex; gap: 6px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .loading-tag  { font-size: 10px; color: var(--ink-3); background: var(--white); padding: 4px 12px; border: 1.5px solid var(--line); border-radius: 20px; letter-spacing: 0.06em; text-transform: uppercase; box-shadow: var(--sh-sm); }
    .dot { animation: bou 1.4s ease-in-out infinite; display: inline-block; }
    .dot:nth-child(1){animation-delay:0s} .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    @keyframes bou { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-7px);opacity:1} }

    /* ── ERROR ─────────────────────────────────────────────────────────────── */
    .error-screen { text-align: center; padding: 60px 0; }

    /* ── RESULT ────────────────────────────────────────────────────────────── */
    .result-summary {
      padding: 20px;
      background: var(--primary);
      border-radius: var(--radius);
      margin-bottom: 24px;
      box-shadow: 0 6px 24px rgba(192,57,43,.2);
    }
    .result-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .result-title { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 700;  flex: 1; line-height: 1.25; color: var(--white); }
    .result-budget-label { font-size: 9px; color: rgba(255,255,255,.6); text-align: right; letter-spacing: 0.12em; text-transform: uppercase; }
    .result-budget-val   { font-size: 18px; font-weight: 700; color: var(--white); font-family: 'Inter', sans-serif; }
    .result-desc  { font-size: 13px; color: rgba(255,255,255,.8); line-height: 1.65; margin-bottom: 12px; }
    .highlight-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .highlight-tag  { font-size: 10px; padding: 3px 10px; border: 1px solid rgba(255,255,255,.3); color: rgba(255,255,255,.9); border-radius: 20px; letter-spacing: 0.04em; text-transform: uppercase; background: rgba(255,255,255,.12); }
    .budget-note { font-size: 11px; color: rgba(255,255,255,.55); }

    /* ── DAY SECTION ───────────────────────────────────────────────────────── */
    .day-section {
      margin-bottom: 16px; animation: fdi .5s ease both;
      background: var(--white); border-radius: var(--r-lg);
      border: 1px solid var(--border);
      overflow: hidden; box-shadow: var(--shadow);
    }
    @keyframes fdi { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .day-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 0; padding: 12px 16px;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .day-num {
      font-family: 'Inter', sans-serif;
      font-size: 26px; font-weight: 700; 
      color: var(--primary); line-height: 1; flex-shrink: 0;
      min-width: 22px;
    }
    .day-label    { font-size: 9px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.12em; }
    .day-title-txt { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.3; }

    /* ── ACTIVITY ──────────────────────────────────────────────────────────── */
    .act-list { padding: 12px 16px 4px; }
    .act-item { display: flex; gap: 14px; margin-bottom: 14px; animation: sli .45s ease both; }
    @keyframes sli { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .act-timeline { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 20px; }
    .act-icon { font-size: 14px; }
    .act-line { width: 1px; flex: 1; background: var(--line); margin: 4px 0; min-height: 12px; }
    .act-body { flex: 1; padding-bottom: 4px; }
    .act-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .act-time     { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: 0.04em; }
    .act-duration { font-size: 10px; color: var(--ink-3); margin-left: 6px; }
    .act-cost     { font-size: 10px; color: var(--ink-2); background: var(--paper); padding: 2px 8px; flex-shrink: 0; border: 1px solid var(--line); border-radius: 20px; }
    .act-name     { font-size: 14px; font-weight: 700; color: var(--ink); font-family: 'Inter', sans-serif; line-height: 1.3; }
    .act-location { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
    .act-desc     { font-size: 12px; color: var(--ink-2); line-height: 1.6; margin-top: 4px; white-space: pre-line; }
    .act-tip      { margin-top: 7px; padding: 8px 12px; font-size: 11px; line-height: 1.5; border-left: 2px solid; background: var(--paper); border-radius: 0 var(--r-sm) var(--r-sm) 0; }

    /* ── PACKING & NOTES ───────────────────────────────────────────────────── */
    .packing-box  { padding: 16px 20px; background: var(--paper); margin-bottom: 0; border-top: 1px solid var(--line); }
    .packing-title { font-size: 11px; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.10em; text-transform: uppercase; color: var(--brand); }
    .packing-tags  { display: flex; gap: 6px; flex-wrap: wrap; }
    .packing-tag   { font-size: 11px; padding: 4px 10px; background: var(--white); border: 1.5px solid var(--line); color: var(--ink-2); border-radius: 20px; }
    .notes-box { padding: 14px 16px; background: rgba(192,57,43,.04); border-left: 3px solid var(--primary); border-radius: 0 var(--radius) var(--radius) 0; margin-bottom: 24px; font-size: 12px; color: var(--text); line-height: 1.6; }

    /* ── SCROLLBAR ─────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--line); }

    /* ── SORTABLEJS ────────────────────────────────────────────────────────── */
    .sortable-chosen  { box-shadow: 0 4px 16px rgba(0,0,0,.12); background: var(--white) !important; }
    .sortable-ghost   { opacity: .2; background: var(--paper-2) !important; outline: 1px dashed var(--ink); }
    .sortable-drag    { cursor: grabbing !important; z-index: 9999 !important; }
    .drag-item        { cursor: grab; user-select: none; -webkit-user-select: none; touch-action: pan-y; }

    /* ── PLANNING BOARD ────────────────────────────────────────────────────── */
    .planning-board { display: flex; flex-direction: column; gap: 10px; }
    .plan-col { border: 1px solid var(--line); background: var(--white); overflow: hidden; border-radius: var(--r-md); box-shadow: var(--sh-sm); }
    .plan-col.locked { opacity: .6; }
    .plan-col-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; font-size: 12px; font-weight: 700;
      color: var(--white); background: linear-gradient(135deg, var(--brand), var(--brand-2));
      font-family: 'Inter', sans-serif; letter-spacing: 0.02em;
    }
    .plan-col-body { padding: 8px; display: flex; flex-direction: column; gap: 6px; min-height: 44px; }
    .plan-day-badge {
      width: 20px; height: 20px;
      background: var(--accent); color: var(--white);
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      font-family: 'Inter', sans-serif; border-radius: 50%;
    }
    .plan-warn { font-size: 11px; color: #8a4a0a; background: #fdf0e0; padding: 5px 10px; border-left: 2px solid #c8760a; border-radius: 0 6px 6px 0; }
    .plan-empty { font-size: 12px; color: var(--ink-4); text-align: center; padding: 12px;  }

    /* ── DRAG CARD ─────────────────────────────────────────────────────────── */
    .drag-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--white);
      border: 1px solid var(--line); border-radius: var(--r-sm);
    }
    .drag-handle { font-size: 14px; color: var(--ink-4); flex-shrink: 0; }
    .drag-emoji  { font-size: 20px; flex-shrink: 0; }
    .drag-info   { flex: 1; min-width: 0; }
    .drag-title  { font-size: 13px; font-weight: 700; color: var(--ink); font-family: 'Inter', sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .drag-zone   { font-size: 11px; color: var(--ink-3); margin-top: 2px; }

    /* ── USER MENU ───────────────────────────────────────────────────────────── */
    .user-menu {
      position: absolute; top: 62px; right: 16px; z-index: 100;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      border-top: 3px solid var(--brand);
      min-width: 168px;
      box-shadow: var(--sh-lg);
      display: none;
    }
    .user-menu.open { display: block; }
    .user-menu-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px;
      font-size: 13px; color: var(--ink-2); cursor: pointer;
      border-bottom: 1px solid var(--line); transition: background .15s;
    }
    .user-menu-item:last-child { border-bottom: none; }
    .user-menu-item:hover { background: var(--paper-2); }
    .user-menu-item.danger { color: var(--red); }

    /* ── ANIMATIONS ──────────────────────────────────────────────────────────── */
    @keyframes screenFadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .anim-in { animation: screenFadeIn 0.35s ease-out forwards; }

    /* ── MATERIAL SYMBOLS ───────────────────────────────────────────────────── */
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }

    /* ── RESPONSIVE ─────────────────────────────────────────────────────────── */
    @media (max-width: 380px) {
      .step-title { font-size: 22px; }
      .dest-grid  { gap: 8px; }
    }

    /* ── EXPORT MODAL ──────────────────────────────────────────────────────── */
    #export-modal {
      display:none; position:fixed; inset:0; z-index:9998;
      background:rgba(17,17,17,.65); align-items:center; justify-content:center; padding:20px;
    }
    #export-modal.open { display:flex; }
    #export-panel {
      background:#ffffff; width:100%; max-width:320px;
      border-radius:16px; overflow:hidden;
      box-shadow:0 20px 60px rgba(15,52,96,.25);
    }
    #export-panel-title {
      background:#c0392b; color:#fff; padding:14px 18px;
      display:flex; align-items:center; justify-content:space-between;
    }

    /* ── ITINERARY PRINT LAYOUT ─────────────────────────────────────────────── */
    #itinerary-print {
      position:fixed; left:-9999px; top:0;
      width:794px;
      background:#fff; font-family:'Inter',sans-serif;
      padding:0;
      color:#111;
    }
    /* Cover strip merah di atas */
    .print-cover {
      background:linear-gradient(135deg,#0F3460,#16527a); padding:36px 56px 28px;
      position:relative; overflow:hidden;
    }
    .print-cover::after {
      content:''; position:absolute;
      right:-40px; top:-40px;
      width:200px; height:200px;
      border:40px solid rgba(255,255,255,.08);
      border-radius:50%;
    }
    .print-cover-eyebrow {
      font-size:11px; letter-spacing:.2em; color:rgba(255,255,255,.7);
      text-transform:uppercase; margin-bottom:10px;
    }
    .print-cover-title {
      font-family:'Inter',sans-serif;
      font-size:52px; font-weight:700; 
      color:#fff; line-height:1.05; margin-bottom:4px;
    }
    .print-cover-dest {
      font-size:15px; color:rgba(255,255,255,.8);
      margin-top:12px; letter-spacing:.04em; line-height:1.6;
    }
    /* Meta bar */
    .print-meta {
      display:flex; gap:0; border-bottom:2px solid #111;
    }
    .print-meta-item {
      flex:1; padding:14px 20px;
      border-right:1px solid #e0dbd4;
    }
    .print-meta-item:last-child { border-right:none; }
    .print-meta-label {
      font-size:10px; color:#888; text-transform:uppercase;
      letter-spacing:.14em; margin-bottom:5px;
    }
    .print-meta-val { font-size:15px; font-weight:700; color:#111; line-height:1.3; }
    /* Body padding */
    .print-body { padding:0 56px 48px; }
    /* Day section */
    .print-day { margin-top:40px; }
    .print-day-header {
      display:flex; align-items:center; gap:18px;
      padding:16px 0 14px;
      border-top:2px solid #111;
      border-bottom:1px solid #e0dbd4;
      margin-bottom:22px;
    }
    .print-day-num {
      font-family:'Inter',sans-serif;
      font-size:56px; font-weight:700; 
      color:#0F3460; line-height:1; flex-shrink:0;
      min-width:52px;
    }
    .print-day-divider { width:2px; height:40px; background:#e0dbd4; flex-shrink:0; }
    .print-day-info { }
    .print-day-lbl {
      font-size:10px; color:#888; text-transform:uppercase;
      letter-spacing:.14em; margin-bottom:3px;
    }
    .print-day-ttl { font-family:'Inter',sans-serif; font-size:21px; font-weight:700; color:#111; }
    /* Activity */
    .print-act { display:flex; gap:0; margin-bottom:0; }
    .print-act-line {
      display:flex; flex-direction:column; align-items:center;
      width:28px; flex-shrink:0; padding-top:4px;
    }
    .print-act-dot {
      width:10px; height:10px;
      background:#0F3460; border-radius:50%;
      border:2px solid #fff; box-shadow:0 0 0 1.5px #0F3460;
      flex-shrink:0;
    }
    .print-act-rule { width:1.5px; flex:1; background:#f0ede8; margin-top:3px; min-height:8px; }
    .print-act-body {
      flex:1; padding:0 0 18px 10px;
      border-bottom:1px solid #f0ede8;
      margin-bottom:0;
    }
    .print-act:last-child .print-act-body { border-bottom:none; }
    .print-act:last-child .print-act-rule { display:none; }
    .print-act-time {
      font-size:12px; color:#0F3460; font-weight:700;
      letter-spacing:.06em; margin-bottom:5px;
      display:inline-block;
      background:rgba(192,57,43,.08); padding:2px 8px;
    }
    .print-act-name { font-family:'Inter',sans-serif; font-size:18px; font-weight:700; color:#111; margin-bottom:4px; line-height:1.3; }
    .print-act-desc { font-size:14px; color:#555; line-height:1.65; }
    .print-act-cost {
      display:inline-block; font-size:12px; color:#888;
      margin-top:5px; padding:2px 7px;
      border:1px solid #e0dbd4;
    }
    .print-act-tip {
      font-size:13px; color:#555; margin-top:7px;
      padding:8px 12px; border-left:3px solid #0F3460;
      background:#e8f0fa; line-height:1.6;
    }
    /* Budget */
    .print-budget {
      margin:32px 0 0;
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 24px;
      background:#111; color:#fff;
    }
    .print-budget-label {
      font-size:11px; color:rgba(255,255,255,.6);
      text-transform:uppercase; letter-spacing:.12em; margin-bottom:4px;
    }
    .print-budget-val { font-family:'Inter',sans-serif; font-size:26px; font-weight:700; color:#fff; }
    .print-budget-note { font-size:12px; color:rgba(255,255,255,.5); text-align:right; }
    /* Packing */
    .print-packing { margin-top:28px; }
    .print-packing-header {
      display:flex; align-items:center; gap:10px;
      margin-bottom:14px; padding-bottom:10px;
      border-bottom:1.5px solid #111;
    }
    .print-packing-title { font-family:'Inter',sans-serif; font-size:17px; font-weight:700; }
    .print-packing-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
    .print-packing-item {
      font-size:13px; color:#444; padding:8px 10px;
      border:1px solid #e0dbd4;
      display:flex; align-items:center; gap:8px; line-height:1.4;
    }
    .print-packing-cb {
      width:13px; height:13px; border:1.5px solid #ccc;
      flex-shrink:0; display:inline-block;
    }
    /* Notes */
    .print-notes {
      margin-top:16px; padding:10px 14px;
      border-left:3px solid #E94560; background:#fdedf0;
      font-size:13px; color:#555; line-height:1.6;
    }
    /* Footer */
    .print-footer {
      margin-top:32px; padding:14px 56px;
      border-top:2px solid #111;
      display:flex; justify-content:space-between; align-items:center;
      background:#f8f7f4;
    }
    .print-footer-left { font-size:11px; color:#888; line-height:1.6; }
    .print-footer-brand {
      font-family:'Inter',sans-serif;
      font-size:17px; font-weight:700;  color:#111;
    }
  </style>

       WANDR — NEO-BRUTALIST SKIN
       Versi Kertas disimpan di index-kertas-backup.html kalau sewaktu-waktu
       perlu dibalikin (tinggal copy isi file itu jadi index.html lagi).
       ══════════════════════════════════════════════════════════════════ -->
  <style>
    :root{
      --primary:#E8532F; --primary-dark:#c43f1f; --primary-light:#F2B90F;
      --surface:#FFFFFF; --bg:#F3EFE6; --text:#111111; --text-muted:#111111;
      --border:#111111; --shadow:5px 5px 0 #111111; --shadow-lg:6px 6px 0 #111111;
      --radius:0px;
      --navy:#12233D; --navy-2:#12233D; --navy-lt:#F2B90F;
      --brand:#E8532F; --brand-2:#c43f1f; --brand-lt:#F2B90F; --accent:#E8532F; --accent-lt:#F2B90F;
      --ink:#111111; --ink-2:#111111; --ink-3:#333333; --ink-4:#666666;
      --paper:#F3EFE6; --paper-2:#F3EFE6; --line:#111111; --white:#FFFFFF;
      --sh-sm:3px 3px 0 #111; --sh-md:5px 5px 0 #111; --sh-lg:6px 6px 0 #111;
      --r-sm:0px; --r-md:0px; --r-lg:0px; --r-xl:0px;
    }
    body, input, textarea, select, button { font-family:'Arial','Helvetica Neue',sans-serif !important; }
    h1,h2,h3,h4,.s0-h1,.section-heading{
      font-family:'Arial Black',Arial,sans-serif !important; font-weight:900 !important;
      text-transform:uppercase; letter-spacing:-.01em;
    }

    /* Tombol & elemen boxed — daftar class EKSPLISIT (bukan wildcard [class*=]),
       supaya elemen anak (ikon/nama/check di dalam card) tidak ikut kebungkus
       border sendiri-sendiri. */
    #btn-next, #btn-back, .btn-pri, .btn-ghost, .btn-close, .btn-print, .cat-btn, .cnt-btn,
    .card-opt, .dest-chip, .gaya-card, .pack-row, .rowbig,
    .s0-card, .s0-chip, .s0-kul-card, .s0-row, .schedcard, .stepper-btn, .card-list {
      border:2.5px solid #111 !important; border-radius:0 !important;
      box-shadow:4px 4px 0 #111 !important; font-weight:800 !important;
    }
    /* Durasi trip (.pill) — aslinya tab underline, di-brutalist-in jadi kotak */
    .pill {
      border:2.5px solid #111 !important; border-radius:0 !important;
      box-shadow:4px 4px 0 #111 !important; padding:10px 14px !important;
      display:inline-block; margin:0 8px 8px 0; background:#fff !important; font-weight:800 !important;
    }
    .pill.sel { background:#F2B90F !important; border-bottom:2.5px solid #111 !important; }
    /* Jalur transport (.tag: Kereta Api/Pesawat/Bus) — sama treatment kayak .pill */
    .tag {
      border:2.5px solid #111 !important; border-radius:0 !important;
      box-shadow:3px 3px 0 #111 !important; padding:10px 14px !important;
      display:inline-block; margin:0 8px 8px 0; background:#fff !important;
      font-weight:800 !important; font-size:13px !important;
    }
    .tag.active { background:#F2B90F !important; color:#111 !important; }
    /* Tombol Lanjut disabled — sebelumnya ikut jadi hitam pekat karena token
       --border & --text-muted sama-sama dioverride ke #111. Dikasih warna
       abu-beige sendiri biar jelas beda dari status aktif (oranye). */
    .btn-pri:disabled, #btn-next:disabled {
      background:#C9C2B4 !important; color:#6b6558 !important; border-color:#111 !important;
      box-shadow:2px 2px 0 #111 !important;
    }
    /* Cegah tinggi kartu "kedut" saat selected — kunci font-weight nama tetap sama
       di kedua state, biar nggak ada reflow baris teks bikin box tiba-tiba tambah tinggi. */
    .s0-card-name { font-weight:700 !important; }
    #btn-next, #btn-back, .btn-pri, .btn-ghost, .cat-btn { text-transform:uppercase !important; }
    #btn-next:active, .btn-pri:active, .s0-card:active, .s0-kul-card:active, .dest-chip:active {
      box-shadow:1px 1px 0 #111 !important; transform:translate(3px,3px) !important;
    }
    .s0-card.sel, .dest-chip.selected, .card-opt.selected, .gaya-card.selected, .schedcard.sel {
      background:#F2B90F !important;
    }

    /* Input biasa (bukan yang di dalam search-compact-wrap) */
    input, textarea, select {
      border:2.5px solid #111 !important; border-radius:0 !important;
      box-shadow:3px 3px 0 #111 !important; font-weight:700 !important;
    }
    /* Search bar: wrapper JADI kotaknya, input di dalam TIDAK dobel border */
    .s0-search-compact-wrap {
      border:2.5px solid #111 !important; border-radius:0 !important;
      box-shadow:4px 4px 0 #111 !important; background:#fff !important;
    }
    .s0-search-compact-wrap input {
      border:none !important; box-shadow:none !important; background:transparent !important;
    }

    /* Feedback FAB: biarkan tetap bulat, jangan ikut diseragamkan jadi kotak */
    #btnFeedback { border-radius:50% !important; bottom:96px !important; }

    /* Hero khusus (class hardcoded, tidak ikut token di atas) */
    .hero-wrap { background: linear-gradient(160deg, #F2B90F 0%, #E8532F 55%, #12233D 100%) !important; }
    .hero-title { font-family:'Arial Black',Arial,sans-serif !important; font-weight:900 !important;
      text-transform:uppercase; color:#111 !important; text-shadow:none !important; }
    .hero-title em { font-style:normal !important; background:#111; color:#F3EFE6; padding:0 6px; }
    .hero-eyebrow { background:#111 !important; color:#F3EFE6 !important; padding:4px 10px !important; display:inline-block; }
    .hero-sub { background:#fff !important; border:2.5px solid #111 !important; box-shadow:4px 4px 0 #111 !important;
      padding:10px 12px !important; color:#111 !important; max-width:none !important; }
    .hero-cta { background:#E8532F !important; color:#fff !important; border-radius:0 !important;
      border:3px solid #111 !important; box-shadow:6px 6px 0 #111 !important; text-transform:uppercase !important; }
    .hero-hint { color:#111 !important; font-weight:700; text-transform:uppercase; }
    .s0-badge-opt { border:2px solid #111 !important; background:#F2B90F !important; color:#111 !important; border-radius:0 !important; }

    /* ── Progress bar segmented (diadopsi dari eksplorasi Google Stitch) ──── */
    .step-labels {
      display:flex !important; gap:5px !important; border-bottom:none !important;
      padding-bottom:0 !important;
    }
    .step-label {
      flex:1 !important; text-align:center !important; padding:9px 2px !important; margin:0 !important;
      font-family:'Arial Black',Arial,sans-serif !important; font-size:9px !important;
      letter-spacing:0 !important; text-transform:uppercase !important;
      border:2px solid #111 !important; background:#fff !important; color:#111 !important;
      transition:background .2s, border-width .2s;
    }
    .step-label.done   { background:#E8532F !important; color:#fff !important; }
    .step-label.active { background:#F2B90F !important; color:#111 !important; border-width:3px !important; }
    #step-ind { display:none !important; } /* sliding underline lama, nggak dipakai lagi */

    /* ── Travel-time chip di timeline (diadopsi dari Stitch) ──────────────── */
    .tl-item[data-type="transport"] { padding:4px 0 10px !important; }
    .tl-item[data-type="transport"] .tl-dot {
      width:8px !important; height:8px !important; left:-19.5px !important;
      background:#fff !important; border:2px solid #111 !important; border-radius:50% !important;
    }
    .tl-item[data-type="transport"] .tl-name,
    .tl-item[data-type="transport"] .tl-type,
    .tl-item[data-type="transport"] .tl-desc { display:none !important; }
    .tl-item[data-type="transport"] .tl-time {
      display:inline-flex !important; align-items:center !important; gap:5px !important;
      background:#EDE7DA !important; border:2px solid #111 !important; box-shadow:2px 2px 0 #111 !important;
      padding:5px 10px !important; margin:0 !important; font-size:10px !important; font-weight:800 !important;
      text-transform:uppercase !important; color:#111 !important;
    }
    .tl-item[data-type="transport"] .tl-time::before { content:'🚗'; font-size:11px; }
    .tl-item[data-type="transport"] .tl-tip,
    .tl-item[data-type="transport"] .tl-cost { font-size:10.5px !important; margin-top:5px !important; }

    /* ── Toast sticker auto-hide (diadopsi dari Stitch) ────────────────────── */
    .toast-sticker {
      position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
      z-index:9998; display:flex; align-items:center; gap:9px;
      background:#F2B90F; border:3px solid #111; box-shadow:4px 4px 0 #111;
      padding:12px 20px; max-width:86vw; font-family:'Arial Black',Arial,sans-serif;
      font-size:11.5px; font-weight:900; text-transform:uppercase; color:#111;
      transition:opacity .35s ease, transform .35s ease;
    }
    .toast-sticker.hide { opacity:0; transform:translateX(-50%) translateY(16px); }
  </style>

</head>

        <input type="password" id="loginPass" placeholder="••••••••"

<script>
// ─── FIREBASE CONFIG ─────────────────────────────────────────────────────────
let db = null, auth = null;
try {
  if (typeof firebase !== 'undefined') {
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey:            'AIzaSyCHWWjnxX5-Fk9-gRTZVwyC3WDDfnLPh_s',
        authDomain:        'banyuwangi-db.firebaseapp.com',
        projectId:         'banyuwangi-db',
        storageBucket:     'banyuwangi-db.firebasestorage.app',
        messagingSenderId: '973498690850',
        appId:             '1:973498690850:web:b2d67373174542167a497b',
      });
    }
    db   = firebase.firestore();
    auth = firebase.auth();
  }
} catch(e) {
  console.warn('Firebase init gagal:', e.message);
  db = null; auth = null;
}

// ─── VISITOR ANALYTICS & FEEDBACK ───────────────────────────────────────────
const BWI_TRACK = { sessionId: null, ref: null, lastStep: -1, itineraryLogged: false, lastErrorMsg: null, errorCount: 0, maxErrors: 5 };

function bwiGetSessionId() {
  let id = sessionStorage.getItem('bwi_session_id');
  if (!id) { id = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10); sessionStorage.setItem('bwi_session_id', id); }
  return id;
}

function bwiGetRef() {
  const url = new URL(window.location.href);
  const refParam = url.searchParams.get('ref');
  if (refParam) { localStorage.setItem('bwi_ref', refParam); return refParam; }
  return localStorage.getItem('bwi_ref') || null;
}

async function bwiDetectDevice() {
  const ua = navigator.userAgent || '';
  const info = {
    type: /Tablet|iPad/i.test(ua) ? 'tablet' : (/Mobi|Android|iPhone/i.test(ua) ? 'mobile' : 'desktop'),
    os: 'Unknown', osVersion: '', model: '', browser: 'Unknown', browserVersion: '',
    screenWidth: window.screen?.width || null, screenHeight: window.screen?.height || null,
    rawUA: ua,
  };
  if (/Chrome\/([\d.]+)/.test(ua) && !/Edg|OPR/.test(ua)) { info.browser='Chrome'; info.browserVersion=ua.match(/Chrome\/([\d.]+)/)[1]; }
  else if (/Firefox\/([\d.]+)/.test(ua)) { info.browser='Firefox'; info.browserVersion=ua.match(/Firefox\/([\d.]+)/)[1]; }
  else if (/Edg\/([\d.]+)/.test(ua)) { info.browser='Edge'; info.browserVersion=ua.match(/Edg\/([\d.]+)/)[1]; }
  else if (/Version\/([\d.]+).*Safari/.test(ua)) { info.browser='Safari'; info.browserVersion=ua.match(/Version\/([\d.]+)/)[1]; }

  const androidMatch = ua.match(/Android\s([\d.]+);\s*([^)]+)\)/);
  if (androidMatch) {
    info.os = 'Android'; info.osVersion = androidMatch[1];
    info.model = androidMatch[2].split(';').pop().trim().replace(/Build\/.*$/, '').trim();
  } else if (/iPhone|iPad|iPod/.test(ua)) {
    info.os = 'iOS';
    const m = ua.match(/OS\s([\d_]+)/); if (m) info.osVersion = m[1].replace(/_/g,'.');
    info.model = /iPad/.test(ua) ? 'iPad' : 'iPhone';
  } else if (/Windows NT/.test(ua)) { info.os = 'Windows'; }
  else if (/Mac OS X/.test(ua)) { info.os = 'macOS'; }
  else if (/Linux/.test(ua)) { info.os = 'Linux'; }

  try {
    if (navigator.userAgentData?.getHighEntropyValues) {
      const hi = await navigator.userAgentData.getHighEntropyValues(['model','platformVersion']);
      if (hi.model) info.model = hi.model;
      if (hi.platformVersion) info.osVersion = hi.platformVersion;
    }
  } catch(_) {}
  return info;
}

async function bwiGetLocation() {
  try {
    const res = await fetch('https://ipwho.is/');
    const j = await res.json();
    if (j && j.success !== false) return { ip: j.ip || null, city: j.city || null, region: j.region || null, country: j.country_code || null };
  } catch(_) {}
  return { ip: null, city: null, region: null, country: null };
}

async function bwiInitTracking() {
  if (!db) return;
  BWI_TRACK.sessionId = bwiGetSessionId();
  BWI_TRACK.ref = bwiGetRef();
  try {
    const [device, location] = await Promise.all([bwiDetectDevice(), bwiGetLocation()]);
    await db.collection('visitor_logs').doc(BWI_TRACK.sessionId).set({
      sessionId: BWI_TRACK.sessionId, ref: BWI_TRACK.ref, device, location,
      firstSeen: firebase.firestore.FieldValue.serverTimestamp(),
      lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
      pageUrl: window.location.href,
    }, { merge: true });
  } catch(e) { console.warn('bwiInitTracking gagal:', e.message); }
}

function bwiLogFunnel(eventType, step) {
  if (!db || !BWI_TRACK.sessionId) return;
  db.collection('session_events').add({
    sessionId: BWI_TRACK.sessionId, ref: BWI_TRACK.ref, eventType, step: step ?? null,
    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
  }).catch(()=>{});
}

function bwiLogError(context, message, stack) {
  if (!db || !BWI_TRACK.sessionId) return;
  if (BWI_TRACK.errorCount >= BWI_TRACK.maxErrors) return;
  BWI_TRACK.errorCount++;
  db.collection('error_logs').add({
    sessionId: BWI_TRACK.sessionId, ref: BWI_TRACK.ref,
    context, message: String(message||'').slice(0,500), stack: String(stack||'').slice(0,1000),
    device: { rawUA: navigator.userAgent }, pageUrl: window.location.href,
    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
  }).catch(()=>{});
}

function bwiSubmitFeedback(rating, message) {
  if (!db || !BWI_TRACK.sessionId) return Promise.reject('no-db');
  return db.collection('feedback').add({
    sessionId: BWI_TRACK.sessionId, ref: BWI_TRACK.ref,
    rating: rating || null, message: (message||'').slice(0,1000),
    step: (typeof S !== 'undefined' ? S.step : null),
    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

window.addEventListener('error', (e) => bwiLogError('window.onerror', e.message, e.error?.stack));
window.addEventListener('unhandledrejection', (e) => bwiLogError('unhandledrejection', e.reason?.message || String(e.reason), e.reason?.stack));

bwiInitTracking();

(function bwiWireFeedbackUI() {
  const btn = document.getElementById('btnFeedback');
  const modal = document.getElementById('modalFeedback');
  if (!btn || !modal) return;
  const closeBtn = document.getElementById('closeFeedback');
  const stars = document.querySelectorAll('#feedbackStars span');
  const sendBtn = document.getElementById('btnSendFeedback');
  const msgEl = document.getElementById('feedbackMsg');
  const noteEl = document.getElementById('feedbackNote');
  let rating = 0;
  btn.addEventListener('click', () => { modal.style.display = 'flex'; });
  closeBtn.addEventListener('click', () => { modal.style.display = 'none'; });
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
  stars.forEach(s => s.addEventListener('click', () => {
    rating = parseInt(s.dataset.star, 10);
    stars.forEach(x => x.textContent = parseInt(x.dataset.star,10) <= rating ? '★' : '☆');
  }));
  sendBtn.addEventListener('click', async () => {
    sendBtn.disabled = true; sendBtn.textContent = 'Mengirim...';
    try {
      await bwiSubmitFeedback(rating, msgEl.value.trim());
      noteEl.style.display = 'block';
      setTimeout(() => {
        modal.style.display = 'none'; noteEl.style.display = 'none'; msgEl.value = '';
        rating = 0; stars.forEach(x => x.textContent = '☆');
        sendBtn.textContent = 'Kirim'; sendBtn.disabled = false;
      }, 1200);
    } catch(e) {
      sendBtn.textContent = 'Kirim'; sendBtn.disabled = false;
      alert('Gagal mengirim, coba lagi.');
    }
  });
})();

// ─── AUTH ────────────────────────────────────────────────────────────────────
let isAdmin = false;

function setAdmin(val, email) {
  isAdmin = val;
  const btn = document.getElementById('btnLogin');
  if (val) {
    btn.textContent = '🔓';
    btn.title = 'Keluar dari Admin';
    btn.style.color = '#E94560';
    btn.style.borderColor = '#E94560';
    document.getElementById('menu-username').textContent = email || 'Admin';
  } else {
    btn.textContent = '🔐';
    btn.title = 'Login admin';
    btn.style.color = '#888888';
    btn.style.borderColor = 'rgba(255,255,255,.4)';
  }
}

document.getElementById('btnLogin').addEventListener('click', (e) => {
  e.stopPropagation();
  if (isAdmin) {
    document.getElementById('user-menu').classList.toggle('open');
  } else {
    const m = document.getElementById('modalLogin');
    m.style.display = 'flex';
    setTimeout(() => document.getElementById('loginEmail').focus(), 100);
    document.getElementById('loginErr').style.display = 'none';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPass').value = '';
  }
});
document.getElementById('closeLogin').addEventListener('click', () => {
  document.getElementById('modalLogin').style.display = 'none';
  document.getElementById('loginErr').style.display = 'none';
});
document.getElementById('modalLogin').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalLogin')) {
    document.getElementById('modalLogin').style.display = 'none';
    document.getElementById('loginErr').style.display = 'none';
  }
});
document.getElementById('loginPass').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('btnDoLogin').click();
});

document.getElementById('btnDoLogin').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const btn   = document.getElementById('btnDoLogin');
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent = 'Email & password wajib diisi'; errEl.style.display = 'block'; return; }
  btn.textContent = '⏳ Memproses...'; btn.disabled = true;
  try {
    if (auth) {
      await auth.signInWithEmailAndPassword(email, pass);
      document.getElementById('modalLogin').style.display = 'none';
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPass').value = '';
    } else {
      setAdmin(true, email);
      document.getElementById('modalLogin').style.display = 'none';
    }
  } catch(e) {
    errEl.textContent = e.code === 'auth/wrong-password' ? '❌ Password salah'
      : e.code === 'auth/user-not-found'  ? '❌ Email tidak ditemukan'
      : e.code === 'auth/invalid-email'   ? '❌ Format email tidak valid'
      : '❌ ' + e.message;
    errEl.style.display = 'block';
  } finally { btn.textContent = 'Masuk'; btn.disabled = false; }
});

document.getElementById('user-menu').addEventListener('click', (e) => e.stopPropagation());
document.addEventListener('click', () => document.getElementById('user-menu').classList.remove('open'));
document.getElementById('menu-logout').addEventListener('click', async () => {
  if (auth) await auth.signOut();
  else setAdmin(false);
  document.getElementById('user-menu').classList.remove('open');
});

if (auth) {
  auth.onAuthStateChanged(user => {
    if (user) setAdmin(true, user.email || user.displayName);
    else      setAdmin(false);
  });
}
</script>

// Dikalibrasi dari pola itinerary riil operator tur lokal + tervalidasi
// terhadap seluruh nilai `Kategori` yang benar-benar ada di Firestore
// (bukan cuma 4 kategori kasar seperti sebelumnya). Aturan lebih spesifik
// dicek lebih dulu; kalau tidak ada yang cocok, fallback ke DEFAULT_DUR.
const DURASI_KATEGORI_MENIT = {
  trekking_sunrise:      300, // Kawah Ijen dkk — sudah di-override isIjen di bawah
  snorkeling:             120, // biasanya 2 spot
  pulau_kecil:             35,
  air_terjun:              90,
  gua:                      75,

  savana_dataran_tinggi:   150,

  hutan_spot_foto:         105, // De Djawatan-like
  taman_rekreasi:          120,
  sejarah_budaya:           55, // pendopo, situs
  museum_edukasi:          100,
  pantai_santai:           105,
};
const DEFAULT_DUR = 90;
const RULES_DURASI_WISATA = [
  { bucket:'trekking_sunrise',      match:['kawah'] },
  { bucket:'snorkeling',            match:['snorkeling'] },
  { bucket:'pulau_kecil',           match:['pulau'] },
  { bucket:'air_terjun',            match:['air terjun'] },
  { bucket:'gua',                   match:['goa'] },
  { bucket:'waduk_danau',           match:['waduk','danau'] },
  { bucket:'savana_dataran_tinggi', match:['savana','dataran tinggi','pegunungan','padang rumput'] },
  { bucket:'konservasi',            match:['konservasi'] },
  { bucket:'hutan_spot_foto',       match:['hutan'] },
  { bucket:'taman_rekreasi',        match:['taman kota','rekreasi','pemandian alam'] },
  { bucket:'museum_edukasi',        match:['edukasi'] },
  { bucket:'sejarah_budaya',        match:['sejarah','budaya'] },
  { bucket:'pantai_santai',         match:['pantai'] },
];
function durasiFromKategori(kategoriRaw) {
  const teks = (kategoriRaw||'').toLowerCase();
  for (const rule of RULES_DURASI_WISATA) {
    if (rule.match.some(kw => teks.includes(kw))) return DURASI_KATEGORI_MENIT[rule.bucket];
  }
  return DEFAULT_DUR;
}

function mapToWandr(id, d) {
  if (d.type !== 'wisata' || d.status === 'pending') return null;
  const nama = (d.nama||'').toLowerCase();
  const kat  = (d.kategori||'').toLowerCase();
  let cat = 'alam';
  if (kat.includes('pantai')||kat.includes('beach')||kat.includes('teluk')) cat='pantai';
  if (kat.includes('snorkel')||kat.includes('diving')||kat.includes('pulau')) cat='diving';
  if (kat.includes('kota')||kat.includes('budaya')||kat.includes('sejarah')) cat='budaya';
  const emojiBase = {alam:'🌿',pantai:'🌊',diving:'🤿',budaya:'🏛️'};
  const emojiOvr  = {'kawah ijen':'🌋','ijen':'🌋','air terjun':'💧','baluran':'🦌',
    'sukamade':'🐢','red island':'🏄','g-land':'🏄','menjangan':'🤿',
    'tabuhan':'🏝️','kawah wurung':'🏔️','green bay':'🌊','city tour':'🏛️',
    'plengsengan':'🏖️','bangsring':'🤿','pulau merah':'🏄','boom':'🌊'};
  let emoji = emojiBase[cat]||'🗺️';
  for (const [k,v] of Object.entries(emojiOvr)) { if(nama.includes(k)){emoji=v;break;} }
  const isIjen=nama.includes('ijen'), isSunset=nama.includes('red island')||nama.includes('pulau merah');
  const isNight=nama.includes('sukamade'), isCity=nama.includes('city tour');
  let bestTime='pagi';
  if(isSunset) bestTime='sore'; if(isNight) bestTime='malam'; if(isIjen) bestTime='dini hari';
  const NAMA_ZONE_OVERRIDE = {
    'kawah wurung':'barat','kawah ijen':'barat','ijen':'barat','lider':'barat',
    'telunjuk':'barat','jagir':'barat','malangsari':'barat','beji':'barat',
    'baluran':'utara','menjangan':'utara','tabuhan':'utara','wongsorejo':'utara',
    'sukamade':'selatan','alas purwo':'selatan','red island':'selatan',
    'pulau merah':'selatan','green bay':'selatan','teluk ijo':'selatan',
    'g-land':'selatan','grajagan':'selatan','wedi ireng':'selatan',
    'plengsengan':'kota','bangsring':'utara','boom':'kota',
  };
  let zone = KAWASAN_ZONE[d.kawasan] || 'kota';
  for (const [key, z] of Object.entries(NAMA_ZONE_OVERRIDE)) {
    if (nama.includes(key)) { zone = z; break; }
  }
  // isIjen tetap di-override manual (300 menit, trekking + tunggu sunrise) —
  // ini kasus khusus yang nggak bisa cuma ditebak dari teks kategori.
  const dur  = isIjen ? 300 : durasiFromKategori(d.kategori);
  const namaWords = nama.split(' ').filter(w => w.length > 2);
  const autoAliases = new Set([nama]);
  const skipWords = new Set(['pura','taman','nasional','pantai','air','gua','goa','pulau','kebun','perkebunan','padang']);
  const meaningfulWords = namaWords.filter(w => !skipWords.has(w));
  if (meaningfulWords.length > 0) {
    autoAliases.add(meaningfulWords.join(' '));
    meaningfulWords.forEach(w => autoAliases.add(w));
    for (let i = 0; i < meaningfulWords.length - 1; i++) {
      autoAliases.add(meaningfulWords[i] + ' ' + meaningfulWords[i+1]);
    }
  }
  return { id, name:d.nama, cat, emoji, desc:d.catatan||d.kategori||'', bestTime,
    zone, tiket:d.htm||0, dur, isIjen, isSunset, isNight, isCity,
    aliases: [...autoAliases],
    tips:d.catatan?`Akses ${d.akses||''}. ${d.catatan}`.trim():'', maps:d.maps||'',
    lat:d.lat||null, lng:d.lng||null };
}
