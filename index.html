<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wandr — Buat Itinerary Banyuwangi</title>
  <meta name="description" content="Generate itinerary perjalanan Banyuwangi secara otomatis dengan AI. Masukkan destinasi, pilih kendaraan dan durasi, itinerary langsung jadi.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & BASE ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    :root {
      --bg-body:    #ffeaf2;
      --app-bg:     #f8f9fe;
      --blue-main:  #5c8df6;
      --blue-light: #e0e9ff;
      --pink-main:  #ffa1c5;
      --pink-light: #ffe0ee;
      --white:      #ffffff;
      --text-dark:  #2c3e50;
      --text-muted: #8ca0b3;
      --border:     #eef2f6;
      --accent-green: #4ade80;
      --accent-orange: #fb923c;
      --accent-red: #f87171;
      --font-main: 'Nunito', system-ui, sans-serif;
    }
    
    body {
      min-height: 100vh;
      background: var(--bg-body);
      font-family: var(--font-main);
      color: var(--text-dark);
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
    }

    /* ── LAYOUT (Mobile App Simulator) ─────────────────────────────────── */
    #app { 
      width: 100%; 
      max-width: 480px; 
      background: var(--app-bg); 
      min-height: 100vh; 
      box-shadow: 0 0 40px rgba(92, 141, 246, 0.15);
      position: relative;
      overflow-x: hidden;
      display: flex; flex-direction: column;
    }

    /* ── HEADER (Hero Style) ───────────────────────────────────────────── */
    #header {
      background: linear-gradient(135deg, #74a0ff 0%, var(--blue-main) 100%);
      padding: 40px 24px 30px;
      border-radius: 0 0 30px 30px;
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      margin-bottom: 24px;
      box-shadow: 0 10px 30px rgba(92, 141, 246, 0.2);
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: var(--pink-main);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      box-shadow: 0 4px 10px rgba(255, 161, 197, 0.5);
    }
    .logo-text {
      font-family: var(--font-main);
      font-size: 24px; font-weight: 800;
      letter-spacing: -.02em;
    }
    .logo-badge {
      font-size: 10px; color: var(--blue-main);
      background: var(--white);
      padding: 4px 10px; border-radius: 20px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* ── PROGRESS ──────────────────────────────────────────────────────── */
    #progress-area { padding: 0 24px; margin-bottom: 24px; }
    .step-labels { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .step-label { font-size: 11px; font-weight: 700; color: var(--text-muted); transition: color .3s; }
    .step-label.active { color: var(--blue-main); font-weight: 800; }
    .step-label.done   { color: var(--accent-green); }
    .progress-bar { height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink-main), var(--blue-main));
      border-radius: 4px;
      transition: width .5s ease;
    }

    #content { padding: 0 24px 30px; flex: 1; }

    /* ── NAV BUTTONS ───────────────────────────────────────────────────── */
    #nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px 24px;
      background: var(--white);
      border-top: 1px solid var(--border);
      border-radius: 30px 30px 0 0;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.03);
      position: sticky; bottom: 0; z-index: 10;
    }
    .dest-count { font-size: 12px; font-weight: 700; color: var(--text-muted); }

    .btn-pri {
      background: var(--blue-main); color: var(--white); border: none;
      border-radius: 20px; padding: 14px 24px;
      font-family: inherit; font-weight: 800; font-size: 15px;
      cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 15px rgba(92, 141, 246, 0.3);
      white-space: nowrap;
    }
    .btn-pri:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(92, 141, 246, 0.4); }
    .btn-pri:disabled { opacity: .5; cursor: not-allowed; transform: none !important; box-shadow: none; }
    .btn-ghost {
      background: var(--blue-light); color: var(--blue-main);
      border: none; border-radius: 20px; padding: 14px 24px;
      font-family: inherit; font-weight: 800; font-size: 15px;
      cursor: pointer; transition: all .2s;
    }
    .btn-ghost:hover  { background: #d0dcff; }
    .btn-ghost.hidden { visibility: hidden; display: none; }

    /* ── TYPOGRAPHY ────────────────────────────────────────────────────── */
    .step-title {
      font-size: 24px; font-weight: 800; color: var(--blue-main);
      margin-bottom: 6px; line-height: 1.3;
    }
    .step-sub { color: var(--text-muted); font-size: 14px; font-weight: 600; margin-bottom: 24px; }
    .field-label {
      display: block; font-size: 13px; font-weight: 800;
      color: var(--text-dark); margin-bottom: 10px;
    }
    .field-wrap { margin-bottom: 24px; }

    /* ── SELECT & INPUT ────────────────────────────────────────────────── */
    select, input[type="text"], input[type="time"],
    input[type="email"], input[type="password"], textarea {
      background: var(--white);
      border: 2px solid transparent;
      color: var(--text-dark); border-radius: 16px; padding: 14px 16px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      outline: none; transition: all .2s;
      width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
      direction: ltr !important; text-align: left !important;
    }
    select:focus, input:focus { border-color: var(--blue-main); box-shadow: 0 4px 15px var(--blue-light); }
    .select-wrap { position: relative; }
    .select-arrow { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-muted); font-size: 14px; font-weight: 800; }

    /* ── CARD OPTIONS ──────────────────────────────────────────────────── */
    .card-list { display: flex; flex-direction: column; gap: 12px; }
    .card-opt {
      padding: 16px; border-radius: 20px;
      background: var(--white);
      border: 2px solid transparent;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }
    .card-opt:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.06); }
    .card-opt.selected { background: var(--pink-light); border-color: var(--pink-main); box-shadow: 0 6px 20px rgba(255, 161, 197, 0.2); }
    .card-opt.sm { padding: 14px; border-radius: 16px; }
    .card-opt-icon { font-size: 26px; flex-shrink: 0; }
    .card-opt.sm .card-opt-icon { font-size: 22px; }
    .card-opt-title { font-size: 15px; font-weight: 800; color: var(--text-dark); transition: color .2s; margin-bottom: 2px; }
    .card-opt.sm .card-opt-title { font-size: 14px; }
    .card-opt.selected .card-opt-title { color: var(--pink-main); }
    .card-opt-sub { font-size: 12px; color: var(--text-muted); font-weight: 600; }
    .card-opt.sm .card-opt-sub { font-size: 11px; }
    .card-opt-check { color: var(--pink-main); font-size: 16px; font-weight: 800; flex-shrink: 0; margin-left: auto; opacity: 0; transition: opacity .2s; }
    .card-opt.selected .card-opt-check { opacity: 1; }

    /* ── PILL OPTIONS ──────────────────────────────────────────────────── */
    .pill-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill-opt {
      padding: 12px 16px; border-radius: 16px;
      background: var(--white);
      border: 2px solid transparent; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      cursor: pointer; transition: all .2s; text-align: center; flex: 1; min-width: 80px;
    }
    .pill-opt.selected { background: var(--blue-light); border-color: var(--blue-main); }
    .pill-label { font-size: 14px; font-weight: 800; color: var(--text-dark); }
    .pill-opt.selected .pill-label { color: var(--blue-main); }
    .pill-sub { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-top: 4px; }

    /* ── GAYA CARDS ────────────────────────────────────────────────────── */
    .gaya-row { display: flex; gap: 12px; }
    .gaya-card {
      flex: 1; padding: 20px 16px; border-radius: 20px;
      background: var(--white); border: 2px solid transparent;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
      cursor: pointer; transition: all .2s; text-align: center;
    }
    .gaya-card.selected { background: var(--pink-light); border-color: var(--pink-main); }
    .gaya-emoji { font-size: 32px; margin-bottom: 12px; }
    .gaya-label { font-size: 16px; font-weight: 800; color: var(--text-dark); }
    .gaya-card.selected .gaya-label { color: var(--pink-main); }
    .gaya-desc  { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-top: 8px; line-height: 1.5; white-space: pre-line; }

    /* ── COUNTER ───────────────────────────────────────────────────────── */
    .counter-row { display: flex; align-items: center; gap: 16px; background: var(--white); padding: 8px; border-radius: 20px; width: fit-content; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
    .cnt-btn {
      background: var(--blue-light); color: var(--blue-main);
      border: none; border-radius: 14px; width: 40px; height: 40px;
      font-size: 20px; font-weight: 800; cursor: pointer; transition: all .2s;
    }
    .cnt-btn:hover { background: #d0dcff; }
    .cnt-val   { font-size: 20px; font-weight: 800; min-width: 32px; text-align: center; color: var(--text-dark); }
    .cnt-label { font-size: 14px; color: var(--text-muted); font-weight: 700; padding-right: 12px; }

    /* ── DESTINATION TAGS ──────────────────────────────────────────────── */
    .dest-tag-pill {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
      background: var(--pink-light); border: 2px solid var(--pink-main);
      border-radius: 20px; margin: 4px; box-shadow: 0 4px 10px rgba(255,161,197,0.2);
    }
    .dt-name { font-size: 13px; font-weight: 800; color: var(--pink-main); }
    .dt-remove { cursor: pointer; color: var(--pink-main); font-size: 14px; font-weight: 800; margin-left: 4px; opacity: 0.6; }

    /* ── AUTOCOMPLETE & SUGGESTIONS ────────────────────────────────────── */
    .autocomplete-dropdown {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0; z-index: 100;
      background: var(--white); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-height: 260px; overflow-y: auto;
    }
    .autocomplete-item {
      padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; transition: background .15s;
    }
    .autocomplete-item:hover, .autocomplete-item.active { background: var(--blue-light); }
    .autocomplete-item-name { font-size: 14px; font-weight: 800; color: var(--text-dark); }
    .autocomplete-item-sub  { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-top: 2px; }
    
    .sewa-wrap { overflow: hidden; max-height: 0; opacity: 0; transition: all .35s ease; }
    .sewa-wrap.open { max-height: 600px; opacity: 1; }
    .sewa-box { padding: 20px; border-radius: 20px; background: var(--blue-light); margin-bottom: 16px; }
    .sewa-title { font-size: 14px; font-weight: 800; color: var(--blue-main); margin-bottom: 6px; }
    .sewa-sub { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 16px; }
    .card-opt.sewa-sel { background: var(--blue-main) !important; color: white !important; }
    .card-opt.sewa-sel .card-opt-title, .card-opt.sewa-sel .card-opt-sub, .card-opt.sewa-sel .card-opt-check { color: white !important; }

    /* ── LOADING & ERROR ───────────────────────────────────────────────── */
    .loading-screen { text-align: center; padding: 60px 0; }
    .loading-icon { font-size: 60px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .loading-title { font-size: 22px; font-weight: 800; color: var(--blue-main); margin-bottom: 12px; }
    .loading-sub { color: var(--text-muted); font-size: 14px; font-weight: 600; line-height: 1.6; }
    .loading-tags { display: flex; gap: 8px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }
    .loading-tag { font-size: 12px; font-weight: 700; color: var(--pink-main); background: var(--pink-light); padding: 6px 14px; border-radius: 20px; }

    /* ── RESULTS / ITINERARY ───────────────────────────────────────────── */
    .result-summary {
      padding: 20px; background: linear-gradient(135deg, var(--blue-main), #8ca0ff);
      border-radius: 24px; margin-bottom: 24px; color: white; box-shadow: 0 10px 30px rgba(92,141,246,0.3);
    }
    .result-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; line-height: 1.2; }
    .result-budget-label { font-size: 11px; font-weight: 700; opacity: 0.9; }
    .result-budget-val { font-size: 18px; font-weight: 800; }
    .result-desc { font-size: 13px; font-weight: 600; opacity: 0.9; line-height: 1.6; margin-bottom: 16px; }
    .highlight-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .highlight-tag { font-size: 11px; font-weight: 800; padding: 4px 12px; background: rgba(255,255,255,0.2); border-radius: 20px; }

    .day-section { margin-bottom: 30px; animation: slideUp .5s ease both; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .day-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .day-num {
      width: 40px; height: 40px; background: var(--pink-main); color: white;
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; flex-shrink: 0; box-shadow: 0 4px 10px var(--pink-light);
    }
    .day-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .day-title-txt { font-size: 18px; font-weight: 800; color: var(--text-dark); line-height: 1.3; }

    /* ── TIMELINE ACTIVITIES ───────────────────────────────────────────── */
    .act-item { display: flex; gap: 16px; margin-bottom: 16px; }
    .act-timeline { display: flex; flex-direction: column; align-items: center; width: 24px; flex-shrink: 0; }
    .act-icon { font-size: 20px; background: white; border-radius: 50%; z-index: 2; }
    .act-line { width: 2px; flex: 1; background: var(--border); margin: 4px 0; border-radius: 2px; }
    .act-body { flex: 1; background: white; padding: 16px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid var(--border); }
    .act-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .act-time { font-size: 13px; font-weight: 800; color: var(--blue-main); }
    .act-duration { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-left: 8px; }
    .act-cost { font-size: 11px; font-weight: 800; color: var(--accent-green); background: #dcfce7; padding: 4px 10px; border-radius: 10px; }
    .act-name { font-size: 15px; font-weight: 800; color: var(--text-dark); line-height: 1.3; }
    .act-location { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-top: 4px; }
    .act-desc { font-size: 13px; font-weight: 600; color: var(--text-muted); line-height: 1.6; margin-top: 8px; }
    .act-tip { margin-top: 10px; padding: 10px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; line-height: 1.5; }

    /* ── PLANNING BOARD ────────────────────────────────────────────────── */
    .planning-board { display: flex; flex-direction: column; gap: 16px; }
    .plan-col { background: white; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 6px 20px rgba(0,0,0,0.03); overflow: hidden; }
    .plan-col.locked { opacity: 0.6; background: #f1f5f9; }
    .plan-col-header { 
      display: flex; align-items: center; gap: 10px; padding: 16px; 
      font-size: 14px; font-weight: 800; color: var(--text-dark); 
      background: #f8fafc; border-bottom: 1px solid var(--border); 
    }
    .plan-col-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
    .plan-day-badge { 
      width: 26px; height: 26px; border-radius: 8px; background: var(--pink-main); color: white; 
      font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; 
    }
    
    .drag-item { 
      display: flex; align-items: center; gap: 12px; padding: 12px; 
      border-radius: 16px; background: var(--app-bg); border: 1px solid var(--border);
      transition: all .2s; cursor: grab;
    }
    .sortable-chosen { background: var(--blue-light) !important; border-color: var(--blue-main) !important; transform: scale(1.02); box-shadow: 0 10px 25px rgba(92,141,246,0.2); }
    .sortable-ghost { opacity: 0.4; border: 2px dashed var(--blue-main) !important; background: transparent !important; }
    .drag-handle { color: var(--text-muted); font-weight: 800; font-size: 18px; padding: 0 4px; }
    .drag-emoji { font-size: 24px; }
    .drag-title { font-size: 14px; font-weight: 800; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .drag-zone { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-top: 2px; }

    /* ── AUTH MODAL ────────────────────────────────────────────────────── */
    #modalLogin { display:none;position:fixed;inset:0;background:rgba(44, 62, 80, 0.6); backdrop-filter:blur(6px);z-index:9999;align-items:center;justify-content:center;padding:24px; }
    .modal-box { background:white;border-radius:30px;width:100%;max-width:360px;padding:32px;box-shadow:0 20px 50px rgba(0,0,0,0.2); }
    
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<div id="modalLogin">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <div>
        <div style="font-size:22px;font-weight:800;color:var(--blue-main)">🔐 Masuk Admin</div>
        <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-top:4px">Wandr · Banyuwangi</div>
      </div>
      <button id="closeLogin" style="background:var(--pink-light);border:none;color:var(--pink-main);width:36px;height:36px;border-radius:50%;font-size:16px;font-weight:800;cursor:pointer">✕</button>
    </div>
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:12px;font-weight:800;color:var(--text-dark);margin-bottom:8px">Email</label>
      <input type="email" id="loginEmail" placeholder="admin@email.com" style="background:var(--app-bg);border:2px solid transparent;">
    </div>
    <div style="margin-bottom:24px">
      <label style="display:block;font-size:12px;font-weight:800;color:var(--text-dark);margin-bottom:8px">Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" style="background:var(--app-bg);border:2px solid transparent;">
    </div>
    <button id="btnDoLogin" style="width:100%;padding:16px;background:var(--blue-main);color:white;border:none;border-radius:20px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 20px rgba(92,141,246,0.3)">Masuk</button>
    <p id="loginErr" style="display:none;font-size:12px;font-weight:700;color:var(--accent-red);margin-top:16px;text-align:center;"></p>
  </div>
</div>

<div class="user-menu" id="user-menu" style="position:absolute;top:70px;right:24px;z-index:100;background:white;border-radius:20px;padding:8px;box-shadow:0 10px 30px rgba(0,0,0,0.1);display:none;border:1px solid var(--border);">
  <div class="user-menu-item" id="menu-profile" style="padding:12px 16px;font-size:14px;font-weight:800;color:var(--text-dark);">
    <span>🔓</span> <span id="menu-username">Admin</span>
  </div>
  <div class="user-menu-item" onclick="window.location.href='admin.html'" style="padding:12px 16px;font-size:14px;font-weight:700;color:var(--blue-main);cursor:pointer;">
    <span>📊</span> Dashboard Admin
  </div>
  <div class="user-menu-item danger" id="menu-logout" style="padding:12px 16px;font-size:14px;font-weight:800;color:var(--pink-main);border-top:1px solid var(--border);margin-top:4px;cursor:pointer;">
    <span>🚪</span> Keluar
  </div>
</div>


<div id="app">

  <div id="header">
    <div class="logo-icon">🗺️</div>
    <div>
      <div class="logo-text">Wandr</div>
    </div>
    <span class="logo-badge">Banyuwangi</span>
    <button id="btnLogin" title="Login admin"
      style="margin-left:auto;background:rgba(255,255,255,0.2);border:none;
      color:white;width:40px;height:40px;border-radius:14px;font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      🔐
    </button>
  </div>

  <div id="progress-area">
    <div class="step-labels">
      <span class="step-label active" data-i="0">Destinasi</span>
      <span class="step-label"        data-i="1">Transport</span>
      <span class="step-label"        data-i="2">Preferensi</span>
      <span class="step-label"        data-i="3">Susun</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="content"></div>

  <div id="nav">
    <button class="btn-ghost hidden" id="btn-back">← Kembali</button>
    <span class="dest-count" id="dest-count"></span>
    <button class="btn-pri" id="btn-next" disabled>Lanjut →</button>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ── FIREBASE CONFIG ──
let db = null, auth = null;
try {
  if (typeof firebase !== 'undefined') {
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey:            'AIzaSyCHWWjnxX5-Fk9-gRTZVwyC3WDDfnLPh_s',
        authDomain:        'banyuwangi-db.firebaseapp.com',
        projectId:         'banyuwangi-db',
        storageBucket:     'banyuwangi-db.firebasestorage.app',
        messagingSenderId: '973498690850',
        appId:             '1:973498690850:web:b2d67373174542167a497b',
      });
    }
    db   = firebase.firestore();
    auth = firebase.auth();
  }
} catch(e) { db = null; auth = null; }

// ── AUTH LOGIC ──
let isAdmin = false;
function setAdmin(val, email) {
  isAdmin = val;
  const btn = document.getElementById('btnLogin');
  if (val) {
    btn.textContent = '🔓';
    btn.style.background = 'var(--pink-main)';
    document.getElementById('menu-username').textContent = email || 'Admin';
  } else {
    btn.textContent = '🔐';
    btn.style.background = 'rgba(255,255,255,0.2)';
  }
}

document.getElementById('btnLogin').addEventListener('click', (e) => {
  e.stopPropagation();
  if (isAdmin) { document.getElementById('user-menu').style.display = document.getElementById('user-menu').style.display === 'block' ? 'none' : 'block'; } 
  else { document.getElementById('modalLogin').style.display = 'flex'; setTimeout(() => document.getElementById('loginEmail').focus(), 100); }
});
document.getElementById('closeLogin').addEventListener('click', () => { document.getElementById('modalLogin').style.display = 'none'; });
document.getElementById('btnDoLogin').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim(), pass = document.getElementById('loginPass').value, errEl = document.getElementById('loginErr'), btn = document.getElementById('btnDoLogin');
  errEl.style.display = 'none'; if (!email || !pass) { errEl.textContent = 'Required'; errEl.style.display = 'block'; return; }
  btn.textContent = 'Memproses...'; btn.disabled = true;
  try {
    if (auth) { await auth.signInWithEmailAndPassword(email, pass); document.getElementById('modalLogin').style.display = 'none'; } 
    else { setAdmin(true, email); document.getElementById('modalLogin').style.display = 'none'; }
  } catch(e) { errEl.textContent = e.message; errEl.style.display = 'block'; } 
  finally { btn.textContent = 'Masuk'; btn.disabled = false; }
});
document.addEventListener('click', () => { const m = document.getElementById('user-menu'); if(m) m.style.display='none'; });
document.getElementById('menu-logout').addEventListener('click', async () => { if(auth) await auth.signOut(); else setAdmin(false); });
if (auth) { auth.onAuthStateChanged(user => { if (user) setAdmin(true, user.email || user.displayName); else setAdmin(false); }); }

// ── APP LOGIC & DATA ──
const KAWASAN_ZONE = { 'Licin':'barat','Wongsorejo':'utara','Pesanggaran':'selatan','Pusat Kota':'kota' }; // Simplified for brevity in mapping
function mapToWandr(id, d) {
  if (d.type !== 'wisata' || d.status === 'pending') return null;
  const nama = (d.nama||'').toLowerCase(), kat = (d.kategori||'').toLowerCase();
  let cat = 'alam'; if(kat.includes('pantai')||kat.includes('teluk')) cat='pantai'; if(kat.includes('snork')) cat='diving'; if(kat.includes('kota')) cat='budaya';
  const emojiBase = {alam:'🌿',pantai:'🌊',diving:'🤿',budaya:'🏛️'}, emojiOvr = {'ijen':'🌋','air terjun':'💧','sukamade':'🐢','red island':'🏄'};
  let emoji = emojiBase[cat]||'🗺️'; for (const [k,v] of Object.entries(emojiOvr)) { if(nama.includes(k)){emoji=v;break;} }
  const isIjen=nama.includes('ijen'), isSunset=nama.includes('pulau merah'), isNight=nama.includes('sukamade'), isCity=nama.includes('city');
  let bestTime='pagi'; if(isSunset) bestTime='sore'; if(isNight) bestTime='malam'; if(isIjen) bestTime='dini hari';
  let zone = KAWASAN_ZONE[d.kawasan] || 'kota';
  const namaWords = nama.split(' ').filter(w => w.length > 2); const autoAliases = new Set([nama]);
  return { id, name:d.nama, cat, emoji, desc:d.catatan||d.kategori||'', bestTime, zone, tiket:d.htm||0, dur: isIjen?300:180, isIjen, isSunset, isNight, isCity, aliases: [...autoAliases], tips:d.catatan||'', lat:d.lat||null, lng:d.lng||null };
}

let DESTINATIONS = [];
const DESTINATIONS_FALLBACK = [
  { id:'ijen', name:'Kawah Ijen', cat:'alam', emoji:'🌋', desc:'Blue fire', bestTime:'dini hari', zone:'barat', tiket:5000, dur:300, isIjen:true, aliases:['ijen','kawah ijen'] },
  { id:'baluran', name:'TN Baluran', cat:'alam', emoji:'🦌', desc:'Afrika van Java', bestTime:'pagi', zone:'utara', tiket:15000, dur:240, aliases:['baluran'] },
  { id:'red_island', name:'Red Island', cat:'pantai', emoji:'🏄', desc:'Sunset', bestTime:'sore', zone:'selatan', tiket:10000, dur:180, isSunset:true, aliases:['red island'] },
];

function showLoadingDest() {
  document.getElementById('content').innerHTML = `<div class="loading-screen"><div class="loading-icon">🌿</div><div class="loading-title">Memuat data...</div></div>`;
  document.getElementById('nav').style.display='none'; document.getElementById('progress-area').style.display='none';
}

async function loadDestinations() {
  showLoadingDest();
  if (!db) { DESTINATIONS = DESTINATIONS_FALLBACK; return; }
  try {
    const snap = await db.collection('places').get(); window._placesCache = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    const loaded = snap.docs.map(doc => mapToWandr(doc.id, doc.data())).filter(Boolean);
    DESTINATIONS = loaded.length > 0 ? loaded : DESTINATIONS_FALLBACK;
  } catch(e) { DESTINATIONS = DESTINATIONS_FALLBACK; }
}

const KOTA = ['Surabaya','Jakarta','Bali','Malang','Lainnya'];
const DURASI = [ { v:'1D', label:'1 Hari', sub:'One Day' }, { v:'2D1N', label:'2H 1M', sub:'Weekend' }, { v:'3D2N', label:'3H 2M', sub:'Long Weekend' } ];
const PENGINAPAN = [ { v:'hotel45', label:'Hotel 4-5', range:'400K+', emoji:'🏨' }, { v:'hotel12', label:'Budget Hotel', range:'100K+', emoji:'🏪' } ];
const ACT_STYLE = {
  aktivitas:  { color:'#ffa1c5', bg:'rgba(255, 161, 197, 0.15)',  icon:'🎯' },
  makan:      { color:'#4ade80', bg:'rgba(74, 222, 128, 0.15)',  icon:'🍽️' },
  transport:  { color:'#5c8df6', bg:'rgba(92, 141, 246, 0.15)', icon:'🚌' },
  penginapan: { color:'#c084fc', bg:'rgba(192, 132, 252, 0.15)', icon:'🏨' },
  istirahat:  { color:'#8ca0b3', bg:'rgba(140, 160, 179, 0.15)', icon:'☕' },
};

const S = { step: 0, destinations: new Set(), destInput: '', kotaAsal: '', kotaAsalCustom: '', transport: '', subTransport: '', waktuTiba: '10:00', waktuPulang: '13:00', sewaLokal: new Set(), durasi: '', gayaPerjalanan: '', penginapan: '', penginapanId: '', penginapanData: null, penginapanCustom: '', penginapanSearchQuery: '', penginapanOptions: [], allPenginapan: [], kulinerOptions: [], kulinerCustom: '', jumlahOrang: 2, planDays: [], planBacklog: [], planArrivalExtras: [], loading: false, itinerary: null, error: null };
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = n => n>=1000?Math.round(n/1000)+'K':String(n);

function updateProgress() {
  document.getElementById('progress-fill').style.width = (S.step >= 4 ? 100 : (S.step / 4) * 100) + '%';
  document.querySelectorAll('.step-label').forEach(el => el.className = 'step-label' + (+el.dataset.i===S.step?' active': +el.dataset.i<S.step?' done':''));
  document.getElementById('progress-area').style.display = (S.step===3 && (S.loading || S.itinerary)) ? 'none' : '';
}
function updateNav() {
  const nav = document.getElementById('nav'); if (S.step===3 && (S.loading || S.itinerary)) { nav.style.display='none'; return; } nav.style.display = 'flex';
  document.getElementById('btn-back').className = 'btn-ghost' + (S.step===0?' hidden':'');
  document.getElementById('dest-count').textContent = S.destinations.size>0 ? S.destinations.size+' dipilih' : '';
  document.getElementById('btn-next').disabled = !canNext(); document.getElementById('btn-next').textContent = S.step===3 ? '✨ Generate' : 'Lanjut →';
}
function canNext() {
  if (S.step===0) return S.destinations.size > 0;
  if (S.step===1) return S.kotaAsal && S.transport && (S.transport==='umum' ? !!S.subTransport : true);
  if (S.step===2) return S.durasi && S.gayaPerjalanan && (S.penginapan || S.penginapanId || S.penginapanCustom.trim());
  return true;
}

function matchScore(term, d) { return d.name.toLowerCase().includes(term.toLowerCase().trim()) ? 100 : 0; }
function parseDestInput(text) { S.destinations.clear(); text.split(',').map(s=>s.trim()).filter(Boolean).forEach(t => { DESTINATIONS.forEach(d => { if(matchScore(t, d) > 50) S.destinations.add(d.id); }); }); }

async function loadPenginapanOptions() { /* Mock load logic for brevity */ S.penginapanOptions = (S.allPenginapan||[]).slice(0,4); }

// ── RENDER ENGINE ──
function renderStep0() {
  const matched = DESTINATIONS.filter(d=>S.destinations.has(d.id));
  const tags = matched.map(d => `<div class="dest-tag-pill"><span>${d.emoji}</span><span class="dt-name">${esc(d.name)}</span><span data-remove="${d.id}" class="dt-remove">✕</span></div>`).join('');
  const suggestions = DESTINATIONS.filter(d=>!S.destinations.has(d.id)).slice(0,6).map(d=>`<button data-suggest="${d.id}" style="background:var(--white);border:1px solid var(--border);color:var(--text-muted);border-radius:16px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;margin:4px;box-shadow:0 2px 8px rgba(0,0,0,0.02)">${d.emoji} ${d.name}</button>`).join('');

  return `
    <h2 class="step-title">Ke Banyuwangi,<br>mau kemana aja?</h2>
    <p class="step-sub">Ketik nama destinasi impianmu</p>
    <div class="field-wrap" style="position:relative;">
      <input type="text" id="dest-input" placeholder="Kawah Ijen, Baluran..." value="${esc(S.destInput)}" style="padding-right:40px; font-size:15px; background: white;">
    </div>
    <div id="dest-tags-area" style="${matched.length>0?'':'display:none'};margin-bottom:24px">
      <div style="font-size:12px;font-weight:800;color:var(--text-muted);margin-bottom:8px">✓ Destinasi Dikenali:</div>
      <div id="dest-tags-list" style="display:flex;flex-wrap:wrap;">${tags}</div>
    </div>
    <div style="margin-bottom:24px">
      <div id="dest-suggest-label" style="font-size:12px;font-weight:800;color:var(--text-muted);margin-bottom:8px">Saran Destinasi Populer:</div>
      <div id="dest-suggestions" style="display:flex;flex-wrap:wrap;">${suggestions}</div>
    </div>`;
}

function renderStep1() {
  const transCards = [ { v:'pribadi_motor', l:'Motor Pribadi', e:'🏍️' }, { v:'umum', l:'Transportasi Umum', e:'🚂' } ].map(t => `<div class="card-opt${S.transport===t.v?' selected':''}" data-transport="${t.v}"><span class="card-opt-icon">${t.e}</span><div><div class="card-opt-title">${t.l}</div></div><span class="card-opt-check">✓</span></div>`).join('');
  return `
    <h2 class="step-title">Naik apa?</h2>
    <p class="step-sub">Pilih kota asal dan kendaraan</p>
    <div class="field-wrap">
      <label class="field-label">Kota Asal</label>
      <div class="select-wrap"><select id="sel-kota"><option value="">Pilih kota...</option>${KOTA.map(k=>`<option value="${k}"${S.kotaAsal===k?' selected':''}>${k}</option>`).join('')}</select><span class="select-arrow">▾</span></div>
    </div>
    <div class="field-wrap"><label class="field-label">Kendaraan</label><div class="card-list">${transCards}</div></div>
    <div class="sewa-wrap${S.transport==='umum'?' open':''}" id="sub-trans-wrap">
      <div class="sewa-box">
        <div class="sewa-title">Kendaraan Umum</div>
        <div style="display:flex;gap:10px;margin-top:12px">
          ${[{v:'kereta',l:'Kereta',e:'🚂'},{v:'pesawat',l:'Pesawat',e:'✈️'}].map(t=>`<div class="card-opt sm${S.subTransport===t.v?' selected':''}" data-sub="${t.v}" style="flex:1;flex-direction:column;text-align:center;gap:6px"><span style="font-size:24px">${t.e}</span><div class="card-opt-title" style="font-size:13px">${t.l}</div></div>`).join('')}
        </div>
      </div>
    </div>`;
}

function renderStep2() {
  const durasiBtns = DURASI.map(d => `<div class="pill-opt${S.durasi===d.v?' selected':''}" data-durasi="${d.v}"><div class="pill-label">${d.label}</div></div>`).join('');
  const gayaCards = [{ v:'santai', e:'🌴', l:'Santai' }, { v:'eksplorasi', e:'⚡', l:'Eksplorasi' }].map(g => `<div class="gaya-card${S.gayaPerjalanan===g.v?' selected':''}" data-gaya="${g.v}"><div class="gaya-emoji">${g.e}</div><div class="gaya-label">${g.l}</div></div>`).join('');
  return `
    <h2 class="step-title">Preferensi Trip</h2>
    <p class="step-sub">Sesuaikan gaya travelingmu</p>
    <div class="field-wrap"><label class="field-label">Durasi Perjalanan</label><div class="pill-row">${durasiBtns}</div></div>
    <div class="field-wrap"><label class="field-label">Gaya Perjalanan</label><div class="gaya-row">${gayaCards}</div></div>
    <div class="field-wrap"><label class="field-label">Jumlah Orang</label>
      <div class="counter-row"><button class="cnt-btn" id="btn-minus">−</button><span class="cnt-val" id="cnt-val">${S.jumlahOrang}</span><button class="cnt-btn" id="btn-plus">+</button><span class="cnt-label">Orang</span></div>
    </div>
    <div class="field-wrap"><label class="field-label">Penginapan Sementara</label>
      <input type="text" id="input-penginapan-custom" placeholder="Ketik nama penginapan..." value="${esc(S.penginapanCustom)}">
    </div>`;
}

function renderPlanningBoard() {
  if (!S.planDays || S.planDays.length === 0) { S.planDays = [['ijen'], ['baluran']]; } // Mock initialization
  const actDayHTML = S.planDays.map((ids, i) => {
    return `<div class="plan-col">
      <div class="plan-col-header"><span class="plan-day-badge">${i+2}</span> Hari ${i+2}</div>
      <div class="plan-col-body" id="bucket-day${i}">
        ${ids.map(id => { const d = DESTINATIONS.find(x=>x.id===id); return d?`<div class="drag-item" data-id="${id}"><span class="drag-handle">≡</span><span class="drag-emoji">${d.emoji}</span><div class="drag-info"><div class="drag-title">${d.name}</div></div></div>`:''; }).join('')}
      </div>
    </div>`;
  }).join('');
  return `<h2 class="step-title">Susun Perjalanan</h2><p class="step-sub">Tahan dan geser kartu ke hari yang diinginkan</p><div class="planning-board">${actDayHTML}</div>`;
}

function renderStep3() {
  if (S.loading) return `<div class="loading-screen"><div class="loading-icon">🗺️</div><h3 class="loading-title">Menyusun Rute Terbaik</h3><p class="loading-sub">AI sedang mengatur jadwal perjalananmu...</p></div>`;
  if (S.itinerary) {
    const days = S.itinerary.days.map((day, di) => {
      const acts = day.activities.map((act, ai) => {
        const as = ACT_STYLE[act.type] || ACT_STYLE.aktivitas;
        return `<div class="act-item">
          <div class="act-timeline"><span class="act-icon">${as.icon}</span>${ai!==day.activities.length-1?'<div class="act-line"></div>':''}</div>
          <div class="act-body">
            <div class="act-meta"><span class="act-time">${act.time}</span><span class="act-cost">~${fmt(act.estimatedCost)}</span></div>
            <div class="act-name">${act.name}</div><div class="act-desc">${act.description}</div>
            ${act.tips?`<div class="act-tip" style="background:${as.bg};color:${as.color}">💡 ${act.tips}</div>`:''}
          </div>
        </div>`;
      }).join('');
      return `<div class="day-section"><div class="day-header"><div class="day-num">${day.day}</div><div><div class="day-label">${day.date_label}</div><div class="day-title-txt">${day.title}</div></div></div>${acts}</div>`;
    }).join('');
    return `<div class="result-summary"><div class="result-title">Itinerary Banyuwangi ✨</div><div class="result-budget-val">Estimasi: Rp 1.5JT - 2JT / org</div></div>${days}<button class="btn-pri" style="width:100%; justify-content:center; margin-top:20px;" id="btn-restart">Buat Itinerary Baru</button>`;
  }
  return '';
}

function updateDestFeedback() { /* Partial DOM updates for input to avoid jumpiness */ }

function render() {
  const c = document.getElementById('content');
  switch (S.step) { case 0: c.innerHTML = renderStep0(); break; case 1: c.innerHTML = renderStep1(); break; case 2: c.innerHTML = renderStep2(); break; case 3: c.innerHTML = (S.loading || S.itinerary) ? renderStep3() : renderPlanningBoard(); if(!S.loading&&!S.itinerary) setTimeout(initSortableBoard, 100); break; }
  updateProgress(); updateNav(); attachListeners();
}

function attachListeners() {
  const c = document.getElementById('content');
  const destInput = document.getElementById('dest-input'); if (destInput) { destInput.addEventListener('input', () => { S.destInput = destInput.value; parseDestInput(S.destInput); render(); }); destInput.focus(); }
  c.querySelectorAll('[data-suggest]').forEach(el => el.addEventListener('click', () => { const d = DESTINATIONS.find(x=>x.id===el.dataset.suggest); if(d){ S.destinations.add(d.id); S.destInput = S.destInput ? S.destInput+', '+d.name : d.name; render(); } }));
  c.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => { S.destinations.delete(el.dataset.remove); render(); }));
  const selKota = document.getElementById('sel-kota'); if (selKota) selKota.addEventListener('change', () => { S.kotaAsal = selKota.value; render(); });
  c.querySelectorAll('[data-transport]').forEach(el => el.addEventListener('click', () => { S.transport = el.dataset.transport; render(); }));
  c.querySelectorAll('[data-sub]').forEach(el => el.addEventListener('click', () => { S.subTransport = el.dataset.sub; render(); }));
  c.querySelectorAll('[data-durasi]').forEach(el => el.addEventListener('click', () => { S.durasi = el.dataset.durasi; render(); }));
  c.querySelectorAll('[data-gaya]').forEach(el => el.addEventListener('click', () => { S.gayaPerjalanan = el.dataset.gaya; render(); }));
  const inpHotel = document.getElementById('input-penginapan-custom'); if (inpHotel) inpHotel.addEventListener('input', () => { S.penginapanCustom = inpHotel.value; S.penginapan='custom'; updateNav(); });
  const minus = document.getElementById('btn-minus'), plus = document.getElementById('btn-plus');
  if (minus) minus.addEventListener('click', () => { S.jumlahOrang = Math.max(1, S.jumlahOrang-1); render(); });
  if (plus) plus.addEventListener('click', () => { S.jumlahOrang = Math.min(20, S.jumlahOrang+1); render(); });
  const restart = document.getElementById('btn-restart'); if (restart) restart.addEventListener('click', () => { window.location.reload(); });
}

document.getElementById('btn-back').addEventListener('click', () => { S.step--; render(); });
document.getElementById('btn-next').addEventListener('click', async () => {
  if (S.step===3) { S.loading=true; render(); setTimeout(mockGenerate, 1500); } 
  else { S.step++; render(); }
});

function initSortableBoard() { document.querySelectorAll('.plan-col-body').forEach(col => { new Sortable(col, { group: 'wandr-board', animation: 200, ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen' }); }); }
function mockGenerate() { S.loading=false; S.itinerary = { days: [{ day:1, date_label:'Hari 1', title:'Kedatangan & Eksplorasi', activities:[{time:'10:00', type:'transport', name:'Tiba di Banyuwangi', description:'Sampai di kota tercinta.', tips:'', estimatedCost:0}, {time:'13:00', type:'makan', name:'Makan Siang Sego Tempong', description:'Kuliner pedas khas.', tips:'Pilih Sego Tempong Mbok Wah.', estimatedCost:25000}] }] }; render(); }

(async () => { await loadDestinations(); document.getElementById('progress-area').style.display = ''; render(); })();
</script>
</body>
</html>
