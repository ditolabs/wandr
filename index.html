<!DOCTYPE html>
<html lang="id" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Wandr — Buat Itinerary Banyuwangi</title>
  <meta name="description" content="Generate itinerary perjalanan Banyuwangi secara otomatis.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <style>
    /* ── TOKENS ────────────────────────────────────────────────────────────── */
    :root {
      /* Brand — Navy premium travel */
      --brand:    #0F3460;
      --brand-2:  #16527a;
      --brand-lt: #e8f0fa;

      /* Accent — Coral CTA */
      --accent:   #E94560;
      --accent-lt:#fdedf0;

      /* Neutrals */
      --ink:      #1a1f36;
      --ink-2:    #3d4461;
      --ink-3:    #8892b0;
      --ink-4:    #c5cbe3;
      --paper:    #f5f7fa;
      --paper-2:  #edf0f7;
      --surface:  #ffffff;
      --line:     #e4e8f0;
      --white:    #ffffff;

      /* Shadows */
      --sh-sm: 0 2px 8px rgba(15,52,96,.07);
      --sh-md: 0 4px 20px rgba(15,52,96,.10);
      --sh-lg: 0 8px 32px rgba(15,52,96,.13);

      /* Radius */
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 24px;

      /* compat aliases */
      --red:    var(--accent);
      --red-lt: var(--accent-lt);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      background: var(--paper);
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overscroll-behavior-y: none;
    }

    /* ── LAYOUT ────────────────────────────────────────────────────────────── */
    #app { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }

    /* ── HEADER ────────────────────────────────────────────────────────────── */
    #header {
      padding: 14px 20px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 50;
      background: var(--white);
      box-shadow: var(--sh-sm);
    }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(15,52,96,.25);
    }
    .logo-text {
      font-family: 'Noto Serif', Georgia, serif;
      font-size: 20px; font-weight: 700; font-style: italic;
      color: var(--brand); letter-spacing: -0.02em;
    }
    .logo-badge {
      font-size: 10px; color: var(--white);
      letter-spacing: 0.10em; text-transform: uppercase;
      font-weight: 600; background: var(--accent);
      padding: 2px 8px; border-radius: 20px;
      margin-left: 2px;
    }
    .logo-divider {
      width: 1px; height: 18px;
      background: var(--line);
      margin: 0 4px;
    }

    /* ── PROGRESS ──────────────────────────────────────────────────────────── */
    #progress-area { padding: 0 20px; margin: 16px 0 0; }
    .step-labels {
      display: flex; gap: 4px; margin-bottom: 0;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--r-xl);
      padding: 4px;
      box-shadow: var(--sh-sm);
    }
    .step-label {
      font-size: 10px; font-weight: 500; color: var(--ink-3);
      letter-spacing: 0.06em; text-transform: uppercase;
      flex: 1; text-align: center;
      padding: 7px 4px;
      border-radius: 20px;
      transition: all .25s cubic-bezier(.4,0,.2,1);
      border-bottom: none;
    }
    .step-label.active {
      color: var(--white); font-weight: 700;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 2px 8px rgba(15,52,96,.3);
    }
    .step-label.done {
      color: var(--accent);
      background: var(--accent-lt);
      border-bottom: none;
    }
    .progress-bar { display: none; }

    /* ── CONTENT AREA ──────────────────────────────────────────────────────── */
    #content-wrap { padding: 0 20px; flex: 1; margin-top: 20px; }

    /* ── NAV ───────────────────────────────────────────────────────────────── */
    #nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px 28px;
      border-top: 1px solid var(--line);
      margin-top: 8px;
      background: var(--white);
    }
    .dest-count {
      font-size: 11px; color: var(--ink-3);
      letter-spacing: 0.04em; font-weight: 500;
    }

    /* ── BUTTONS ───────────────────────────────────────────────────────────── */
    .btn-pri {
      background: linear-gradient(135deg, var(--accent), #d63250);
      color: var(--white);
      border: none; padding: 12px 24px;
      border-radius: var(--r-xl);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 8px;
      white-space: nowrap; letter-spacing: 0.02em;
      box-shadow: 0 4px 12px rgba(233,69,96,.30);
    }
    .btn-pri:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(233,69,96,.40);
    }
    .btn-pri:active { transform: translateY(0); }
    .btn-pri:disabled {
      background: var(--ink-4); cursor: not-allowed;
      box-shadow: none; transform: none;
    }
    .btn-ghost {
      background: transparent; color: var(--ink-2);
      border: 1.5px solid var(--line); padding: 11px 20px;
      border-radius: var(--r-xl);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all .2s;
      display: inline-flex; align-items: center; gap: 8px;
      letter-spacing: 0.02em;
    }
    .btn-ghost:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-lt); }
    .btn-ghost.hidden { visibility: hidden; }

    /* ── STEP TYPOGRAPHY ───────────────────────────────────────────────────── */
    .step-title {
      font-family: 'Noto Serif', Georgia, serif;
      font-size: 28px; font-weight: 700; font-style: italic;
      margin-bottom: 6px; line-height: 1.2;
      color: var(--brand); letter-spacing: -0.02em;
    }
    .step-title span { color: var(--accent); }
    .step-sub {
      color: var(--ink-3); font-size: 13px;
      margin-bottom: 20px; line-height: 1.6; font-weight: 400;
    }
    .field-label {
      display: block; font-size: 10px; font-weight: 600;
      color: var(--ink-3); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.14em;
    }
    .field-wrap { margin-bottom: 20px; }

    /* ── HORIZONTAL RULE ───────────────────────────────────────────────────── */
    .jp-rule {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0;
    }
    .jp-rule::before, .jp-rule::after {
      content: ''; flex: 1; height: 1px; background: var(--line);
    }
    .jp-rule span {
      font-size: 10px; color: var(--ink-4);
      letter-spacing: 0.14em; text-transform: uppercase; white-space: nowrap;
    }

    /* ── CATEGORY FILTER ───────────────────────────────────────────────────── */
    .cat-filter {
      display: flex; gap: 6px; margin-bottom: 16px;
      border-bottom: none;
      flex-wrap: wrap;
    }
    .cat-btn {
      background: var(--white); color: var(--ink-3);
      border: 1.5px solid var(--line);
      border-bottom: 1.5px solid var(--line);
      padding: 6px 14px; margin-bottom: 0;
      font-size: 11px; font-weight: 500; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.04em; text-transform: uppercase;
      transition: all .18s;
      border-radius: 20px;
    }
    .cat-btn:hover { border-color: var(--brand); color: var(--brand); }
    .cat-btn.active {
      color: var(--white); border-color: var(--brand);
      background: var(--brand); font-weight: 700;
      box-shadow: 0 2px 8px rgba(15,52,96,.2);
    }

    /* ── DESTINATION CARDS ─────────────────────────────────────────────────── */
    .dest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: transparent; border: none; }
    .dest-chip {
      padding: 14px 12px;
      background: var(--white);
      cursor: pointer;
      transition: all .18s cubic-bezier(.4,0,.2,1);
      user-select: none;
      border-radius: var(--r-md);
      border: 1.5px solid var(--line);
      box-shadow: var(--sh-sm);
    }
    .dest-chip:hover { box-shadow: var(--sh-md); transform: translateY(-2px); border-color: var(--brand-lt); }
    .dest-chip.selected {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      border-color: var(--brand);
      box-shadow: 0 4px 16px rgba(15,52,96,.25);
      transform: translateY(-1px);
    }
    .dest-chip-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .dest-emoji { font-size: 22px; }
    .dest-check {
      width: 18px; height: 18px;
      border: 1.5px solid var(--ink-4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--ink); flex-shrink: 0;
      opacity: 0; transition: opacity .15s;
      background: var(--white);
    }
    .dest-chip.selected .dest-check { opacity: 1; background: var(--accent); border-color: var(--accent); color: var(--white); }
    .dest-name { font-size: 12px; font-weight: 700; color: var(--ink); line-height: 1.3; margin-top: 8px; font-family: 'Noto Serif', serif; }
    .dest-chip.selected .dest-name { color: var(--white); }
    .dest-desc { font-size: 10px; color: var(--ink-3); margin-top: 2px; line-height: 1.4; }
    .dest-chip.selected .dest-desc { color: rgba(255,255,255,.6); }
    .dest-meta { margin-top: 6px; display: flex; align-items: center; gap: 5px; }
    .cat-tag { font-size: 9px; padding: 2px 7px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 20px; }
    .cat-tag.alam   { background: #e6f7ee; color: #1a7a45; }
    .cat-tag.pantai { background: #e6f0fb; color: #1a4a8c; }
    .cat-tag.diving { background: #e0f7f4; color: #0a6a5a; }
    .cat-tag.budaya { background: #fef3e2; color: #8a5a00; }
    .dest-chip.selected .cat-tag { opacity: 0.75; }
    .best-time { font-size: 10px; color: var(--ink-3); }
    .dest-chip.selected .best-time { color: rgba(255,255,255,.55); }
    .dest-notice {
      margin-top: 14px; padding: 12px 14px;
      border-left: 3px solid var(--accent);
      background: var(--accent-lt);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      font-size: 12px; color: var(--ink-2);
      display: none;
    }
    .dest-notice.show { display: block; }

    /* ── INPUTS ────────────────────────────────────────────────────────────── */
    select, input[type="text"], input[type="time"],
    input[type="email"], input[type="password"], textarea {
      background: var(--white);
      border: 1.5px solid var(--line);
      border-radius: var(--r-sm);
      color: var(--ink); padding: 11px 14px;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      outline: none; transition: border-color .2s, box-shadow .2s;
      width: 100%; appearance: none; -webkit-appearance: none;
      direction: ltr !important; text-align: left !important;
      unicode-bidi: isolate !important;
    }
    select:focus, input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15,52,96,.10);
    }
    select option { background: var(--white); color: var(--ink); }
    .select-wrap { position: relative; }
    .select-wrap select { padding-right: 36px; }
    .select-arrow {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      pointer-events: none; color: var(--ink-3); font-size: 11px;
    }

    /* ── AUTOCOMPLETE ──────────────────────────────────────────────────────── */
    .autocomplete-wrap { position: relative; }
    .autocomplete-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 100;
      background: var(--white);
      border: 1.5px solid var(--line);
      border-radius: var(--r-md);
      box-shadow: var(--sh-lg);
      max-height: 220px; overflow-y: auto;
    }
    .autocomplete-item {
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
      transition: background .12s;
    }
    .autocomplete-item:last-child { border-bottom: none; border-radius: 0 0 var(--r-md) var(--r-md); }
    .autocomplete-item:first-child { border-radius: var(--r-md) var(--r-md) 0 0; }
    .autocomplete-item:hover, .autocomplete-item.active { background: var(--brand-lt); }
    .autocomplete-item-name { font-size: 13px; font-weight: 600; color: var(--ink); }
    .autocomplete-item-sub  { font-size: 11px; color: var(--ink-3); margin-top: 1px; }
    .autocomplete-empty { padding: 14px; text-align: center; font-size: 12px; color: var(--ink-3); font-style: italic; }

    /* ── CARD OPTIONS ──────────────────────────────────────────────────────── */
    .card-list { display: flex; flex-direction: column; gap: 8px; border: none; }
    .card-opt {
      padding: 14px 16px;
      background: var(--white);
      border: 1.5px solid var(--line);
      border-radius: var(--r-md);
      cursor: pointer; transition: all .18s;
      display: flex; align-items: center; gap: 14px;
      box-shadow: var(--sh-sm);
    }
    .card-opt:last-child { border-bottom: 1.5px solid var(--line); }
    .card-opt:hover { border-color: var(--brand); background: var(--brand-lt); transform: translateY(-1px); box-shadow: var(--sh-md); }
    .card-opt.selected {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      border-color: var(--brand);
      box-shadow: 0 4px 14px rgba(15,52,96,.22);
    }
    .card-opt.sm { padding: 11px 14px; }
    .card-opt-icon { font-size: 22px; flex-shrink: 0; }
    .card-opt-title { font-size: 14px; font-weight: 600; color: var(--ink); font-family: 'Noto Serif', serif; }
    .card-opt.selected .card-opt-title { color: var(--white); }
    .card-opt-sub { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
    .card-opt.selected .card-opt-sub { color: rgba(255,255,255,.6); }
    .card-opt-check { color: var(--accent); font-size: 16px; flex-shrink: 0; margin-left: auto; opacity: 0; transition: opacity .15s; }
    .card-opt.selected .card-opt-check { opacity: 1; color: var(--white); }

    /* ── SEWA LOKAL ────────────────────────────────────────────────────────── */
    .sewa-wrap { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .35s ease, opacity .35s ease; }
    .sewa-wrap.open { max-height: 420px; opacity: 1; }
    .sewa-box {
      padding: 14px; background: var(--brand-lt);
      border-left: 3px solid var(--brand);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      margin-bottom: 4px;
    }
    .sewa-title { font-size: 12px; font-weight: 700; color: var(--brand); margin-bottom: 3px; font-family: 'Noto Serif', serif; }
    .sewa-sub   { font-size: 11px; color: var(--ink-2); margin-bottom: 10px; line-height: 1.5; }
    .card-opt.sewa-sel { background: var(--brand-lt) !important; border-color: var(--brand) !important; }
    .card-opt.sewa-sel .card-opt-title { color: var(--brand) !important; }

    /* ── PILL OPTIONS ──────────────────────────────────────────────────────── */
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; border: none; }
    .pill-opt {
      padding: 11px 16px;
      background: var(--white);
      border: 1.5px solid var(--line);
      border-radius: var(--r-md);
      cursor: pointer; transition: all .18s; text-align: center;
      box-shadow: var(--sh-sm);
    }
    .pill-opt:hover { border-color: var(--brand); background: var(--brand-lt); transform: translateY(-1px); }
    .pill-opt.selected {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      border-color: var(--brand);
      box-shadow: 0 3px 10px rgba(15,52,96,.2);
    }
    .pill-label { font-size: 13px; font-weight: 700; color: var(--ink); font-family: 'Noto Serif', serif; }
    .pill-opt.selected .pill-label { color: var(--white); }
    .pill-sub { font-size: 10px; color: var(--ink-3); margin-top: 2px; }
    .pill-opt.selected .pill-sub { color: rgba(255,255,255,.6); }

    /* ── GAYA CARDS ────────────────────────────────────────────────────────── */
    .gaya-row { display: flex; gap: 10px; background: transparent; border: none; }
    .gaya-card {
      flex: 1; padding: 18px 12px;
      background: var(--white);
      cursor: pointer; transition: all .18s; text-align: center;
      border-radius: var(--r-md);
      border: 1.5px solid var(--line);
      box-shadow: var(--sh-sm);
    }
    .gaya-card:hover { border-color: var(--brand); background: var(--brand-lt); transform: translateY(-2px); box-shadow: var(--sh-md); }
    .gaya-card.selected {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      border-color: var(--brand);
      box-shadow: 0 4px 16px rgba(15,52,96,.25);
      transform: translateY(-2px);
    }
    .gaya-emoji { font-size: 26px; margin-bottom: 8px; }
    .gaya-label { font-size: 13px; font-weight: 700; color: var(--ink); font-family: 'Noto Serif', serif; }
    .gaya-card.selected .gaya-label { color: var(--white); }
    .gaya-desc  { font-size: 10px; color: var(--ink-3); margin-top: 6px; line-height: 1.6; white-space: pre-line; }
    .gaya-card.selected .gaya-desc { color: rgba(255,255,255,.6); }

    /* ── COUNTER ───────────────────────────────────────────────────────────── */
    .counter-row { display: flex; align-items: center; gap: 16px; }
    .cnt-btn {
      background: var(--white); color: var(--brand);
      border: 1.5px solid var(--line);
      border-radius: 50%;
      width: 38px; height: 38px; font-size: 18px;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--sh-sm);
    }
    .cnt-btn:hover { border-color: var(--brand); background: var(--brand); color: var(--white); box-shadow: var(--sh-md); }
    .cnt-val   { font-size: 26px; font-weight: 700; min-width: 32px; text-align: center; font-family: 'Noto Serif', serif; color: var(--brand); }
    .cnt-label { font-size: 12px; color: var(--ink-3); }

    /* ── LOADING ───────────────────────────────────────────────────────────── */
    .loading-screen { text-align: center; padding: 60px 0; }
    .loading-icon { font-size: 48px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .loading-title { font-family: 'Noto Serif', serif; font-size: 22px; font-weight: 700; font-style: italic; margin-bottom: 10px; color: var(--brand); }
    .loading-sub  { color: var(--ink-3); font-size: 13px; line-height: 1.6; }
    .loading-tags { display: flex; gap: 6px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .loading-tag  { font-size: 10px; color: var(--ink-3); background: var(--white); padding: 4px 12px; border: 1.5px solid var(--line); border-radius: 20px; letter-spacing: 0.06em; text-transform: uppercase; box-shadow: var(--sh-sm); }
    .dot { animation: bou 1.4s ease-in-out infinite; display: inline-block; }
    .dot:nth-child(1){animation-delay:0s} .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    @keyframes bou { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-7px);opacity:1} }

    /* ── ERROR ─────────────────────────────────────────────────────────────── */
    .error-screen { text-align: center; padding: 60px 0; }

    /* ── RESULT ────────────────────────────────────────────────────────────── */
    .result-summary {
      padding: 20px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      border-radius: var(--r-lg);
      margin-bottom: 24px;
      box-shadow: 0 6px 24px rgba(15,52,96,.2);
    }
    .result-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .result-title { font-family: 'Noto Serif', serif; font-size: 20px; font-weight: 700; font-style: italic; flex: 1; line-height: 1.25; color: var(--white); }
    .result-budget-label { font-size: 9px; color: rgba(255,255,255,.6); text-align: right; letter-spacing: 0.12em; text-transform: uppercase; }
    .result-budget-val   { font-size: 18px; font-weight: 700; color: var(--white); font-family: 'Noto Serif', serif; }
    .result-desc  { font-size: 13px; color: rgba(255,255,255,.8); line-height: 1.65; margin-bottom: 12px; }
    .highlight-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .highlight-tag  { font-size: 10px; padding: 3px 10px; border: 1px solid rgba(255,255,255,.3); color: rgba(255,255,255,.9); border-radius: 20px; letter-spacing: 0.04em; text-transform: uppercase; background: rgba(255,255,255,.12); }
    .budget-note { font-size: 11px; color: rgba(255,255,255,.55); }

    /* ── DAY SECTION ───────────────────────────────────────────────────────── */
    .day-section {
      margin-bottom: 16px; animation: fdi .5s ease both;
      background: var(--white); border-radius: var(--r-lg);
      border: 1px solid var(--line);
      overflow: hidden; box-shadow: var(--sh-sm);
    }
    @keyframes fdi { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

<script>
// ─── PROGRESS & NAV ──────────────────────────────────────────────────────────
function updateProgress() {

  document.getElementById('progress-fill').style.width = pct + '%';
  document.querySelectorAll('.step-label').forEach(el => {

  });

function updateNav() {

function canNext() {
  if (S.step===0) return S.destinations.size > 0;
  if (S.step===1) { const ok = S.kotaAsal && (S.kotaAsal!=='Lainnya'||S.kotaAsalCustom.trim()) && S.transport; return S.transport==='umum' ? ok && !!S.subTransport : ok; }
  if (S.step===2) return S.durasi && S.gayaPerjalanan && (S.penginapan || S.penginapanIds.size > 0 || S.penginapanCustom.trim());
  if (S.step===3) return true;
  return false;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getFinalHotelName() {
  if (S.penginapanCustom.trim()) return S.penginapanCustom.split(',')[0].trim();
  if (S.penginapanDataList?.length > 0) return S.penginapanDataList[0].nama;
  return 'Penginapan Banyuwangi';
}
function getHotelNames() {
  if (S.penginapanCustom.trim()) {
    return S.penginapanCustom.split(',').map(s=>s.trim()).filter(Boolean);
  }
  if (S.penginapanDataList?.length > 0) {
    return S.penginapanDataList.map(p => p.nama).filter(Boolean);
  }
  return ['Penginapan Banyuwangi'];
}
function haversineKm(lat1,lng1,lat2,lng2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function parseDestInput(text) {
  S.destinations.clear();
  // Normalize: hapus spasi berlebih tapi jangan ubah nilai S.destInput
  const terms = text.split(',').map(s=>s.trim().toLowerCase()).filter(s=>s.length>=2);
  terms.forEach(term => {
    if (!term) return;
    let bestMatch = null, bestScore = 0;
    DESTINATIONS.forEach(d => {
      const score = matchScore(term, d);
      if (score > bestScore) { bestScore = score; bestMatch = d; }
    });
    if (bestMatch && bestScore >= 45) S.destinations.add(bestMatch.id);
  });
}

function matchScore(term, d) {
  const t = term.toLowerCase().trim();
  const n = d.name.toLowerCase();
  if (n === t) return 100;
  if (d.aliases) {
    for (const a of d.aliases) {
      if (a.length < 4) continue;
      if (a === t) return 98;
      if (a.includes(t) && t.length >= 5) return 90;
      if (t.includes(a) && a.length >= 8) return 85;
    }
  }
  if (t.length >= 4 && n.includes(t)) return 80;
  if (n.length >= 5 && t.includes(n)) return 75;
  const skipWords = new Set(['dan','yang','ke','di','dari','untuk','dengan','atau','taman','nasional','pantai','air','goa','gua','pulau','bukit','gunung','perkebunan']);
  const nWords    = n.split(' ').filter(w => w.length > 2 && !skipWords.has(w));
  const termWords = t.split(' ').filter(w => w.length > 2 && !skipWords.has(w));
  if (!nWords.length || !termWords.length) return 0;
  const hits = termWords.filter(tw => nWords.some(nw => nw === tw || nw.startsWith(tw) || tw.startsWith(nw)));
  const coverage = hits.length / nWords.length;
  const precision = hits.length / termWords.length;
  const f1 = coverage + precision > 0 ? 2 * coverage * precision / (coverage + precision) : 0;
  return f1 >= 0.5 ? Math.round(f1 * 60) : 0;
}

async function loadPenginapanOptions() {
  try {
    let waited = 0;
    while (!window._placesCache && waited < 5000) {
      await new Promise(r => setTimeout(r, 200));
      waited += 200;
    }
    const allDocs = window._placesCache || [];
    if (!allDocs || allDocs.length === 0) { S.penginapanOptions = []; S.allPenginapan = []; return; }
    const all = allDocs.filter(d => {
      const t = (d.type||d.kategori||'').toLowerCase().replace(/\s+/g,'');
      return t.includes('penginapan')||t.includes('hotel')||t.includes('homestay')||
             t.includes('villa')||t.includes('guesthouse')||t.includes('guest')||
             t.includes('losmen')||t.includes('resort')||t.includes('inn')||
             t.includes('motel')||t.includes('cottage')||t.includes('wisma');
    });
    S.allPenginapan = all;
    if (S.destinations.size > 0) {
      const selDests = DESTINATIONS.filter(d=>S.destinations.has(d.id));
      const lats = selDests.map(d=>d.lat).filter(Boolean);
      const lngs = selDests.map(d=>d.lng).filter(Boolean);
      if (lats.length > 0) {
        const cLat = lats.reduce((a,b)=>a+b,0)/lats.length;
        const cLng = lngs.reduce((a,b)=>a+b,0)/lngs.length;
        S.penginapanOptions = all
          .filter(d => d.lat && d.lng)
          .map(d => ({ ...d, dist: haversineKm(cLat,cLng,d.lat,d.lng) }))
          .sort((a,b)=>a.dist-b.dist)
          .slice(0, 6);
      } else {
        S.penginapanOptions = all.slice(0, 6);
      }
    } else {
      S.penginapanOptions = all.slice(0, 6);
    }
  } catch(e) {
    console.warn('loadPenginapanOptions gagal:', e.message);
    S.penginapanOptions = []; S.allPenginapan = [];
  }
}

async function loadKulinerNearPenginapan(lat, lng) {
  if (!db) { S.kulinerOptions = []; return; }

    S.kulinerOptions = snap.docs
      .map(doc => ({ id:doc.id, ...doc.data() }))
      .filter(d => d.lat && d.lng && d.nama)
      .map(d => ({ ...d, dist: haversineKm(lat,lng,d.lat,d.lng) }))
      .filter(d => d.dist <= 1.0)
      .sort((a,b)=>a.dist-b.dist)
      .slice(0, 5);
  } catch(e) {
    S.kulinerOptions = [];
  }
}

function isTermMatched(term) {
  const t = term.toLowerCase().trim();
  if (!t) return true;
  return DESTINATIONS.some(d => matchScore(t, d) >= 50);
}

function renderStep0() {
  const matched   = DESTINATIONS.filter(d=>S.destinations.has(d.id));
  const query     = (S.destInput||'').toLowerCase().trim();
  const activeCat = S._catFilter || 'semua';

  // Filter & sort
  // Split query per koma — tiap term dicek terpisah
  const queryTerms = query.length >= 2
    ? query.split(',').map(s=>s.trim()).filter(s=>s.length>=2)
    : [];

  let displayDests;
  if (queryTerms.length > 0) {
    displayDests = DESTINATIONS
      .filter(d => activeCat==='semua' || d.cat===activeCat)
      .map(d => {
        const n = d.name.toLowerCase();
        const aliases = d.aliases||[];
        // Ambil score tertinggi dari semua term
        let bestScore = 0;
        for (const term of queryTerms) {
          let score = matchScore(term, d);
          if (n.includes(term) && term.length >= 3) score += 30;
          if (aliases.some(a=>a.includes(term) && term.length >= 3)) score += 20;
          if (score > bestScore) bestScore = score;
        }
        return { d, score: bestScore };
      })
      .filter(x => x.score > 0)
      .sort((a,b) => b.score - a.score)
      .map(x => x.d)
      .slice(0, 14);
    // Tambahkan selected destinations yang tidak muncul di hasil search
    const resultIds = new Set(displayDests.map(d=>d.id));
    const selectedNotShown = DESTINATIONS.filter(d =>
      S.destinations.has(d.id) && !resultIds.has(d.id)
    );
    displayDests = [...selectedNotShown, ...displayDests].slice(0, 16);
  } else {
    const pool = DESTINATIONS.filter(d => activeCat==='semua' || d.cat===activeCat);
    if (!S._shuffledDests || S._lastCat !== activeCat) {
      S._shuffledDests = [...pool].sort(() => Math.random() - 0.5);

            style="width:100%;padding:12px;background:#f0ede8;border:1.5px solid rgba(0,0,0,.22);color:#111111;border-radius:0;font-family:inherit;font-size:15px;outline:none">
        </div>
      </div>
    </div>

    <div class="sewa-wrap${S.transport==='umum'?' open':''}" id="sewa-wrap">
      <div style="padding:14px;border-radius:0;background:rgba(107,159,212,.05);border:1px solid rgba(107,159,212,.2);margin-bottom:4px">
        <div style="font-size:12px;font-weight:700;color:#6b9fd4;margin-bottom:4px">🚉 MOBILITAS LOKAL</div>
        <div style="font-size:12px;color:#888888;margin-bottom:12px">Kendaraan setelah tiba. Boleh pilih lebih dari satu.</div>
        ${sewaCard('motor','🏍️','Sewa Motor','~100K–150K/hari')}
        ${sewaCard('mobil_driver','🚐','Sewa Mobil + Driver','~450K–650K/hari')}
        ${sewaCard('ojek','📱','Ojek / Online','Gojek, Grab, ojek pangkalan')}
      </div>
    </div>`;
}

// ─── RENDER STEP 2 ───────────────────────────────────────────────────────────
function renderStep2() {
  const durasiBtns = DURASI.map(d => {
    const sel = S.durasi===d.v;
    return `<div data-durasi="${d.v}" style="padding:10px 16px;border-radius:22px;cursor:pointer;
      transition:all .2s;text-align:center;
      background:${sel?'#c0392b':'rgba(255,255,255,.05)'};
      border:1.5px solid ${sel?'#c0392b':'rgba(0,0,0,0.08)'};
      box-shadow:${sel?'0 4px 16px rgba(192,57,43,.35)':'none'}">
      <div style="font-size:14px;font-weight:700;color:${sel?'#c0392b':'#111111'}">${d.label}</div>
      <div style="font-size:10px;color:${sel?'rgba(255,255,255,.7)':'#5a7a5a'};margin-top:2px">${d.sub}</div>
    </div>`;
  }).join('');

  const gayaCards = [
    { v:'santai',    emoji:'🌴', label:'Santai',    desc:'Maks 2 destinasi/hari. Banyak waktu menikmati setiap momen.' },
    { v:'eksplorasi',emoji:'⚡', label:'Eksplorasi', desc:'3–4 destinasi/hari. Efisien & terpadatkan.' },
  ].map(g => {
    const sel = S.gayaPerjalanan===g.v;
    return `<div data-gaya="${g.v}" style="flex:1;padding:16px;border-radius:0;cursor:pointer;
      transition:all .25s;text-align:center;
      background:${sel?'rgba(192,57,43,.1)':'rgba(255,255,255,.03)'};
      border:1.5px solid ${sel?'#c0392b':'rgba(0,0,0,0.08)'}">
      <div style="font-size:30px;margin-bottom:10px">${g.emoji}</div>
      <div style="font-size:15px;font-weight:700;color:${sel?'#c0392b':'#111111'};margin-bottom:8px">${g.label}</div>
      <div style="font-size:11px;color:#666666;line-height:1.6">${g.desc}</div>
    </div>`;
  }).join('');

  const allHotels = S.allPenginapan || [];
  const hotelQuery = S.penginapanSearchQuery || '';
  const filteredHotels = hotelQuery.length >= 1
    ? allHotels.filter(p => {
        const n = (p.nama||'').toLowerCase();
        const q = hotelQuery.toLowerCase();
        return n.includes(q) || (p.kawasan||'').toLowerCase().includes(q) || (p.kategori||'').toLowerCase().includes(q);
      }).slice(0, 6)
    : S.penginapanOptions.slice(0, 4);

  const hotelSuggestions = filteredHotels.map(p => {
    const sel = S.penginapanIds.has(p.id);
    const distTxt = p.dist != null ? (p.dist < 1 ? Math.round(p.dist*1000)+'m' : p.dist.toFixed(1)+'km') : '';
    return `<div class="card-opt sm${sel?' selected':''}" data-penginapan-fb="${p.id}">
      <span class="card-opt-icon">🏨</span>
      <div style="flex:1;min-width:0">
        <div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.nama)}</div>
        <div class="card-opt-sub">${p.kawasan||''} ${distTxt?'· <span style="color:#c0392b">~'+distTxt+' dari destinasi</span>':''}${p.harga?' · Rp'+p.harga:''}</div>
      </div>
      <span class="card-opt-check">✓</span>
    </div>`;
  }).join('');

  const selectedListHTML = (function() {
    if (S.penginapanIds.size === 0) return '';
    const selectedList = S.penginapanDataList || [];
    if (selectedList.length === 0) return '';
    return selectedList.map(sel =>
      '<div class="card-opt sm selected" style="margin-bottom:8px;pointer-events:none">'
      +'<span class="card-opt-icon">🏨</span>'
      +'<div style="flex:1;min-width:0">'
      +'<div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(sel.nama)+'</div>'
      +'<div class="card-opt-sub">'+(sel.kawasan||'')+(sel.harga?' · Rp'+sel.harga:'')+'</div>'
      +'</div>'
      +'<span class="card-opt-check">✓</span>'
      +'</div>'
    ).join('');
  })();

  const penginapanSection = `
    <div class="autocomplete-wrap" style="margin-bottom:10px">
      <input type="text" id="input-penginapan-search"
        dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"
        placeholder="🔍 Cari nama penginapan..."
        value="${esc(hotelQuery)}"
        oninput="S.penginapanSearchQuery=this.value;partialUpdateHotelList();"
        style="padding-right:36px">
      ${hotelQuery ? `<span id="btn-clear-hotel" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#888888;font-size:14px;padding:4px;z-index:1">✕</span>` : ''}
      <div class="autocomplete-dropdown" id="hotel-autocomplete" style="${hotelQuery.length>=1?'display:block':'display:none'}">
        ${filteredHotels.length > 0
          ? filteredHotels.map(p => {
              const sel = S.penginapanIds.has(p.id);
              const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):'';
              return '<div class="autocomplete-item'+(sel?' active':'')+'\" data-penginapan-ac="'+p.id+'">'
                +'<span style="font-size:20px">🏨</span>'
                +'<div>'
                +'<div class="autocomplete-item-name">'+esc(p.nama)+(sel?' ✓':'')+'</div>'
                +'<div class="autocomplete-item-sub">'+(p.kawasan||'')+(distTxt?' · ~'+distTxt+' dari destinasi':'')+(p.harga?' · Rp'+p.harga:'')+'</div>'
                +'</div>'
                +'</div>';
            }).join('')
          : '<div class="autocomplete-empty">Tidak ditemukan — coba kata kunci lain</div>'
        }
      </div>
    </div>
    ${selectedListHTML}
    ${!S.penginapanIds.size && !hotelQuery && S.penginapanOptions.length > 0
      ? '<div style="font-size:11px;color:#444444;margin-bottom:8px">📍 Terdekat dari destinasimu:</div>'
        +'<div class="card-list" id="hotel-suggestions">'+hotelSuggestions+'</div>'
      : ''}
    ${allHotels.length === 0 ? `
      <div class="card-list">
        ${PENGINAPAN.map(p =>
          `<div class="card-opt sm${S.penginapan===p.v?' selected':''}" data-penginapan="${p.v}">
            <span class="card-opt-icon">${p.emoji}</span>
            <div><div class="card-opt-title">${p.label}</div><div class="card-opt-sub">${p.range}</div></div>
            <span class="card-opt-check">✓</span>
          </div>`).join('')}
      </div>` : ''}
    <div style="margin-top:10px">
      <label style="display:block;font-size:12px;color:#666666;margin-bottom:6px">Atau ketik langsung nama penginapan:</label>
      <input type="text" id="input-penginapan-custom"
        dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"
        placeholder="Contoh: Aston Banyuwangi, Ketapang Indah Hotel..."
        value="${esc(S.penginapanCustom)}">
    </div>`;

  return `
    <h2 class="step-title">Preferensi Trip</h2>
    <p class="step-sub">Sesuaikan dengan gaya traveling kamu</p>

    <div style="margin-bottom:24px">
      <div style="font-size:11px;font-weight:700;color:#888888;letter-spacing:.08em;margin-bottom:10px">DURASI</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${durasiBtns}</div>
    </div>

    <div style="margin-bottom:24px">
      <div style="font-size:11px;font-weight:700;color:#888888;letter-spacing:.08em;margin-bottom:10px">GAYA TRIP</div>
      <div style="display:flex;gap:10px">${gayaCards}</div>
    </div>

    <div style="margin-bottom:24px">
      <div style="font-size:11px;font-weight:700;color:#888888;letter-spacing:.08em;margin-bottom:10px">🏨 PENGINAPAN</div>
      ${penginapanSection}
    </div>

    <div style="padding:18px;border-radius:0;background:#f0ede8;border:1.5px solid rgba(0,0,0,0.08)">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:40px;height:40px;border-radius:0;background:#f0ede8;
          display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">👥</div>
        <div style="flex:1">
          <div style="font-size:15px;font-weight:700;color:#111111">Jumlah Orang</div>
          <div style="font-size:12px;color:#888888;margin-top:2px">Tentukan kuota perjalanan</div>
        </div>
        <div style="display:flex;align-items:center;gap:0;background:#f0ede8;border-radius:0;border:1px solid rgba(0,0,0,0.08)">
          <button id="btn-minus" style="width:38px;height:38px;border:none;background:transparent;color:#111111;font-size:20px;cursor:pointer;border-radius:24px 0 0 24px;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:background .2s">−</button>
          <span id="cnt-val" style="font-size:18px;font-weight:700;color:#111111;min-width:32px;text-align:center">${S.jumlahOrang}</span>
          <button id="btn-plus" style="width:38px;height:38px;border:none;background:rgba(192,57,43,.9);color:#fff;font-size:20px;cursor:pointer;border-radius:0 24px 24px 0;display:flex;align-items:center;justify-content:center;font-family:inherit">+</button>
        </div>
      </div>
    </div>`;
}

// ─── RENDER STEP 3 ───────────────────────────────────────────────────────────
const ACT_ICON_CIRCLE = {
  aktivitas:  { bg:'#c0392b', icon:'🎯' },
  makan:      { bg:'#4ab06a', icon:'🍽️' },
  transport:  { bg:'#6b9fd4', icon:'🚌' },
  penginapan: { bg:'#c47bd4', icon:'🏨' },
  istirahat:  { bg:'#888888', icon:'☕' },
};
const ACT_TYPE_LABEL = { aktivitas:'Adventure', makan:'Kuliner', transport:'Transport', penginapan:'Menginap', istirahat:'Relax' };

let _activeDay = 0;

function renderStep3() {
  // ── Loading ──────────────────────────────────────────────────────────────────
  if (S.loading) return `
    <div style="text-align:center;padding:72px 0">
      <div style="font-size:56px;margin-bottom:20px;animation:float 2.5s ease-in-out infinite">🗺️</div>
      <h3 style="font-family:'Noto Serif',Georgia,serif;font-size:22px;margin-bottom:10px;line-height:1.3">
        Merencanakan perjalananmu<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
      </h3>
      <p style="color:#888888;font-size:13px;line-height:1.6">Menyusun rute terbaik, estimasi waktu,<br>dan kalkulasi biaya untukmu</p>
      <div style="display:flex;gap:7px;justify-content:center;margin-top:22px;flex-wrap:wrap">
        <span style="font-size:11px;color:#444;background:#f0ede8;padding:5px 12px;border:1px solid #e0dbd4">📍 Sorting rute</span>
        <span style="font-size:11px;color:#444;background:#f0ede8;padding:5px 12px;border:1px solid #e0dbd4">🕐 Estimasi waktu</span>
        <span style="font-size:11px;color:#444;background:#f0ede8;padding:5px 12px;border:1px solid #e0dbd4">💰 Kalkulasi biaya</span>
        <span style="font-size:11px;color:#c0392b;background:rgba(192,57,43,.08);padding:5px 12px;border:1px solid rgba(192,57,43,.2)">✨ Finalisasi</span>
      </div>
    </div>`;

  // ── Error ────────────────────────────────────────────────────────────────────
  if (S.error) return `
    <div style="text-align:center;padding:64px 0">
      <div style="font-size:48px;margin-bottom:14px">⚠️</div>
      <h3 style="font-size:18px;margin-bottom:8px">Gagal generate</h3>
      <p style="color:#888888;font-size:13px;margin-bottom:22px">${esc(S.error)}</p>
      <button class="btn-pri" id="btn-retry">↺ Coba Lagi</button>
    </div>`;

  if (!S.itinerary) return '';

  const it = S.itinerary;
  const totalDays = it.days?.length || 1;
  _activeDay = Math.min(_activeDay, totalDays - 1);

  // ── Color palette per destinasi ───────────────────────────────────────────────
  // Warna card per jenis/kategori destinasi
  const CAT_COLORS = {
    alam:   { bg: '#d4edda', fg: '#1a4a2a', accent: '#2d8a4a', badge: '#2d8a4a' },
    pantai: { bg: '#fef9c3', fg: '#4a3a00', accent: '#c8980a', badge: '#b8880a' },
    diving: { bg: '#d0eaf8', fg: '#0a2a4a', accent: '#1a6a9a', badge: '#1a6a9a' },
    budaya: { bg: '#fddccc', fg: '#4a1a0a', accent: '#c0392b', badge: '#c0392b' },
    kuliner:{ bg: '#fce8f3', fg: '#4a0a2a', accent: '#a0306a', badge: '#a0306a' },
    default:{ bg: '#e8e8f0', fg: '#1a1a2a', accent: '#444466', badge: '#444466' },
  };

  // Mapping act.type → color
  const ACT_CAT = {
    aktivitas: 'alam', pantai: 'pantai', diving: 'diving',
    budaya: 'budaya', kuliner: 'kuliner', penginapan: 'default',
    transport: 'default', istirahat: 'default',
  };

  function getActColor(act) {
    // Coba match dari nama destinasi
    const dest = DESTINATIONS.find(d => act.name?.toLowerCase().includes(d.name.toLowerCase().split(' ')[0]));
    if (dest) return CAT_COLORS[dest.category] || CAT_COLORS[ACT_CAT[act.type]] || CAT_COLORS.default;
    return CAT_COLORS[ACT_CAT[act.type]] || CAT_COLORS.default;
  }

  // ── Summary header (clean, minimal) ──────────────────────────────────────────
  const headerCard = `
    <div style="margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px">
        <h2 style="font-family:'Noto Serif',Georgia,serif;font-size:26px;font-weight:700;font-style:italic;
          color:#111;line-height:1.2;flex:1">Itinerary<br>Banyuwangi</h2>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:9px;color:#888;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px">Estimasi</div>
          <div style="font-size:20px;font-weight:700;color:#c0392b;font-family:'Noto Serif',serif">
            ${((it.estimatedBudget?.min||0)/1000000).toFixed(1)}–${((it.estimatedBudget?.max||0)/1000000).toFixed(1)}<span style="font-size:13px;color:#888;font-weight:400"> JT</span>
          </div>
        </div>
      </div>
      <div style="font-size:12px;color:#888;margin-bottom:12px">
        📅 ${totalDays} Hari${totalDays>1?' · '+(totalDays-1)+' Malam':''} &nbsp;·&nbsp;
        ${(it.highlights||[]).slice(0,2).join(' · ')}
      </div>
      <div style="height:1.5px;background:#111;margin-bottom:4px"></div>
      <div style="height:1px;background:#e0dbd4"></div>
    </div>`;

  // ── Day strip (horizontal scroll, pill style) ─────────────────────────────────
  const dayStrip = it.days.map((day, i) => {
    const sel = i === _activeDay;
    const label = i===0?'Hari 1':i===it.days.length-1&&totalDays>1?'Pulang':`Hari ${i+1}`;
    const dest = (day.activities||[]).find(a=>a.type==='aktivitas');
    const cat  = dest ? (DESTINATIONS.find(d=>dest.name?.toLowerCase().includes(d.name.toLowerCase().split(' ')[0]))?.category||'default') : 'default';
    const col  = CAT_COLORS[cat]||CAT_COLORS.default;
    return `<button data-day-tab="${i}" style="
      padding:10px 18px;border:none;cursor:pointer;white-space:nowrap;
      font-family:'Noto Serif',Georgia,serif;font-size:13px;font-weight:700;
      transition:all .2s;
      background:${sel ? col.accent : '#f0ede8'};
      color:${sel ? '#fff' : '#888'};
      border-radius:${sel ? '20px' : '20px'};
      box-shadow:${sel ? '0 4px 14px '+col.accent+'44' : 'none'};
    ">${label}</button>`;
  }).join('');

  // ── Activity cards (colorful, per item) ───────────────────────────────────────
  const day  = it.days[_activeDay];
  const acts = (day?.activities||[]).map((act, ai) => {
    const col     = getActColor(act);
    const isLast  = ai === (day.activities.length - 1);
    const ci      = ACT_ICON_CIRCLE[act.type] || ACT_ICON_CIRCLE.aktivitas;
    const typeLabel = ACT_TYPE_LABEL[act.type] || 'Aktivitas';

    return `
      <div style="
        border-radius:20px;
        background:${col.bg};
        padding:18px;
        margin-bottom:${isLast?0:12}px;
        position:relative;
        animation:fdi .4s ease both;
        animation-delay:${ai*.07}s;
      ">
        <!-- Badge status pojok kanan atas -->
        <div style="position:absolute;top:16px;right:16px;
          background:${col.accent};
          border-radius:20px;padding:4px 12px;
          font-size:10px;font-weight:700;color:#fff;
          letter-spacing:.06em;text-transform:uppercase">
          ${typeLabel}
        </div>

        <!-- Waktu -->
        <div style="font-size:12px;font-weight:700;color:${col.accent};
          letter-spacing:.05em;margin-bottom:6px">
          🕐 ${esc(act.time||'')}${act.duration?' · '+act.duration:''}
        </div>

        <!-- Nama destinasi -->
        <div style="font-family:'Noto Serif',Georgia,serif;
          font-size:18px;font-weight:700;font-style:italic;
          color:${col.fg};line-height:1.25;margin-bottom:4px;
          padding-right:70px">
          ${esc(act.name)}
        </div>

        ${act.location&&act.location!==act.name ? `
        <div style="font-size:11px;color:${col.accent};margin-bottom:8px;opacity:.8">
          📍 ${esc(act.location)}
        </div>` : ''}

        <!-- Deskripsi -->
        <div style="font-size:12px;color:${col.fg};opacity:.75;
          line-height:1.6;margin-top:6px">
          ${esc(act.description||'')}
        </div>

        ${act.tips ? `
        <div style="margin-top:10px;padding:9px 12px;
          background:rgba(255,255,255,.5);border-radius:12px;
          font-size:11px;color:${col.fg};line-height:1.5;opacity:.9">
          💡 ${esc(act.tips)}
        </div>` : ''}

        <!-- Biaya -->
        ${act.estimatedCost>0 ? `
        <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
          <div style="height:1px;flex:1;background:${col.accent};opacity:.2"></div>
          <span style="font-size:11px;font-weight:700;color:${col.accent}">
            ~Rp${act.estimatedCost.toLocaleString('id-ID')}
          </span>
        </div>` : ''}
      </div>`;
  }).join('');

  // ── Packing checklist ─────────────────────────────────────────────────────────
  const checklist = (it.packingTips||[]).length > 0 ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      ${(it.packingTips||[]).map(t => `
        <div onclick="this.classList.toggle('done');
          this.querySelector('.cb').style.background=this.classList.contains('done')?'#111':'transparent';
          this.querySelector('.cb').style.borderColor=this.classList.contains('done')?'#111':'#e0dbd4';
          this.querySelector('.cb span').textContent=this.classList.contains('done')?'v':'';
          this.querySelector('.cb span').style.color='#fff';
          this.style.opacity=this.classList.contains('done')?'0.55':'1';"
          style="display:flex;align-items:center;gap:10px;padding:10px 12px;
          background:#fff;border:1px solid #e0dbd4;cursor:pointer;transition:all .2s;user-select:none">
          <div class="cb" style="width:18px;height:18px;border:1.5px solid #e0dbd4;flex-shrink:0;
            display:flex;align-items:center;justify-content:center;transition:all .2s">
            <span style="font-size:10px;font-weight:700"></span>
          </div>
          <span style="font-size:12px;color:#444;line-height:1.4">${esc(t)}</span>
        </div>`).join('')}
    </div>` : ''

  return `
    ${headerCard}

    <!-- DAY STRIP -->
    <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:16px;
      scrollbar-width:none;-webkit-overflow-scrolling:touch">
      ${dayStrip}
    </div>

    <!-- ACTIVITY CARDS -->
    <div id="acts-container">
      ${acts || '<div style="text-align:center;padding:40px;color:#888;font-size:13px;font-style:italic">Tidak ada aktivitas</div>'}
    </div>

    <!-- PACKING LIST -->
    ${checklist ? `
    <div style="margin-top:28px;border-top:2px solid #111;padding-top:18px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <span style="font-size:18px">🎒</span>
        <div style="font-family:'Noto Serif',serif;font-size:16px;font-weight:700;font-style:italic;color:#111">Persiapan</div>
      </div>
      ${checklist}
    </div>` : ''}

    ${it.importantNotes ? `
    <div style="margin-top:14px;padding:12px 14px;border-left:3px solid #c0392b;
      background:#fdf5f5;font-size:12px;color:#444;line-height:1.5">
      ⚠️ ${esc(it.importantNotes)}
    </div>` : ''}

    <!-- BOTTOM ACTIONS -->
    <div style="display:flex;gap:8px;margin-top:24px;padding-bottom:8px;flex-wrap:wrap">
      <button class="btn-pri" id="btn-export"
        style="flex:1;justify-content:center;min-width:120px">

// ─── EXPORT FUNCTIONS ──────────────────────────────────────────────────────────
function buildPrintPage(it) {
  const totalDays = it.days?.length || 1;
  const dests     = Array.from(S.destinations).map(id=>DESTINATIONS.find(d=>d.id===id)?.name).filter(Boolean);
  const transport = {motor:'Motor Pribadi',mobil:'Mobil Pribadi',umum:'Kendaraan Umum'}[S.transport]||S.transport||'-';
  const budget    = it.estimatedBudget;
  const budStr    = budget ? `Rp${(budget.min/1e6).toFixed(1)}jt \u2013 Rp${(budget.max/1e6).toFixed(1)}jt` : '-';
  const today     = new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});

  const DAY_COLORS = ['#c0392b','#1e5a8c','#286346','#784010','#502878'];

  function sessionOf(time) {
    if (!time) return 'siang';
    const h = parseInt(time.split(':')[0]);
    if (h < 10) return 'pagi';
    if (h < 14) return 'siang';
    if (h < 18) return 'sore';
    return 'malam';
  }
  const SESS_ORDER = ['pagi','siang','sore','malam'];
  const SESS_LBL   = {pagi:'PAGI',siang:'SIANG',sore:'SORE',malam:'MALAM'};

  // Build days HTML
  const daysHTML = (it.days||[]).map((day, di) => {
    const dc = DAY_COLORS[di % DAY_COLORS.length];

    // Group by session
    const grps = {};
    (day.activities||[]).forEach(a => {
      const s = sessionOf(a.time);
      (grps[s] = grps[s]||[]).push(a);
    });

    const sessionsHTML = SESS_ORDER.filter(s=>grps[s]?.length).map(sess => {
      const times = grps[sess].map(a=>a.time).filter(Boolean);
      const timeRange = times.length>=2 ? `${times[0]} \u2013 ${times[times.length-1]}` : times[0]||'';

      const actsHTML = grps[sess].map((act, ai) => {
        const isLast = ai === grps[sess].length-1;
        return `
          <div class="act-row">
            <div class="act-timeline">
              <div class="act-dot" style="background:${dc}"></div>
              ${!isLast ? '<div class="act-vline"></div>' : ''}
            </div>
            <div class="act-body">
              ${act.time ? `<div class="act-time" style="background:${dc}18;color:${dc}">${esc(act.time)}${act.duration ? ' &middot; '+esc(act.duration) : ''}</div>` : ''}
              <div class="act-name">${esc(act.name)}</div>
              ${act.description ? `<div class="act-desc">${esc(act.description)}</div>` : ''}
              ${act.estimatedCost>0 ? `<div class="act-cost">~Rp${act.estimatedCost.toLocaleString('id-ID')}</div>` : ''}
              ${act.tips ? `<div class="act-tip" style="border-left-color:${dc}">${esc(act.tips)}</div>` : ''}
            </div>
          </div>`;
      }).join('');

      return `
        <div class="session-block">
          <div class="session-label" style="color:${dc}">
            <span>${SESS_LBL[sess]}</span>
            ${timeRange ? `<span class="session-time">${timeRange}</span>` : ''}
          </div>
          ${actsHTML}
        </div>`;
    }).join('');

    return `
      <div class="day-section">
        <div class="day-header">
          <div class="day-num" style="background:${dc}">${di+1}</div>
          <div class="day-info">
            <div class="day-label">HARI KE-${di+1}</div>
            <div class="day-title">${esc(day.title||'')}</div>
          </div>
          <div class="day-accent-line" style="background:${dc}"></div>
        </div>
        ${sessionsHTML}
      </div>`;
  }).join('');

  // Packing
  const packHTML = (it.packingTips||[]).length ? `
    <div class="section-divider"></div>
    <div class="packing-section">
      <div class="section-title">Persiapan &amp; Perlengkapan</div>
      <div class="packing-grid">
        ${(it.packingTips||[]).map(t=>`
          <div class="pack-item">
            <div class="pack-cb"></div>
            <span>${esc(t)}</span>
          </div>`).join('')}
      </div>
    </div>` : '';

  const notesHTML = it.importantNotes ? `
    <div class="notes-box">&#9888; ${esc(it.importantNotes)}</div>` : '';

  return `<!DOCTYPE html>

async function exportItinerary(format) {
  const it = S.itinerary;
  if (!it) return;

  const modal        = document.getElementById('export-modal');
  const progressEl   = document.getElementById('export-progress');
  const progressBar  = document.getElementById('export-progress-bar');
  const progressText = document.getElementById('export-progress-text');
  const btns         = modal.querySelectorAll('button:not([onclick])');

  if (format === 'pdf') {
    // Cara 3: buka halaman print di tab baru
    progressEl.style.display = 'block';
    progressBar.style.width = '60%';
    progressText.textContent = 'Membuka halaman print...';
    btns.forEach(b => b.disabled = true);

    try {
      const html = buildPrintPage(it);
      const blob = new Blob([html], {type:'text/html;charset=utf-8'});
      const url  = URL.createObjectURL(blob);
      const win  = window.open(url, '_blank');
      if (!win) {
        // Popup blocked — fallback ke same tab
        document.open(); document.write(html); document.close();
      }
      // Cleanup blob URL setelah 60 detik
      setTimeout(() => URL.revokeObjectURL(url), 60000);

      progressBar.style.width = '100%';
      progressText.textContent = 'Tab baru terbuka — pilih "Save as PDF"';
      await new Promise(r => setTimeout(r, 1200));
      modal.classList.remove('open');

    } catch(err) {
      progressText.textContent = 'Gagal: ' + err.message;
      progressText.style.color = '#c0392b';
    } finally {
      btns.forEach(b => b.disabled = false);
      setTimeout(() => {
        progressEl.style.display = 'none';
        progressBar.style.width = '0%';
        progressText.style.color = '';
      }, 2000);
    }

  } else {
    // JPG: tetap pakai html2canvas
    progressEl.style.display = 'block';
    progressBar.style.width  = '20%';
    progressText.textContent = 'Merender gambar...';
    btns.forEach(b => b.disabled = true);

    try {
      const printEl = document.getElementById('itinerary-print');
      printEl.innerHTML = buildPrintPage(it)
        .replace(/^[\s\S]*?<body[^>]*>/i,'')
        .replace(/<\/body>[\s\S]*/i,'')
        .replace(/<div class="no-print">[\s\S]*?<\/div>/,'');

      await new Promise(r => setTimeout(r, 700));
      progressBar.style.width = '50%';

      const canvas = await html2canvas(printEl, {
        scale:2, useCORS:true, backgroundColor:'#fff',
        width:794, windowWidth:794,
        onclone: doc => {
          const el=doc.getElementById('itinerary-print');
          if(el){el.style.position='relative';el.style.left='0';}
        }
      });

      progressBar.style.width = '90%';
      const link = document.createElement('a');
      link.download = 'itinerary-banyuwangi-'+new Date().toISOString().slice(0,10)+'.jpg';
      link.href = canvas.toDataURL('image/jpeg', 0.93);
      link.click();

      progressBar.style.width = '100%';
      progressText.textContent = 'Selesai!';
      await new Promise(r => setTimeout(r, 700));
      modal.classList.remove('open');

    } catch(err) {
      progressText.textContent = 'Gagal: ' + err.message;
      progressText.style.color = '#c0392b';
    } finally {
      btns.forEach(b => b.disabled = false);
      setTimeout(() => {
        progressEl.style.display = 'none';
        progressBar.style.width = '0%';
        progressText.style.color = '';
      }, 1500);
    }
  }
}





// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function updateDestFeedback() {
  const matched   = DESTINATIONS.filter(d=>S.destinations.has(d.id));
  const terms     = S.destInput.split(',').map(s=>s.trim()).filter(Boolean);
  const unmatched = terms.filter(t => !isTermMatched(t));

  const tagsEl = document.getElementById('dest-tags-area');
  if (tagsEl) {
    if (matched.length > 0) {
      tagsEl.style.display = '';
      const tags = matched.map(d => `
        <div style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;
          background:#f0ede8;border:1px solid #111;
          border-radius:20px;margin:3px">
          <span>${d.emoji}</span>
          <span style="font-size:13px;font-weight:600;color:#c0392b">${esc(d.name)}</span>
          <span data-remove="${d.id}" style="cursor:pointer;color:#8b6f47;font-size:11px;
            margin-left:2px;padding:1px 3px;border-radius:50%">✕</span>
        </div>`).join('');
      document.getElementById('dest-tags-list').innerHTML = tags;
      document.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
        const id = el.dataset.remove;
        S.destinations.delete(id);
        const d = DESTINATIONS.find(x=>x.id===id);
        if (d) {
          const parts = S.destInput.split(',').map(s=>s.trim())
            .filter(s=>!s.toLowerCase().includes(d.name.toLowerCase().split(' ')[0]));
          S.destInput = parts.join(', ');
          const inp = document.getElementById('dest-input');
          if (inp) inp.value = S.destInput;
        }
        updateDestFeedback();
        updateNav();
      }));
    } else {
      tagsEl.style.display = 'none';
    }
  }

  const warnEl = document.getElementById('dest-warn-area');
  if (warnEl) {
    const show = unmatched.length > 0 && S.destInput;
    warnEl.style.display = show ? '' : 'none';
    if (show) {
      warnEl.innerHTML = `⚠️ Tidak ditemukan: <em>${unmatched.join(', ')}</em><br>
        <span style="color:#8b6f47">Coba: Kawah Ijen, TN Baluran, Red Island, Green Bay, TN Alas Purwo, Kawah Wurung…</span>`;
    }
  }

  const lblEl = document.getElementById('dest-suggest-label');
  if (lblEl) lblEl.textContent = matched.length > 0 ? 'Tambah lagi:' : 'Atau pilih dari sini:';

  const sugEl = document.getElementById('dest-suggestions');
  if (sugEl) {
    const suggestions = DESTINATIONS
      .filter(d=>!S.destinations.has(d.id))
      .slice(0,6)
      .map(d=>`<button data-suggest="${d.id}" style="background:#ede4d3;
        border:1px solid rgba(255,255,255,.1);color:#8b6f47;border-radius:0;
        padding:5px 11px;font-size:11px;cursor:pointer;font-family:inherit;
        transition:all .2s;white-space:nowrap">${d.emoji} ${d.name}</button>`).join('');
    sugEl.innerHTML = suggestions;
    sugEl.querySelectorAll('[data-suggest]').forEach(el => el.addEventListener('click', () => {
      const d = DESTINATIONS.find(x=>x.id===el.dataset.suggest);
      if (!d) return;
      S.destinations.add(d.id);
      S.destInput = S.destInput ? S.destInput.trimEnd().replace(/,$/,'')+', '+d.name : d.name;
      const inp = document.getElementById('dest-input');
      if (inp) inp.value = S.destInput;
      parseDestInput(S.destInput);
      updateDestFeedback();
      updateNav();
    }));
  }

  const clearBtn = document.getElementById('btn-clear-input');
  if (S.destInput && !clearBtn) {
    const wrap = document.getElementById('dest-input')?.parentElement;
    if (wrap) {
      const sp = document.createElement('span');
      sp.id = 'btn-clear-input';
      sp.style.cssText = 'position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#a89070;font-size:16px;padding:4px';
      sp.textContent = '✕';
      sp.addEventListener('click', () => {
        S.destInput = ''; S.destinations.clear();
        const inp = document.getElementById('dest-input');
        if (inp) { inp.value = ''; inp.focus(); }
        updateDestFeedback(); updateNav();
        const cb = document.getElementById('btn-clear-input');
        if (cb) cb.remove();
      });
      wrap.appendChild(sp);
    }
  } else if (!S.destInput && clearBtn) {
    clearBtn.remove();
  }
}

function updateHotelSuggestions() {
  const q = (S.penginapanSearchQuery||'').toLowerCase();
  const all = S.allPenginapan || [];
  const filtered = q.length >= 1
    ? all.filter(p => {
        const n = (p.nama||'').toLowerCase();
        return n.includes(q)||(p.kawasan||'').toLowerCase().includes(q)||(p.kategori||'').toLowerCase().includes(q);
      }).slice(0, 8)
    : S.penginapanOptions.slice(0, 5);

  const acEl = document.getElementById('hotel-autocomplete');
  if (acEl) {
    acEl.style.display = q.length >= 1 ? '' : 'none';
    acEl.innerHTML = filtered.length > 0
      ? filtered.map(p => {
          const sel = S.penginapanIds.has(p.id);
          const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):'';
          return `<div class="autocomplete-item${sel?' active':''}" data-penginapan-ac="${p.id}">
            <span style="font-size:20px">🏨</span>
            <div>
              <div class="autocomplete-item-name">${esc(p.nama)}${sel?' ✓':''}</div>
              <div class="autocomplete-item-sub">${p.kawasan||''}${distTxt?' · ~'+distTxt+' dari destinasi':''}${p.harga?' · Rp'+p.harga:''}</div>
            </div>
          </div>`;
        }).join('')
      : '<div class="autocomplete-empty">Tidak ditemukan — coba kata kunci lain</div>';
    acEl.querySelectorAll('[data-penginapan-ac]').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const id = el.dataset.penginapanAc;
        const hotelData = (S.allPenginapan||[]).find(p=>p.id===id) || (S.penginapanOptions||[]).find(p=>p.id===id) || null;
        if (S.penginapanIds.has(id)) {
          S.penginapanIds.delete(id);
          S.penginapanDataList = (S.penginapanDataList||[]).filter(p=>p.id!==id);
        } else {
          S.penginapanIds.add(id);
          if (hotelData) S.penginapanDataList = [...(S.penginapanDataList||[]), hotelData];
        }
        S.penginapan = S.penginapanIds.size > 0 ? 'firebase' : '';
        S.penginapanSearchQuery = '';
        const firstWithCoord = (S.penginapanDataList||[]).find(p=>p.lat&&p.lng);
        if (firstWithCoord) loadKulinerNearPenginapan(firstWithCoord.lat, firstWithCoord.lng);
        render();
      });
    });
  }

  const listEl = document.getElementById('hotel-suggestions');
  if (listEl) {
    listEl.innerHTML = filtered.map(p => {
      const sel = S.penginapanIds.has(p.id);
      const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):'';
      return `<div class="card-opt sm${sel?' selected':''}" data-penginapan-fb="${p.id}">
        <span class="card-opt-icon">🏨</span>
        <div style="flex:1;min-width:0">
          <div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.nama)}</div>
          <div class="card-opt-sub">${p.kawasan||''} ${distTxt?'· ~'+distTxt+' dari destinasi':''}</div>
        </div>
        <span class="card-opt-check">✓</span>
      </div>`;
    }).join('') || '<div style="font-size:12px;color:#a89070;padding:12px;text-align:center;font-style:italic">Tidak ditemukan</div>';
  }
}

function render() {
  const c = document.getElementById('content');
  try {
    switch (S.step) {
      case 0: c.innerHTML = renderStep0(); break;
      case 1: c.innerHTML = renderStep1(); break;
      case 2: c.innerHTML = renderStep2(); break;
      case 3:
        if (S.loading || S.error || S.itinerary) {
          c.innerHTML = renderStep3();
        } else {
          c.innerHTML = renderPlanningBoard();
        }
        break;
    }
  } catch(e) {
    console.error('render() error:', e);
    c.innerHTML = `<div style="padding:20px;color:#c0392b;font-size:13px">
      <b>⚠️ Error render:</b><br><pre style="white-space:pre-wrap;font-size:11px;color:#666666;margin-top:8px">${esc(e.message)}\n${esc(e.stack||'')}</pre>
    </div>`;
  }
  updateProgress();
  updateNav();
  attachListeners();
}

function partialUpdateDestList() {
  const q = S.destInput.toLowerCase().trim();
  const activeCat = S._catFilter || 'semua';

  // Update chips (selected destinations)
  const chipsEl = document.getElementById('dest-chips');
  if (chipsEl) {
    const matched = DESTINATIONS.filter(d => S.destinations.has(d.id));
    chipsEl.innerHTML = matched.map(d => `
      <div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;
        border-radius:20px;white-space:nowrap;flex-shrink:0;
        background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.35);">
        <span style="font-size:13px">${d.emoji}</span>
        <span style="font-size:12px;font-weight:700;color:#c0392b">${esc(d.name)}</span>
        <span data-remove="${d.id}" style="font-size:11px;color:#888;cursor:pointer;padding:0 2px">✕</span>
      </div>`).join('');
    // Re-attach remove handlers
    chipsEl.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
      const id = el.dataset.remove;
      S.destinations.delete(id);
      const d = DESTINATIONS.find(x => x.id === id);
      if (d) {
        const allNames = [d.name.toLowerCase(), ...(d.aliases||[]).map(a=>a.toLowerCase())];
        const parts = S.destInput.split(',').map(s=>s.trim()).filter(s => {
          const sl = s.toLowerCase();
          return !allNames.some(n => sl.includes(n.split(' ')[0]) || n.includes(sl));
        });
        S.destInput = parts.join(', ');
        const inp = document.getElementById('dest-input');
        if (inp) inp.value = S.destInput;
      }
      parseDestInput(S.destInput);
      partialUpdateDestList();
      updateNav();
    }));
  }

  // Update quick-pick chip states (toggle selected style tanpa rebuild)
  document.querySelectorAll('[data-dest-card]').forEach(el => {
    const id = el.dataset.destCard;
    if (!id) return;
    const sel = S.destinations.has(id);
    el.style.background = sel ? 'rgba(192,57,43,.08)' : '#f0ede8';
    el.style.border = sel ? '1px solid rgba(192,57,43,.5)' : '1px solid #e0dbd4';
    // Update checkmark
    const chk = el.querySelector('.dest-check');
    if (chk) chk.style.opacity = sel ? '1' : '0';
    // Update name color
    const nm = el.querySelector('.dest-name');
    if (nm) nm.style.color = sel ? '#c0392b' : '#111111';
  });

  // Update dest-cards-list (hasil pencarian)
  const listEl = document.getElementById('dest-cards-list');
  if (!listEl) return;

  const queryTerms = q.length >= 2
    ? q.split(',').map(s => s.trim()).filter(s => s.length >= 2)
    : [];

  if (queryTerms.length === 0) {
    listEl.innerHTML = '';
    return;
  }

  let displayDests = DESTINATIONS
    .filter(d => activeCat === 'semua' || d.cat === activeCat)
    .map(d => {
      let best = 0;
      for (const term of queryTerms) {
        let score = matchScore(term, d);
        if (d.name.toLowerCase().includes(term) && term.length >= 3) score += 30;
        if ((d.aliases||[]).some(a => a.includes(term) && term.length >= 3)) score += 20;
        if (score > best) best = score;
      }
      return { d, score: best };
    })
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .map(x => x.d)
    .slice(0, 14);

  // Tambahkan selected yang tidak muncul di hasil search
  const resultIds = new Set(displayDests.map(d => d.id));
  const selectedNotShown = DESTINATIONS.filter(d => S.destinations.has(d.id) && !resultIds.has(d.id));
  displayDests = [...selectedNotShown, ...displayDests].slice(0, 16);

  const CAT_DOT = { alam:'#2d8a4a', pantai:'#1a6a9a', diving:'#0a5a4a', budaya:'#8a6010', default:'#888888' };

  listEl.innerHTML = displayDests.map(d => {
    const sel = S.destinations.has(d.id);
    const dot = CAT_DOT[d.cat] || CAT_DOT.default;
    const catLabel = {alam:'Alam',pantai:'Pantai',diving:'Diving',budaya:'Budaya'}[d.cat]||d.cat;
    return `<div data-dest-card="${d.id}" style="display:flex;align-items:center;gap:12px;
      padding:12px 13px;border-radius:11px;cursor:pointer;transition:all .15s;margin-bottom:5px;
      background:${sel ? 'rgba(192,57,43,.07)' : '#ffffff'};
      border:1px solid ${sel ? 'rgba(192,57,43,.38)' : '#e0dbd4'};">
      <div style="width:40px;height:40px;border-radius:9px;flex-shrink:0;font-size:20px;
        display:flex;align-items:center;justify-content:center;
        background:${sel ? 'rgba(192,57,43,.13)' : '#f0ede8'};">
        ${d.emoji}
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:${sel?'#c0392b':'#111111'};margin-bottom:2px;
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.name)}</div>
        <div style="font-size:11px;color:#888888;display:flex;align-items:center;gap:5px">
          <span style="width:6px;height:6px;border-radius:50%;background:${dot};display:inline-block;flex-shrink:0"></span>
          ${catLabel} &middot; ${d.bestTime||''}
        </div>
      </div>
      <div style="width:20px;height:20px;border-radius:3px;flex-shrink:0;
        background:${sel?'#c0392b':'transparent'};border:1.5px solid ${sel?'#c0392b':'#e0dbd4'};
        display:flex;align-items:center;justify-content:center;
        font-size:12px;color:#fff;font-weight:700">
        ${sel ? '✓' : ''}
      </div>
    </div>`;
  }).join('');

  // Re-attach click handlers untuk card list
  listEl.querySelectorAll('[data-dest-card]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.destCard;
    S.destinations.has(id) ? S.destinations.delete(id) : S.destinations.add(id);
    partialUpdateDestList();
    updateDestFeedback();
    updateNav();
  }));

  // Update warn area
  const warnEl = document.getElementById('dest-warn-area');
  if (warnEl) warnEl.style.display = (queryTerms.length > 0 && displayDests.length === 0) ? 'block' : 'none';

  updateNav();
}

function partialUpdateHotelList() {
  const q = (S.penginapanSearchQuery || '').toLowerCase().trim();
  const listEl = document.getElementById('hotel-autocomplete');
  if (!listEl) return;

  const allHotels = S.penginapanDataList || [];

  const filtered = q.length >= 1
    ? allHotels.filter(p => {
        const n = (p.name||'').toLowerCase();
        const t = (p.tipe||'').toLowerCase();
        return n.includes(q) || t.includes(q);
      })
    : allHotels;

  if (filtered.length === 0) {
    listEl.innerHTML = `<div style="padding:12px;text-align:center;font-size:12px;
      color:#888;font-style:italic">Tidak ditemukan — coba kata kunci lain</div>`;
    return;
  }

  listEl.innerHTML = filtered.slice(0, 10).map(p => {
    const sel = S.penginapanIds.has(p.id);
    return `<div data-hotel-id="${p.id}" style="display:flex;align-items:center;gap:10px;
      padding:10px 13px;cursor:pointer;border-bottom:1px solid #f0ede8;
      background:${sel ? 'rgba(192,57,43,.05)' : '#fff'};transition:background .15s">
      <span style="font-size:20px;flex-shrink:0">${p.emoji||'🏨'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:${sel?'#c0392b':'#111'};
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}</div>
        <div style="font-size:11px;color:#888">${esc(p.harga||'')}</div>
      </div>
      ${sel ? '<span style="color:#c0392b;font-weight:700;flex-shrink:0">✓</span>' : ''}
    </div>`;
  }).join('');

  // Attach click
  listEl.querySelectorAll('[data-hotel-id]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.hotelId;
    const p = (S.penginapanDataList||[]).find(x => x.id === id);
    if (!p) return;
    if (S.penginapanIds.has(id)) {
      S.penginapanIds.delete(id);
      if (S.penginapan === p.name) S.penginapan = '';
    } else {
      S.penginapanIds.add(id);
      S.penginapan = p.name;
    }
    partialUpdateHotelList();
    updateNav();
  }));
}


function attachListeners() {
  const c = document.getElementById('content');

  const destInput = document.getElementById('dest-input');
  if (destInput) {
    let _destTimer = null;
    destInput.addEventListener('input', () => {
      const val = destInput.value;
      S.destInput = val;
      const q = val.toLowerCase().trim();
      parseDestInput(S.destInput);
      if (q.length === 0) S._shuffledDests = null;

      // Debounce partial update — JANGAN render() penuh agar keyboard tidak close
      clearTimeout(_destTimer);
      _destTimer = setTimeout(() => {
        updateDestFeedback();
        updateNav();
        // Update hanya card list dan chips, bukan seluruh DOM
        partialUpdateDestList();
      }, 180);
    });
  }
  const btnClear = document.getElementById('btn-clear-input');
  if (btnClear) btnClear.addEventListener('click', () => {
    S.destInput=''; S.destinations.clear(); S._shuffledDests = null;
    render();
  });
  c.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.remove;
    S.destinations.delete(id);
    const d = DESTINATIONS.find(x=>x.id===id);
    if (d) {
      // Match alias dan nama penuh, bukan hanya kata pertama
      const allNames = [d.name.toLowerCase(), ...(d.aliases||[]).map(a=>a.toLowerCase())];
      const parts = S.destInput.split(',').map(s=>s.trim()).filter(s => {
        const sl = s.toLowerCase();
        return !allNames.some(n => sl.includes(n.split(' ')[0]) || n.includes(sl));
      });
      S.destInput = parts.join(', ');
      const inp = document.getElementById('dest-input');
      if (inp) inp.value = S.destInput;
    }
    parseDestInput(S.destInput);
    render();
  }));
  c.querySelectorAll('[data-suggest]').forEach(el => el.addEventListener('click', () => {
    const d = DESTINATIONS.find(x=>x.id===el.dataset.suggest);
    if (!d) return;
    S.destinations.add(d.id);
    S.destInput = S.destInput ? S.destInput.trimEnd().replace(/,$/,'')+', '+d.name : d.name;
    const inp = document.getElementById('dest-input');
    if (inp) inp.value = S.destInput;
    parseDestInput(S.destInput);
    updateDestFeedback(); updateNav();

  const kulCust = document.getElementById('input-kuliner-custom');

  const selKota = document.getElementById('sel-kota');

  const inputKota = document.getElementById('input-kota-custom');
  if (inputKota) inputKota.addEventListener('input', () => { S.kotaAsalCustom = inputKota.value; updateNav(); });

  c.querySelectorAll('[data-transport]').forEach(el => el.addEventListener('click', () => {
    S.transport = el.dataset.transport;

    const v = el.dataset.sewa;
    S.sewaLokal.has(v) ? S.sewaLokal.delete(v) : S.sewaLokal.add(v);
    render();
  }));
  c.querySelectorAll('[data-sub]').forEach(el => el.addEventListener('click', () => {
    S.subTransport = el.dataset.sub;
    render();
  }));

  const inpTiba = document.getElementById('input-waktu-tiba');

  const inpPulang = document.getElementById('input-waktu-pulang');

    S.gayaPerjalanan = el.dataset.gaya;

  }));

    const id = el.dataset.penginapanFb;
    const hotelData = S.penginapanOptions.find(p=>p.id===id) || (S.allPenginapan||[]).find(p=>p.id===id) || null;
    if (S.penginapanIds.has(id)) {
      S.penginapanIds.delete(id);
      S.penginapanDataList = (S.penginapanDataList||[]).filter(p=>p.id!==id);

      if (hotelData) S.penginapanDataList = [...(S.penginapanDataList||[]), hotelData];

  if (plus)  plus.addEventListener('click',  () => { S.jumlahOrang = Math.min(20, S.jumlahOrang+1); if (cntEl) cntEl.textContent = S.jumlahOrang; });

  // Day tabs
  c.querySelectorAll('[data-day-tab]').forEach(el => el.addEventListener('click', () => {
    _activeDay = parseInt(el.dataset.dayTab);
    render();

    render();

    if (S.destinations.has(id)) S.destinations.delete(id);
    else S.destinations.add(id);
    render();
    updateNav();
  }));

  const retry   = document.getElementById('btn-retry');
  const restart = document.getElementById('btn-restart');
  const exportBtn = document.getElementById('btn-export');
  if (exportBtn) exportBtn.addEventListener('click', () => {
    document.getElementById('export-modal').classList.add('open');
  });
  const btnExportPdf = document.getElementById('btn-export-pdf');
  const btnExportJpg = document.getElementById('btn-export-jpg');
  if (btnExportPdf) btnExportPdf.addEventListener('click', () => exportItinerary('pdf'));
  if (btnExportJpg) btnExportJpg.addEventListener('click', () => exportItinerary('jpg'));
  if (retry)   retry.addEventListener('click', () => { S.error=null; S.loading=true; render(); generate(); });
  if (restart) restart.addEventListener('click', () => {
    Object.assign(S, {
      step:0, kotaAsal:'', kotaAsalCustom:'', destInput:'',
      transport:'', subTransport:'', durasi:'', gayaPerjalanan:'',
      penginapan:'', penginapanCustom:'', kulinerCustom:'', jumlahOrang:2,
      planDays:[], planBacklog:[],
      loading:false, itinerary:null, error:null,
    });
    S.destinations.clear();
    S.sewaLokal.clear();
    S.penginapanIds.clear();
    S.penginapanDataList = [];
    render();
  });
  // Re-init Sortable setiap kali DOM di-rebuild (planning board)
  if (S.step === 3 && !S.loading && !S.itinerary && !S.error) {
    requestAnimationFrame(() => initSortableBoard());
  }
}

// ─── STATIC NAV LISTENERS ────────────────────────────────────────────────────
document.getElementById('btn-back').addEventListener('click', () => { S.step--; render(); });
document.getElementById('btn-next').addEventListener('click', async () => {
  if (S.step===3) {
    readPlanFromDOM();
    S.loading=true; S.itinerary=null; S.error=null;
    render();
    generate();
  } else if (S.step===2) {
    S.step=3;
    initPlanDays();
    render();
  } else if (S.step===1) {
    S.step=2;
    render();
    await loadPenginapanOptions();
    render();
  } else {
    S.step++;
    render();
  }
});
