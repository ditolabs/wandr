<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wandr — Buat Itinerary Banyuwangi</title>
  
  <style>
    /* ── RESET & BASE ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      min-height: 100vh; background: #0c1a0c;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      color: #f0e8d8; -webkit-font-smoothing: antialiased;
      overscroll-behavior-y: none;
    }

    /* ── LAYOUT & HEADER ───────────────────────────────────────────────── */
    #app { max-width: 640px; margin: 0 auto; padding: 0 20px; }
    #header { padding-top: 20px; margin-bottom: 18px; display: flex; align-items: center; gap: 9px; }
    .logo-icon { width: 30px; height: 30px; background: #e07b39; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .logo-text { font-family: 'Playfair Display', Georgia, serif; font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
    .logo-badge { font-size: 10px; color: #4a6a4a; background: rgba(74,106,74,.18); padding: 2px 9px; border-radius: 20px; font-weight: 500; }

    /* ── PROGRESS ──────────────────────────────────────────────────────── */
    #progress-area { margin-bottom: 20px; }
    .step-labels { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .step-label { font-size: 10px; font-weight: 400; color: #2a4a2a; letter-spacing: .04em; transition: color .3s; }
    .step-label.active { font-weight: 700; color: #e07b39; }
    .step-label.done   { color: #4a7a4a; }
    .progress-bar { height: 2px; background: rgba(255,255,255,.05); border-radius: 1px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #c96a2a, #e07b39); border-radius: 1px; transition: width .5s ease; }

    /* ── NAV & BUTTONS ─────────────────────────────────────────────────── */
    #nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 0 32px; border-top: 1px solid rgba(255,255,255,.04); margin-top: 4px; }
    .dest-count { font-size: 11px; color: #3a5a3a; }
    .btn-pri { background: #e07b39; color: #fff; border: none; border-radius: 10px; padding: 12px 22px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all .2s; }
    .btn-pri:hover:not(:disabled) { background: #c96a2a; transform: translateY(-1px); }
    .btn-pri:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }
    .btn-ghost { background: transparent; color: #8fa08f; border: 1.5px solid rgba(255,255,255,.1); border-radius: 10px; padding: 12px 22px; font-weight: 500; font-size: 15px; cursor: pointer; }
    .btn-ghost.hidden { visibility: hidden; }

    /* ── TYPOGRAPHY & FIELDS ───────────────────────────────────────────── */
    .step-title { font-family: 'Playfair Display', Georgia, serif; font-size: 26px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
    .step-sub { color: #6a8a6a; font-size: 14px; margin-bottom: 20px; }
    .field-wrap { margin-bottom: 20px; }
    .field-label { display: block; font-size: 12px; font-weight: 600; color: #6a8a6a; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
    input[type="text"], input[type="time"], select { background: rgba(255,255,255,.05); border: 1.5px solid rgba(255,255,255,.1); color: #f0e8d8; border-radius: 10px; padding: 11px 14px; width: 100%; font-size: 14px; }
    input:focus, select:focus { border-color: #e07b39; outline: none; }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .select-wrap { position: relative; }
    .select-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #5a7a5a; font-size: 12px; }
    summary::-webkit-details-marker { display: none; }
    summary { list-style: none; }

    /* ── CARD OPTIONS ──────────────────────────────────────────────────── */
    .card-list { display: flex; flex-direction: column; gap: 8px; }
    .card-opt { padding: 13px 15px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 13px; }
    .card-opt:hover { transform: translateY(-2px); }
    .card-opt.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .card-opt.sm { padding: 11px 13px; border-radius: 10px; }
    .card-opt-icon { font-size: 24px; flex-shrink: 0; }
    .card-opt.sm .card-opt-icon { font-size: 20px; }
    .card-opt-title { font-size: 14px; font-weight: 600; color: #f0e8d8; transition: color .2s; }
    .card-opt.selected .card-opt-title { color: #e07b39; }
    .card-opt-sub { font-size: 12px; color: #5a7a5a; margin-top: 2px; }
    .card-opt.sm .card-opt-sub { font-size: 11px; }

    .sewa-wrap { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .35s ease, opacity .35s ease; }
    .sewa-wrap.open { max-height: 500px; opacity: 1; overflow: visible; margin-bottom: 24px; }
    .sewa-box { padding: 15px; border-radius: 12px; background: rgba(107,159,212,.06); border: 1.5px solid rgba(107,159,212,.2); margin-bottom: 4px; }
    .sewa-title { font-size: 13px; font-weight: 700; color: #6b9fd4; margin-bottom: 4px; }
    .sewa-sub   { font-size: 12px; color: #5a7a5a; margin-bottom: 12px; line-height: 1.5; }
    .card-opt.sewa-sel { background: rgba(107,159,212,.12) !important; border-color: rgba(107,159,212,.6) !important; }
    .card-opt.sewa-sel .card-opt-title { color: #6b9fd4 !important; }

    /* ── PILL & GAYA CARDS ─────────────────────────────────────────────── */
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill-opt { padding: 10px 15px; border-radius: 10px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; text-align: center; }
    .pill-opt.selected { background: rgba(224,123,57,.13); border-color: #e07b39; }
    .pill-label { font-size: 13px; font-weight: 700; color: #f0e8d8; }
    .pill-opt.selected .pill-label { color: #e07b39; }
    .pill-sub { font-size: 10px; color: #5a7a5a; margin-top: 2px; }

    .gaya-row { display: flex; gap: 10px; }
    .gaya-card { flex: 1; padding: 15px; border-radius: 12px; background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.08); cursor: pointer; text-align: center; }
    .gaya-card.selected { background: rgba(224,123,57,.1); border-color: #e07b39; }
    .gaya-emoji { font-size: 28px; margin-bottom: 8px; }
    .gaya-label { font-size: 14px; font-weight: 700; color: #f0e8d8; }
    .gaya-card.selected .gaya-label { color: #e07b39; }
    .gaya-desc  { font-size: 11px; color: #5a7a5a; margin-top: 7px; line-height: 1.6; white-space: pre-line; }

    /* ── COUNTER ───────────────────────────────────────────────────────── */
    .counter-row { display: flex; align-items: center; gap: 14px; }
    .cnt-btn { background: rgba(255,255,255,.07); color: #f0e8d8; border: 1.5px solid rgba(255,255,255,.12); border-radius: 8px; width: 36px; height: 36px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cnt-val { font-size: 22px; font-weight: 700; min-width: 30px; text-align: center; }
    .cnt-label { font-size: 13px; color: #5a7a5a; }

    /* ── PLANNING BOARD (DRAG & DROP) ──────────────────────────────────── */
    .planning-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; padding-bottom: 20px; align-items: start; }
    .plan-col { background: rgba(255,255,255,.02); border-radius: 12px; padding: 12px; border: 1px dashed rgba(255,255,255,.1); display: flex; flex-direction: column; }
    .plan-col-header { font-size: 13px; font-weight: 700; margin-bottom: 12px; color: #a0b090; text-align: center; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid rgba(255,255,255,.05); padding-bottom: 8px; }
    .col-body { flex: 1; min-height: 80px; display: flex; flex-direction: column; gap: 8px; }
    
    .drag-item {
      background: #152415; border: 1px solid rgba(255,255,255,.08); padding: 14px 16px; border-radius: 10px; 
      display: flex; flex-direction: column; gap: 4px; transition: box-shadow 0.2s ease, transform 0.2s ease;
      cursor: grab; user-select: none; -webkit-user-select: none; touch-action: pan-y;
    }
    .drag-title { font-size: 14px; font-weight: 600; color: #f0e8d8; line-height: 1.3; pointer-events: none; }
    .drag-zone { font-size: 11px; color: #8fa08f; pointer-events: none; margin-top: 3px; }
    
    .sortable-chosen { box-shadow: 0 8px 24px rgba(0,0,0,0.5); background: #1a2e1a; border-color: #e07b39; transform: scale(1.02); }
    .sortable-ghost { opacity: 0.3; background: rgba(224,123,57,.1); border: 2px dashed #e07b39; }
    .sortable-drag { cursor: grabbing !important; z-index: 9999 !important; background: #1a2e1a !important; border: 1px solid #e07b39 !important; box-shadow: 0 15px 35px rgba(0,0,0,0.7) !important; opacity: 1 !important; will-change: transform, left, top !important; pointer-events: none !important; transition: none !important; }

    /* ── LOADING & RESULT ──────────────────────────────────────────────── */
    .loading-screen { text-align: center; padding: 64px 0; }
    .loading-icon { font-size: 52px; margin-bottom: 18px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .loading-title { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; margin-bottom: 10px; line-height: 1.3; }
    .loading-sub  { color: #5a7a5a; font-size: 13px; line-height: 1.6; }
    
    .result-summary { padding: 18px; background: rgba(224,123,57,.07); border: 1.5px solid rgba(224,123,57,.2); border-radius: 16px; margin-bottom: 22px; }
    .result-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .result-title { font-family: 'Playfair Display', Georgia, serif; font-size: 20px; font-weight: 700; flex: 1; line-height: 1.3; }
    .result-budget-label { font-size: 10px; color: #6a8a6a; text-align: right; }
    .result-budget-val   { font-size: 16px; font-weight: 700; color: #e07b39; }
    .result-desc  { font-size: 13px; color: #a0b090; line-height: 1.6; margin-bottom: 10px; }
    
    .day-section { margin-bottom: 24px; animation: fdi .5s ease both; }
    @keyframes fdi { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .day-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .day-num { width: 32px; height: 32px; background: #e07b39; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .day-label { font-size: 10px; color: #5a7a5a; text-transform: uppercase; letter-spacing: .05em; }
    .day-title-txt { font-family: 'Playfair Display', Georgia, serif; font-size: 17px; font-weight: 600; line-height: 1.3; }

    .act-item { display: flex; gap: 12px; margin-bottom: 12px; animation: sli .45s ease both; }
    @keyframes sli { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
    .act-timeline { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 22px; }
    .act-icon { font-size: 15px; }
    .act-line { width: 1px; flex: 1; background: rgba(255,255,255,.05); margin: 4px 0; min-height: 12px; }
    .act-body { flex: 1; padding-bottom: 4px; }
    .act-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .act-time { font-size: 11px; color: #5a7a5a; font-weight: 500; }
    .act-duration { font-size: 11px; color: #3d5a3d; margin-left: 7px; }
    .act-cost { font-size: 11px; color: #6a8a6a; background: rgba(255,255,255,.04); padding: 2px 7px; border-radius: 6px; flex-shrink: 0; }
    .act-name { font-size: 14px; font-weight: 600; color: #f0e8d8; line-height: 1.3; }
    .act-location { font-size: 11px; color: #4a6a4a; margin-top: 2px; }
    .act-desc { font-size: 12px; color: #7a9a7a; line-height: 1.55; margin-top: 4px; }
    .act-tip { margin-top: 7px; padding: 6px 10px; border-radius: 7px; font-size: 11px; line-height: 1.5; border-left: 2px solid; }
  </style>
</head>
<body>
<div id="app">

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<script>
// ─── RADIUS & DATABASE ──────────────────────────────────────────────────────
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371; 
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

const PENGINAPAN_DB = [
  { id: 'h1', name: 'Luminor Hotel (Pusat Kota)', lat: -8.2045, lng: 114.3644, type: 'hotel3' },
  { id: 'h2', name: 'Dialoog Banyuwangi (Kalipuro)', lat: -8.1465, lng: 114.3965, type: 'hotel45' },
  { id: 'h3', name: 'Jiwa Jawa Resort (Ijen/Barat)', lat: -8.1255, lng: 114.2690, type: 'hotel45' },

  { id: 'h7', name: 'Ketapang Indah Hotel (Utara)', lat: -8.1565, lng: 114.3892, type: 'hotel45' },

if (!firebase.apps.length) {
  firebase.initializeApp({ apiKey: 'AIzaSyCHWWjnxX5-Fk9-gRTZVwyC3WDDfnLPh_s', authDomain: 'banyuwangi-db.firebaseapp.com', projectId: 'banyuwangi-db' });
}
const db = firebase.firestore();

const KAWASAN_ZONE = { 'Licin':'barat', 'Wongsorejo':'utara', 'Pesanggaran':'selatan', 'Pusat Kota':'kota' };
const DEST_COORDS = { 'ijen': {lat:-8.0584, lng:114.2420}, 'baluran': {lat:-7.8384, lng:114.3949}, 'tabuhan': {lat:-8.0433, lng:114.4533}, 'red_island': {lat:-8.6046, lng:114.0264}, 'de_djawatan': {lat:-8.3242, lng:114.1111}, 'sendang_seruni': {lat:-8.1522, lng:114.2501}, 'city': {lat:-8.2192, lng:114.3692} };

function mapToWandr(id, d) {
  if (d.type !== 'wisata' || d.status === 'pending') return null;
  let finalId = id;
  const nm = (d.nama||'').toLowerCase();
  
  if(nm.includes('ijen')) finalId = 'ijen';
  else if(nm.includes('djawatan')) finalId = 'de_djawatan';
  else if(nm.includes('seruni')) finalId = 'sendang_seruni';
  else if(nm.includes('baluran')) finalId = 'baluran';
  else if(nm.includes('tabuhan')) finalId = 'tabuhan';
  else if(nm.includes('merah')) finalId = 'red_island';

  return { id: finalId, name:d.nama, desc:d.catatan||d.kategori||'', zone: KAWASAN_ZONE[d.kawasan]||'kota' };
}

let DESTINATIONS = [];
const DESTINATIONS_FALLBACK = [
  { id:'ijen', name:'Kawah Ijen', desc:'Blue fire & kawah asam', zone:'barat'},
  { id:'de_djawatan', name:'De Djawatan', desc:'Hutan trembesi rindang ala Lord of The Rings', zone:'selatan'},
  { id:'sendang_seruni', name:'Sendang Seruni', desc:'Mata air jernih di kaki gunung', zone:'barat'},
  { id:'baluran', name:'TN Baluran', desc:'Afrika van Java', zone:'utara'},
  { id:'tabuhan', name:'Pulau Tabuhan', desc:'Pasir putih & snorkeling', zone:'utara'},
  { id:'red_island', name:'Pulau Merah', desc:'Pantai eksotis & sunset', zone:'selatan'},
  { id:'city', name:'City Tour BWI', desc:'Kuliner & wisata kota', zone:'kota'},
];

async function loadDestinations() {
  try {
    const query = db.collection('places').where('type','==','wisata').get();
    const snap = await Promise.race([query, new Promise((_,rej) => setTimeout(()=>rej(new Error()), 6000))]);
    const loaded = snap.docs.map(doc => mapToWandr(doc.id, doc.data())).filter(Boolean);
    DESTINATIONS = loaded.length > 0 ? loaded : DESTINATIONS_FALLBACK;
    if(!DESTINATIONS.find(d=>d.id==='sendang_seruni')) DESTINATIONS.push(DESTINATIONS_FALLBACK[2]);
    if(!DESTINATIONS.find(d=>d.id==='de_djawatan')) DESTINATIONS.push(DESTINATIONS_FALLBACK[1]);
  } catch(e) { DESTINATIONS = DESTINATIONS_FALLBACK; }
}

const KOTA = ['Surabaya','Jakarta','Bali/Denpasar','Malang','Yogyakarta','Bandung','Lainnya'];
const DURASI = [ { v:'1D', label:'1 Hari', sub:'One Day Trip' }, { v:'2D1N', label:'2H 1M', sub:'Weekend Trip' }, { v:'3D2N', label:'3H 2M', sub:'Long Weekend' }, { v:'4D3N', label:'4H 3M', sub:'Mini Vacation' } ];
const ACT_STYLE = { aktivitas: { color:'#e07b39', bg:'rgba(224,123,57,.1)', icon:'🎯' }, makan: { color:'#4ab06a', bg:'rgba(74,176,106,.1)', icon:'🍽️' }, transport: { color:'#6b9fd4', bg:'rgba(107,159,212,.1)', icon:'🚌' }, penginapan: { color:'#c47bd4', bg:'rgba(196,123,212,.1)', icon:'🏨' }, istirahat: { color:'#8fa08f', bg:'rgba(143,160,143,.1)', icon:'☕' } };

// ─── STATE ───────────────────────────────────────────────────────────────────
const S = {
  step: 0, destinations: new Set(), inputText: '',
  penginapanId: null, penginapanType: '', penginapanName: '', penginapanCustom: '', kulinerCustom: '',
  kotaAsal: '', kotaAsalCustom: '', transport: '', subTransport: '', waktuTiba: '06:00', waktuPulang: '13:00',
  sewaLokal: new Set(), durasi: '', gayaPerjalanan: '', jumlahOrang: 2,
  userPlan: [], loading: false, itinerary: null, error: null,
};

const fmt = n => n >= 1000 ? Math.round(n/1000) + 'K' : String(n);
const esc = s => String(s).replace(/</g,'<').replace(/>/g,'>');

// FUNGSI BARU: Mengekstrak string penginapan yang dipisah koma menjadi array
function getHotelNames() {
  let val = S.penginapanCustom.trim() !== '' ? S.penginapanCustom : (S.penginapanName || 'Penginapan');
  return val.split(',').map(s => s.trim()).filter(s => s.length > 0);
}

// ─── PROGRESS & NAV ──────────────────────────────────────────────────────────
function updateProgress() {
  document.getElementById('progress-fill').style.width = (S.step / 4) * 100 + '%';
  document.querySelectorAll('.step-label').forEach(el => {
    el.className = 'step-label' + (+el.dataset.i === S.step ? ' active' : +el.dataset.i < S.step ? ' done' : '');
  });
  document.getElementById('progress-area').style.display = S.step===4 ? 'none' : '';
}

function updateNav() {
  const nav = document.getElementById('nav');
  if (S.step===4) { nav.style.display='none'; return; }
  nav.style.display = 'flex';
  document.getElementById('btn-back').className = 'btn-ghost' + (S.step===0?' hidden':'');
  
  let ok = false;
  if (S.step===0) ok = S.destinations.size > 0 && (S.penginapanId || S.penginapanCustom.trim().length > 0); 
  if (S.step===1) { let ok1 = S.kotaAsal && (S.kotaAsal!=='Lainnya'||S.kotaAsalCustom.trim()) && S.transport; if (S.transport === 'umum' && !S.subTransport) ok1 = false; ok = ok1; }
  if (S.step===2) ok = S.durasi && S.gayaPerjalanan;
  if (S.step===3) ok = true;

  document.getElementById('btn-next').disabled = !ok;
  document.getElementById('btn-next').textContent = S.step===3 ? '✨ Generate Itinerary' : 'Lanjut →';
}

// ─── RENDER STEP 0 ──────────────────────────────────────────────────────────
function renderStep0() {
  return `
    <h2 class="step-title">Ke Banyuwangi, mau kemana aja?</h2>
    <p class="step-sub">Pisahkan dengan koma (contoh: kawah ijen, sendang seruni, de djawatan)</p>

// ─── LOGIC & ENGINE ─────────────────────────────────────────────────────────
function processDestInput(inputVal) {
  const keywords = inputVal.split(',').map(s => s.trim().toLowerCase()).filter(s => s.length > 2);
  S.destinations.clear(); let matchedDestinations = [];
  keywords.forEach(kw => {
    const match = DESTINATIONS.find(d => d.name.toLowerCase().includes(kw) || d.desc.toLowerCase().includes(kw));
    if (match && !S.destinations.has(match.id)) { S.destinations.add(match.id); matchedDestinations.push(match); }
  });
  const noticeEl = document.getElementById('dest-match-notice');
  const accSection = document.getElementById('accommodation-section');
  if (S.destinations.size > 0) {
    noticeEl.textContent = `✓ Terdeteksi: ${matchedDestinations.map(d => d.name).join(', ')}`;
    accSection.style.display = 'block';
    let avgLat = 0, avgLng = 0;
    const destCoords = matchedDestinations.map(d => DEST_COORDS[d.id] || {lat: -8.2192, lng: 114.3692});
    destCoords.forEach(c => { avgLat += c.lat; avgLng += c.lng; });
    avgLat /= destCoords.length; avgLng /= destCoords.length;

    const sortedHotels = PENGINAPAN_DB.map(h => ({ ...h, distance: getDistance(avgLat, avgLng, h.lat, h.lng) }))
      .filter(h => h.distance <= 2.5).sort((a, b) => a.distance - b.distance);
    if(sortedHotels.length === 0) sortedHotels.push(...PENGINAPAN_DB.map(h => ({ ...h, distance: getDistance(avgLat, avgLng, h.lat, h.lng) })).sort((a, b) => a.distance - b.distance).slice(0, 2));

    document.getElementById('hotel-suggestions').innerHTML = sortedHotels.map(h => `
      <div class="card-opt sm ${S.penginapanId === h.id ? 'selected' : ''}" onclick="selectHotel('${h.id}', '${h.name}', '${h.type}', event)">
        <span class="card-opt-icon">🏨</span><div><div class="card-opt-title">${h.name}</div><div class="card-opt-sub">± ${h.distance.toFixed(1)} km dari titik destinasi</div></div><span class="card-opt-check">✓</span>
      </div>`).join('');
  } else { noticeEl.textContent = ''; accSection.style.display = 'none'; S.penginapanId = null; }
  updateNav();
}

window.selectHotel = function(id, name, type, event) {
  S.penginapanId = id; S.penginapanName = name; S.penginapanType = type; S.penginapanCustom = '';
  document.getElementById('input-hotel-custom').value = '';
  document.querySelectorAll('#hotel-suggestions .card-opt').forEach(el => el.classList.remove('selected'));
  if (event) event.currentTarget.classList.add('selected');
  updateNav();
};

function attachListeners() {
  const c = document.getElementById('content');
  if (c.querySelector('#input-dest-text')) {
    if (S.inputText) processDestInput(S.inputText);
    c.querySelector('#input-dest-text').addEventListener('input', e => { S.inputText = e.target.value; processDestInput(S.inputText); });
    c.querySelector('#input-hotel-custom').addEventListener('input', e => { S.penginapanCustom = e.target.value; if(S.penginapanCustom.trim() !== '') { document.querySelectorAll('#hotel-suggestions .card-opt').forEach(el => el.classList.remove('selected')); S.penginapanId = null; } updateNav(); });
    c.querySelector('#input-kuliner-custom').addEventListener('input', e => { S.kulinerCustom = e.target.value; });
  }

  if (c.querySelector('#sel-kota')) {
    c.querySelector('#sel-kota').addEventListener('change', e => { S.kotaAsal = e.target.value; S.kotaAsalCustom = ''; render(); });
    if(c.querySelector('#input-kota-custom')) c.querySelector('#input-kota-custom').addEventListener('input', e => { S.kotaAsalCustom = e.target.value; updateNav(); });
    c.querySelector('#input-waktu-tiba').addEventListener('change', e => { S.waktuTiba = e.target.value; updateNav(); });
    c.querySelector('#input-waktu-pulang').addEventListener('change', e => { S.waktuPulang = e.target.value; updateNav(); });
  }
  
  if (c.querySelector('#btn-minus')) {
    c.querySelector('#btn-minus').addEventListener('click', () => { S.jumlahOrang = Math.max(1, S.jumlahOrang-1); c.querySelector('#cnt-val').textContent = S.jumlahOrang; });
    c.querySelector('#btn-plus').addEventListener('click', () => { S.jumlahOrang = Math.min(20, S.jumlahOrang+1); c.querySelector('#cnt-val').textContent = S.jumlahOrang; });
  }

  if(c.querySelector('#btn-restart')) c.querySelector('#btn-restart').addEventListener('click', () => location.reload());
}

// ─── ALGORITMA GENERATOR (TRACKING PINDAH HOTEL) ────────────────────────────
function addMin(t, m) { const [h,mn] = t.split(':').map(Number); const tot = h*60+mn+m; return `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`; }
function buildMakan(waktu, customKuliner, specificTime = null) {
  let label = { pagi:'Sarapan', siang:'Makan Siang', malam:'Makan Malam' }[waktu];
  let timeStr = specificTime || { pagi:'07:30', siang:'12:30', malam:'19:00' }[waktu];
  if (waktu === 'siang' && parseInt(timeStr.split(':')[0]) < 11) { label = 'Sarapan Pagi / Brunch'; }
  return { time: timeStr, name: `${label} — ${customKuliner || 'Kuliner Lokal'}`, location: customKuliner || 'Warung Lokal', duration: '1 jam', description: 'Waktunya mengisi perut.', tips: customKuliner ? 'Pilihan pribadimu.' : 'Coba kuliner khas lokal.', estimatedCost: 30000, type: 'makan' };
}

function calculateBudget(spots, form, totalDays) {
  const totalWisata = spots.length * 15000;
  const totalKuliner = totalDays * 3 * 25000;
  const hotelEst = {hotel45:700000, hotel3:300000, hotel12:150000, homestay:80000};
  const hargaHotelMalam = hotelEst[form.penginapanType] || 150000; 
  const totalAkomodasi = hargaHotelMalam * Math.max(0, totalDays - 1);
  let transportPP = 200000; 
  if (form.transport === 'umum') {
     if (form.subTransport === 'kereta') transportPP = 250000; else if (form.subTransport === 'pesawat') transportPP = 1500000; else if (form.subTransport === 'bus') transportPP = 300000;
  } else if (form.transport === 'pribadi_mobil') transportPP = 400000; else if (form.transport === 'pribadi_motor') transportPP = 150000;
  
  let sewaLokal = 0;
  if (form.sewaLokal.has('motor')) sewaLokal += 100000 * totalDays; if (form.sewaLokal.has('mobil_driver')) sewaLokal += 500000 * totalDays;
  const totalTransport = transportPP + sewaLokal;
  const minTotal = totalWisata + totalKuliner + totalAkomodasi + totalTransport;
  return { min: Math.round(minTotal/1000)*1000, max: Math.round((minTotal*1.3)/1000)*1000, details: { transportasi: totalTransport, akomodasi: totalAkomodasi, kuliner: totalKuliner, wisata: totalWisata }, note: 'Klik angka budget untuk melihat rincian biaya.' };
}

function generate() {
  setTimeout(() => {
    try {
      const selected = DESTINATIONS.filter(d=>S.destinations.has(d.id));
      const totalDays = parseInt(S.durasi.charAt(0)) || 3;
      const kota = S.kotaAsal==='Lainnya' ? S.kotaAsalCustom : S.kotaAsal;
      
      const hotelNames = getHotelNames();
      let currentHotel = hotelNames.length > 0 ? hotelNames[0] : "Penginapan"; // Set hotel awal
      
      const days = [];

      for(let d = 0; d < totalDays; d++) {
         const dayNum = d + 1;
         const isFirstDay = dayNum === 1;
         const isLastDay = dayNum === totalDays;
         let dayActs = [];
         
         // Mapping ID drag ke objek wisata / hotel
         let spotsForThisDay = (S.userPlan[d] || []).map(id => {
             if(id.startsWith('hotel_checkin_')) {
                 const idx = parseInt(id.split('_')[2]);
                 const hName = hotelNames[idx] || "Penginapan";
                 return { id: id, name: `Check-in: ${hName}`, hotelName: hName, desc: 'Masuk penginapan untuk menaruh barang dan istirahat.', type: 'penginapan' };
             }
             return DESTINATIONS.find(x => x.id === id);
         }).filter(Boolean);

         // UPDATE CURRENT HOTEL JIKA ADA KARTU CHECK-IN HARI INI
         const checkinSpot = spotsForThisDay.find(s => s.id && s.id.startsWith('hotel_checkin_'));
         if (checkinSpot) { currentHotel = checkinSpot.hotelName; }

         let curTime = '08:00';
         let usedLocker = false;
         
         // [LOGIKA HARI 1: KEDATANGAN]
         if(isFirstDay) {
            const jamTiba = parseInt(S.waktuTiba.split(':')[0]);
            const transportName = S.transport === 'umum' ? S.subTransport : S.transport.replace('pribadi_', '');
            
            dayActs.push({ time: addMin(S.waktuTiba, -240), name:`Perjalanan dari ${kota}`, location:kota, duration:'Sesuai moda', description:`Menggunakan ${transportName} menuju Banyuwangi.`, tips:'', estimatedCost: S.transport==='umum'?150000:60000, type:'transport' });
            dayActs.push({ time: S.waktuTiba, name:'Tiba di Banyuwangi', location:'Stasiun/Bandara', duration:'30 menit', description:'Selamat datang di Banyuwangi!', tips:'', estimatedCost:0, type:'transport' });
            
            let firstSpotId = spotsForThisDay.length > 0 ? spotsForThisDay[0].id : null;

            if (jamTiba < 11) {
               if(S.transport === 'umum' && S.sewaLokal.size > 0 && !(firstSpotId && firstSpotId.startsWith('hotel_checkin_'))) {
                   usedLocker = true;
                   dayActs.push({ time: addMin(S.waktuTiba, 30), name:'Sewa Kendaraan & Titip Tas', location: 'Stasiun / Locker Wangi', duration:'45 menit', description:'Ambil kendaraan sewa yang sudah dipesan. Titip tas di Locker Wangi agar jalan-jalan leluasa.', tips:'Web: lockerwangi.com', estimatedCost:25000, type:'aktivitas' });
                   curTime = addMin(S.waktuTiba, 75);
               } else {
                   curTime = addMin(S.waktuTiba, 30);
               }
               dayActs.push(buildMakan('pagi', S.kulinerCustom, curTime));
               curTime = addMin(curTime, 60);
            } else {
               curTime = addMin(S.waktuTiba, 45);
            }
         }

         // [LOOPING SPOT YANG DI-DRAG]
         let hasIjen = false;
         let titleParts = [];

         spotsForThisDay.forEach((spot, index) => {
            const isIjen = spot.id === 'ijen' || spot.name.toLowerCase().includes('ijen');

            if(spot.id && spot.id.startsWith('hotel_checkin_')) {
                if(usedLocker) {
                    dayActs.push({ time: curTime, name:'Ambil Barang di Locker Wangi', location: 'Locker Wangi', duration:'30 menit', description:'Mengambil kembali koper yang dititipkan.', tips:'', estimatedCost:0, type:'aktivitas' });
                    curTime = addMin(curTime, 45);
                    usedLocker = false;
                }
                dayActs.push({ time: curTime, name: spot.name, location: spot.hotelName, duration:'1 jam', description: spot.desc, tips:'Siapkan dokumen booking.', estimatedCost:0, type:'penginapan' });
                curTime = addMin(curTime, 60);
                titleParts.push('Check-in');
            } 
            else if(isIjen) {
                hasIjen = true;
                let isSewaMandiri = S.transport === 'pribadi_motor' || S.transport === 'pribadi_mobil' || S.sewaLokal.has('motor') || S.sewaLokal.has('mobil_driver');
                let jamBerangkat = isSewaMandiri ? '00:00' : '23:15';
                let locBerangkat = isSewaMandiri ? `${currentHotel} → Loket Kawah Ijen` : `Stasiun BWI Kota → Loket Kawah Ijen`;
                let descBerangkat = isSewaMandiri ? `Bangun jam 00:00 dan memacu kendaraan menuju Kawah Ijen.` : `Bus DAMRI Ijen berangkat pukul 23.15 WIB.`;
                
                dayActs.push({ time: jamBerangkat, name:'Menuju Loket Kawah Ijen', location: locBerangkat, duration:'30 - 60 menit', description: descBerangkat, tips:'Bawa masker gas, headlamp, dan jaket tebal.', estimatedCost:0, type:'transport' });
                dayActs.push({ time:'01:00', name:'Tiba di Pos & Antri Loket', location:'Pos Paltuding', duration:'30 menit', description:'Memarkir kendaraan, bersiap antri tiket masuk.', tips:'Siapkan KTP asli.', estimatedCost:15000, type:'aktivitas' });
                dayActs.push({ time:'01:30', name:'Mulai Trekking Kawah Ijen', location:'Jalur Pendakian', duration:'4 jam 30 menit', description:'Trekking menuju puncak kawah. Menyaksikan Blue Fire dan Sunrise.', tips:'Jalan perlahan, sesuaikan nafas.', estimatedCost:0, type:'aktivitas' });
                dayActs.push({ time:'06:00', name:'Turun & Sarapan Pagi', location:'Warung Paltuding', duration:'1.5 jam', description:'Perjalanan turun gunung dan sarapan pagi.', tips:'', estimatedCost:25000, type:'makan' });
                
                curTime = '09:00'; 
                titleParts.push('Kawah Ijen');
            } else {
                dayActs.push({ time: curTime, name: spot.name, location: spot.name, duration:'2 jam', description:spot.desc, tips:'', estimatedCost:15000, type:'aktivitas' });
                curTime = addMin(curTime, 150);
                titleParts.push(spot.name);
            }

            if (!spot.id.startsWith('hotel_checkin_') && !isIjen && index === 0 && parseInt(curTime.split(':')[0]) >= 11 && dayActs.filter(a=>a.type==='makan' && a.name.includes('Siang')).length === 0) {
               dayActs.push(buildMakan('siang', S.kulinerCustom, curTime));
               curTime = addMin(curTime, 60);
            }
         });

         // [PENUTUP HARI & FALLBACK CHECK-IN]
         if (hasIjen) {
             dayActs.push({ time:curTime, name:'Kembali ke Penginapan & Istirahat Total', location: currentHotel, duration:'7 jam', description:'Tiba kembali di penginapan. Istirahat memulihkan stamina.', tips:'', estimatedCost:0, type:'istirahat' });
         } else if (isFirstDay) {
             const isHotelPlanned = S.userPlan.some(dayArr => dayArr.some(id => id.startsWith('hotel_checkin_')));
             if (!isHotelPlanned) {
                 if(usedLocker) {
                     dayActs.push({ time: curTime, name:'Ambil Barang di Locker Wangi', location: 'Locker Wangi', duration:'30 menit', description:'Mengambil kembali koper yang dititipkan.', tips:'', estimatedCost:0, type:'aktivitas' });
                     curTime = addMin(curTime, 45);
                 }
                 let ijenTomorrow = (S.userPlan[d+1] || []).some(id => { const s = DESTINATIONS.find(x => x.id === id); return s && (s.id === 'ijen' || s.name.toLowerCase().includes('ijen')); });
                 if(ijenTomorrow) {
                     dayActs.push({ time: curTime, name:`Check-in & Persiapan Ijen`, location: currentHotel, duration:'Sore - Malam', description:`Masuk penginapan dan istirahat total hingga menunggu jam 00:00 untuk pendakian Ijen.`, tips:'Tidur lebih awal.', estimatedCost:0, type:'penginapan' });
                 } else {
                     dayActs.push({ time: curTime, name:'Check-in Penginapan', location: currentHotel, duration:'Sore', description:'Masuk penginapan untuk istirahat.', tips:'', estimatedCost:0, type:'penginapan' });
                 }
             }
         }

         if(!isLastDay) {
             dayActs.push(buildMakan('malam', S.kulinerCustom, '19:00'));
             dayActs.push({ time:'21:00', name:'Istirahat', location: currentHotel, duration:'8 jam', description:'Persiapkan energi.', tips:'', estimatedCost:0, type:'penginapan' });
         } else {
             let wPulang = S.waktuPulang;
             dayActs.push({ time: addMin(wPulang, -120), name:'Check-out & Menuju Stasiun/Bandara', location: currentHotel, duration:'1 jam', description:'Perjalanan kembali ke kota asal.', tips:'Hati-hati di jalan!', estimatedCost:0, type:'transport' });
         }

         let fallbackTitle = isFirstDay ? 'Kedatangan' : (isLastDay ? 'Kepulangan' : 'Eksplorasi');
         days.push({ day: dayNum, date_label:`Hari ${dayNum}`, title: titleParts.join(' & ') || fallbackTitle, activities: dayActs });
      }

      S.itinerary = {
        summary: `Itinerary ${totalDays} hari dari ${kota} ke Banyuwangi.`,
        estimatedBudget: calculateBudget(selected, S, totalDays),
        days: days,
      };
    } catch(e) { console.error(e); }
    S.loading = false; render();
  }, 1000);
}

// ─── INIT ───────────────────────────────────────────────────────────────────
(async () => { await loadDestinations(); document.getElementById('progress-area').style.display = ''; render(); })();
</script>
</body>
