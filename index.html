<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#f4f5f7">
  <title>Banyuwangi Travel App</title>
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { display: none; }
    
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --muted: #94a3b8;
      --hi: #f59e0b;
      --w-color: #10b981; --w-bg: #ecfdf5; --w-pill: #d1fae5;
      --p-color: #8b5cf6; --p-bg: #f5f3ff; --p-pill: #ede9fe;
      --k-color: #f97316; --k-bg: #fff7ed; --k-pill: #ffedd5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* ── HEADER ── */
    header {
      background: rgba(248, 250, 252, 0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      padding: 16px 20px 0;
      position: sticky; top: 0; z-index: 100;
    }
    .hdr-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .hdr-title h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.2; color: #0f172a;}
    .hdr-title span { font-size: 12px; color: var(--muted); }
    
    .btn-lock {
      width: 40px; height: 40px; border-radius: 50%; background: #fff;
      border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    /* ── SEARCH & FILTERS ── */
    .search-box { position: relative; margin-bottom: 16px; }
    .search-box input {
      width: 100%; padding: 14px 14px 14px 44px;
      background: #fff; border: 1px solid #e8eaed; border-radius: 14px;
      color: var(--text); font-size: 14px; outline: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: all .2s;
    }
    .search-box input:focus { border-color: var(--hi); box-shadow: 0 0 0 3px rgba(245,158,11,0.12); }
    .search-box .icon-search { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; }

    .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 16px; }
    .filter-btn {
      flex-shrink: 0; padding: 10px 20px; border-radius: 50px;
      background: #fff; color: #64748b; border: 1px solid #e8eaed;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
      display: flex; align-items: center; gap: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.02);
    }
    .filter-btn.active { font-weight: 700; border-color: transparent; }
    [data-filter="all"].active { background: var(--hi); color: #fff; box-shadow: 0 4px 12px rgba(245,158,11,0.3); }
    [data-filter="wisata"].active { background: var(--w-bg); color: var(--w-color); box-shadow: 0 4px 12px rgba(16,185,129,0.2); }
    [data-filter="penginapan"].active { background: var(--p-bg); color: var(--p-color); box-shadow: 0 4px 12px rgba(139,92,246,0.2); }
    [data-filter="kuliner"].active { background: var(--k-bg); color: var(--k-color); box-shadow: 0 4px 12px rgba(249,115,22,0.2); }

    /* ── SECTION TITLE ── */
    .section-title { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; margin-bottom: 12px; margin-top: 8px;}
    .section-title h2 { font-size: 16px; font-weight: 700; color: #0f172a; }
    .section-title a { font-size: 12px; color: var(--hi); font-weight: 700; text-decoration: none; cursor: pointer; }

    /* ── HORIZONTAL CARDS (Destinasi Populer) ── */
    .horizontal-scroll { display: flex; gap: 14px; overflow-x: auto; padding: 0 20px 12px; scrollbar-width: none; }
    .photo-card {
      flex-shrink: 0; width: 160px; background: #fff; border-radius: 20px;
      overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      cursor: pointer; transition: transform .2s;
    }
    .photo-card:active { transform: translateY(2px); }
    .pc-img { height: 120px; position: relative; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .pc-fav { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; border: none; cursor: pointer; color: #cbd5e1; box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
    .pc-fav.active { color: #f43f5e; }
    .pc-tag { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); color: #fff; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 700; }
    .pc-content { padding: 12px 14px; }
    .pc-name { font-size: 14px; font-weight: 800; color: #0f172a; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pc-loc { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-weight: 500;}
    .pc-price { font-size: 13px; font-weight: 800; color: #0f172a; }

    /* ── VERTICAL CARDS (Semua Destinasi) ── */
    .list-container { padding: 0 20px; margin-top: 16px; }
    .list-card {
      background: #fff; border-radius: 20px; margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid #f1f5f9;
      overflow: hidden; cursor: pointer; transition: box-shadow .2s;
    }
    .lc-main { display: flex; }
    .lc-img {
      width: 100px; min-height: 100px; display: flex; align-items: center; justify-content: center;
      font-size: 36px; position: relative; flex-shrink: 0;
    }
    .lc-content { flex: 1; padding: 14px; }
    .lc-type-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
    .lc-type { font-size: 9px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; padding: 3px 8px; border-radius: 10px; }
    .wisata .lc-type { color: var(--w-color); background: var(--w-pill); }
    .penginapan .lc-type { color: var(--p-color); background: var(--p-pill); }
    .kuliner .lc-type { color: var(--k-color); background: var(--k-pill); }
    .lc-name { font-size: 15px; font-weight: 800; line-height: 1.3; margin-bottom: 4px; color: #0f172a; }
    .lc-loc { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 500;}
    .lc-bottom { display: flex; justify-content: space-between; align-items: center; }
    .tag-akses { font-size: 10px; padding: 3px 8px; border-radius: 8px; font-weight: 700; }
    .akses-mulus { background: #dcfce7; color: #166534; }
    .akses-menengah { background: #fef9c3; color: #854d0e; }
    .akses-ekstrem { background: #fee2e2; color: #991b1b; }
    .lc-price { font-size: 14px; font-weight: 800; color: #0f172a; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 90px; right: 20px; z-index: 200;
      width: 56px; height: 56px; border-radius: 50%; border: none;
      background: var(--hi); color: #fff; font-size: 26px; font-weight: 300;
      cursor: pointer; box-shadow: 0 8px 24px rgba(245,158,11,0.4);
      display: flex; align-items: center; justify-content: center;
    }

    /* ── SHIFTING BOTTOM NAV ── */
    .shifting-nav {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 32px); max-width: 400px; height: 68px;
      background: #0f172a; /* Warna gelap solid seperti di JSX */
      border-radius: 34px; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 10px; z-index: 1000;
    }
    .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; height: 100%; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .nav-pill {
      display: flex; align-items: center; gap: 8px; padding: 12px;
      border-radius: 50px; transition: all .3s cubic-bezier(.4,0,.2,1);
      background: transparent; color: #64748b;
    }
    .nav-pill .icon { font-size: 20px; }
    .nav-pill .text { font-size: 13px; font-weight: 700; max-width: 0; opacity: 0; overflow: hidden; white-space: nowrap; transition: all .3s ease; }
    .nav-item.active .nav-pill { background: rgba(245, 158, 11, 0.2); color: var(--hi); padding: 12px 18px; }
    .nav-item.active .nav-pill .text { max-width: 100px; opacity: 1; }

    /* ── PLACEHOLDER VIEWS ── */
    .full-view { display: none; padding: 20px; text-align: center; color: var(--muted); padding-top: 100px; }
  </style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div class="hdr-title">
      <h1>Jelajahi Banyuwangi</h1>
      <span id="headerSubtitle">12 destinasi menanti</span>
    </div>
    <button class="btn-lock">🔐</button>
  </div>
  
  <div class="search-box">
    <span class="icon-search">🔍</span>
    <input type="text" id="searchInput" placeholder="Cari nama, kawasan, kategori...">
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">Semua</button>
    <button class="filter-btn" data-filter="wisata">⛺ Wisata</button>
    <button class="filter-btn" data-filter="penginapan">🏨 Inap</button>
    <button class="filter-btn" data-filter="kuliner">🍜 Kuliner</button>
  </div>
</header>

<div id="viewExplore">
  
  <div id="featuredSection">
    <div class="section-title">
      <h2>Destinasi Populer</h2>
      <a>Lihat semua</a>
    </div>
    <div class="horizontal-scroll" id="featuredList">
      </div>
  </div>

  <div class="list-container">
    <div class="section-title" style="padding: 0; margin-top: 24px;">
      <h2 id="listTitle">Semua Destinasi</h2>
    </div>
    <div id="mainList">
      </div>
  </div>
</div>

<div id="viewOther" class="full-view">
  <div style="font-size: 40px; margin-bottom: 10px;">🚧</div>
  <h2>Fitur sedang dibangun</h2>
  <p>Silakan kembali ke tab Jelajah.</p>
</div>

<button class="fab" id="fabBtn">+</button>

<nav class="shifting-nav">
  <div class="nav-item active" data-view="explore">
    <div class="nav-pill"><span class="icon">🧭</span><span class="text">Jelajah</span></div>
  </div>
  <div class="nav-item" data-view="other">
    <div class="nav-pill"><span class="icon">🗺️</span><span class="text">Peta</span></div>
  </div>
  <div class="nav-item" data-view="other">
    <div class="nav-pill"><span class="icon">🎒</span><span class="text">Rute</span></div>
  </div>
  <div class="nav-item" data-view="other">
    <div class="nav-pill"><span class="icon">📊</span><span class="text">Stats</span></div>
  </div>
</nav>

<script type="module">
  // --- 1. DATA TIRUAN (SAMPLE) DARI CLAUDE JSX ---
  // Data ini menjamin UI langsung ter-render cantik meskipun Firebase kosong
  const SAMPLE = [
    { id:"w1", type:"wisata", nama:"Kawah Ijen", kategori:"Pegunungan & Kawah", kawasan:"Licin", akses:"Menengah", htm:15000, catatan:"Fenomena Blue Fire dan danau asam murni.", grad:"linear-gradient(135deg,#1a3a2a,#2d6a4f,#40916c)", icon:"🌋" },
    { id:"w2", type:"wisata", nama:"Taman Nasional Alas Purwo", kategori:"Hutan & Alam", kawasan:"Tegaldlimo", akses:"Menengah", htm:20000, catatan:"Hutan tertua Jawa, Savana Sadengan.", grad:"linear-gradient(135deg,#1b4332,#2d6a4f,#52b788)", icon:"🌿" },
    { id:"w3", type:"wisata", nama:"Pantai Pulau Merah", kategori:"Pantai", kawasan:"Pesanggaran", akses:"Mulus", htm:15000, catatan:"Ikon bukit/pulau kecil di tengah laut.", grad:"linear-gradient(135deg,#0d3b66,#1565c0,#e65100)", icon:"🌊" },
    { id:"w4", type:"wisata", nama:"Teluk Hijau (Green Bay)", kategori:"Pantai & Teluk", kawasan:"Pesanggaran", akses:"Ekstrem", htm:20000, catatan:"Air laut hijau jernih berkilau.", grad:"linear-gradient(135deg,#004d40,#00796b,#4db6ac)", icon:"🏝️" },
    { id:"p1", type:"penginapan",nama:"Jiwa Jawa Ijen Resort", kategori:"Resort & Villa", kawasan:"Licin", akses:"", harga:1500000, catatan:"Resort premium bergaya Jawa klasik di lereng Ijen.", grad:"linear-gradient(135deg,#4a148c,#7b1fa2,#ba68c8)", icon:"🏨" },
    { id:"k1", type:"kuliner", nama:"Sego Tempong Mbok Wah", kategori:"Makanan Tradisional", kawasan:"Glagah", akses:"", harga:25000, catatan:"Kuliner tempong paling legendaris.", grad:"linear-gradient(135deg,#bf360c,#e64a19,#ff8a65)", icon:"🌶️" }
  ];

  const META = {
    wisata: { label: "Wisata", cls: "wisata" },
    penginapan: { label: "Penginapan", cls: "penginapan" },
    kuliner: { label: "Kuliner", cls: "kuliner" }
  };
  const AKSES_COLOR = { Mulus: "akses-mulus", Menengah: "akses-menengah", Ekstrem: "akses-ekstrem" };

  let currentFilter = 'all';
  
  // Konversi Angka ke Rupiah
  function rupiah(n) { return (!n || n===0) ? 'GRATIS' : 'Rp ' + Number(n).toLocaleString('id-ID'); }

  // --- 2. FUNGSI RENDER KOMPONEN ---
  function renderPhotoCard(d) {
    return `
      <div class="photo-card">
        <div class="pc-img" style="background: ${d.grad}">
          <span style="position:absolute; z-index:1;">${d.icon}</span>
          <button class="pc-fav">🤍</button>
          <div class="pc-tag">${META[d.type]?.label}</div>
        </div>
        <div class="pc-content">
          <div class="pc-name">${d.nama}</div>
          <div class="pc-loc">📍 ${d.kawasan}</div>
          <div class="pc-price">${rupiah(d.htm || d.harga)}</div>
        </div>
      </div>
    `;
  }

  function renderListCard(d) {
    const meta = META[d.type] || META.wisata;
    const ac = AKSES_COLOR[d.akses];
    return `
      <div class="list-card ${meta.cls}">
        <div class="lc-main">
          <div class="lc-img" style="background: ${d.grad}">
            <span>${d.icon}</span>
          </div>
          <div class="lc-content">
            <div class="lc-type-row">
              <span class="lc-type">${meta.label}</span>
            </div>
            <div class="lc-name">${d.nama}</div>
            <div class="lc-loc">📍 ${d.kawasan}</div>
            <div class="lc-bottom">
              ${d.akses ? `<span class="tag-akses ${ac}">${d.akses}</span>` : '<span></span>'}
              <div class="lc-price">${rupiah(d.htm || d.harga)}</div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  // --- 3. LOGIKA UPDATE TAMPILAN UTAMA ---
  function renderUI() {
    let displayData = SAMPLE; // Gunakan SAMPLE sebagai default

    // Filter Kategori
    if (currentFilter !== 'all') {
      displayData = displayData.filter(d => d.type === currentFilter);
      document.getElementById('featuredSection').style.display = 'none';
      document.getElementById('listTitle').textContent = META[currentFilter].label;
    } else {
      document.getElementById('featuredSection').style.display = 'block';
      document.getElementById('listTitle').textContent = "Semua Destinasi";
      // Render Horizontal Cards (Destinasi Populer - 4 teratas wisata)
      const featured = displayData.filter(d => d.type === 'wisata').slice(0, 4);
      document.getElementById('featuredList').innerHTML = featured.map(renderPhotoCard).join('');
    }

    // Render Vertical Cards (Semua Destinasi)
    document.getElementById('mainList').innerHTML = displayData.map(renderListCard).join('');
  }

  // --- 4. INTERAKSI TOMBOL ---
  // Navigasi Filter
  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn'); if(!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); 
    currentFilter = btn.dataset.filter; 
    renderUI();
  });

  // Navigasi Bawah (Shifting Nav)
  document.querySelector('.shifting-nav').addEventListener('click', e => {
    const ni = e.target.closest('.nav-item'); if(!ni) return;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    ni.classList.add('active'); 
    
    if(ni.dataset.view === 'explore') {
      document.getElementById('viewExplore').style.display = 'block';
      document.getElementById('viewOther').style.display = 'none';
    } else {
      document.getElementById('viewExplore').style.display = 'none';
      document.getElementById('viewOther').style.display = 'block';
    }
  });

  // Eksekusi Render Pertama Kali
  renderUI();

</script>
</body>
</html>
