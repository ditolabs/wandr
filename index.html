async function loadDestinations() {
  showLoadingDest();
  if (!db) {
    DESTINATIONS = DESTINATIONS_FALLBACK;
    window._usingFallbackData = true;
    return;
  }

  try {
    const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000));

    // Auth anonim optional — tidak blocking query utama
    if (auth && !auth.currentUser) {
      try { await Promise.race([auth.signInAnonymously(), new Promise(res => setTimeout(res, 1500))]); } catch(ae) {}
    }

    const snap = await Promise.race([db.collection('places').get(), timeout]);

    window._placesCache = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    const loaded = snap.docs.map(doc => mapToWandr(doc.id, doc.data())).filter(Boolean);
    // Deduplicate: kalau ada >1 entry isIjen, hanya pakai yang pertama
    const seen = { ijen: false };
    const deduped = loaded.filter(d => {
      if (d.isIjen) { if (seen.ijen) return false; seen.ijen = true; }
      return true;
    });
    DESTINATIONS = deduped.length > 0 ? deduped : DESTINATIONS_FALLBACK;
    window._usingFallbackData = deduped.length === 0;
    // Migrate S.destinations: kalau ada id lama ('ijen') yang sudah tidak ada,
    // tapi ada entry isIjen baru → ganti id-nya
    if (deduped.length > 0 && S.destinations.has('ijen')) {
      const ijenNew = deduped.find(d => d.isIjen);
      if (ijenNew && ijenNew.id !== 'ijen') {
        S.destinations.delete('ijen');
        S.destinations.add(ijenNew.id);
      }
    }
  } catch(e) {
    DESTINATIONS = DESTINATIONS_FALLBACK;
    window._usingFallbackData = true;
    console.warn('Firebase gagal (' + e.message + '), pakai fallback');
  }
}

  if (S.step===2) return true; // kuliner opsional
  if (S.step===3) { const ok = S.kotaAsal && (S.kotaAsal!=='Lainnya'||S.kotaAsalCustom.trim()) && S.transport; return S.transport==='umum' ? ok && !!S.subTransport : ok; }
  if (S.step===4) return S.durasi && S.gayaPerjalanan && (S.penginapan || S.penginapanIds.size > 0 || S.penginapanCustom.trim());
  if (S.step===5) return true;
  return false;
}

function getFinalHotelName() {

function getHotelNames() {

  }
  return ['Penginapan Banyuwangi'];
}
function haversineKm(lat1,lng1,lat2,lng2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Estimasi waktu tempuh antar 2 titik koordinat (fallback Haversine, bukan rute jalan asli).
// coordA/coordB: {lat, lng} — kalau salah satu kosong, balik fallback konservatif 20 menit
// biar itinerary tetap masuk akal walau data koordinat belum lengkap.
function estimasiTravelMenit(coordA, coordB) {
  if (!coordA || !coordB || coordA.lat==null || coordA.lng==null || coordB.lat==null || coordB.lng==null) return 20;
  const kmLurus = haversineKm(coordA.lat, coordA.lng, coordB.lat, coordB.lng);
  const ROAD_FACTOR = 1.35; // jalan asli biasanya ~35% lebih panjang dari garis lurus
  const kmJalan = kmLurus * ROAD_FACTOR;
  const speedKmh = (hasMotor()||hasMobil()) ? 35 : 28; // medan Banyuwangi campuran (kota+pegunungan)
  const menit = Math.round(kmJalan / speedKmh * 60) + 10; // +10 menit buffer parkir/persiapan
  return Math.max(10, menit);
}

function parseDestInput(text) {
  S.destinations.clear();
  // Normalize: hapus spasi berlebih tapi jangan ubah nilai S.destInput
  const terms = text.split(',').map(s=>s.trim().toLowerCase()).filter(s=>s.length>=2);
  terms.forEach(term => {
    if (!term) return;
    let bestMatch = null, bestScore = 0;
    DESTINATIONS.forEach(d => {
      const score = matchScore(term, d);
      if (score > bestScore) { bestScore = score; bestMatch = d; }
    });
    if (bestMatch && bestScore >= 45) S.destinations.add(bestMatch.id);
  });
}

function matchScore(term, d) {
  const t = term.toLowerCase().trim();
  const n = d.name.toLowerCase();
  if (n === t) return 100;
  if (d.aliases) {
    for (const a of d.aliases) {
      if (a.length < 3) continue;
      if (a === t) return 98;
      if (a.includes(t) && t.length >= 4) return 90;
      if (t.includes(a) && a.length >= 4) return 85;
    }
  }
  if (t.length >= 4 && n.includes(t)) return 80;
  if (n.length >= 5 && t.includes(n)) return 75;
  const skipWords = new Set(['dan','yang','ke','di','dari','untuk','dengan','atau','taman','nasional','pantai','air','goa','gua','pulau','bukit','gunung','perkebunan']);
  const nWords    = n.split(' ').filter(w => w.length > 2 && !skipWords.has(w));
  const termWords = t.split(' ').filter(w => w.length > 2 && !skipWords.has(w));
  if (!nWords.length || !termWords.length) return 0;
  const hits = termWords.filter(tw => nWords.some(nw => nw === tw || nw.startsWith(tw) || tw.startsWith(nw)));
  const coverage = hits.length / nWords.length;
  const precision = hits.length / termWords.length;
  const f1 = coverage + precision > 0 ? 2 * coverage * precision / (coverage + precision) : 0;
  return f1 >= 0.5 ? Math.round(f1 * 60) : 0;
}

async function loadPenginapanOptions() {
  try {
    let waited = 0;
    while (!window._placesCache && waited < 5000) {
      await new Promise(r => setTimeout(r, 200));
      waited += 200;
    }
    const allDocs = window._placesCache || [];
    if (!allDocs || allDocs.length === 0) { S.penginapanOptions = []; S.allPenginapan = []; return; }
    const all = allDocs.filter(d => {
      const t = ((d.type||'')+' '+(d.kategori||'')).toLowerCase().replace(/\s+/g,'');
      return t.includes('penginapan')||t.includes('hotel')||t.includes('homestay')||
             t.includes('villa')||t.includes('guesthouse')||t.includes('guest')||
             t.includes('losmen')||t.includes('resort')||t.includes('inn')||
             t.includes('motel')||t.includes('cottage')||t.includes('wisma');
    });
    S.allPenginapan = all;
    if (S.destinations.size > 0) {
      const selDests = DESTINATIONS.filter(d=>S.destinations.has(d.id));
      const lats = selDests.map(d=>d.lat).filter(Boolean);
      const lngs = selDests.map(d=>d.lng).filter(Boolean);
      if (lats.length > 0) {
        const cLat = lats.reduce((a,b)=>a+b,0)/lats.length;
        const cLng = lngs.reduce((a,b)=>a+b,0)/lngs.length;
        S.penginapanOptions = all
          .filter(d => d.lat && d.lng)
          .map(d => ({ ...d, dist: haversineKm(cLat,cLng,d.lat,d.lng) }))
          .sort((a,b)=>a.dist-b.dist)
          .slice(0, 6);
      } else {
        S.penginapanOptions = all.slice(0, 6);
      }
    } else {
      S.penginapanOptions = all.slice(0, 6);
    }
  } catch(e) {
    console.warn('loadPenginapanOptions gagal:', e.message);
    S.penginapanOptions = []; S.allPenginapan = [];
  }
}

async function loadKulinerNearPenginapan(lat, lng) {
  if (!db) { S.kulinerOptions = []; return; }
  try {
    const snap = await db.collection('places').where('type','==','kuliner').get();
    S.kulinerOptions = snap.docs
      .map(doc => ({ id:doc.id, ...doc.data() }))
      .filter(d => d.lat && d.lng && d.nama)
      .map(d => ({ ...d, dist: haversineKm(lat,lng,d.lat,d.lng) }))
      .filter(d => d.dist <= 5.0)
      .sort((a,b)=>a.dist-b.dist)
      .slice(0, 5);
  } catch(e) {
    S.kulinerOptions = [];
  }
}

function renderStepDest() {
  const matched   = DESTINATIONS.filter(d=>S.destinations.has(d.id));
  const query     = (S.destInput||'').toLowerCase().trim();
  const activeCat = S._catFilter || 'semua';

  // Filter & sort
  // Split query per koma — tiap term dicek terpisah
  const queryTerms = query.length >= 2
    ? query.split(',').map(s=>s.trim()).filter(s=>s.length>=2)
    : [];

  let displayDests;
  if (queryTerms.length > 0) {
    displayDests = DESTINATIONS
      .filter(d => activeCat==='semua' || d.cat===activeCat)
      .map(d => {
        const n = d.name.toLowerCase();
        const aliases = d.aliases||[];
        // Ambil score tertinggi dari semua term
        let bestScore = 0;
        for (const term of queryTerms) {
          let score = matchScore(term, d);
          if (n.includes(term) && term.length >= 3) score += 30;
          if (aliases.some(a=>a.includes(term) && term.length >= 3)) score += 20;
          if (score > bestScore) bestScore = score;
        }
        return { d, score: bestScore };
      })
      .filter(x => x.score > 0)
      .sort((a,b) => b.score - a.score)
      .map(x => x.d)
      .slice(0, 14);
    // Tambahkan selected destinations yang tidak muncul di hasil search
    const resultIds = new Set(displayDests.map(d=>d.id));
    const selectedNotShown = DESTINATIONS.filter(d =>
      S.destinations.has(d.id) && !resultIds.has(d.id)
    );
    displayDests = [...selectedNotShown, ...displayDests].slice(0, 16);
  } else {
    const pool = DESTINATIONS.filter(d => activeCat==='semua' || d.cat===activeCat);
    if (!S._shuffledDests || S._lastCat !== activeCat) {
      S._shuffledDests = [...pool].sort(() => Math.random() - 0.5);
      S._lastCat = activeCat;
    }
    displayDests = S._shuffledDests.slice(0, 14);
  }

  const cats = ['semua','alam','pantai','diving','budaya'];
  const catLabelText = { semua:'Semua', alam:'Alam', pantai:'Pantai', diving:'Diving', budaya:'Budaya' };
  const catBtns = cats.map(ct => {
    const sel = activeCat===ct;
    return `<span data-cat="${ct}" class="s0-cat${sel?' active':''}">${catLabelText[ct]}</span>`;
  }).join('');

  const chips = matched.map(d =>
    `<div class="s0-chip">
      <span>${d.emoji}</span>
      <span>${esc(d.name)}</span>
      <span data-remove="${d.id}" class="s0-chip-x">✕</span>
    </div>`
  ).join('');

  const rows = displayDests.length ? displayDests.map(d => {
    const sel = S.destinations.has(d.id);
    const rating = DEST_RATINGS[d.id];
    return `<div data-dest-card="${d.id}" class="s0-row">
      <span class="s0-emoji">${d.emoji}</span>
      <span class="s0-name${sel?' sel':''}">${esc(d.name)}</span>
      <span class="s0-meta">${DEST_CAT_LABEL[d.cat]||d.cat}${rating?` · ★${rating}`:''}${d.bestTime?` · ${d.bestTime}`:''}</span>
      <span class="s0-check${sel?' sel':''}"></span>
    </div>`;
  }).join('') : `<div class="s0-empty">Tidak ada destinasi</div>`;

  // Quick-pick: top 8 destinasi populer, ditampilkan sebagai list bernomor.
  // Dicocokkan lewat nama/alias (bukan id) karena id dokumen Firestore acak,
  // tidak selalu sama dengan slug seperti 'ijen' / 'baluran'.
  const QUICK_KEYWORDS = [
    ['ijen'], ['baluran'], ['alas purwo','purwo'], ['red island','pulau merah'],
    ['green bay','teluk ijo','teluk hijau'], ['kawah wurung'], ['sukamade'], ['tabuhan'],
  ];
  const findByKeyword = (kws) => DESTINATIONS.find(d => {
    const n = d.name.toLowerCase();
    return kws.some(k => n.includes(k) || (d.aliases||[]).some(a=>a.includes(k)));
  });
  let quickDests = QUICK_KEYWORDS.map(findByKeyword).filter(Boolean);
  // Fallback: kalau keyword match gagal total (data belum lengkap), tetap
  // tampilkan 8 destinasi apa saja supaya POPULER tidak pernah kosong.
  if (quickDests.length === 0) quickDests = DESTINATIONS.slice(0, 8);
  quickDests = quickDests.slice(0, 8);
  const POPULER_DEFAULT_COUNT = 6;
  const showAllPopuler = !!S._showAllPopuler;
  const visibleQuick = showAllPopuler ? quickDests : quickDests.slice(0, POPULER_DEFAULT_COUNT);
  const quickCards = visibleQuick.map(d => {
    const sel = S.destinations.has(d.id);
    return `<div data-dest-card="${d.id}" class="s0-card${sel?' sel':''}">
      <span class="s0-card-emoji">${d.emoji}</span>
      <span class="s0-card-name">${esc(d.name)}</span>
      <span class="s0-card-check${sel?' sel':''}"></span>
    </div>`;
  }).join('');
  const populerMoreBtn = quickDests.length > POPULER_DEFAULT_COUNT
    ? `<div class="s0-more-toggle" data-toggle-populer>${showAllPopuler ? 'Lebih sedikit ↑' : `Lihat semua (${quickDests.length}) →`}</div>`
    : '';

  return `
    <h2 class="s0-h1">Pilih Destinasi</h2>
    <p class="s0-sub">Isi wisata yang kamu mau di kolom bawah ini.</p>

    ${matched.length>0?`<div class="s0-chips" id="dest-chips">${chips}</div>`:''}

    <div class="s0-search-compact-wrap">
      <span class="s0-sc-icon">🔍</span>
      <input type="text" id="dest-input" dir="ltr" lang="en" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"
        value="${esc(S.destInput)}" placeholder="Cari destinasi lain, mis. Pulau Merah, Teluk Hijau…">
      ${S.destInput?`<span id="btn-clear-input" class="s0-sc-clear">✕</span>`:''}
    </div>
    ${query?'':'<p class="s0-search-caption">atau pilih langsung dari populer di bawah 👇</p>'}

    <div class="s0-cats" id="cat-btns">${query?catBtns:''}</div>

    <div id="dest-warn-area" class="s0-warn" style="display:${queryTerms.length>0&&displayDests.length===0?'block':'none'};">
      Tidak ditemukan untuk "${esc(S.destInput)}"
    </div>

    <div id="dest-cards-list">${query?rows:''}</div>

    <div class="s0-eyebrow">Populer</div>
    <p class="s0-hint">Ketuk untuk pilih — bisa lebih dari satu tempat 👆</p>
    <div class="s0-grid" id="dest-quick-list">${quickCards}</div>
    ${populerMoreBtn}
    <div style="height:12px;"></div>`;
}

function renderStepKuliner() {
  const matched = DESTINATIONS.filter(d=>S.destinations.has(d.id));

  let kulinerPop = [];
  let kulinerPopIsNear = false;
  try {
    const destsWithCoord = matched.filter(d => d.lat && d.lng);
    kulinerPop = destsWithCoord.length > 0 ? getKulinerPopulerForDest(destsWithCoord, 6) : [];
    kulinerPopIsNear = kulinerPop.length > 0;
    if (kulinerPop.length === 0) kulinerPop = getKulinerPopulerGeneral(6);
  } catch(e) {
    console.warn('Gagal memuat Kuliner Populer, pakai fallback umum:', e.message);
    try { kulinerPop = getKulinerPopulerGeneral(6); } catch(e2) { kulinerPop = []; }
    kulinerPopIsNear = false;
  }
  const kulinerPopCards = kulinerPop.map(k => {
    const metaParts = [];
    if (k.rating) metaParts.push(`★${Number(k.rating).toFixed(1)}`);
    if (kulinerPopIsNear && typeof k.dist === 'number') {
      metaParts.push(k.dist < 1 ? `${Math.round(k.dist*1000)}m` : `${k.dist.toFixed(1)}km`);
    } else if (k.kawasan) {
      metaParts.push(k.kawasan);
    }
    return `<div data-kuliner-pick="${esc(k.nama)}" class="s0-kul-card">
      <span class="s0-kul-emoji">${kulinerEmoji(k)}</span>
      <span class="s0-kul-body">

        ${metaParts.length?`<div class="s0-kul-meta">${esc(metaParts.join(' · '))}</div>`:''}

  return `

// ─── EXPORT FUNCTIONS ──────────────────────────────────────────────────────────
function buildPrintPage(it) {
  const totalDays = it.days?.length || 1;
  const dests     = Array.from(S.destinations).map(id=>DESTINATIONS.find(d=>d.id===id)?.name).filter(Boolean);
  const transport = {motor:'Motor Pribadi',mobil:'Mobil Pribadi',umum:'Kendaraan Umum'}[S.transport]||S.transport||'-';
  const budget    = it.estimatedBudget;
  const budStr    = budget ? `Rp${(budget.min/1e6).toFixed(1)}jt – Rp${(budget.max/1e6).toFixed(1)}jt` : '-';
  const today     = new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
  const hotelName = getFinalHotelName() || '-';

  const DAY_COLORS = ['#c0392b','#7c3aed','#2d8a4a','#c8760a','#16527a'];

  // ── Rincian wisata satu-per-satu, sesuai urutan kemunculan di itinerary ──
  const destDetailHTML = Array.from(S.destinations).map(id => {
    const d = DESTINATIONS.find(x => x.id === id);
    if (!d) return '';
    let dayFound = null, timeFound = '';
    (it.days||[]).forEach((day, di) => {
      if (dayFound !== null) return;
      (day.activities||[]).forEach(act => {
        if (dayFound !== null || !act.name) return;
        if (act.name.toLowerCase().includes(d.name.toLowerCase())) {
          dayFound = di; timeFound = act.time || '';
        }
      });
    });
    const dc = dayFound !== null ? DAY_COLORS[dayFound % DAY_COLORS.length] : '#999';
    const dayLabel = dayFound !== null
      ? `Hari ke-${dayFound + 1}${timeFound ? ' · ' + timeFound : ''}`
      : 'Tidak terjadwal';
    return `
      <div class="dest-detail-item" style="border-left-color:${dc}">
        <div class="dest-detail-head">
          <span class="dest-detail-emoji">${d.emoji || '🗺️'}</span>
          <span class="dest-detail-name">${esc(d.name)}</span>
          <span class="dest-detail-day" style="color:${dc}">${esc(dayLabel)}</span>
        </div>
        ${d.desc ? `<div class="dest-detail-desc">${esc(d.desc)}</div>` : ''}
        ${d.tiket ? `<div class="dest-detail-tiket">Tiket masuk: Rp${d.tiket.toLocaleString('id-ID')}</div>` : ''}
      </div>`;
  }).join('');

  const SESS_LABEL = { malam_awal:'Malam Sebelumnya', pagi:'Pagi', siang:'Siang', sore:'Sore', malam:'Malam' };
  const SESS_ICON  = { malam_awal:'🌙', pagi:'☀️', siang:'🌤️', sore:'🌅', malam:'🌙' };
  const SESS_ORDER = ['malam_awal','pagi','siang','sore','malam'];

  function sessionOf(act) {
    // dayOffset:-1 = aktivitas malam SEBELUM tengah malam (persiapan/berangkat
    // ke Paltuding) yang harus tampil di atas kartu hari itu, sebelum sesi
    // dini-hari/pagi — bukan di bawah sebagai sesi "Malam" biasa.
    if (act && act.dayOffset === -1) return 'malam_awal';
    const time = act && act.time;
    if (!time) return 'siang';
    const h = parseInt(time.split(':')[0]);
    if (h < 10) return 'pagi';
    if (h < 14) return 'siang';
    if (h < 18) return 'sore';
    return 'malam';
  }

  // ── Build days HTML ──────────────────────────────────────────────────────
  const daysHTML = (it.days||[]).map((day, di) => {

async function exportItinerary(format) {
  if (typeof bwiLogFunnel === 'function') bwiLogFunnel('export_' + format, 3);
  const it = S.itinerary;
  if (!it) return;

  const modal        = document.getElementById('export-modal');
  const progressEl   = document.getElementById('export-progress');
  const progressBar  = document.getElementById('export-progress-bar');
  const progressText = document.getElementById('export-progress-text');
  const btns         = modal.querySelectorAll('button:not([onclick])');

  if (format === 'pdf') {
    // Generate PDF asli via jsPDF + html2canvas — langsung download, TANPA dialog print
    progressEl.style.display = 'block';
    progressBar.style.width  = '15%';
    progressText.textContent = 'Menyiapkan halaman...';
    btns.forEach(b => b.disabled = true);

    try {
      const printEl = document.getElementById('itinerary-print');
      const fullHTML = buildPrintPage(it);

      // Ambil hanya isi <div class="print-wrap">...</div> (tanpa no-print bar & script)
      const bodyMatch = fullHTML.match(/<div class="print-wrap">([\s\S]*?)<\/div>\s*<script>/);
      printEl.innerHTML = `<div class="print-wrap" style="max-width:210mm;padding:14mm;background:#fff;font-family:'Inter',sans-serif">${bodyMatch ? bodyMatch[1] : ''}</div>`;

      // Inject style block dari buildPrintPage agar styling tetap konsisten
      const styleMatch = fullHTML.match(/<style>([\s\S]*?)<\/style>/);
      let styleEl = document.getElementById('_pdf_temp_style');
      if (styleEl) styleEl.remove();
      if (styleMatch) {
        styleEl = document.createElement('style');
        styleEl.id = '_pdf_temp_style';
        styleEl.textContent = styleMatch[1];
        document.head.appendChild(styleEl);
      }

      await new Promise(r => setTimeout(r, 500));
      progressBar.style.width = '35%';
      progressText.textContent = 'Merender halaman...';

      // Ukur posisi tiap "blok" konten (kartu aktivitas, header hari, budget, dll)
      // SEBELUM di-render ke canvas, supaya nanti potongan halaman PDF tidak jatuh
      // di tengah-tengah satu blok (penyebab teks/kartu kepotong).
      const printRect = printEl.getBoundingClientRect();
      const blockEls = printEl.querySelectorAll(
        '.cover, .info-box, .dest-detail-item, .day-block, .day-title-row, .sess-row, .act-table tr, .budget-bar, .pack-section, .notes-box, .print-footer'
      );
      const cssBoundaries = [0, printEl.scrollHeight];
      blockEls.forEach(el => {
        const r = el.getBoundingClientRect();
        cssBoundaries.push(r.top - printRect.top, r.bottom - printRect.top);
      });

      const canvas = await html2canvas(printEl, {
        scale: 2, useCORS: true, backgroundColor: '#fff',
        width: printEl.scrollWidth, windowWidth: printEl.scrollWidth,
      });

      progressBar.style.width = '65%';
      progressText.textContent = 'Membuat PDF...';

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pageW = 210, pageH = 297;
      const pxPerMm = canvas.width / pageW; // konversi mm <-> px canvas
      const pageHpx = pageH * pxPerMm;

      // Skala rect CSS (px browser) ke ruang canvas (px hasil render, scale:2)
      const scaleFactor = canvas.width / printEl.scrollWidth;
      let boundaries = Array.from(new Set(
        cssBoundaries.map(v => Math.round(v * scaleFactor))
      )).sort((a, b) => a - b).filter(v => v >= 0 && v <= canvas.height);

      // Susun titik potong per halaman: cari boundary blok terdekat yang <= target,
      // supaya potongan jatuh di celah antar-kartu, bukan di tengah kartu.
      const cutPoints = [0];
      let cursor = 0;
      while (cursor < canvas.height - 2) {
        const target = Math.min(cursor + pageHpx, canvas.height);
        if (target >= canvas.height - 2) { cutPoints.push(canvas.height); break; }
        const candidates = boundaries.filter(b => b > cursor + pageHpx * 0.4 && b <= target);
        const cut = candidates.length ? candidates[candidates.length - 1] : target;
        cutPoints.push(cut);
        cursor = cut;
      }

      // Gabungkan halaman terakhir kalau isinya cuma sisa kecil (mis. footer sendirian)
      // supaya tidak menghasilkan 1 halaman PDF yang nyaris kosong di akhir.
      const MIN_TAIL_PX = 40 * pxPerMm; // ~40mm — kalau sisa konten lebih kecil dari ini, gabung ke halaman sebelumnya
      if (cutPoints.length > 2) {
        const lastSeg = cutPoints[cutPoints.length - 1] - cutPoints[cutPoints.length - 2];
        const secondLastSeg = cutPoints[cutPoints.length - 2] - cutPoints[cutPoints.length - 3];
        if (lastSeg < MIN_TAIL_PX && (lastSeg + secondLastSeg) <= pageHpx) {
          cutPoints.splice(cutPoints.length - 2, 1);
        }
      }

      // Render tiap halaman dari slice canvas sesuai cutPoints (bukan overlap posisi negatif)
      for (let i = 0; i < cutPoints.length - 1; i++) {
        const sliceStart = cutPoints[i];
        const sliceEnd = cutPoints[i + 1];
        const sliceHpx = sliceEnd - sliceStart;
        if (sliceHpx <= 2) continue; // skip sisa sangat kecil (cegah halaman kosong)

        const pageCanvas = document.createElement('canvas');
        pageCanvas.width = canvas.width;
        pageCanvas.height = sliceHpx;
        const ctx = pageCanvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, pageCanvas.width, pageCanvas.height);
        ctx.drawImage(canvas, 0, sliceStart, canvas.width, sliceHpx, 0, 0, canvas.width, sliceHpx);

        const pageImgData = pageCanvas.toDataURL('image/jpeg', 0.95);
        const sliceHmm = sliceHpx / pxPerMm;
        if (i > 0) pdf.addPage();
        pdf.addImage(pageImgData, 'JPEG', 0, 0, pageW, sliceHmm);
      }

      progressBar.style.width = '90%';
      progressText.textContent = 'Menyimpan file...';

      const fileName = 'itinerary-banyuwangi-' + new Date().toISOString().slice(0,10) + '.pdf';
      const pdfBlob  = pdf.output('blob');

      if (!pdfBlob || pdfBlob.size === 0) {
        throw new Error('PDF gagal dibuat (blob kosong)');
      }

      // Manual download via <a> element — lebih reliable di Android Chrome
      // daripada pdf.save() bawaan jsPDF yang bisa silent-fail di async context
      const blobUrl = URL.createObjectURL(pdfBlob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = fileName;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();

      // Beri waktu browser memproses download sebelum cleanup
      await new Promise(r => setTimeout(r, 600));
      document.body.removeChild(a);
      URL.revokeObjectURL(blobUrl);

      if (styleEl) styleEl.remove();
      printEl.innerHTML = '';

      progressBar.style.width = '100%';
      progressText.textContent = `PDF tersimpan (${(pdfBlob.size/1024).toFixed(0)} KB) — cek folder Download`;
      await new Promise(r => setTimeout(r, 1800));
      modal.classList.remove('open');

    } catch(err) {
      progressText.textContent = 'Gagal: ' + err.message;
      progressText.style.color = '#E94560';
      console.error(err);
    } finally {
      btns.forEach(b => b.disabled = false);
      setTimeout(() => {
        progressEl.style.display = 'none';
        progressBar.style.width = '0%';
        progressText.style.color = '';
      }, 1800);
    }

  } else {
    // JPG: tetap pakai html2canvas
    progressEl.style.display = 'block';
    progressBar.style.width  = '20%';
    progressText.textContent = 'Merender gambar...';
    btns.forEach(b => b.disabled = true);

    try {
      const printEl = document.getElementById('itinerary-print');
      printEl.innerHTML = buildPrintPage(it)
        .replace(/^[\s\S]*?<body[^>]*>/i,'')
        .replace(/<\/body>[\s\S]*/i,'')
        .replace(/<div class="no-print">[\s\S]*?<\/div>/,'');

      await new Promise(r => setTimeout(r, 700));
      progressBar.style.width = '50%';

      const canvas = await html2canvas(printEl, {
        scale:2, useCORS:true, backgroundColor:'#fff',
        width:794, windowWidth:794,
        onclone: doc => {
          const el=doc.getElementById('itinerary-print');
          if(el){el.style.position='relative';el.style.left='0';}
        }
      });

      progressBar.style.width = '90%';
      progressText.textContent = 'Menyimpan file...';

      const jpgDataUrl = canvas.toDataURL('image/jpeg', 0.93);
      const jpgBlob = await (await fetch(jpgDataUrl)).blob();

      if (!jpgBlob || jpgBlob.size === 0) {
        throw new Error('Gambar gagal dibuat (blob kosong)');
      }

      const blobUrl = URL.createObjectURL(jpgBlob);
      const link = document.createElement('a');
      link.href = blobUrl;
      link.download = 'itinerary-banyuwangi-'+new Date().toISOString().slice(0,10)+'.jpg';
      link.style.display = 'none';
      document.body.appendChild(link);
      link.click();

      await new Promise(r => setTimeout(r, 600));
      document.body.removeChild(link);
      URL.revokeObjectURL(blobUrl);

      progressBar.style.width = '100%';
      progressText.textContent = `Tersimpan (${(jpgBlob.size/1024).toFixed(0)} KB) — cek folder Download`;
      await new Promise(r => setTimeout(r, 1500));
      modal.classList.remove('open');

    } catch(err) {
      progressText.textContent = 'Gagal: ' + err.message;
      progressText.style.color = '#E94560';
    } finally {
      btns.forEach(b => b.disabled = false);
      setTimeout(() => {
        progressEl.style.display = 'none';
        progressBar.style.width = '0%';
        progressText.style.color = '';
      }, 1500);
    }
  }
}

function updateDestFeedback() {
  const matched   = DESTINATIONS.filter(d=>S.destinations.has(d.id));
  const terms     = S.destInput.split(',').map(s=>s.trim()).filter(Boolean);
  const unmatched = terms.filter(t => !isTermMatched(t));

  const tagsEl = document.getElementById('dest-tags-area');
  if (tagsEl) {
    if (matched.length > 0) {
      tagsEl.style.display = '';
      const tags = matched.map(d => `
        <div style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;
          background:#f0ede8;border:1px solid #111;
          border-radius:20px;margin:3px">
          <span>${d.emoji}</span>
          <span style="font-size:13px;font-weight:600;color:#E94560">${esc(d.name)}</span>
          <span data-remove="${d.id}" style="cursor:pointer;color:#8b6f47;font-size:11px;
            margin-left:2px;padding:1px 3px;border-radius:50%">✕</span>
        </div>`).join('');
      document.getElementById('dest-tags-list').innerHTML = tags;
      document.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
        const id = el.dataset.remove;
        S.destinations.delete(id);
        const d = DESTINATIONS.find(x=>x.id===id);
        if (d) {
          const parts = S.destInput.split(',').map(s=>s.trim())
            .filter(s=>!s.toLowerCase().includes(d.name.toLowerCase().split(' ')[0]));
          S.destInput = parts.join(', ');
          const inp = document.getElementById('dest-input');
          if (inp) inp.value = S.destInput;
        }
        updateDestFeedback();
        updateNav();
      }));
    } else {
      tagsEl.style.display = 'none';
    }
  }

  const warnEl = document.getElementById('dest-warn-area');
  if (warnEl) {
    const show = unmatched.length > 0 && S.destInput;
    warnEl.style.display = show ? '' : 'none';
    if (show) {
      warnEl.innerHTML = `⚠️ Tidak ditemukan: <em>${unmatched.join(', ')}</em><br>
        <span style="color:#8b6f47">Coba: Kawah Ijen, TN Baluran, Red Island, Green Bay, TN Alas Purwo, Kawah Wurung…</span>`;
    }
  }

  const lblEl = document.getElementById('dest-suggest-label');
  if (lblEl) lblEl.textContent = matched.length > 0 ? 'Tambah lagi:' : 'Atau pilih dari sini:';

  const sugEl = document.getElementById('dest-suggestions');
  if (sugEl) {
    const suggestions = DESTINATIONS
      .filter(d=>!S.destinations.has(d.id))
      .slice(0,6)
      .map(d=>`<button data-suggest="${d.id}" style="background:#ede4d3;
        border:1px solid rgba(255,255,255,.1);color:#8b6f47;border-radius:0;
        padding:5px 11px;font-size:11px;cursor:pointer;font-family:inherit;
        transition:all .2s;white-space:nowrap">${d.emoji} ${d.name}</button>`).join('');
    sugEl.innerHTML = suggestions;
    sugEl.querySelectorAll('[data-suggest]').forEach(el => el.addEventListener('click', () => {
      const d = DESTINATIONS.find(x=>x.id===el.dataset.suggest);
      if (!d) return;
      S.destinations.add(d.id);
      S.destInput = S.destInput ? S.destInput.trimEnd().replace(/,$/,'')+', '+d.name : d.name;
      const inp = document.getElementById('dest-input');
      if (inp) inp.value = S.destInput;
      parseDestInput(S.destInput);
      updateDestFeedback();
      updateNav();
    }));
  }

  const clearBtn = document.getElementById('btn-clear-input');
  if (S.destInput && !clearBtn) {
    const wrap = document.getElementById('dest-input')?.parentElement;
    if (wrap) {
      const sp = document.createElement('span');
      sp.id = 'btn-clear-input';
      sp.style.cssText = 'position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#a89070;font-size:16px;padding:4px';
      sp.textContent = '✕';
      sp.addEventListener('click', () => {
        S.destInput = ''; S.destinations.clear();
        const inp = document.getElementById('dest-input');
        if (inp) { inp.value = ''; inp.focus(); }
        updateDestFeedback(); updateNav();
        const cb = document.getElementById('btn-clear-input');
        if (cb) cb.remove();
      });
      wrap.appendChild(sp);
    }
  } else if (!S.destInput && clearBtn) {
    clearBtn.remove();
  }
}

function updateHotelSuggestions() {
  const q = (S.penginapanSearchQuery||'').toLowerCase();
  const all = S.allPenginapan || [];
  const filtered = q.length >= 1
    ? all.filter(p => {
        const n = (p.nama||'').toLowerCase();
        return n.includes(q)||(p.kawasan||'').toLowerCase().includes(q)||(p.kategori||'').toLowerCase().includes(q);
      }).slice(0, 8)
    : S.penginapanOptions.slice(0, 5);

  const acEl = document.getElementById('hotel-autocomplete');
  if (acEl) {
    acEl.style.display = q.length >= 1 ? '' : 'none';
    acEl.innerHTML = filtered.length > 0
      ? filtered.map(p => {
          const sel = S.penginapanIds.has(p.id);
          const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):'';
          return `<div class="autocomplete-item${sel?' active':''}" data-penginapan-ac="${p.id}">
            <span style="font-size:20px">🏨</span>
            <div>
              <div class="autocomplete-item-name">${esc(p.nama)}${sel?' ✓':''}</div>
              <div class="autocomplete-item-sub">${p.kawasan||''}${distTxt?' · ~'+distTxt+' dari destinasi':''}${p.harga?' · Rp'+p.harga:''}</div>
            </div>
          </div>`;
        }).join('')
      : `<div class="autocomplete-empty">Tidak ditemukan — coba kata kunci lain</div>
         <div class="autocomplete-use-custom" data-use-custom-hotel="${esc(S.penginapanSearchQuery)}">Pakai "${esc(S.penginapanSearchQuery)}" langsung →</div>`;
    acEl.querySelectorAll('[data-use-custom-hotel]').forEach(el => el.addEventListener('click', () => useHotelCustomName(el.dataset.useCustomHotel)));
    acEl.querySelectorAll('[data-penginapan-ac]').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const id = el.dataset.penginapanAc;
        const hotelData = (S.allPenginapan||[]).find(p=>p.id===id) || (S.penginapanOptions||[]).find(p=>p.id===id) || null;
        if (S.penginapanIds.has(id)) {
          S.penginapanIds.delete(id);
          S.penginapanDataList = (S.penginapanDataList||[]).filter(p=>p.id!==id);
        } else {
          S.penginapanIds.add(id);
          if (hotelData) S.penginapanDataList = [...(S.penginapanDataList||[]), hotelData];
        }
        S.penginapan = S.penginapanIds.size > 0 ? 'firebase' : '';
        S.penginapanSearchQuery = '';
        const firstWithCoord = (S.penginapanDataList||[]).find(p=>p.lat&&p.lng);
        if (firstWithCoord) loadKulinerNearPenginapan(firstWithCoord.lat, firstWithCoord.lng);
        render();
      });
    });
  }

  const listEl = document.getElementById('hotel-suggestions');
  if (listEl) {
    listEl.innerHTML = filtered.map(p => {
      const sel = S.penginapanIds.has(p.id);
      const distTxt = p.dist!=null?(p.dist<1?Math.round(p.dist*1000)+'m':p.dist.toFixed(1)+'km'):'';
      return `<div class="card-opt sm${sel?' selected':''}" data-penginapan-fb="${p.id}">
        <span class="card-opt-icon">🏨</span>
        <div style="flex:1;min-width:0">
          <div class="card-opt-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.nama)}</div>
          <div class="card-opt-sub">${p.kawasan||''} ${distTxt?'· ~'+distTxt+' dari destinasi':''}</div>
        </div>
        <span class="card-opt-check">✓</span>
      </div>`;
    }).join('') || '<div style="font-size:12px;color:#a89070;padding:12px;text-align:center;font-style:italic">Tidak ditemukan</div>';
  }
}

function render() {
  const c = document.getElementById('content');
  try {
    switch (S.step) {
      case 0: c.innerHTML = renderStepHero(); break;
      case 1: c.innerHTML = renderStepDest(); break;
      case 2: c.innerHTML = renderStepKuliner(); break;
      case 3: c.innerHTML = renderStep1(); break;
      case 4: c.innerHTML = renderStep2(); break;
      case 5:
        if (S.loading || S.error || S.itinerary) {
          c.innerHTML = renderStep3();
        } else {
          c.innerHTML = renderPlanningBoard();
        }
        break;
    }
  } catch(e) {
    console.error('render() error:', e);
    c.innerHTML = `<div style="padding:20px;color:#E94560;font-size:13px">
      <b>⚠️ Error render:</b><br><pre style="white-space:pre-wrap;font-size:11px;color:#666666;margin-top:8px">${esc(e.message)}\n${esc(e.stack||'')}</pre>
    </div>`;
  }
  updateProgress();
  updateNav();
  attachListeners();

  // ── Analytics hooks (funnel + auto error capture) ──
  try {
    if (typeof BWI_TRACK !== 'undefined') {
      if (S.step !== BWI_TRACK.lastStep) { bwiLogFunnel('step_view', S.step); BWI_TRACK.lastStep = S.step; }
      if (S.step === 5 && S.itinerary && !BWI_TRACK.itineraryLogged) { bwiLogFunnel('itinerary_generated', 5); BWI_TRACK.itineraryLogged = true; }
      if (S.step === 5 && S.error && BWI_TRACK.lastErrorMsg !== S.error) { bwiLogError('generate', S.error); BWI_TRACK.lastErrorMsg = S.error; }
    }
  } catch(_) {}
}

function partialUpdateDestList() {
  const q = S.destInput.toLowerCase().trim();
  const activeCat = S._catFilter || 'semua';

  // Update chips (selected destinations)
  const chipsEl = document.getElementById('dest-chips');
  if (chipsEl) {
    const matched = DESTINATIONS.filter(d => S.destinations.has(d.id));
    chipsEl.innerHTML = matched.map(d => `
      <div class="s0-chip">
        <span>${d.emoji}</span>
        <span>${esc(d.name)}</span>
        <span data-remove="${d.id}" class="s0-chip-x">✕</span>
      </div>`).join('');
    // Re-attach remove handlers
    chipsEl.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
      const id = el.dataset.remove;
      S.destinations.delete(id);
      const d = DESTINATIONS.find(x => x.id === id);
      if (d) {
        const allNames = [d.name.toLowerCase(), ...(d.aliases||[]).map(a=>a.toLowerCase())];
        const parts = S.destInput.split(',').map(s=>s.trim()).filter(s => {
          const sl = s.toLowerCase();
          return !allNames.some(n => sl.includes(n.split(' ')[0]) || n.includes(sl));
        });
        S.destInput = parts.join(', ');
        const inp = document.getElementById('dest-input');
        if (inp) inp.value = S.destInput;
      }
      parseDestInput(S.destInput);
      partialUpdateDestList();
      updateNav();
    }));
  }

  // Update quick-pick row states (toggle selected style tanpa rebuild)
  document.querySelectorAll('[data-dest-card]').forEach(el => {
    const id = el.dataset.destCard;
    if (!id) return;
    const sel = S.destinations.has(id);
    const nm = el.querySelector('.s0-name');
    if (nm) nm.classList.toggle('sel', sel);
    const chk = el.querySelector('.s0-check');
    if (chk) chk.classList.toggle('sel', sel);
  });

  // Update dest-cards-list (hasil pencarian)
  const listEl = document.getElementById('dest-cards-list');
  if (!listEl) return;

  const queryTerms = q.length >= 2
    ? q.split(',').map(s => s.trim()).filter(s => s.length >= 2)
    : [];

  if (queryTerms.length === 0) {
    listEl.innerHTML = '';
    return;
  }

  let displayDests = DESTINATIONS
    .filter(d => activeCat === 'semua' || d.cat === activeCat)
    .map(d => {
      let best = 0;
      for (const term of queryTerms) {
        let score = matchScore(term, d);
        if (d.name.toLowerCase().includes(term) && term.length >= 3) score += 30;
        if ((d.aliases||[]).some(a => a.includes(term) && term.length >= 3)) score += 20;
        if (score > best) best = score;
      }
      return { d, score: best };
    })
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .map(x => x.d)
    .slice(0, 14);

  // Tambahkan selected yang tidak muncul di hasil search
  const resultIds = new Set(displayDests.map(d => d.id));
  const selectedNotShown = DESTINATIONS.filter(d => S.destinations.has(d.id) && !resultIds.has(d.id));
  displayDests = [...selectedNotShown, ...displayDests].slice(0, 16);

  listEl.innerHTML = displayDests.length ? displayDests.map(d => {
    const sel = S.destinations.has(d.id);
    const rating = DEST_RATINGS[d.id];
    const catLabel = {alam:'Alam',pantai:'Pantai',diving:'Diving',budaya:'Budaya'}[d.cat]||d.cat;
    return `<div data-dest-card="${d.id}" class="s0-row">
      <span class="s0-emoji">${d.emoji}</span>
      <span class="s0-name${sel?' sel':''}">${esc(d.name)}</span>
      <span class="s0-meta">${catLabel}${rating?` · ★${rating}`:''}${d.bestTime?` · ${d.bestTime}`:''}</span>
      <span class="s0-check${sel?' sel':''}"></span>
    </div>`;
  }).join('') : `<div class="s0-empty">Tidak ada destinasi</div>`;

  // Re-attach click handlers untuk card list
  listEl.querySelectorAll('[data-dest-card]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.destCard;
    S.destinations.has(id) ? S.destinations.delete(id) : S.destinations.add(id);
    partialUpdateDestList();
    updateDestFeedback();
    updateNav();
  }));

  // Update warn area
  const warnEl = document.getElementById('dest-warn-area');
  if (warnEl) warnEl.style.display = (queryTerms.length > 0 && displayDests.length === 0) ? 'block' : 'none';

  updateNav();
}

  S.penginapanCustom = name;
  S.penginapanIds.clear();
  S.penginapanDataList = [];
  S.penginapan = 'custom';

  if (inpSearch) inpSearch.value = '';
  const acEl = document.getElementById('hotel-autocomplete');

}


function attachListeners() {
  const c = document.getElementById('content');

  const destInput = document.getElementById('dest-input');
  if (destInput) {
    let _destTimer = null;
    destInput.addEventListener('input', () => {
      const val = destInput.value;
      S.destInput = val;
      const q = val.toLowerCase().trim();
      parseDestInput(S.destInput);
      if (q.length === 0) S._shuffledDests = null;

      // Debounce partial update — JANGAN render() penuh agar keyboard tidak close
      clearTimeout(_destTimer);
      _destTimer = setTimeout(() => {
        updateDestFeedback();
        updateNav();
        // Update hanya card list dan chips, bukan seluruh DOM
        partialUpdateDestList();
      }, 180);
    });
  }
  const btnClear = document.getElementById('btn-clear-input');
  if (btnClear) btnClear.addEventListener('click', () => {
    S.destInput=''; S.destinations.clear(); S._shuffledDests = null;
    render();
  });
  c.querySelectorAll('[data-remove]').forEach(el => el.addEventListener('click', () => {
    const id = el.dataset.remove;
    S.destinations.delete(id);
    const d = DESTINATIONS.find(x=>x.id===id);
    if (d) {
      // Match alias dan nama penuh, bukan hanya kata pertama
      const allNames = [d.name.toLowerCase(), ...(d.aliases||[]).map(a=>a.toLowerCase())];
      const parts = S.destInput.split(',').map(s=>s.trim()).filter(s => {
        const sl = s.toLowerCase();
        return !allNames.some(n => sl.includes(n.split(' ')[0]) || n.includes(sl));
      });
      S.destInput = parts.join(', ');
      const inp = document.getElementById('dest-input');
      if (inp) inp.value = S.destInput;
    }
    parseDestInput(S.destInput);
    render();
  }));
  c.querySelectorAll('[data-suggest]').forEach(el => el.addEventListener('click', () => {
    const d = DESTINATIONS.find(x=>x.id===el.dataset.suggest);
    if (!d) return;
    S.destinations.add(d.id);
    S.destInput = S.destInput ? S.destInput.trimEnd().replace(/,$/,'')+', '+d.name : d.name;
    const inp = document.getElementById('dest-input');
    if (inp) inp.value = S.destInput;
    parseDestInput(S.destInput);
    updateDestFeedback(); updateNav();
  }));

  const kulCust = document.getElementById('input-kuliner-custom');
  if (kulCust) {
    let _kulTimer = null;
    kulCust.addEventListener('input', () => {
      S.kulinerCustom = kulCust.value;
      clearTimeout(_kulTimer);
      _kulTimer = setTimeout(() => { partialUpdateKulinerList(); }, 180);
    });
  }

  const selKota = document.getElementById('sel-kota');
  if (selKota) selKota.addEventListener('change', () => { S.kotaAsal = selKota.value; S.kotaAsalCustom = ''; render(); });
  const inputKota = document.getElementById('input-kota-custom');
  if (inputKota) inputKota.addEventListener('input', () => { S.kotaAsalCustom = inputKota.value; updateNav(); });

  c.querySelectorAll('[data-transport]').forEach(el => el.addEventListener('click', () => {
    S.transport = el.dataset.transport;
    S.sewaLokal.clear();
    if (S.transport !== 'umum') S.subTransport = '';
    render(); // re-render agar inline style ${sel?...} update
  }));
  c.querySelectorAll('[data-sewa]').forEach(el => el.addEventListener('click', () => {
    const v = el.dataset.sewa;
    S.sewaLokal.has(v) ? S.sewaLokal.delete(v) : S.sewaLokal.add(v);
    render();
  }));
  c.querySelectorAll('[data-sub]').forEach(el => el.addEventListener('click', () => {
    S.subTransport = el.dataset.sub;
    render();
  }));

  const inpTiba = document.getElementById('input-waktu-tiba');
  if (inpTiba) inpTiba.addEventListener('change', () => { S.waktuTiba = inpTiba.value; });
  const inpPulang = document.getElementById('input-waktu-pulang');
  if (inpPulang) inpPulang.addEventListener('change', () => { S.waktuPulang = inpPulang.value; });

  const inpHotel = document.getElementById('input-penginapan-custom');
  if (inpHotel) inpHotel.addEventListener('input', () => {
    S.penginapanCustom = inpHotel.value;
    if (S.penginapanCustom.trim()) {
      S.penginapanIds.clear(); S.penginapanDataList = []; S.penginapan = 'custom';
      c.querySelectorAll('[data-penginapan-fb],[data-penginapan]').forEach(e => e.classList.remove('selected'));
    }
    updateNav();
  });

  if (inpHotelSearch) {
    inpHotelSearch.addEventListener('input', () => {
      S.penginapanSearchQuery = inpHotelSearch.value;
      updateHotelSuggestions();
      updateNav();
    });
    inpHotelSearch.addEventListener('focus', () => {
      if (!S.penginapanIds.size) updateHotelSuggestions();
    });
    inpHotelSearch.addEventListener('blur', () => {
      setTimeout(() => {
        const acEl = document.getElementById('hotel-autocomplete');
        if (acEl) acEl.style.display = 'none';
      }, 200);
    });
  }
  const btnClearHotel = document.getElementById('btn-clear-hotel');
  if (btnClearHotel) btnClearHotel.addEventListener('click', () => {
    S.penginapanSearchQuery = '';
    S.penginapanIds.clear(); S.penginapanDataList = []; S.penginapan = '';

// ─── TIME HELPERS ─────────────────────────────────────────────────────────────
function addMin(t, m) {
  const [h,mn] = t.split(':').map(Number);
  const tot = h*60+mn+m;
  return `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;
}
function durLabel(m) {
  const h=Math.floor(m/60), mn=m%60;
  return h&&mn?`${h} jam ${mn} menit`:h?`${h} jam`:`${mn} menit`;
}
function pickRand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function parseDurasi(v) {
  return {'1D':[1,0],'2D1N':[2,1],'3D2N':[3,2],'4D3N':[4,3],'5D4N':[5,4]}[v]||[2,1];
}
function timeToMin(t) {
  if (!t || typeof t !== 'string') return 9999;
  const [h,m] = t.split(':').map(Number);
  return (h||0)*60+(m||0);
}
function sortActivities(acts) {
  // dayOffset:-1 menandai aktivitas malam SEBELUM tengah malam (mis. persiapan/
  // berangkat ke Paltuding jam 20:00–23:30) yang secara narasi terjadi SEBELUM
  // aktivitas dini hari (00:00–13:00) di array yang sama. Tanpa offset ini,
  // timeToMin('20:00')=1200 > timeToMin('01:00')=60, jadi entri malam itu
  // nyasar ke akhir daftar alih-alih ke awal.
  const sortKey = a => (a.dayOffset||0)*1440 + timeToMin(a.time);
  return [...acts].sort((a,b) => sortKey(a)-sortKey(b));
}

// ─── TRANSPORT HELPERS ────────────────────────────────────────────────────────
function hasMotor()  { return S.transport==='pribadi_motor' || S.sewaLokal.has('motor'); }
function hasMobil()  { return S.transport==='pribadi_mobil' || S.sewaLokal.has('mobil_driver'); }
function hasOjek()   { return S.sewaLokal.has('ojek'); }
function getTransportLabel() {
  if (hasMotor()) return 'motor';
  if (hasMobil()) return 'mobil';
  if (hasOjek())  return 'ojek online';
  return 'kendaraan';
}
function tipsKembaliDaratan() {
  if (hasMotor() || hasMobil()) return 'Kendaraanmu sudah standby di parkiran GWD. Perjalanan balik ke penginapan ±45 menit.';
  if (hasOjek())  return 'Grab/Gojek terbatas di area GWD — sebaiknya pesan ojek pangkalan atau arrange jemputan H-1.';
  return 'Transportasi umum tidak tersedia di area GWD. Pastikan sudah arrange kendaraan pulang dari H-1.';
}
function travelMinutes(coord1, coord2) {
  if (!coord1 || !coord2) return 20;
  const dist = haversineKm(coord1.lat, coord1.lng, coord2.lat, coord2.lng);
  const speed = hasMotor() ? 35 : hasMobil() ? 40 : 35;
  return Math.round((dist/speed)*60)+10;
}

<script>
// ─── KULINER HELPERS ──────────────────────────────────────────────────────────
// Nama kota/kabupaten lain yang kadang kebawa di nama bisnis (mis. "Fujiyama
// Sushi Jember" beneran ada di Jember, bukan Banyuwangi). Kalau kawasan/nama
// menyebut salah satu ini, jangan pernah direkomendasikan sebagai kuliner
// terdekat — meski entah kenapa datanya kepasang koordinat di Banyuwangi.
const NON_BWI_REGIONS = ['jember','situbondo','bondowoso','probolinggo','lumajang',
  'denpasar','surabaya','malang','jakarta','jogja','yogyakarta','semarang','bandung'];
function mentionsOtherRegion(d) {
  const text = `${d.nama||''} ${d.kawasan||''}`.toLowerCase();
  return NON_BWI_REGIONS.some(r => text.includes(r));
}

function getKulinerNear(lat, lng, radiusKm=1, maxResult=5) {
  if (!lat || !lng) return [];
  const cache = window._placesCache || [];
  const candidates = cache
    .filter(d => {
      const t = ((d.type||'')+(d.kategori||'')).toLowerCase();
      return t.includes('kuliner')||t.includes('cafe')||t.includes('kafe')||
             t.includes('restoran')||t.includes('warung')||t.includes('rumah makan')||
             t.includes('seafood')||t.includes('makan')||t.includes('kedai')||
             t.includes('depot')||t.includes('lesehan')||t.includes('kopi');
    })
    .filter(d => d.lat && d.lng && d.nama)
    .filter(d => !mentionsOtherRegion(d))
    .map(d => ({...d, dist: haversineKm(lat, lng, d.lat, d.lng)}))
    .filter(d => d.dist <= radiusKm);

  // Urutan: kalau ADA data rating di antara kandidat, urutkan dari yang paling
  // populer (rating tertinggi) dulu, jarak jadi tiebreaker. Kalau belum ada
  // rating sama sekali (default saat ini), tetap urut dari yang paling dekat.
  const hasAnyRating = candidates.some(d => d.rating && d.rating > 0);
  candidates.sort((a, b) => {
    if (hasAnyRating) {
      const rb = b.rating || 0, ra = a.rating || 0;
      if (rb !== ra) return rb - ra;
    }
    return a.dist - b.dist;
  });
  return candidates.slice(0, maxResult);
}

// Icon kuliner berdasarkan kategori/nama — dipakai di card "Kuliner Populer" Step0
function kulinerEmoji(d) {
  const t = `${d.kategori||''} ${d.nama||''}`.toLowerCase();
  if (t.includes('kopi')||t.includes('kafe')||t.includes('cafe')) return '☕';
  if (t.includes('seafood')||t.includes('ikan')) return '🦐';
  if (t.includes('sego')||t.includes('nasi')) return '🍚';
  if (t.includes('bakso')||t.includes('mie')||t.includes('mi ayam')) return '🍜';
  if (t.includes('sate')) return '🍢';
  return '🍽️';
}

// Kuliner populer se-Banyuwangi (tanpa acuan lokasi) — dipakai saat belum ada
// destinasi yang dipilih, atau sebagai fallback kalau radius destinasi kosong.
function getKulinerPopulerGeneral(maxResult=6) {
  const cache = window._placesCache || [];
  const candidates = cache
    .filter(d => {
      const t = ((d.type||'')+(d.kategori||'')).toLowerCase();
      return t.includes('kuliner')||t.includes('cafe')||t.includes('kafe')||
             t.includes('restoran')||t.includes('warung')||t.includes('rumah makan')||
             t.includes('seafood')||t.includes('makan')||t.includes('kedai')||
             t.includes('depot')||t.includes('lesehan')||t.includes('kopi');
    })
    .filter(d => d.nama && !mentionsOtherRegion(d));
  candidates.sort((a,b) => (b.rating||0) - (a.rating||0));
  return candidates.slice(0, maxResult);
}

// Kuliner populer di sekitar destinasi-destinasi yang sudah dipilih user.
// Gabungkan hasil getKulinerNear tiap destinasi, dedupe by nama, urut rating.
function getKulinerPopulerForDest(dests, maxResult=6) {
  const merged = [];
  const seen = new Set();
  for (const d of dests) {
    if (!d.lat || !d.lng) continue;
    const near = getKulinerNear(d.lat, d.lng, 5, 10);
    for (const k of near) {
      if (!k.nama) continue;
      const key = k.nama.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      merged.push(k);
    }
  }
  merged.sort((a,b) => (b.rating||0) - (a.rating||0) || (a.dist||0) - (b.dist||0));
  return merged.slice(0, maxResult);
}

// Pencarian kuliner bebas teks (untuk live-search kolom "Kuliner yang diincar"),
// mirip logika pencarian destinasi tapi tanpa acuan lokasi.
function searchKulinerByQuery(queryText, maxResult=6) {
  const q = (queryText||'').toLowerCase().trim();
  if (q.length < 2) return [];
  const cache = window._placesCache || [];
  const candidates = cache
    .filter(d => {
      const t = ((d.type||'')+(d.kategori||'')).toLowerCase();
      return t.includes('kuliner')||t.includes('cafe')||t.includes('kafe')||
             t.includes('restoran')||t.includes('warung')||t.includes('rumah makan')||
             t.includes('seafood')||t.includes('makan')||t.includes('kedai')||
             t.includes('depot')||t.includes('lesehan')||t.includes('kopi');
    })
    .filter(d => d.nama && !mentionsOtherRegion(d))
    .filter(d => {
      const n = d.nama.toLowerCase();
      return n.includes(q) || (d.kategori||'').toLowerCase().includes(q) || (d.kawasan||'').toLowerCase().includes(q);
    });
  candidates.sort((a,b) => (b.rating||0) - (a.rating||0));
  return candidates.slice(0, maxResult);
}

// Jangan tampilkan dropdown kalau hasilnya cuma 1 dan sudah persis sama dengan
// segmen yang sedang diketik (misal baru saja dipilih dari dropdown).
function currentKulinerTerm(queryText) {
  const segments = (queryText||'').split(',');
  return segments[segments.length-1].trim();
}
function computeKulinerSuggestions(queryText) {
  const term = currentKulinerTerm(queryText);
  if (term.length < 2) return [];
  const results = searchKulinerByQuery(term, 6);
  if (results.length === 1 && results[0].nama.toLowerCase() === term.toLowerCase()) return [];
  return results;
}

function kulinerSuggestRowsHtml(results, queryText) {
  if (results.length) {
    return results.map(k => `<div data-kuliner-pick="${esc(k.nama)}" class="s0-row">
      <span class="s0-emoji">${kulinerEmoji(k)}</span>
      <span class="s0-name">${esc(k.nama)}</span>
      <span class="s0-meta">${k.kawasan?esc(k.kawasan):''}${k.rating?` · ★${Number(k.rating).toFixed(1)}`:''}</span>
    </div>`).join('');
  }
  const term = currentKulinerTerm(queryText);
  return term.length >= 2 ? `<div class="s0-empty">Tidak ditemukan di data kami — nama yang kamu ketik tetap dipakai</div>` : '';
}

// Dipakai baik oleh dropdown live-search (melengkapi segmen yang sedang diketik)
// maupun card "Kuliner Populer" (menambah item baru) — dibedakan otomatis:
// kalau segmen terakhir adalah awalan dari nama yang dipilih, itu berarti
// sedang "melengkapi ketikan", jadi diganti. Kalau tidak, ditambah sebagai item baru.
function pickKulinerSuggestion(picked) {
  const parts = (S.kulinerCustom||'').split(',').map(s=>s.trim()).filter(Boolean);
  const last = parts[parts.length-1] || '';
  if (last && picked.toLowerCase().startsWith(last.toLowerCase())) {
    parts[parts.length-1] = picked;
  } else {
    parts.push(picked);
  }
  S.kulinerCustom = parts.join(', ') + ', ';
  const inp = document.getElementById('input-kuliner-custom');
  if (inp) { inp.value = S.kulinerCustom; inp.focus(); }
  partialUpdateKulinerList();
}

function partialUpdateKulinerList() {
  const listEl = document.getElementById('kuliner-suggest-list');
  if (!listEl) return;
  const results = computeKulinerSuggestions(S.kulinerCustom);
  listEl.innerHTML = kulinerSuggestRowsHtml(results, S.kulinerCustom);
  listEl.querySelectorAll('[data-kuliner-pick]').forEach(el => el.addEventListener('click', () => pickKulinerSuggestion(el.dataset.kulinerPick)));
}

function kulinerActivityMulti(list, waktu, labelWaktu) {
  const timeMap = { pagi:'07:00', siang:'12:30', malam:'19:00' };
  const parsePrice = h => h ? (parseInt(String(h).replace(/\D/g,''))||0) : 0;
  const prices = list.map(k=>parsePrice(k.harga)).filter(p=>p>0);
  const avgPrice = prices.length>0
    ? Math.round(prices.reduce((a,b)=>a+b,0)/prices.length/1000)*1000
    : (waktu==='pagi'?20000:waktu==='siang'?25000:30000);
  const sortedByRating = list.some(k=>k.rating && k.rating>0);
  const lines = list.map((k,i) => {
    const distTxt = k.dist<1 ? `${Math.round(k.dist*1000)}m` : `${k.dist.toFixed(1)}km`;
    const hargaTxt = k.harga ? ` · ~Rp${parsePrice(k.harga).toLocaleString('id-ID')}` : '';
    const ratingTxt = k.rating ? ` · ★${Number(k.rating).toFixed(1)}` : '';
    const ket = k.menu_andalan||k.catatan||k.kategori||'';
    return `${i+1}. ${k.nama}${k.kawasan?` (${k.kawasan})`:''} — ${distTxt}${ratingTxt}${hargaTxt}${ket?` · ${ket}`:''}`;
  });
  const intro = sortedByRating
    ? 'Rekomendasi kuliner, urut dari yang paling populer (rating tertinggi) — tinggal pilih sesuai selera:'
    : 'Rekomendasi kuliner terdekat, urut dari yang paling dekat — tinggal pilih sesuai selera:';
  return {
    time: timeMap[waktu]||timeMap.siang,
    name: `${labelWaktu} — Pilihan Kuliner Terdekat`,
    location: `${list.length} pilihan dalam radius 5km dari lokasi`,
    duration: '1 jam',
    description: `${intro}\n${lines.join('\n')}`,
    tips: 'Cek jam operasional masing-masing sebelum berangkat — data jarak dihitung garis lurus, aktualnya bisa sedikit lebih jauh.',
    estimatedCost: avgPrice,
    type: 'makan',
  };
}

function getDestCoords(destOrId) {
  const id = typeof destOrId==='string' ? destOrId : destOrId?.id;
  const d  = typeof destOrId==='object' ? destOrId : DESTINATIONS.find(x=>x.id===id);
  if (d?.lat && d?.lng) return {lat:d.lat, lng:d.lng};
  const ext = DEST_EXT[id];
  if (ext?.lat && ext?.lng) return {lat:ext.lat, lng:ext.lng};
  return null;
}
function midpoint(c1, c2) {
  if (!c1||!c2) return c1||c2||null;
  return {lat:(c1.lat+c2.lat)/2, lng:(c1.lng+c2.lng)/2};
}

function buildMakan(waktu, zone, overrideTime, refLat, refLng) {
  const timeMap  = { pagi:'07:00', siang:'12:30', malam:'19:00' };
  const labelMap = { pagi:'Sarapan', siang:'Makan Siang', malam:'Makan Malam' };
  const finalTime = overrideTime || timeMap[waktu];
  const label = labelMap[waktu];

  if (S.kulinerCustom && S.kulinerCustom.trim()) {
    return { time:finalTime, name:`${label} — ${S.kulinerCustom.trim()}`,
      location:S.kulinerCustom.trim(), duration:'1 jam',
      description:`${label} di ${S.kulinerCustom.trim()} — pilihan kuliner incaran kamu.`,
      tips:'Sesuaikan dengan jam operasional.', estimatedCost:30000, type:'makan' };
  }

  const hotelC = getHotelCoords();
  const coords = (refLat && refLng) ? {lat:refLat, lng:refLng} : hotelC;

  // Tampilkan beberapa pilihan kuliner sekaligus (bukan cuma satu) dalam radius
  // maks 5km, diurutkan dari yang paling dekat — user yang pilih sendiri sesuai
  // selera, aplikasi cuma kasih rekomendasi.
  const options = getKulinerNear(coords.lat, coords.lng, 5, 5);
  if (options.length > 0) {
    return kulinerActivityMulti(options, waktu, label);
  }

  const genDesc = {
    pagi:  'Cari warung sarapan lokal — Sego Tempong, nasi pecel, atau lontong sayur khas Banyuwangi.',
    siang: 'Cari warung makan terdekat. Menu andalan: Rujak Soto, Rawon, atau Pecel Pitik.',
    malam: 'Belum ada data kuliner terdaftar dalam radius 5km dari lokasi ini — kemungkinan daerahnya cukup terpencil. Tanyakan pilihan makan malam terdekat ke penginapan.',
  };
  return {
    time:finalTime, name:`${label} — Warung Lokal Sekitar Lokasi`,
    location:'Warung terdekat dari lokasi', duration:'1 jam',
    description:genDesc[waktu],
    tips:'Tanya rekomendasi ke warga lokal atau penginapan.',
    estimatedCost: waktu==='pagi'?20000:waktu==='siang'?25000:30000,
    type:'makan',
  };
}

function getHotelCoords() {
  // Konsisten dengan getFinalHotelName(): selalu pakai hotel index [0]
  // (custom text tidak punya koordinat, jadi fallback ke pusat kota)
  if (S.penginapanCustom.trim()) return BWI_COORDS.pusat;
  const h = (S.penginapanDataList||[])[0];
  if (h && h.lat && h.lng) return {lat:h.lat, lng:h.lng};
  return BWI_COORDS.pusat;
}
function findHotelCoords(hotelName) {
  // Cari koordinat penginapan TERTENTU (bukan selalu index [0]) — dipakai saat
  // trip punya lebih dari satu penginapan, supaya sarapan/makan malam/kuliner
  // dicari dari lokasi penginapan yang benar-benar relevan untuk hari itu.
  if (!hotelName || S.penginapanCustom.trim()) return getHotelCoords();
  const h = (S.penginapanDataList||[]).find(p => p.nama === hotelName);
  if (h && h.lat && h.lng) return {lat:h.lat, lng:h.lng};
  return getHotelCoords();
}

// ─── ARRIVAL DAY ─────────────────────────────────────────────────────────────
function buildArrivalDay(kota, transport, penginapan) {
  const isUmum  = transport === 'umum';
  const jamTiba = parseInt((S.waktuTiba||'10:00').split(':')[0]);
  const finalHotel = getFinalHotelName();
  const hotelC  = getHotelCoords();
  const selectedDests  = DESTINATIONS.filter(d => S.destinations.has(d.id));
  const firstDestCoord = selectedDests.length>0 ? getDestCoords(selectedDests[0]) : null;
  const sarapanCoord   = midpoint(BWI_COORDS.stasiun, firstDestCoord) || BWI_COORDS.stasiun;
  const acts = [];

  acts.push({ _order:0, time:S.waktuTiba, name:'Tiba di Banyuwangi',
    location: isUmum ? 'Stasiun/Bandara Banyuwangi' : 'Banyuwangi',
    duration:'30 menit', description:'Selamat datang di Banyuwangi! 🎉',
    tips: hasMotor() ? 'Kendaraan sewa bisa diambil di area stasiun — konfirmasi H-1.'
      : hasMobil() ? 'Mobil + driver sudah bisa standby di stasiun — konfirmasi jadwal jemput H-1.'
      : hasOjek()  ? 'Grab/Gojek tersedia di area stasiun untuk perjalanan pertama.'
      : 'Grab/Gojek tersedia di area stasiun.',
    estimatedCost:0, type:'transport' });

  if (jamTiba < 11) {
    acts.push({ _order:1, time:addMin(S.waktuTiba,20), name:'Titip Tas (Opsional)',
      location:'Locker Wangi / Area Stasiun', duration:'20 menit',
      description:'Jika membawa koper besar, bisa dititipkan di Locker Wangi sebelum jalan-jalan.',
      tips:'Locker Wangi: lockerwangi.com | Tarif ~25K/tas. Buka 24 jam.',
      estimatedCost:25000, type:'aktivitas' });
    const sarapan = buildMakan('pagi','kota', addMin(S.waktuTiba,45), sarapanCoord.lat, sarapanCoord.lng);
    sarapan.name = 'Sarapan Khas Banyuwangi';
    acts.push({ _order:2, ...sarapan, time:addMin(S.waktuTiba,45) });
    acts.push({ _order:3, time:'13:00', name:'Check-in Penginapan',
      location:finalHotel, duration:'1 jam',
      description:`Check-in ${finalHotel}. Check-in standar jam 14:00.`,
      tips:'Hubungi penginapan H-1 untuk konfirmasi early check-in.',
      estimatedCost:0, type:'penginapan' });
    const malamAct = buildMakan('malam','kota','19:00',hotelC?.lat,hotelC?.lng);
    malamAct.time = '19:00';
    acts.push({ _order:10, ...malamAct });
  } else if (jamTiba >= 11 && jamTiba < 18) {
    const checkInTime = jamTiba>=14 ? S.waktuTiba : '14:00';
    if (jamTiba < 14) {
      const siangAct = buildMakan('siang','kota',addMin(S.waktuTiba,30),BWI_COORDS.stasiun.lat,BWI_COORDS.stasiun.lng);
      siangAct.name  = 'Makan Siang Sambil Menunggu Check-in';
      acts.push({ _order:1, ...siangAct });
    }
    acts.push({ _order:2, time:checkInTime, name:'Check-in Penginapan',
      location:finalHotel, duration:'1 jam',
      description:`Check-in ${finalHotel}. Istirahat dan bersih-bersih setelah perjalanan.`,
      tips:'', estimatedCost:0, type:'penginapan' });
    const malamAct = buildMakan('malam','kota','19:00',hotelC?.lat,hotelC?.lng);
    malamAct.time = '19:00';
    acts.push({ _order:10, ...malamAct });
  } else {
    acts.push({ _order:1, time:addMin(S.waktuTiba,20), name:'Check-in & Istirahat',
      location:finalHotel, duration:'Malam',
      description:`Check-in ${finalHotel}. Istirahat yang cukup.`,
      tips:'', estimatedCost:0, type:'penginapan' });
    const malamAct = buildMakan('malam','kota',addMin(S.waktuTiba,60),BWI_COORDS.stasiun.lat,BWI_COORDS.stasiun.lng);
    acts.push({ _order:2, ...malamAct });
  }

  const ordered = acts.sort((a,b)=>(a._order||0)-(b._order||0)).map(({_order,...r})=>r);
  return { day:1, date_label:'Hari 1', title:'Kedatangan di Banyuwangi', activities:ordered };
}

function injectArrivalExtras(arrivalDay) {
  const extras = (S.planArrivalExtras||[]).map(id=>DESTINATIONS.find(d=>d.id===id)).filter(Boolean);
  if (extras.length===0) return arrivalDay;
  const pagiSpots = extras.filter(d => { const bt=(DEST_EXT[d.id]?.bestTime||'').toLowerCase(); return bt.includes('pagi')||bt===''; });
  const soreSpots = extras.filter(d => { const bt=(DEST_EXT[d.id]?.bestTime||'').toLowerCase(); return bt.includes('sore')||bt.includes('sunset')||bt.includes('siang'); });
  let curPagi = addMin(S.waktuTiba, 80);
  let prevCoord = BWI_COORDS.stasiun;
  const pagiActs = pagiSpots.map(d => {
    const ext=DEST_EXT[d.id]||{}, dur=ext.dur||90;
    const dCoord=getDestCoords(d)||prevCoord;
    const travelMin=travelMinutes(prevCoord,dCoord);
    curPagi=addMin(curPagi,travelMin);
    const act={time:curPagi,name:d.name,location:d.name+', Banyuwangi',duration:durLabel(dur),description:ext.desc||d.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'};
    curPagi=addMin(curPagi,dur); prevCoord=dCoord;
    return act;
  });
  const checkInTime=timeToMin(curPagi)>timeToMin('13:00')?curPagi:'13:00';
  let curSore=addMin(checkInTime,90);
  const soreActs=soreSpots.map(d=>{
    const ext=DEST_EXT[d.id]||{},dur=ext.dur||120;
    const act={time:curSore,name:d.name,location:d.name+', Banyuwangi',duration:durLabel(dur),description:ext.desc||d.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'};
    curSore=addMin(curSore,dur+30); return act;
  });
  const base=arrivalDay.activities;
  const idxSarapan=base.findIndex(a=>a.type==='makan');
  const idxCheckin=base.findIndex(a=>a.type==='penginapan');
  const result=[];
  base.forEach((a,i)=>{
    result.push(a);
    if(i===idxSarapan&&pagiActs.length>0){result.push(...pagiActs);if(idxCheckin>=0)base[idxCheckin].time=checkInTime;}
    if(i===idxCheckin&&soreActs.length>0){result.push(...soreActs);}
  });
  arrivalDay.activities=result;
  return arrivalDay;
}

    location:`${getFinalHotelName()} → ${ZONE_LABEL_SHORT[zone]||zone}`,
    duration:travelLabel,
    description:`Perjalanan menuju destinasi hari ini. Siapkan diri untuk pengalaman luar biasa!`,
    tips:hasMotor()?'Isi bensin penuh — SPBU terbatas di area wisata.':hasMobil()?'Gunakan Google Maps — signal melemah di beberapa titik.':'Pesan ojek/grab dari H-1.',
    estimatedCost:hasMotor()?15000:hasMobil()?50000:40000,type:'transport'});

  let curTime=addMin('07:00',60+15+travelMins);
  mainSpots.forEach((spot,i)=>{
    const ext=DEST_EXT[spot.id]||{};
    const dur=ext.dur||180;
    acts.push({time:curTime,name:spot.name,location:spot.name+', Banyuwangi',duration:durLabel(dur),description:ext.desc||spot.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'});
    curTime=addMin(curTime,dur);
    if(i<mainSpots.length-1) {
      // Perjalanan ke destinasi berikutnya — sebelumnya nggak ada sama sekali,
      // jadi itinerary kelihatan "teleport" dari satu tempat ke tempat lain.
      const nextSpot = mainSpots[i+1];
      const coordA = getDestCoords(spot), coordB = getDestCoords(nextSpot);
      const segMenit = estimasiTravelMenit(coordA, coordB);
      if (segMenit > 8) {
        acts.push({time:curTime,name:`Perjalanan ke ${nextSpot.name}`,
          location:`${spot.name} → ${nextSpot.name}`,
          duration:`~${segMenit} menit`,
          description:'Perjalanan menuju destinasi berikutnya.',
          tips:hasMotor()?'Cek bensin & kondisi jalan sebelum lanjut.':'Gunakan Google Maps untuk rute terkini.',
          estimatedCost:hasMotor()?8000:hasMobil()?15000:20000,type:'transport'});
        curTime=addMin(curTime,segMenit);
      }
      acts.push(buildMakan('siang',zone,curTime,getDestCoords(spot)?.lat,getDestCoords(spot)?.lng));
      curTime=addMin(curTime,60);
    }
  });

  const hasMidMakan=acts.some(a=>a.type==='makan'&&a.name.toLowerCase().includes('siang'));
  if (!hasMidMakan) {
    const siangTime=acts.filter(a=>a.type==='aktivitas').length>0?addMin(curTime,-30):'12:30';
    acts.push(buildMakan('siang',zone,siangTime,null,null));
    if (timeToMin(siangTime)<timeToMin(curTime)) curTime=addMin(siangTime,60);
  }

  sunsetSpots.forEach(spot=>{
    const ext=DEST_EXT[spot.id]||{};
    const dur=ext.dur||180;
    const sunsetStart='16:00';
    acts.push({time:sunsetStart,name:spot.name,location:spot.name+', Banyuwangi',duration:durLabel(dur),description:ext.desc||spot.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'});
    curTime=addMin(sunsetStart,dur);
  });

  const malamAct=buildMakan('malam',zone,'19:00',hotelC?.lat,hotelC?.lng);
  acts.push(malamAct);
  nightSpots.forEach(spot=>{
    const ext=DEST_EXT[spot.id]||{};
    acts.push({time:'20:00',name:spot.name,location:spot.name,duration:durLabel(ext.dur||180),description:ext.desc||spot.desc||'',tips:ext.tips||'',estimatedCost:ext.tiket||0,type:'aktivitas'});
  });

  const baseTitle=spots.length===1?spots[0].name:`Jelajah ${ZONE_LABEL_SHORT[zone]||'Banyuwangi'}`;
  return {day:dayNum,date_label:`Hari ${dayNum}`,title:baseTitle,activities:sortActivities(acts)};
}

// ─── BUDGET & SUMMARY ─────────────────────────────────────────────────────────
function calculateBudget(spots, form, totalDays) {
  const tiket  = spots.reduce((s,d)=>s+(DEST_EXT[d.id]?.tiket||0),0);
  const makan  = totalDays*3*27000;
  const nights = Math.max(0,totalDays-1);
  const hotelEst={hotel45:700000,hotel3:300000,hotel12:150000,homestay:80000,none:0,firebase:150000,custom:150000};
  const hotel  = (hotelEst[form.penginapan]||100000)*nights;
  const sewaEst=[...(form.sewaLokal||[])].reduce((s,v)=>s+({motor:120000,mobil_driver:500000,ojek:30000}[v]||0)*totalDays,0);
  const transPP={kereta:250000,pesawat:1500000,bus:150000}[form.subTransport]||(form.transport==='pribadi_mobil'?400000:form.transport==='pribadi_motor'?150000:200000);
  const totalTransport=transPP+sewaEst;
  const min=tiket+makan+hotel+totalTransport;
  return {
    min:Math.round(min/1000)*1000, max:Math.round(min*1.35/1000)*1000,
    details:{transportasi:totalTransport,akomodasi:hotel,kuliner:makan,wisata:tiket},
    note:`Per orang · ${totalDays} hari · Belum termasuk oleh-oleh`,
  };
}
function buildPackingTips(spots) {
  const base=new Set(['Sunscreen SPF50+','Uang tunai (ATM terbatas)','Powerbank','Kartu identitas','Obat-obatan pribadi']);
  spots.forEach(s=>(PACKING_DB[s.id]||[]).forEach(t=>base.add(t)));
  return [...base].slice(0,8);
}
function buildSummary(spots, totalDays, gaya, kota) {
  return `Itinerary ${totalDays} hari dari ${kota} ke ${spots.length} destinasi terbaik Banyuwangi, disusun dengan gaya ${gaya==='santai'?'santai — menikmati setiap momen tanpa terburu-buru':'eksplorasi — efisien namun tetap berkesan'}.`;
}
function buildNotes(spots) {
  const n=[];
  if(spots.some(s=>s.id==='ijen')) n.push('Kawah Ijen ditutup saat cuaca ekstrem — selalu cek update terbaru sebelum berangkat.');
  if(spots.some(s=>s.id==='sukamade')) n.push('Akses Sukamade bisa terputus di musim hujan.');
  if(spots.some(s=>['menjangan','tabuhan'].includes(s.id))) n.push('Perjalanan ke pulau tergantung kondisi laut.');
  return n.join(' ')||'Selalu cek kondisi cuaca dan jalan sebelum berangkat. Jaga kebersihan dan hormati alam Banyuwangi.';
}

<script>
// ─── PLANNING BOARD ──────────────────────────────────────────────────────────
// ─── Saran Otomatis: route-first (nearest-neighbor chain) + brute-force
//     intra-day ordering. Kasus khusus (Ijen, Sukamade) tetap jadi hard
//     constraint yang jalan duluan sebelum sisanya dirantai pakai jarak asli.
function initPlanDays() {
  const [totalDays]=parseDurasi(S.durasi);
  const selected=DESTINATIONS.filter(d=>S.destinations.has(d.id));
  const spotsPerDay=S.gayaPerjalanan==='santai'?2:3;
  const naturalAct=Math.max(1,totalDays-(totalDays>1?2:0));
  const actDays=Math.min(Math.max(naturalAct,Math.ceil(selected.length/spotsPerDay)),Math.max(1,totalDays-1));
  S.planDays=Array.from({length:actDays},()=>[]);
  S.planBacklog=[];
  S.planArrivalExtras=[];

  // 1. Destinasi yang WAJIB hari sendiri, apapun hasil clustering jarak.
  const ijenSel = selected.find(d=>d.isIjen);
  const soloIds = [ijenSel?.id, selected.some(d=>d.id==='sukamade')?'sukamade':null].filter(Boolean);
  const regular = selected.filter(d=>!soloIds.includes(d.id));

  let di=0;
  soloIds.forEach(id=>{ if(di<actDays) S.planDays[di++]=[id]; });

  // 2. Rantai sisanya pakai nearest-neighbor berdasarkan jarak asli (bukan
  //    label zona) — biar destinasi yang searah geografis nggak kepisah
  //    cuma gara-gara beda label, dan yang jauh nggak numpuk kepaksa gabung.
  const chain = nearestNeighborChain(regular);

  // 3. Potong rantai jadi kelompok per hari. Berhenti kalau kapasitas hari
  //    penuh (spotsPerDay) ATAU kalau lompatan ke destinasi berikutnya udah
  //    kejauhan (>MAX_GAP_KM) — biar destinasi yang jauh banget (kayak
  //    Baluran vs klaster selatan, ~75-90km) nggak kepaksa gabung cuma
  //    gara-gara kapasitas hari itu belum penuh.
  const MAX_GAP_KM = 45;
  let curDay=[];
  const flushDay=()=>{ if(curDay.length && di<actDays){ S.planDays[di++]=optimalOrder(curDay).map(x=>x.id); } curDay=[]; };
  chain.forEach(d=>{
    if (curDay.length===0) { curDay.push(d); return; }
    const prev=getDestCoords(curDay[curDay.length-1]), cur=getDestCoords(d);
    const gap = (prev&&cur) ? haversineKm(prev.lat,prev.lng,cur.lat,cur.lng) : 0;
    if (curDay.length>=spotsPerDay || gap>MAX_GAP_KM) { flushDay(); curDay.push(d); }
    else curDay.push(d);
  });
  flushDay();

  const placedIds = new Set(S.planDays.flat());
  S.planBacklog = selected.map(d=>d.id).filter(id=>!placedIds.has(id));
}

// Rantai nearest-neighbor: mulai dari destinasi pertama di daftar, lalu tiap
// langkah lompat ke destinasi belum-dikunjungi yang jaraknya paling dekat.
// Destinasi tanpa koordinat lengkap ditaruh di ujung rantai (fallback aman).
function nearestNeighborChain(dests) {
  const withCoord = dests.filter(d=>getDestCoords(d));
  const noCoord   = dests.filter(d=>!getDestCoords(d));
  if (withCoord.length===0) return [...noCoord];
  const remaining = [...withCoord];
  const chain = [remaining.shift()];
  while (remaining.length) {
    const last = getDestCoords(chain[chain.length-1]);
    let bestIdx=0, bestDist=Infinity;
    remaining.forEach((d,i)=>{
      const c=getDestCoords(d);
      const dist=haversineKm(last.lat,last.lng,c.lat,c.lng);
      if (dist<bestDist) { bestDist=dist; bestIdx=i; }
    });
    chain.push(remaining.splice(bestIdx,1)[0]);
  }
  return [...chain, ...noCoord];
}

// Cari urutan kunjungan paling pendek dalam satu hari. Isi per hari cuma
// 2-3 destinasi jadi brute-force (coba semua kemungkinan urutan) murah
// secara komputasi dan hasilnya dijamin optimal, bukan cuma heuristik.
function optimalOrder(group) {
  if (group.length<=1 || group.length>6) return group; // >6 harusnya nggak pernah kejadian
  let best=group, bestDist=totalRouteDist(group);
  permuteDest(group).forEach(order=>{
    const d=totalRouteDist(order);
    if (d<bestDist) { bestDist=d; best=order; }
  });
  return best;
}
function totalRouteDist(order) {
  let sum=0;
  for (let i=0;i<order.length-1;i++) {
    const a=getDestCoords(order[i]), b=getDestCoords(order[i+1]);
    if (a&&b) sum+=haversineKm(a.lat,a.lng,b.lat,b.lng);
  }
  return sum;
}
function permuteDest(arr) {
  if (arr.length<=1) return [arr];
  const result=[];
  arr.forEach((item,i)=>{
    const rest=[...arr.slice(0,i), ...arr.slice(i+1)];
    permuteDest(rest).forEach(p=>result.push([item, ...p]));
  });
  return result;
}

function readPlanFromDOM() {
  S.planDays=S.planDays.map((_,i)=>{
    const el=document.getElementById(`bucket-day${i}`);
    return el?[...el.querySelectorAll('.drag-item')].map(c=>c.dataset.id):[];
  });
  const arrEl=document.getElementById('bucket-day-arrival');
  S.planArrivalExtras=arrEl?[...arrEl.querySelectorAll('.drag-item')].map(c=>c.dataset.id).filter(id=>!id.startsWith('hotel_checkin_')):[];
  const bEl=document.getElementById('bucket-unassigned');
  S.planBacklog=bEl?[...bEl.querySelectorAll('.drag-item')].map(c=>c.dataset.id).filter(id=>!id.startsWith('hotel_checkin_')):[];
}

        title="Duplikat kartu"
        style="background:rgba(196,123,212,.15);border:1px solid rgba(196,123,212,.3);color:#c47bd4;border-radius:0;padding:3px 7px;font-size:11px;cursor:pointer;font-family:inherit;flex-shrink:0;white-space:nowrap">+</button>
    </div>`;
  }

  const hotelNames=getHotelNames();
  const hotelCards=hotelNames.map((name,idx)=>hotelCard(idx,name)).join('');
  const backlogHTML=S.planBacklog.length>0||hotelCards?`

      <div class="plan-col-header" style="color:#444444">📌 Belum Dijadwalkan
        ${S.planBacklog.length>0?`<span style="font-size:10px;background:rgba(255,200,50,.15);padding:2px 7px;border-radius:0;margin-left:6px">${S.planBacklog.length}</span>`:''}
      </div>
      <div class="plan-col-body" id="bucket-unassigned">${S.planBacklog.map(destCard).join('')}${hotelCards}</div>
    </div>`:'';

  const arrivalHTML=`
    <div class="plan-col">
      <div class="plan-col-header">
        <span class="plan-day-badge">1</span> Hari 1 — Kedatangan

      </div>
      <div class="plan-col-body arrival-bucket" id="bucket-day-arrival">
        ${S.planArrivalExtras&&S.planArrivalExtras.length>0
          ?S.planArrivalExtras.map(destCard).join('')
          :'<div class="plan-empty" style="font-size:11px">Opsional: seret destinasi kota ke sini untuk sore kedatangan</div>'}

  const actDayHTML=S.planDays.map((ids,i)=>{

    return `

        ${warnHTML}
        <div class="plan-col-body" id="bucket-day${i}">
          ${ids.map(id=>id.startsWith('hotel_checkin_')?hotelCard(parseInt(id.split('_')[2]),hotelNames[parseInt(id.split('_')[2])]||'Penginapan'):destCard(id)).join('')}
          ${ids.length===0?`<div class="plan-empty" style="padding:14px;text-align:center">

      <div style="font-size:11px;color:#888888">

      </div>

    </div>`:''}
    <div class="planning-board">${backlogHTML}${arrivalHTML}${actDayHTML}${depHTML}</div>`;
}

// ─── SORTABLEJS ───────────────────────────────────────────────────────────────
let _sortableInstances=[];
function initSortableBoard() {
  _sortableInstances.forEach(s=>s.destroy()); _sortableInstances=[];
  document.querySelectorAll('.plan-col-body').forEach(col=>{
    if(col.closest('.plan-col.locked')) return;

      animation:280,easing:'cubic-bezier(0.25,1,0.5,1)',delay:150,delayOnTouchOnly:true,
      fallbackTolerance:5,scroll:true,scrollSensitivity:80,scrollSpeed:20,bubbleScroll:true,

      ghostClass:'sortable-ghost',chosenClass:'sortable-chosen',dragClass:'sortable-drag',

    });
    _sortableInstances.push(inst);
  });

    btn.addEventListener('click',e=>{e.stopPropagation();duplicateHotelCard(btn);});

}

function duplicateHotelCard(btn) {
